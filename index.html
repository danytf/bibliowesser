dráulicos, reforzando la transparencia pública y la base jurídica de las posiciones de WWF.\n\nEn justicia ambiental, el departamento actúa en múltiples niveles. Ante la Comisión Europea, con la comunicación sobre el deslinde de Doñana que derivó en la apertura de un procedimiento investigatorio por la DG Medio Ambiente. Ante el Tribunal Supremo, la Audiencia Nacional y Tribunales Superiores de Justicia, con litigios en biodiversidad, agua y energía —incluido el caso del lobo, ver Programa de Lobo y Grandes Carnívoros—. También en vía penal, con personación en casos de veneno, furtivismo y tráfico de especies protegidas (ver Programa de Crimen Ambiental para más detalle), y ante el Defensor del Pueblo, con un recurso de inconstitucionalidad por la desprotección del lobo.\n\nEn 2023, WWF analizó por satélite una proposición de ley de PP y Vox sobre Doñana y demostró que legalizaría hasta 1.900 ha de cultivos ilegales, más del doble de las 750 ha declaradas por sus promotores. De ellas, 471,3 ha estaban en zona forestal, mediante un cambio a la Ley Forestal de Andalucía para permitir el cultivo de fresas y frutos rojos.\n\nEn noviembre de 2025, el caso de Doñana escaló: WWF presentó un recurso de reposición contra el deslinde aprobado por el Ministerio para la Transición Ecológica. Pedía su nulidad por incorporar \"errores sustanciales\" sobre el funcionamiento y la influencia mareal de la marisma. En paralelo, envió cartas de alerta a la UNESCO, la Secretaría del Convenio Ramsar y la Comisión Europea. Advirtió de que el deslinde contradice la evidencia científica sobre el carácter de marisma de agua dulce de Doñana y podría afectar a más de dos tercios de la marisma del Parque Nacional.\n\nEn marzo de 2026, la Fiscalía de la Audiencia Nacional identificó a 250 operadores por extracción ilegal de agua en Doñana. WWF respaldó esa acción judicial y presionó al Ministerio para la Transición Ecológica para que abriera expediente de responsabilidad ambiental contra ellos, en vez de retrasar el proceso.\n\nEl departamento también ha intervenido en debates regulatorios europeos frente al paquete Ómnibus, que amenaza marcos clave como la taxonomía verde y la diligencia debida.", "dato": "Convenio de Aarhus · Doñana: análisis satelital desmonta la 'ley anti-Doñana' (1.900 ha de cultivos ilegales, 2023) · Caso Doñana → procedimiento DG Medio Ambiente UE · Doñana: recurso de reposición + cartas a UNESCO/Ramsar/CE (nov. 2025) · Doñana: Fiscalía identifica 250 operadores por extracción ilegal (mar. 2026) · Lobo: litigios en Galicia, Asturias, La Rioja y Cantabria · Ámbito penal: veneno y furtivismo · 9 herencias · +80 acuerdos", "categoria": "Justicia y defensa legal", "resumenClave": "El Departamento Legal de WWF usa el derecho como herramienta de incidencia: ante la Comisión Europea, los tribunales españoles y el Defensor del Pueblo. Su independencia financiera le permite litigar contra el propio Gobierno español —como en Doñana, donde un análisis satelital de WWF desmontó una proposición de ley que habría legalizado 1.900 hectáreas de cultivo ilegal."}, {"emoji": "🤝", "name": "Participación y Voluntariado — 12 Grupos Locales en toda España", "desc": "El Programa de Participación es el músculo social de WWF: conecta la agenda ambiental global con el territorio a través de voluntarios, grupos locales y campañas ciudadanas. La Red de Grupos Locales de WWF España tiene presencia activa en 12 grupos activos en toda España. En 2025 se reforzó con encuentros presenciales y online, un nuevo Plan de Formación continua con microformaciones mensuales en colaboración con los programas de conservación, y acompañamiento directo para impulsar nuevos proyectos locales.\n\nEl programa estatal de voluntariado en Parques Nacionales (OAPN) tiene alta participación en espacios como Cabañeros, Islas Atlánticas o Sierra de Andújar. El Plan Allen, en colaboración con IKEA España, desarrolla actividades de restauración, ciencia ciudadana y educación ambiental en el entorno de Doñana. En 3 años ha restaurado 270 ha (120 de humedales y 150 de bosque), beneficiando a más de 1.000 especies. También ha formado a más de 1.200 mujeres rurales y apoyado a más de 70 emprendedores locales.\n\nLas campañas en red más destacadas de 2025 fueron la Plantación en Red, La Hora del Planeta y Walking Rivers. En marzo de 2026, La Hora del Planeta celebró su 20º aniversario: más de 400 ayuntamientos, 100 empresas y 100 organizaciones se sumaron al apagón simbólico en España. Entre los monumentos apagados estuvieron la Torre del Oro, la Sagrada Familia, la Puerta de Alcalá, el Palacio Real, la Basílica del Pilar, las Casas Colgadas, la Torre de Hércules y el Teatro Arriaga. El voluntariado participó activamente en movilizaciones climáticas (COP30 en Madrid, bajo el lema 'El clima exige acción, el futuro exige esperanza') y en defensa del lobo.\n\nEl programa también explora la educación ambiental, la ciencia ciudadana y el trabajo con jóvenes, participando en el Congreso Internacional de Educación Ambiental y el proceso del PAEAS. Los campamentos juveniles de naturaleza de WWF tienen su origen en el Refugio de Montejo, donde desde 1975 generaciones de jóvenes han aprendido conservación sobre el terreno.\n\nEl programa de Ciencia Ciudadana permite a cualquier persona contribuir con datos reales a los proyectos de seguimiento de biodiversidad de WWF: censos de fauna, inventarios de flora, detección de especies invasoras y monitoreo de hábitats. En Canarias, una app móvil recoge datos de más de 20 temas de fauna marina y terrestre y sus amenazas. En Castilla-La Mancha, otro proyecto conecta a la ciudadanía con la biodiversidad de los humedales del centro de la Península.", "dato": "12 Grupos Locales en toda España · Plantación en Red · Hora del Planeta: 20º aniversario 2026 (+400 ayuntamientos, +100 empresas, +100 organizaciones) · Walking Rivers · Plan Allen Doñana (con IKEA España: 270 ha restauradas en 3 años, +1.200 mujeres rurales formadas, +70 emprendedores apoyados) · Movilización COP30 Madrid · Campamentos juveniles (origen Montejo 1975) · Ciencia ciudadana (app Canarias +20 temas, humedales Castilla-La Mancha)", "categoria": "Participación y comunidad"}], "fondos": [{"label": "Proyectos y actividades de conservación — incluye campañas, sensibilización, captación de fondos y gastos de actividad (~7,3M€)", "pct": 66}, {"label": "Personal especializado — científicos, abogados, técnicos de conservación, comunicación y administración (~3,2M€)", "pct": 29}, {"label": "Inversiones, inmovilizado y otros (~0,5M€)", "pct": 5}], "web": "https://www.wwf.es", "problema": "El planeta ha perdido el 73% de sus poblaciones de vertebrados (mamíferos, aves, peces, anfibios y reptiles) desde 1970, según el Informe Planeta Vivo 2024 — la naturaleza se está vaciando a un ritmo sin precedentes en la historia humana. El declive no es uniforme: las especies de agua dulce son las más golpeadas (-85%), seguidas de las terrestres (-69%) y las marinas (-56%); América Latina y el Caribe es la región más afectada, con un -95%. Al mismo tiempo, el planeta encadena ya 11 años consecutivos como los más cálidos jamás registrados, con la temperatura global casi 1,5°C por encima de los niveles preindustriales.\n\nEsto no es un problema lejano ni afecta solo a la fauna salvaje. La degradación de los ecosistemas compromete el agua que bebemos, los alimentos que producimos, la polinización de los cultivos y la capacidad del planeta para amortiguar fenómenos extremos.\n\nEspaña es uno de los países más ricos en biodiversidad de Europa: alberga más de 80.000 especies de fauna y flora, el 54% del total europeo (8.000 plantas, 15.000 hongos, 50.000 invertebrados y 635 vertebrados). Ese patrimonio no es inmune a la crisis global.\n\nEn España, esa crisis tiene nombres concretos: en 2025, el peor año de incendios forestales en dos siglos calcinó cerca de 355.000 hectáreas y dejó 8 víctimas mortales y más de 42.000 personas evacuadas. El Mar Menor —la laguna salada más grande de Europa Occidental, 135 km²— colapsó en 2019 por la eutrofización causada por nitratos de la agricultura intensiva, con miles de peces muertos. Doñana sufre un robo sistemático de agua de sus acuíferos. Y menos del 7% de los crímenes ambientales que se denuncian en España llegan a juzgarse.", "motivosSocio": ["La prueba de que sí se puede revertir: a principios de siglo, el lince ibérico era el felino más amenazado del mundo, con menos de 100 ejemplares. En 2025 son 2.663 — el mayor éxito de recuperación de un mamífero en toda Europa, con nuevas poblaciones en seis comunidades autónomas y Portugal. No es un caso aislado: es la prueba de que la conservación funciona cuando hay financiación sostenida.", "El mar también se recupera cuando se le deja. En Baleares, las poblaciones de rayas han vuelto a niveles de abundancia comparables a los años 60 — una de las señales más claras de que la gestión pesquera basada en ciencia funciona. La biomasa pesquera en el Mediterráneo ha crecido más de un 25% en zonas con medidas de protección. España ya protege el 27,5% de su superficie marina, camino del 30% en 2030, y desde enero de 2026 el Tratado Global de los Océanos permite por primera vez crear áreas protegidas en alta mar.", "Independencia total, sin depender de gobiernos ni empresas: los ~50.000 socios en España (parte de los +6 millones en el mundo) financian el 53% del presupuesto anual de WWF España (~11M€). Esa independencia es lo que permite a WWF llevar casos contra el propio Gobierno español ante la Comisión Europea cuando incumple normativa ambiental — algo que una organización dependiente de subvenciones públicas no podría permitirse.", "Tecnología al servicio de la defensa del territorio: WWF detecta el robo de agua en acuíferos sobreexplotados mediante imágenes satelitales, una metodología que ya están adoptando administraciones públicas. En 2025 consiguió que se acordara una reducción del bombeo ilegal en el entorno de Doñana — algo que llevaba décadas sin resolverse por vías convencionales.", "58 años de historia con raíces en la conservación española: WWF nació en España en 1968 como ADENA, fruto de la campaña que salvó las marismas de Doñana de la desecación. Esa misma filosofía —proteger antes de que sea demasiado tarde— sigue guiando programas como la restauración de Doñana o la recuperación del lince."], "fuentesCompletas": [{"texto": "WWF España · Memoria de Conservación 2025 (documento principal de esta ficha)", "url": "https://wwfes.awsassets.panda.org/downloads/resumen-memoria-2025.pdf"}, {"texto": "WWF · Informe Planeta Vivo 2024 (pérdida de biodiversidad)", "url": "https://www.wwf.es/nuestro_trabajo/informe_planeta_vivo_ipv/informe_planeta_vivo_2024_resolver_la_crisis/"}, {"texto": "WWF España · Incendios extremos: el reto de adaptar el territorio (2026)", "url": "https://wwfes.awsassets.panda.org/downloads/informe-2026-wwf-incendios-extremos--el-reto-de-adaptar-el-territorio.pdf"}, {"texto": "wwf.es · Portal oficial de WWF España (bosques, agua, Doñana, océanos, alimentos, clima y energía, especies y hábitats, participación, Refugio de Montejo, campañas y actualidad)", "url": "https://www.wwf.es/"}, {"texto": "Huelva24 · WWF respalda la acción judicial de la Fiscalía por extracción ilegal de agua en Doñana (mar. 2026)", "url": "https://www.andaluciainformacion.es/articulo/huelva/wwf-apoya-demanda-fiscalia-que-exige-medidas-reparacion-extraccion-ilegal-agua-donana/202603071314463224483.html"}, {"texto": "WWF España · Victorias para la naturaleza 2026", "url": "https://www.wwf.es/buenas_noticias_naturaleza_en_positivo/victorias_para_la_naturaleza_2026/"}, {"texto": "WWF España · Informe Autopistas Salvajes (conectividad y adaptación al cambio climático)", "url": "https://www.wwf.es/nuestro_trabajo/especies_y_habitats/conectividad_y_adaptacion_al_cambio_climatico/"}], "verificado": "Datos verificados julio 2026", "captacion": {"resumen30": {"cifras": ["2.663", "73%", "27,5%"], "labels": ["linces ibéricos en 2025 — de menos de 100 a principios de siglo: el mayor éxito de conservación de un mamífero en Europa", "de reducción en poblaciones mundiales de vertebrados desde 1970 — las especies de agua dulce son las más golpeadas, con un -85%", "del mar español protegido, camino del 30% en 2030 — y desde enero de 2026 el Tratado Global de los Océanos permite crear áreas protegidas en alta mar"], "cierre": "WWF trabaja con un objetivo claro para 2030: frenar a cero la pérdida neta de especies y hábitats, y reducir a la mitad la huella ecológica y las emisiones de la humanidad.", "videoDestacado": {"url": "https://www.youtube.com/watch?v=DlMfJPCXrpA", "titulo": "WWF Informe Planeta Vivo 2024 — La naturaleza está desapareciendo", "duracion": "1:28"}}, "proyectosClave": [1, 10, 0], "argumentario": [0, 2, 3]}, "speech": {"parada": "¿Tienes un minuto y medio? Te voy a contar cómo podría ser un día normal, dentro de 20 años, si nada cambia.", "discurso": "Imagina un día cualquiera de verano, dentro de 20 años, en una ciudad española.\n\nHace tanto calor que salir a la calle a partir de las 11 de la mañana no es seguro para muchas personas. El planeta ya lleva 11 años consecutivos siendo el más cálido jamás registrado, casi 1,5 grados por encima de lo normal, y la tendencia no se ha revertido. En el supermercado, ciertos alimentos —frutas, verduras, pescado— son más caros y más irregulares, porque las cosechas dependen de un clima que cada año es menos predecible. El sistema alimentario actual ya es responsable del 26% de las emisiones mundiales. En las noticias, otro incendio forestal ha obligado a evacuar un pueblo. 2025 fue el peor año de incendios en dos siglos en España, con cerca de 355.000 hectáreas quemadas, 8 víctimas mortales y más de 42.000 personas evacuadas. Los bosques, que ya cubren menos de un tercio de la superficie que podrían ocupar, siguen reduciéndose. Cada vez se ven menos animales silvestres: el planeta ha perdido el 73% de sus poblaciones de vertebrados desde 1970. Y cuando hay restricciones de agua, no es solo \"culpa de la sequía\": el 80% del agua de zonas como Doñana ya se destina al regadío agrícola. Ríos y lagunas enteras —como el Mar Menor, la más grande de Europa Occidental— han colapsado por la contaminación, con miles de peces muertos.\n\nNada de esto es ciencia ficción. Es, literalmente, la proyección de lo que ya está pasando, si simplemente seguimos igual.\n\nPero hay buenas noticias: nada de esto está cerrado todavía. El lince ibérico, que hace 25 años rozaba la extinción, ya supera los 2.600 ejemplares — la prueba de que conservar funciona. España ya protege el 27,5% de su superficie marina, camino del 30% en 2030. En 2025 se aprobó una ley para reducir el desperdicio de alimentos. Y en Doñana, en 2025, se restauraron 134 hectáreas de humedales — el mayor proyecto de este tipo hasta ahora — con un nuevo plan de 3,3 millones de euros para la próxima década. La diferencia entre el día que acabo de describir y un día normal, sin sobresaltos, depende de cuánto y cuán rápido se haga esto.", "cierre": "WWF trabaja en todos esos frentes a la vez —clima, agua, alimentación, incendios, especies— y lo hace sin depender de gobiernos ni empresas. Sus ~50.000 socios en España financian más de la mitad de su presupuesto, lo que le permite actuar incluso contra el propio Gobierno cuando hace falta. Por unos 12 euros al mes — unos 140-150 al año — formas parte de quienes están evitando que ese día de dentro de 20 años sea así. ¿Te animas?"}, "fondosNota": "Nota: el desglose de WWF España clasifica gastos por naturaleza contable. La captación de fondos y la administración están distribuidas dentro de las categorías de personal y actividades. Las cuentas pasan una auditoría externa anual, aprobada por la Asamblea General, y están sujetas a la Ley de Subvenciones (38/2003). Fuente: Presupuesto y cuentas auditadas WWF España.", "videos": [{"titulo": "WWF Informe Planeta Vivo 2024 — La naturaleza está desapareciendo", "tipo": "Informe de impacto global", "duracion": "1:28", "url": "https://www.youtube.com/watch?v=DlMfJPCXrpA", "anio": "2024"}, {"titulo": "Nuevo Informe: Incendios Forestales 2025", "tipo": "Informe de urgencia — incendios", "duracion": "1:30", "url": "https://www.youtube.com/watch?v=PhkhXLOwD7c", "anio": "2025"}, {"titulo": "Tres años, 400 hectáreas y un objetivo: recuperar Doñana", "tipo": "Documental de proyecto", "duracion": "3:08", "url": "https://www.youtube.com/watch?v=ej2-uFXXhag", "anio": "2025"}, {"titulo": "Los momentazos de Territorio Lince 2025", "tipo": "Resumen del año — lince ibérico", "duracion": "1:16", "url": "https://www.youtube.com/watch?v=SmY4YhgwR_Q", "anio": "2025"}, {"titulo": "Restaurando el mar: el proyecto LIFE ECOREST devuelve la vida al Mediterráneo", "tipo": "Documental de proyecto marino", "duracion": "1:55", "url": "https://www.youtube.com/watch?v=-96VcCnB-Hw", "anio": "2024"}, {"titulo": "Restaurando el Humedal de Las Islillas", "tipo": "Documental de proyecto", "duracion": "2:37", "url": "https://www.youtube.com/watch?v=J490SUmJNXk", "anio": "2025"}, {"titulo": "La fuerza del grupo — Grupos Locales WWF España", "tipo": "Spot de voluntariado", "duracion": "1:34", "url": "https://www.youtube.com/watch?v=ANmbFgFsA38", "anio": "2025"}, {"titulo": "Día de la Tierra 2024 — Alimentación sostenible", "tipo": "Divulgación — sistema alimentario", "duracion": "4:49", "url": "https://www.youtube.com/watch?v=5Yi9vnTdMzc", "anio": "2024"}, {"titulo": "WWF de cerca (serie de 7 episodios)", "tipo": "Serie — el equipo de WWF España cuenta sus proyectos en primera persona", "duracion": "7 episodios", "url": "https://www.youtube.com/watch?v=ezIJeenXf7E", "anio": "2023"}], "ultimaActualizacion": "julio 2026"}</script>
<script type="application/json" id="data-fjc">{"id": "fjc", "emoji": "🩸", "nombre": "FJC", "full": "Fundación Josep Carreras contra la Leucemia", "color": "#7c3aed", "claim": "Fundada en 1988 por Josep Carreras, tenor superviviente de una leucemia que en 1987 le devolvió la vida un trasplante de médula ósea. En la habitación de al lado de su primer ingreso había un bebé de dos años: le invadió una sensación de injusticia — él, con 40 años, ya había vivido décadas enteras — y fue eso lo que le impulsó a crear la Fundación.\n\nDesde entonces, la Fundación cubre todo el recorrido de la enfermedad: gestiona el REDMO —único registro oficial de donantes de médula de España, por mandato del Ministerio de Sanidad— e impulsa investigación a través del Instituto de Investigación contra la Leucemia Josep Carreras. También acompaña a pacientes y familias.\n\n520.508 donantes activos en el REDMO — 5.º registro de Europa. 149.867 socios en toda España sostienen esta labor.\n\nJosep Carreras sigue siendo hoy el presidente de la Fundación que fundó: \"Me planteé un objetivo: conseguir que, algún día, la leucemia fuese una enfermedad curable en todos los casos.\" Hasta que la curemos, no pararemos.", "meta": [{"label": "Fundada", "val": "1988 (REDMO: 1991)"}, {"label": "Donantes REDMO", "val": "520.508 (5.º Europa / 13.º mundo)"}, {"label": "Socios FJC", "val": "149.867 activos"}, {"label": "Probabilidad compatibilidad", "val": "1 entre 3.500"}], "cifras": [{"num": "3 de cada 4", "label": "Pacientes con leucemia u otra enfermedad de la sangre que no tienen un familiar compatible para donarles médula ósea — dependen de encontrar a un desconocido en el REDMO."}, {"num": "2 de cada 10", "label": "Niños con leucemia que no superan la enfermedad, pese a la mejora de los índices de curación en las últimas décadas. En adultos, la supervivencia es del 50%."}, {"num": "520.508", "label": "Donantes activos en el REDMO a 31 dic. 2025 (eran 505.505 en 2024). España es el 5.º registro de Europa y el 13.º del mundo.", "fuente": "REDMO · Memoria de Impacto 2025 / FJC Memoria 2024"}, {"num": "794", "label": "Trasplantes coordinados para pacientes en España en 2025. En 2024 fueron 748 (+18% vs 2023). Desde 1991 se han coordinado 15.435 trasplantes.", "fuente": "REDMO · Memoria de Impacto 2025 / Ministerio de Sanidad-ONT, 1 mayo 2026"}, {"num": "26 días", "label": "Mediana de búsqueda de donante compatible en 2025 (27 días en 2024). El 84% de los pacientes encuentra donante antes de 60 días.", "fuente": "REDMO · Memoria de Impacto 2025"}, {"num": "481", "label": "Donaciones efectivas en 2025 (+14% vs 2024). En 2024 fueron 426. En 2012, cuando empezó el REDMO, solo se realizaban 35 al año.", "fuente": "REDMO · Memoria de Impacto 2025"}, {"num": "60.886", "label": "Unidades de sangre de cordón umbilical en el REDMO (2025). España es el 1.º de Europa y 3.º del mundo en unidades disponibles.", "fuente": "REDMO · Memoria de Impacto 2025"}, {"num": "149.867", "label": "Socios activos de la Fundación Josep Carreras en 2024, con una cuota media de 38,23€. A punto de alcanzar los 150.000.", "fuente": "FJC · Memoria de Actividades 2024"}], "programas": [{"emoji": "🗃️", "name": "REDMO — El único registro oficial de donantes de médula de España", "desc": "El REDMO (Registro de Donantes de Médula Ósea de España) fue creado por la Fundación Josep Carreras en 1991 para cubrir un vacío crítico. Tres de cada cuatro pacientes con leucemia no disponen de un familiar compatible y necesitan encontrar a un donante desconocido. Su pleno desarrollo llegó en 1994, con la firma del primer acuerdo marco con el Ministerio de Sanidad y la ONT, integrándolo en el Sistema Nacional de Salud como registro oficial único.\n\nEn 2024, el REDMO superó el hito de 505.505 donantes (septiembre 2024), con 30.010 nuevas incorporaciones (+27% vs 2023). A 31 de diciembre de 2025 son ya 520.508 donantes activos. España se posiciona como el 5.º registro de Europa y el 13.º del mundo.\n\nEn 2024 se coordinaron 426 donaciones efectivas (+8% vs 2023) y 748 trasplantes para pacientes españoles (+18% vs 2023). En 2025: 481 donaciones y 794 trasplantes. El tiempo mediano de búsqueda es de 26-27 días. El 84-85% de los pacientes encuentra donante antes de 60 días.\n\nDesde su creación hasta fin de 2025, el REDMO ha transformado 15.435 vidas. En 2024 obtuvo la acreditación Full Standard de la WMDA, la máxima certificación mundial en calidad y seguridad. El REDMO está conectado a la red internacional WMDA.\n\nEn 2025 se inscribieron 24.829 nuevos donantes (+3% vs 2024), con una edad media de 30 años.\n\nEn mayo de 2026, 1.083 pacientes de médula ósea estaban activos en el REDMO, buscando en ese mismo momento un donante compatible.\n\nEl \"rejuvenecimiento\" del registro es uno de los logros que el Ministerio de Sanidad destaca del Plan Nacional de Médula Ósea (PNMO), en marcha desde 2012 y que completó su tercera fase en 2025. España alcanzó un 27% de autoabastecimiento en 2025 (trasplantes con donante español, sin depender del extranjero), frente al 3% de 2012.\n\nGracias al proyecto Ready to Ship (R2S), el 7% de las unidades de sangre de cordón umbilical del REDMO —las de mayor calidad— están ya caracterizadas y pre-liberadas para uso inmediato en caso de urgencia. Detrás de cada cifra hay una historia: Hugo, donante de 20 años, se apuntó al registro al donar sangre por primera vez y, seis meses después, fue compatible con un paciente. Pastora, madre de una bebé de 23 días cuando fue diagnosticada de leucemia, recibió un trasplante de un donante anónimo y hoy celebra un año de nueva vida junto a sus hijos.\n\nEn enero de 2026, el Ministerio de Sanidad, la ONT y la Fundación Josep Carreras renovaron el convenio de colaboración que mantienen desde hace más de 30 años para impulsar la donación y el trasplante de médula ósea. Además, prácticamente todas las comunidades autónomas firman convenios propios con la Fundación para financiar el acceso de sus pacientes al REDMO. Destacan Castilla y León (5.688.768€, renovado por 4 años, colaboración activa desde 2015, que en 2025 permitió registrar a 764 nuevos donantes solo en esa comunidad), Galicia (885.000€) y Baleares (3,7M€), entre otras.", "dato": "520.508 donantes (2025) · 481 donaciones · 794 trasplantes · 26 días mediana · 15.435 vidas en 35 años · Full Standard WMDA · 24.829 nuevos donantes 2025 (+3%) · 30 años edad media (rejuvenecimiento REDMO) · 27% autoabastecimiento (vs 3% en 2012) · 7% unidades SCU pre-liberadas (proyecto R2S) · Renovación convenio Sanidad-ONT-FJC (ene. 2026, +30 años) · Convenios autonómicos: Castilla y León (5,69M€), Galicia (885.000€), Baleares (3,7M€)"}, {"emoji": "💉", "name": "Proceso de donación — gratuito, sin cirugía en el 81% de los casos", "desc": "Inscribirse en el REDMO es gratuito y puede hacerse en cualquier centro de transfusión de sangre de España o llamando al 900 32 33 34. El proceso empieza con una extracción de sangre para tipificación HLA. Si en algún momento se identifica un paciente compatible, el donante es contactado y recibe toda la información antes de tomar ninguna decisión, sin ningún tipo de compromiso previo.\n\nEl 81% de las donaciones en 2025 se realizan por aféresis de sangre periférica (88% en 2024). Durante 4-5 días previos se administra un medicamento que moviliza las células madre desde la médula al torrente sanguíneo, y luego se extraen mediante una máquina de aféresis, igual que con las plaquetas. El donante vuelve a casa el mismo día.\n\nEl 9% son por extracción directa de médula ósea bajo anestesia general (recuperación de 2-3 días). El 9% restante son linfocitos o boosts. En todos los casos, todos los gastos (desplazamiento, alojamiento, médicos, días laborables) son cubiertos íntegramente por la Fundación.\n\nEl perfil de donante más demandado clínicamente: varón joven (18-40 años). La edad media de los nuevos inscritos en 2025 es de 30 años. La probabilidad de que dos personas no emparentadas sean compatibles es de aproximadamente 1 entre 3.500 — por eso cada nueva inscripción cuenta, y por eso el registro necesita ser lo más amplio y diverso posible.\n\nAmanda, enfermera de oncología pediátrica de 25 años, donó por aféresis: \"pude ofrecerle la oportunidad de seguir viviendo a una persona anónima\". Guillem, en cambio, donó médula ósea por punción en la cresta ilíaca para un niño con leucemia: \"los médicos me recomendaron hacer la donación por punción en las crestas ilíacas de la pelvis [...] os puedo asegurar de que no lo es\" [doloroso].", "dato": "Gratuito · Sin compromiso previo · 81% sin cirugía (aféresis, como plaquetas) · Todos los gastos cubiertos · 900 32 33 34 · Probabilidad compatibilidad no emparentada: 1 entre 3.500"}, {"emoji": "🏛️", "name": "Instituto Josep Carreras — el centro más grande de Europa en leucemia", "desc": "El Instituto de Investigación contra la Leucemia Josep Carreras es el primer centro de investigación europeo focalizado exclusivamente en la leucemia y las hemopatías malignas, y uno de los únicos en el mundo. Fue fundado en 2010 por la Generalitat de Cataluña y la Fundación Josep Carreras. Tiene 6 localizaciones coordinadas (Hospital Can Ruti de Badalona, Hospital Sant Pau, Hospital Clínic, Hospital del Mar, Hospital Trueta de Girona y, desde julio de 2025, Sant Joan de Déu) y es un centro CERCA de la Generalitat de Cataluña.\n\nEste sexto campus nació de una alianza con Sant Joan de Déu valorada en más de 10 millones de euros para crear un programa conjunto de investigación en leucemia infantil. La Fundación Josep Carreras financia la adecuación de los espacios, el equipamiento y 4 equipos propios de investigadores; Sant Joan de Déu aporta otros 4 equipos y 300 m² de laboratorios, posible gracias al legado que el Sr. Carles Parrera Casanovas dejó a beneficio de la investigación oncológica infantil. El nuevo campus forma parte de la red \"Alianza PReTI\" (Pediatric Research Technology and Innovation Alliance).\n\nEn 2024 cuenta con más de 400 profesionales (366 investigadores y técnicos, 58 de gestión), 40 grupos de investigación y 4 programas. Sus investigaciones abarcan todos los aspectos de la leucemia: diagnóstico genómico, mecanismos moleculares, desarrollo de terapias avanzadas, mejora de CAR-T, epidemiología y medicina personalizada.\n\nEn 2024 recibió la acreditación provisional como Centro de Excelencia Severo Ochoa del Ministerio de Ciencia, el máximo reconocimiento académico en España (pendiente de confirmación definitiva).\n\nEn 2025, 2 tratamientos desarrollados íntegramente en el Instituto iniciaron ensayos clínicos con pacientes.\n\nEse mismo año, el Instituto captó 14,7 millones de euros en financiación externa competitiva (proyectos, becas y convenios), al margen de la aportación directa de la Fundación.\n\nDesde su fundación, la Fundación Josep Carreras ha aportado más de 71 millones de euros al Instituto; 6,995 millones en 2024. El Instituto realiza más de 600.000 horas anuales de investigación.\n\nEn la última evaluación CERCA, el Instituto obtuvo la calificación A — la máxima posible — lo que garantiza la continuidad presupuestaria por parte de la Generalitat de Catalunya durante los próximos 4 años. En abril de 2025, el Dr. Ari Melnick (Weill Cornell, Nueva York), referente internacional en linfomas de células B y leucemias agudas, relevó al Dr. Manel Esteller en la dirección del Instituto. El Instituto Josep Carreras es el centro más grande de Europa dedicado en exclusiva a la investigación contra la leucemia y otros cánceres de la sangre.\n\nJosé María fue diagnosticado con leucemia linfoblástica aguda a los 5 años — un cáncer con más prevalencia entre las personas con síndrome de Down, como él. En 2018 accedió a un ensayo clínico de inmunoterapia CAR-T pionero en España.", "dato": "+400 profesionales · 40 grupos, 4 programas · 6 sedes hospitalarias (6ª: Sant Joan de Déu, jul. 2025) · Severo Ochoa 2024 · 71M€ histórico (6,995M€ en 2024) · 600.000h/año investigación · CERCA: calificación A (4 años garantizados) · Dr. Ari Melnick, director desde abr. 2025 · Centro más grande de Europa · Alianza Sant Joan de Déu: +10M€, leucemia infantil, legado Carles Parrera Casanovas"}, {"emoji": "🔬", "name": "Avances científicos 2025-2026 — de la mesa de laboratorio al paciente", "desc": "En 2026, el Instituto Josep Carreras acumula avances destacados: la identificación de un \"interruptor protector\" en el cáncer de sangre más frecuente y la descripción de dos fases clave en el origen de la leucemia infantil más frecuente. También una nueva forma de entender el cáncer mediante \"ecosistemas dinámicos\" de características tumorales, y avances en la identificación de tipos celulares poco frecuentes mediante integración multiómica.\n\nEn el ámbito tecnológico, el equipo de Spatial Biology, liderado por el Dr. Eduard Porta y la Dra. Daniela Grases, ha procesado más de 1.000 muestras de tejido y publicó en 2025 la primera guía práctica mundial de Transcriptómica Espacial en la revista Trends in Biotechnology. Es una tecnología clave para diagnósticos más rápidos, precisos y personalizados en cáncer hematológico.\n\nEl Instituto cuenta también con un Centro de Diagnóstico Computacional que integra datos biológicos con inteligencia artificial para acelerar el desarrollo de nuevos enfoques diagnósticos y terapéuticos. Para asegurar el futuro de esta investigación, el programa CarrerasLeaders financia a 16 investigadores postdoctorales de excelencia durante 36 meses, con selección por mérito y revisión por pares internacional, impulsando su desarrollo en liderazgo, independencia y consolidación científica.\n\nEl compromiso de los socios de la Fundación permitió incorporar en 2026 un nuevo secuenciador MiSeq i100 de Illumina, financiado íntegramente con sus aportaciones. Se suma al MiSeqDx ya existente y refuerza la Unidad de Genómica, dirigida por la Dra. Raquel Pluvinet, referente en estudios genómicos aplicados a la investigación traslacional de los cánceres de la sangre.\n\nEn el ámbito clínico, nació en 2026 la Beca Josep Carreras (300.000€), una nueva convocatoria conjunta con el GETH-TC (Grupo Español de Trasplante Hematopoyético y Terapia Celular) para impulsar la investigación y la innovación en trasplante de médula ósea. El proyecto ganador de su primera edición, presentado en el Symposium Josep Carreras sobre el Donante Ideal (Málaga, 2026), compara dos estrategias de selección de donante: trasplante haploidéntico frente a donante no emparentado parcialmente compatible. Lo lideran los Dres. Ignacio Gómez-Centurión y Mi Kwon (Hospital Gregorio Marañón) junto a la Dra. María Jesús Pascual (Hospital Regional de Málaga).\n\nEn 2026, el Instituto publicó en Nature (con Mass General Brigham, Boston) el descubrimiento de SIRT7, una proteína clave en la protección del cromosoma X y la estabilidad del genoma, con implicaciones sobre las diferencias entre sexos en salud y envejecimiento. Otro estudio internacional (~5.000 pacientes de 14 estudios, con la Universidad de Nueva York y la de British Columbia) identificó un subtipo del linfoma difuso de células B grandes hasta 4 veces más letal en mujeres por alteraciones en los genes SPEN y NOTCH2, abriendo una vía terapéutica con inhibidores de IRAK. El proyecto VulnerAM, del Dr. Lucas Pontel y financiado por el Ministerio de Ciencia, Innovación y Universidades, busca nuevas vulnerabilidades terapéuticas en la leucemia mieloide aguda.", "dato": "2026: 4 avances científicos (interruptor protector, leucemia infantil, ecosistemas dinámicos tumorales, multiómica) · Spatial Biology: +1.000 muestras, 1ª guía mundial 2025 (Trends in Biotechnology) · Centro de Diagnóstico Computacional con IA · CarrerasLeaders: 16 postdocs/36 meses · Nuevo secuenciador MiSeq i100 financiado por socios · Beca Josep Carreras 2026: 300.000€ con GETH-TC · Estudio Nature (SIRT7, con Mass General Brigham) · Subtipo de linfoma 4x más letal en mujeres (SPEN/NOTCH2, ~5.000 pacientes) · Proyecto VulnerAM (Dr. Pontel, financiación Ministerio de Ciencia)"}, {"emoji": "🏠", "name": "Pisos de Acogida — Un hogar lejos de casa", "desc": "El programa de alojamientos de acogida de la Fundación Josep Carreras ofrece un hogar temporal gratuito a los pacientes que necesitan desplazarse a Barcelona para recibir trasplante de médula ósea o tratamiento CAR-T, y a sus cuidadores.\n\nEn 2025 dispone de 9 pisos situados cerca del Hospital Clínic, Hospital Vall d'Hebron, Hospital de Sant Pau, ICO-Badalona e ICO-L'Hospitalet, y 5 hoteles solidarios. En 2024 se atendió a 105 pacientes y cuidadores (+48% vs 2023), con una ocupación cercana al 80%.\n\nLos 8 pisos acogieron a 54 pacientes adultos (59 estancias, 2.030 pernoctaciones, media de 37 días de estancia). Los 5 hoteles acogieron a 51 pacientes, incluyendo niños (81 estancias, 184 pernoctaciones, media de 3,6 días).\n\nEn 2024 se tuvo que denegar 53 peticiones por falta de disponibilidad. El precio medio de una habitación de hotel en Barcelona es de 183€/noche: en los casos de estancias más largas (hasta unos 109 días), la Fundación evitó a los pacientes gastos de hasta 19.947€ por estancia. En 2024 se completó la reforma integral de 6 de los 8 pisos gracias al apoyo de empresas colaboradoras.\n\nDesde el inicio del programa en 1994, la red de pisos y hoteles ha acumulado 2.300 días de acogida y ha atendido a 766 pacientes únicos. En 2025 acogió a 102 familias.\n\nVanesa, de Tortosa, tuvo que alojarse en uno de estos pisos a 200 km de su hospital tras recaer con una leucemia mieloblástica secundaria a un linfoma folicular: \"a pesar de estar lejos, me sentí como en casa, estuve muy bien acompañada\".", "dato": "8 pisos gratuitos en Barcelona (Clínic, Sant Pau, Vall d'Hebron, ICO-Duran i Reynals, ICO-Badalona) + 5 hoteles concertados · 2 pisos para trasplante autólogo domiciliario (15-20 días) · Resto para trasplante alogénico y CAR-T (estancias más largas) · 105 pacientes 2024 (+48%) · Consultas médicas 24h/365: Dr. Enric Carreras (~1.500/año, España + Latinoamérica) · Información y acompañamiento: ~16 consultas/día laborable · Programa de Experiencia del Paciente desde 2022 (manuales, vídeos, artículos, documentales)"}, {"emoji": "🧬", "name": "Spin-offs — De la leucemia al laboratorio al paciente", "desc": "La Fundación impulsa la creación de empresas biotecnológicas que llevan los resultados de investigación del Instituto al paciente real. En 2024 destacan dos spin-offs en fase clínica.\n\nOneChain Immunotherapeutics desarrolla OC-1, una terapia CAR-T para la leucemia T/mieloide cortical agresiva (coT-ALL), un tipo poco frecuente y de muy mal pronóstico. En mayo de 2024 fue tratado el primer paciente en el ensayo clínico CARxALL en el Hospital Clínic y el Hospital Sant Joan de Déu de Barcelona. En marzo, OneChain obtuvo financiación de 3,8 millones de euros del programa TransMisiones del Gobierno para el diseño de nuevas partículas virales mediante inteligencia artificial.\n\nLeukos Biotech desarrolla AOP208, un fármaco que bloquea el receptor de serotonina 1b (diana nunca antes utilizada en oncología), dirigido a las células madre leucémicas responsables del desarrollo y recaída de la leucemia. En octubre de 2024 inició el ensayo clínico SERONCO-1 en el Hospital Vall d'Hebron, después de más de 10 años de investigación liderada por la Dra. Ruth Risueño.", "dato": "OneChain: primer paciente CAR-T mayo 2024 · Leukos Biotech: primer paciente AOP208 octubre 2024 · 2 spin-offs en ensayo clínico activo"}, {"emoji": "🌐", "name": "Red WMDA y cordón umbilical — España, 1.º Europa en SCU", "desc": "El REDMO está integrado en la World Marrow Donor Association (WMDA), la red que conecta registros de más de 30 países. Esta integración transforma la búsqueda: cuando un paciente español no encuentra donante en el REDMO, la búsqueda se extiende automáticamente a millones de donantes en el mundo, y viceversa.\n\nEn 2025, de las 481 donaciones desde España, 270 viajaron a 29 países distintos. De los 794 trasplantes para pacientes españoles, 215 usaron donantes del registro español (autosuficiencia del 27%; objetivo ONT: 35%) y el resto vinieron de Alemania (267), Polonia (56), Reino Unido (48), Italia (36) y EEUU (64), entre otros.\n\nAdemás, España es el primer país de Europa y tercero del mundo en número de unidades de sangre de cordón umbilical disponibles: 60.886 unidades (2025). Las gestionan bancos públicos en Málaga (20.968), Barcelona (18.657), Madrid (7.995), Galicia (6.371) y Valencia (4.953). La sangre de cordón es especialmente útil para pacientes pediátricos y casos con compatibilidad HLA difícil, ya que está disponible de forma inmediata.", "dato": "30+ países conectados · 270 donaciones enviadas al extranjero en 2025 · 60.886 unidades SCU · 1.º Europa · 3.º mundo"}, {"emoji": "👥", "name": "Comunidad Imparable — 149.867 socios y sensibilización", "desc": "La Fundación Josep Carreras tiene una comunidad de socios y colaboradores que en 2024 alcanzaba los 149.867 socios activos, a punto de llegar a los 150.000. La cuota media es de 38,23€ y las cuotas y donativos de socios regulares supusieron 18,5 millones de euros.\n\nLa campaña de sensibilización 'El mejor anuncio del mundo' llegó a más de 7,5 millones de personas. Cada año, la Semana contra la Leucemia (21-28 de junio) moviliza a toda la organización con estands informativos y campañas en medios y redes. También el Día de los Imparables — en 2024 en el CaixaForum de Valencia con más de 2.000 pacientes y familias, y en su 15ª edición de 2026 en el Museo Guggenheim de Bilbao, con más de 1.700 participantes y 272 iniciativas solidarias registradas ese mismo día.\n\nEn 2024 se gestionaron 525 iniciativas solidarias que recaudaron 324.062€, organizadas por particulares, empresas y asociaciones en toda España. Más de 900 empresas y entidades forman parte del plan de alianzas corporativas: Banco Santander seleccionó el programa \"Un hogar lejos de casa\" en su convocatoria \"Euros de tu Nómina\" 2026, y la carrera solidaria OnCodines Trail recaudó en su 6ª edición un récord de 303.733€ para modernizar las herramientas tecnológicas del REDMO. La tienda solidaria online facturó 116.101€ en 2024 con 680 pedidos.\n\nLa Fundación cuenta también con un programa de herencias y legados solidarios, con una gestora dedicada (Albertina Grau) y contacto directo (herencias@fcarreras.es, 900 32 33 34). Permite tres modalidades: legar un bien concreto, ser coheredero, o nombrar a la Fundación heredera universal. Es precisamente un legado —el del Sr. Carles Parrera Casanovas— el que ha hecho posible el sexto campus del Instituto en alianza con Sant Joan de Déu (ver programa del Instituto Josep Carreras). Concepción legó en 1994 su vivienda cerca del Hospital Clínic, que se convirtió en el primer piso de acogida del programa y ya ha alojado a 155 pacientes hematológicos y sus familias. Natividad, mediante testamento solidario, financió el separador celular FACS ARIA que hoy usa el Instituto y que lleva su nombre en una placa.\n\nLa Fundación Josep Carreras no está sola: forma parte de una red internacional de fundaciones hermanas. En Alemania, la Deutsche José Carreras Leukämie Stiftung ha recaudado más de 270 millones de euros en 30 ediciones de su gala televisiva contra la leucemia, financiando 1.552 proyectos (960 becas de investigación, equipamiento asistencial y ayudas sociales a pacientes).\n\nEn Suiza, la Fondation José Carreras de Ginebra mantiene un programa de tipaje de alta resolución de unidades de cordón umbilical, accesibles para cualquier paciente del mundo, y financia el proyecto SWISSCORD junto a hospitales pediátricos de Zúrich y Lausana. En Estados Unidos, la cátedra Josep Carreras / E.D. Thomas en el Fred Hutchinson Cancer Center de Seattle financia investigación de primer nivel en leucemia mieloide aguda.\n\nA través del REDMO, España tiene acceso a más de 40 millones de donantes disponibles en todo el mundo, y ha contribuido a más de 13.576 trasplantes no emparentados a nivel mundial. Es una cifra distinta a los 15.435 trasplantes recibidos por pacientes en España: estos 13.576 son las veces que un donante español ha sido el origen de un trasplante, en España o en cualquier otro país del mundo.\n\n\"Un Match x una Vida\" es una campaña del Ministerio de Sanidad, la ONT, las comunidades autónomas y la Fundación Josep Carreras dentro del Plan Nacional de Médula Ósea. Está dirigida especialmente a hombres jóvenes de 18 a 40 años, el perfil más necesario y menos representado en el registro. El \"Match Tour\" es un autobús que recorre ciudades de España con actividades de divulgación e inscripción de donantes en directo.", "dato": "149.867 socios · 18,5M€ en cuotas regulares · 525 iniciativas solidarias · 900+ empresas colaboradoras (Banco Santander, OnCodines Trail 303.733€) · Día de los Imparables 2026: Bilbao, +1.700 participantes · Herencias: Concepción (1er piso, 155 pacientes), Natividad (FACS ARIA) · 7,5M personas campaña · Red internacional: Alemania (~250M€/31 galas TV), Suiza (SWISSCORD), Seattle (cátedra Fred Hutch) · 40M+ donantes mundiales vía REDMO · \"Un Match x una Vida\": Match Tour (bus por ciudades de España, Ministerio de Sanidad)"}, {"emoji": "🩺", "name": "Programa de Experiencia del Paciente", "desc": "Iniciado en 2022, el Programa de Experiencia del Paciente diseña e implementa proyectos que mejoran la calidad de vida de pacientes con leucemia y hemopatías malignas más allá del ámbito estrictamente médico.\n\nEl Proyecto CORAL estudia exhaustivamente la experiencia del paciente adulto joven (18-39 años) con leucemia aguda o linfoma agresivo, desde el prediagnóstico hasta la larga supervivencia, para diseñar un modelo de atención de ámbito nacional. En 2024 se realizó el estudio cualitativo en el Hospital Clínic de Barcelona, con validación posterior en 3 hospitales más.\n\nEl Proyecto EICR 360º (con Sanofi) trabaja la enfermedad injerto contra receptor crónica, que afecta a múltiples órganos (piel, ojos, articulaciones, pulmón) en supervivientes de trasplante, con un manual práctico de más de 60 páginas y vídeos testimoniales.\n\nEl podcast Imparables por un tubo, disponible en Spotify, Apple Podcasts y YouTube, ofrece información de calidad a pacientes y familias desde 2023. Desde 2010 se han atendido más de 22.000 consultas de orientación médica y otras 22.000 consultas informativas. Además, la FJC fue clave para la aprobación en España de la Ley del Derecho al Olvido Oncológico (junio 2023), que protege a los supervivientes frente a la discriminación en seguros y préstamos.\n\nEl servicio de consultas de orientación médica funciona 24 horas, los 365 días del año, y está atendido personalmente por el Dr. Enric Carreras, hematólogo y director médico de la Fundación, especialista en trasplante de médula ósea. Recibe una media de 1.500 consultas al año, con pacientes que escriben desde España, Latinoamérica y otros países. El servicio de información y acompañamiento atiende además una media de 16 consultas cada día laborable.\n\nSara tenía 17 años cuando le diagnosticaron una leucemia mieloide aguda, el mismo verano en que a su madre le diagnosticaron cáncer de mama. Se sometió a un trasplante de médula ósea de un donante localizado por el REDMO: \"tras 9 años, aunque con bastantes limitaciones, estoy estudiando para ser enfermera\".", "dato": "22.000 consultas médicas + 22.000 informativas · CORAL · EICR 360º · Podcast Imparables · Ley Derecho Olvido Oncológico 2023 · Consultas médicas 24h/365: Dr. Enric Carreras · ~1.500/año · 16 consultas info/día laborable"}, {"emoji": "🤝", "name": "Alianzas internacionales del Instituto — China, IGTP y 50 años de historia", "desc": "El Instituto impulsa el proyecto europeo ACHILLES para formar a la nueva generación investigadora en hemato-oncología, y refuerza su alianza con China en cánceres hematológicos. También acoge encuentros científicos internacionales como el cónclave sobre linfoma folicular y la reunión europea EWALL sobre leucemia linfoblástica aguda. El Instituto firmó también una alianza estratégica con el IGTP y el ICO en el Campus Can Ruti de Badalona, que integra a más de 100 profesionales para proyectos de investigación conjuntos.\n\nEn junio de 2026, Josep Carreras participó en la conmemoración de los 50 años del primer trasplante alogénico de médula ósea realizado en el Hospital Clínic de Barcelona. Es el mismo procedimiento que, décadas después, salvaría su propia vida y le llevaría a fundar la Fundación que hoy lleva su nombre.\n\nEn el Congreso EHA 2026 (Estocolmo, más de 18.000 asistentes), el Instituto presentó 13 abstracts científicos y el director, Prof. Ari Melnick, impartió una conferencia invitada. El Dr. Josep Maria Ribera recibió el EHA Clinical Excellence Award, una de las máximas distinciones de la asociación europea de hematología. Un nuevo proyecto sobre leucemia linfoblástica aguda de células T, coliderado por la Dra. Anna Bigas y el German Cancer Research Center, está financiado por la Deutsche José Carreras Leukämie Stiftung — la fundación hermana alemana.", "dato": "ACHILLES: formación europea en hemato-oncología · Alianza con China · Conclaves internacionales: linfoma folicular, EWALL · Alianza IGTP-ICO Can Ruti: +100 profesionales · 50 años del primer trasplante alogénico (Clínic, jun. 2026) — con Josep Carreras presente · Congreso EHA 2026 (Estocolmo): 13 abstracts, conferencia del Prof. Melnick · Dr. Ribera: EHA Clinical Excellence Award · Proyecto T-ALL con la Deutsche José Carreras Leukämie Stiftung"}], "fondos": [{"label": "Búsqueda de donante y trasplante (España + extranjero)", "pct": 38}, {"label": "Investigación — Instituto Josep Carreras (construcción + ayudas)", "pct": 35}, {"label": "Estructura y gestión del REDMO", "pct": 10}, {"label": "Administración y captación de fondos", "pct": 10}, {"label": "Sensibilización", "pct": 7}], "web": "https://fcarreras.org", "problema": "Cada año se diagnostican en España 6.400 casos de leucemia, 11.500 de linfomas y 3.000 de mieloma múltiple, entre otros cánceres de la sangre. La leucemia es el cáncer infantil más frecuente —un 30% de todos los cánceres en edad pediátrica. Aunque los índices de curación han mejorado, 2 de cada 10 niños no superan la enfermedad y la supervivencia en adultos es del 50%.\n\nTres de cada cuatro pacientes con leucemia u otra enfermedad de la sangre no tienen un familiar compatible que pueda donarles médula ósea. Necesitan encontrar a un desconocido — y la probabilidad de que dos personas no emparentadas sean compatibles es de aproximadamente 1 entre 3.500.\n\nEl desafío, además, no es único: hace falta investigar nuevos tratamientos para los casos que hoy no se curan, y disponer de un registro amplio y conectado a la red mundial para que cualquier paciente tenga opciones reales. También acompañar a pacientes y familias durante un proceso que suele ser largo y duro.\n\nEsto no es un dato abstracto: Hugo se inscribió en el REDMO en 2018 al donar sangre por primera vez, sin pensar que llegarían a llamarle nunca. En 2020 resultó compatible con un paciente al otro lado del mundo y le salvó la vida.\n\nCada uno de los 520.508 donantes activos en España es, en potencia, esa misma llamada para alguien que hoy no sabe que la necesita.", "motivosSocio": ["El único ciclo completo, de principio a fin: el REDMO conecta donantes con pacientes. El Instituto de Investigación contra la Leucemia Josep Carreras —el centro más grande de Europa dedicado en exclusiva a la leucemia y cánceres de la sangre, calificado con la máxima nota (A) en su última evaluación— investiga nuevas terapias, y sus spin-offs las llevan a ensayos clínicos reales. Pocas organizaciones cubren todo el recorrido, del donante al laboratorio y de vuelta al paciente.", "El Estado les delegó esta misión: la Fundación Josep Carreras no es una ONG que actúa por iniciativa propia. Es la entidad a la que el Ministerio de Sanidad encargó por mandato oficial la gestión del REDMO, el único registro nacional de donantes de médula ósea de España. Cuando un médico busca un donante para su paciente, pasa por aquí.\n\nEse mandato no significa que el Estado lo financie: en el convenio ONT-FJC de 2023 para promoción de la donación (publicado en el BOE), la Administración aportó 100.000€ y la propia Fundación puso otros 100.000€. Incluso en las colaboraciones oficiales, la Fundación pone la mitad.", "De 35 donaciones al año a 481: en 2012, cuando empezó el REDMO, se realizaban 35 donaciones efectivas al año en toda España. En 2025 fueron 481 — un crecimiento que no es casualidad, sino el resultado de más de una década de captación constante de nuevos donantes y de mejoras en la gestión del registro.", "Creada por quien vivió en sus carnes lo que hoy financia: Josep Carreras sobrevivió a una leucemia en 1987-1988 gracias a un trasplante de médula ósea. Ese mismo año fundó la entidad; en 1991 creó el REDMO para que ningún paciente tuviera que pasar por lo que él pasó sin tener, al menos, una oportunidad real de encontrar donante.", "No está sola: forma parte de una red internacional de fundaciones hermanas. En Alemania, la fundación equivalente ha recaudado más de 270 millones de euros en 30 ediciones de una gala televisiva anual, financiando 1.552 proyectos de investigación y sociales. La Fundación Josep Carreras en España, con sus 149.867 socios, es el nodo español de ese esfuerzo compartido."], "fuentesCompletas": [{"texto": "Fundación Josep Carreras · Memoria de Actividades 2024 (documento principal de esta ficha)", "url": "https://fcarreras.org/wp-content/uploads/2025/09/2024_MEMORIA-FJC_es_web_def.pdf"}, {"texto": "BOE · Convenio ONT-Fundación Josep Carreras 2023 (BOE-A-2023-1948), cofinanciación 50/50 de campaña de promoción de la donación", "url": "https://www.boe.es/diario_boe/txt.php?id=BOE-A-2023-1948"}, {"texto": "REDMO · Memoria de Impacto 2025", "url": "https://www.fcarreras.org/es/redmo"}, {"texto": "Fundación Josep Carreras / Instituto de Investigación Sant Joan de Déu · Alianza para programa de investigación en leucemia infantil (+10M€, jul. 2025)", "url": "https://fcarreras.org/notas-de-prensa/la-fundacion-josep-carreras-y-sant-joan-de-deu-crean-un-programa-de-investigacion-en-leucemia-infantil-valorado-en-mas-de-10-millones-de-euros/"}, {"texto": "Fundación Josep Carreras · Beca Josep Carreras 2026 (con GETH-TC)", "url": "https://fcarreras.org/actualidad/un-proyecto-sobre-estrategias-de-donante-en-trasplante-de-medula-osea-gana-la-beca-josep-carreras-2026/"}, {"texto": "La Moncloa · Renovación del convenio Sanidad-ONT-Fundación Josep Carreras (enero 2026)", "url": "https://www.lamoncloa.gob.es/serviciosdeprensa/notasprensa/sanidad14/paginas/2025/120126-convenio-donacion-medula-osea.aspx"}, {"texto": "Tribuna de León · Convenio Castilla y León-Fundación Josep Carreras (5,69M€, 4 años)", "url": "https://www.tribunaleon.com/noticias/443040/mas-de-5-6-millones-para-reforzar-la-lucha-contra-la-leucemia-y-la-donacion-de-medula-osea-en-castilla-y-leon"}, {"texto": "Fundación Josep Carreras · Herencias y legados solidarios", "url": "https://fcarreras.org/herencias-y-legados-solidarios/"}, {"texto": "Fundación Josep Carreras · Nuevo secuenciador MiSeq i100 financiado por los socios", "url": "https://fcarreras.org/actualidad/el-compromiso-de-nuestros-socios-permite-un-nuevo-salto-tecnologico-en-el-instituto-josep-carreras/"}, {"texto": "Instituto Josep Carreras · Presencia en el Congreso EHA 2026 y premio al Dr. Ribera", "url": "https://www.carrerasresearch.org/es/noticias/el-instituto-josep-carreras-refuerza-su-presencia-internacional-en-la-eha-2026"}, {"texto": "Instituto Josep Carreras · Subtipo de linfoma más letal en mujeres (genes SPEN/NOTCH2)", "url": "https://www.carrerasresearch.org/es/noticias/descubren-un-subtipo-de-cancer-de-la-sangre-mas-letal-en-mujeres-que-en-hombres-y-un-posible-tratamiento-dirigido"}, {"texto": "Instituto Josep Carreras · Estudio en Nature sobre la proteína SIRT7", "url": "https://www.carrerasresearch.org/es/noticias/un-protector-oculto-del-genoma-podria-explicar-las-diferencias-entre-mujeres-y-hombres-en-salud-y-envejecimiento-"}, {"texto": "Instituto Josep Carreras · Proyecto VulnerAM (Dr. Lucas Pontel)", "url": "https://www.carrerasresearch.org/es/noticias/el-proyecto-vulneram-busca-nuevos-puntos-debiles-contra-las-leucemias-mieloides-agresivas"}, {"texto": "Instituto Josep Carreras · Proyecto de leucemia linfoblástica de células T con la Deutsche José Carreras Leukämie Stiftung", "url": "https://www.carrerasresearch.org/es/noticias/nuevo-proyecto-en-leucemia-linfoblastica-aguda-de-celulas-t-coliderado-por-anna-bigas-y-financiado-por-la-deutsche-jose-carreras-leukämie-stiftung-"}, {"texto": "Fundación Josep Carreras · Testimonio de Vanesa, pisos de acogida", "url": "https://fcarreras.org/testimonios/vanesa/"}, {"texto": "Fundación Josep Carreras · Testimonios de Amanda y Guillem, donantes de médula", "url": "https://fcarreras.org/testimonios/amanda/"}, {"texto": "Fundación Josep Carreras · Testimonio de José María, ensayo CAR-T pionero", "url": "https://fcarreras.org/testimonios/jose-maria/"}, {"texto": "Fundación Josep Carreras · 15ª edición del Día de los Imparables (Bilbao, junio 2026)", "url": "https://fcarreras.org/actualidad/mas-de-1-700-personas-participan-en-una-nueva-edicion-de-el-dia-de-los-imparables/"}, {"texto": "Fundación Josep Carreras · Banco Santander selecciona el programa Un hogar lejos de casa", "url": "https://fcarreras.org/empresas-y-entidades-imparables/banco-santander-selecciona-a-la-fundacion-josep-carreras-en-euros-de-tu-nomina/"}, {"texto": "Fundación Josep Carreras · Récord de recaudación en la 6ª edición de OnCodines Trail", "url": "https://fcarreras.org/empresas-y-entidades-imparables/record-de-recaudacion-en-la-6a-edicion-de-oncodines-trail/"}, {"texto": "Fundación Josep Carreras · Herencias y legados solidarios (casos de Concepción y Natividad)", "url": "https://fcarreras.org/herencias-y-legados-solidarios/"}, {"texto": "Fundación Josep Carreras · Carta de Josep Carreras sobre el origen de la Fundación", "url": "https://fcarreras.org/josep-carreras/josep-carreras-y-la-lucha-contra-la-leucemia/"}, {"texto": "Fundación Josep Carreras · Testimonio de Sara, REDMO", "url": "https://fcarreras.org/registro-de-donantes-de-medula-osea-redmo/nuestras-funciones/"}], "verificado": "Datos verificados junio 2026", "captacion": {"resumen30": {"cifras": ["520.508", "794", "26 días"], "labels": ["donantes activos en el REDMO, el registro oficial de médula ósea de España (5.º Europa / 13.º mundo)", "trasplantes coordinados para pacientes en España en 2025", "mediana de búsqueda de donante compatible — el 84% de los pacientes lo encuentra en menos de 60 días"], "cierre": "Cada uno de los 520.508 donantes activos en España es, en potencia, esa misma llamada para alguien que hoy no sabe que la necesita.", "videoDestacado": {"url": "https://www.youtube.com/shorts/5ZIRPNjnnjs", "titulo": "La historia de Carmen — Imparable contra la leucemia linfoblástica aguda", "duracion": "1:05"}}, "proyectosClave": [0, 2, 4], "argumentario": [0, 1, 2]}, "speech": {"parada": "¿Te importa si te cuento algo de minuto y medio? Es la historia de Marta, una paciente — es ficticia, pero su proceso es exactamente el real.", "discurso": "A Marta le diagnostican leucemia. El médico le explica que necesita un trasplante de médula ósea. Le hacen pruebas a su familia, pero solo 1 de cada 4 pacientes tiene un familiar compatible — y Marta no es uno de esos casos. Tendrá que depender de un desconocido, y la probabilidad de que dos personas no emparentadas sean compatibles es de aproximadamente 1 entre 3.500.\n\nAquí entra el REDMO, el registro español de donantes de médula, gestionado por la Fundación Josep Carreras por encargo oficial del Ministerio de Sanidad. Buscan en una base de 520.508 donantes en España, conectada con una red mundial de más de 30 países. A los 26 días —la mediana de espera— encuentran a alguien compatible. El 84% de los pacientes, como Marta, tienen esa suerte.\n\nEl donante vive en otra ciudad, así que el trasplante se hace en un hospital lejos de casa de Marta. Su madre quiere acompañarla, pero un hotel durante semanas no es algo que puedan permitirse. La Fundación tiene 8 pisos y 5 hoteles de acogida para estas situaciones — gratuitos, para que ninguna familia tenga que elegir entre estar cerca o pagar el alquiler de su casa. Solo en 2024, 105 familias se alojaron así.\n\nDurante las semanas de tratamiento, Marta y su madre tienen acceso a consultas médicas e informativas — más de 22.000 de cada tipo al año en toda España — para entender cada paso del proceso.\n\nEl trasplante sale bien. Y parte de la razón es que el tratamiento que recibió Marta no existía hace pocos años. Salió del Instituto de Investigación contra la Leucemia Josep Carreras, el centro más grande de Europa dedicado en exclusiva a esta enfermedad, con más de 400 investigadores. Terapias como CAR-T, que hace una década eran experimentales, hoy ya están llegando a pacientes reales.", "cierre": "La historia de Marta —el registro, el trasplante, el piso de acogida, la investigación que hizo posible su tratamiento— es un solo sistema, y lo sostienen 149.867 socios. Por unos 12 euros al mes — unos 140-150 al año — formas parte de ese sistema: el que encuentra al donante, el que aloja a la familia, y el que investiga la cura. ¿Te animas?"}, "videos": [{"titulo": "El mejor anuncio del mundo", "tipo": "Spot viral de captación", "duracion": "0:30", "url": "https://www.youtube.com/watch?v=wlnXuOC9zJc", "anio": "2024"}, {"titulo": "Para que no pare la música, que no pare la investigación", "tipo": "Spot emocional de campaña", "duracion": "1:00", "url": "https://www.youtube.com/watch?v=0x2vpFOTWBs", "anio": "2025"}, {"titulo": "La historia de Carmen — Imparable contra la leucemia linfoblástica aguda", "tipo": "Testimonio breve de paciente (Short)", "duracion": "1:05", "url": "https://www.youtube.com/shorts/5ZIRPNjnnjs", "anio": "2025"}, {"titulo": "Más de 500.000 donantes unen estas dos historias", "tipo": "Spot emocional — donantes de médula", "duracion": "1:39", "url": "https://www.youtube.com/watch?v=xY7k0JQaIdM", "anio": "2024"}, {"titulo": "Un match x una vida", "tipo": "Spot campaña Match Tour", "duracion": "1:57", "url": "https://www.youtube.com/watch?v=7x5NSBuUnYo", "anio": "2024"}, {"titulo": "Los niños y niñas nos explican qué es la leucemia", "tipo": "Divulgación — perspectiva infantil", "duracion": "1:46", "url": "https://www.youtube.com/watch?v=DPma94FSHIc", "anio": "2023"}, {"titulo": "¡Ya somos más de 150.000 socios contra la leucemia!", "tipo": "Spot de agradecimiento — hito de socios", "duracion": "2:59", "url": "https://www.youtube.com/watch?v=8JGOopC7-i0", "anio": "2025"}, {"titulo": "Imparables contra el linfoma", "tipo": "Testimonio de paciente", "duracion": "5:40", "url": "https://www.youtube.com/watch?v=WoNJR2UCcwI", "anio": "2024"}], "ultimaActualizacion": "julio 2026"}</script>
<script type="application/json" id="data-fpm">{"id": "fpm", "emoji": "🧠", "nombre": "FPM", "full": "Fundación Pasqual Maragall", "color": "#0ea5e9", "claim": "Única fundación en España dedicada casi en exclusiva a la investigación preventiva del Alzheimer — su Premio Carles Colomer extiende también el apoyo a la investigación en atrofia multisistémica (AMS), con ayudas de hasta 600.000€ por proyecto.\n\nNacida en abril de 2008 por iniciativa de Pasqual Maragall (Barcelona, 1941), alcalde de Barcelona (1982-1997), presidente de la Generalitat de Catalunya (2003-2006) y presidente del Comité Organizador de los Juegos Olímpicos de Barcelona'92. Hizo público su diagnóstico de Alzheimer el 20 de octubre de 2007: \"Quiero ayudar a derrotar esta enfermedad. En ningún lugar está escrito que sea invencible.\"\n\nPresidida por Cristina Maragall (hija de Pasqual Maragall) y dirigida por el Dr. Arcadi Navarro (director general).\n\n112.842 socios (de 147 en 2012 a más de 110.000 hoy — un crecimiento de la base social que la colaboración con Wesser ha contribuido a impulsar con +29.000 nuevos socios). 93M€ invertidos en investigación 2013-2025.\n\nSu hallazgo en Nature Medicine (análisis de sangre, >90% precisión) puede transformar el diagnóstico temprano del Alzheimer.", "meta": [{"label": "Fundada", "val": "2008"}, {"label": "Socios", "val": "112.842"}, {"label": "Participantes Alfa", "val": "2.743"}, {"label": "Publicaciones 2025", "val": "80 revistas"}], "cifras": [{"num": "900.000", "label": "Personas con Alzheimer y otras demencias en España, según el Estudio sobre la percepción social del Alzheimer en España de la propia Fundación (2025). 2 de cada 3 españoles tienen o han tenido en su entorno a alguien con Alzheimer.", "fuente": "Fundación Pasqual Maragall · Estudio percepción social 2025"}, {"num": ">90%", "label": "Precisión del análisis de sangre (biomarcador p-tau217) para detectar el Alzheimer, publicado en Nature Medicine. Comparable a la punción lumbar pero mucho menos invasivo y costoso.", "fuente": "BBRC / Nature Medicine · Hito 6 Informe 2025"}, {"num": "2.743", "label": "Participantes del Estudio Alfa, personas de entre 45 y 75 años en su mayoría descendientes de personas con Alzheimer, seguidos longitudinalmente desde 2013.", "fuente": "Fundación Pasqual Maragall · Informe de Impacto 2025"}, {"num": "93 M€", "label": "Invertidos en investigación del Alzheimer del 2013 al 2025. Solo en 2025: 17 millones de euros. El 57% del presupuesto total va directamente a investigación.", "fuente": "Fundación Pasqual Maragall · Informe de Impacto 2025"}, {"num": "112.842", "label": "Socios y socias a cierre de 2025. Durante el año se alcanzó el hito de los 100.000 socios, uno de los mayores apoyos ciudadanos activos a la investigación en España.", "fuente": "Fundación Pasqual Maragall · Informe de Impacto 2025"}, {"num": "416 M", "label": "Personas en el \"continuo\" del Alzheimer en el mundo según Gustavsson et al. (2022): 32 millones ya con demencia por Alzheimer, 69 millones en fase prodrómica (deterioro cognitivo leve) y 315 millones en fase preclínica — con la patología en el cerebro pero sin ningún síntoma todavía. Aparte, la OMS estima 55 millones de personas con demencia de cualquier causa en el mundo (2021), cifra que podría llegar a 152 millones en 2050.", "fuente": "Gustavsson et al. 2022 / FPM Informe 2025"}], "programas": [{"emoji": "🩸", "name": "Diagnóstico por análisis de sangre — Nature Medicine 2025", "desc": "Uno de los hitos más relevantes del BBRC en 2025 fue la publicación en Nature Medicine de que el biomarcador p-tau217 medido en plasma sanguíneo detecta el Alzheimer con una precisión superior al 90%. Es comparable a la punción lumbar (el test de referencia hasta ahora) pero mucho menos invasivo y más accesible. Este hallazgo, liderado por investigadores del BBRC, supone un paso decisivo hacia diagnósticos accesibles en atención primaria: un análisis de sangre estándar podría sustituir a procedimientos que requieren sedación y hospitalización.\n\nEl BBRC también participó en el proyecto SCAP-AD para validar nuevos métodos diagnósticos ultrasensibles de detección precoz, coordinando la neuroimagen desde el centro de Barcelona.\n\nEl estudio SpeechDx, en consorcio con la Alzheimer's Drug Discovery Foundation, explorará biomarcadores del habla para detección precoz en 2.650 participantes de 5 centros (400 del BBRC de cohortes ALFA+ y Beta-AARC).", "dato": "p-tau217 en sangre: >90% precisión · Nature Medicine · Comparable a punción lumbar · Sin sedación · SCAP-AD · SpeechDx"}, {"emoji": "🧫", "name": "Estudio Alfa — La cohorte de referencia internacional", "desc": "El Alzheimer es responsable del 75% de las demencias y afecta a más de 900.000 personas en España: 1 de cada 10 mayores de 65 años, y 1 de cada 3 mayores de 85. Si no se encuentra un tratamiento eficaz, las personas con demencia en el mundo podrían pasar de 55 a 152 millones en 2050 (OMS) — y solo en España la cifra podría superar el millón y medio de personas. Es un escenario que podría colapsar los sistemas sanitario y asistencial.\n\nEl coste medio asciende a unos 35.000-42.000€ por persona y año (hasta 77.000€ en fases avanzadas), del cual el 86-87% lo asumen las familias y solo un 8% es gasto sanitario público.\n\nEn 8 de cada 10 casos, el cuidado lo asume un familiar — en un 76% de los casos, una mujer (hijas y esposas) — que dedica una media de 70 horas semanales. Dos de cada tres españoles afirman conocer a alguien con Alzheimer (en el 27% de los casos, un familiar directo): es la 2ª preocupación de salud tras el cáncer, y la 1ª entre las personas mayores.\n\nEl Estudio Alfa (Alzheimer's and Families) es el proyecto central del Barcelonaβeta Brain Research Center (BBRC) y una de las plataformas de investigación preventiva del Alzheimer más importantes del mundo. Impulsado en 2013 por la Fundación 'la Caixa', cuenta con 2.743 personas de entre 45 y 75 años, en su mayoría descendientes de personas con Alzheimer.\n\nEl estudio caracteriza la fase preclínica de la enfermedad: el periodo de hasta 20 años antes de los primeros síntomas cognitivos, cuando la intervención preventiva todavía puede ser eficaz. Cada participante es evaluado en múltiples visitas con análisis de sangre, neuroimagen (resonancia magnética y PET), pruebas cognitivas y factores de estilo de vida.\n\nEn 2025, el estudio generó 23.947 muestras procesadas, 965 resonancias magnéticas y 3.563 sesiones totales (1.292 clínicas, 1.219 de cognición, 1.052 de enfermería). El Estudio Alfa actúa como infraestructura estratégica que alimenta a todos los demás estudios del BBRC y sirve como base para los 4 ensayos clínicos activos de tratamientos modificadores de la enfermedad.\n\nJulián, voluntario de 67 años de Pineda de Mar, resume por qué participa aunque sabe que el beneficio llegará para otros: \"Aportar algo, por muy poco que sea, siempre es conveniente. Este es un pasito que se va agregando para un futuro sin Alzheimer\".\n\nEn febrero de 2025, un estudio del BBRC publicado en Alzheimer's & Dementia analizó líquido cefalorraquídeo y resonancia magnética avanzada del hipocampo de 360 voluntarios de la cohorte Alfa, comparándolos con la cohorte de validación EPAD. Confirmó que la acumulación de la proteína beta-amiloide puede, por sí sola, causar daño cerebral y pérdida de memoria en fases iniciales del Alzheimer, incluso sin niveles elevados de la proteína tau. El hallazgo abre la puerta a tratamientos preventivos más tempranos, dirigidos específicamente a la beta-amiloide antes de que aparezcan síntomas.", "dato": "75% de las demencias · 900.000 afectados en España · 1/10 >65 años, 1/3 >85 · 2050: podría triplicarse, +1,5M en España · Coste 42-77.000€/año, 86% lo paga la familia · 8/10 cuidado por familiar (76% mujeres, 70h/semana) · 2.743 participantes · 45-75 años · desde 2013 · 23.947 muestras procesadas · 965 RM · base para 4 ensayos clínicos activos · Testimonio real: Julián, voluntario · Beta-amiloide sola causa daño hipocampal sin tau elevado (Alzheimer's & Dementia, feb. 2025, 360 voluntarios Alfa)"}, {"emoji": "🤖", "name": "ALFA10 — El algoritmo que se anticipará al Alzheimer", "desc": "ALFA10 es el proyecto más ambicioso de la Fundación para esta década: el seguimiento longitudinal de toda la cohorte ALFA, que busca desarrollar y validar un algoritmo predictivo capaz de estimar el riesgo de Alzheimer antes de los primeros síntomas. Representa la evolución completa de la cohorte: desde la cohorte parental ALFA (2013-2014, 2.743 personas) hasta ALFA+ (450 personas desde 2016) y ahora ALFA10 (+2.000 personas), con seguimiento digital remoto previsto desde 2027.\n\nEl estudio, con más de 2.000 personas de la cohorte histórica, recontacta a los participantes originales para continuar su seguimiento; las primeras visitas presenciales están previstas para 2026 y pueden prolongarse hasta finales de 2027. Como explica el Dr. Gonzalo Sánchez, investigador y neuropsicólogo del BBRC: \"El objetivo es entender mejor cómo progresa la enfermedad antes de que se manifiesten los síntomas, y preparar un protocolo de actuación que, a la larga, pueda ser adoptado por el sistema de salud.\"\n\nLa monitorización digital incluye apps propias de evaluación cognitiva (Cogstate, NeoTiv), análisis de patrones de pulsación de teclas (Neurokeys) y biomarcadores del habla — sin necesidad de desplazarse al centro. ALFA10 está conectado al proyecto europeo AD-RIDDLE (2024-2028, presupuesto de 31M€, cofinanciado por la Comisión Europea), que reúne a 6 países europeos y EE.UU. para crear una plataforma modular de cribado del Alzheimer.", "dato": "ALFA10: recontacta a la cohorte histórica, +2.000 personas · Cohorte: ALFA(2.743)→ALFA+(450)→ALFA10(+2.000) · Apps Cogstate/NeoTiv + Neurokeys + habla · Conectado a AD-RIDDLE (31M€, 2024-2028, 6 países+EEUU) · Dr. Gonzalo Sánchez"}, {"emoji": "💊", "name": "4 ensayos clínicos activos — Los primeros fármacos modificadores", "desc": "2025 es un año bisagra para el Alzheimer: por primera vez llegan los primeros fármacos modificadores de la enfermedad, y el BBRC participa activamente en los ensayos clínicos clave. Los 4 ensayos en curso son: AHEAD A3-45 (lecanemab, anticuerpo anti-beta-amiloide, 1.400 participantes de todo el mundo, prevención en personas de 55-80 años con alto riesgo) y LAKI (remternetug, anticuerpo anti-amiloide, ~1.200 participantes de 250+ centros en América, Asia, España y Reino Unido, fase III). También ReTain (inmunoterapia activa anti-tau fosforilada en Alzheimer preclínico) y AACO/TRAILBLAZER-ALZ 5 (donanemab, anticuerpo anti-amiloide, fase III, evaluaciones cognitivas y neuroimagen).\n\nEl BBRC está en uno de los únicos dos países europeos en el ensayo LAKI (España y Reino Unido), lo que refleja su reconocimiento internacional.\n\n2021-2024 marca una nueva era: tras décadas con solo fármacos sintomáticos (Tacrine 1993, Donepezil 1996, Rivastigmine 2000, Galantamine 2001, Memantine 2003), llegaron los primeros fármacos modificadores de la enfermedad: Aducanumab (2021), Lecanemab (2023) y Donanemab (2024).\n\nSin embargo, actualmente solo alrededor del 6% de las personas con Alzheimer son elegibles para estos tratamientos según estudios en clínicas especializadas europeas (criterios EMA: fase inicial, sin doble copia ApoE4, sin comorbilidades graves). Esto subraya la urgencia de la detección precoz mediante biomarcadores en sangre, que permitirá identificar a quién tratar y cuándo.", "dato": "4 ensayos activos · AHEAD: lecanemab · LAKI: remternetug · ReTain: anti-tau · AACO: donanemab · BBRC en uno de 2 países europeos en LAKI · Nuevos fármacos: Aducanumab(2021)·Lecanemab(2023)·Donanemab(2024) · Solo ~6% pacientes elegibles actualmente (criterios EMA: fase inicial + ApoE4 0-1 copias + sin comorbilidades graves)"}, {"emoji": "🧠", "name": "Minicerebros — investigar el Alzheimer sin experimentación animal", "desc": "Una de las líneas más innovadoras del grupo de Genómica del BBRC es la creación de \"minicerebros\" (organoides cerebrales): cultivos celulares tridimensionales que reproducen la estructura del cerebro humano. Se generan a partir de células madre obtenidas de muestras de sangre de los propios participantes, sin necesidad de experimentación animal. Iniciado en 2022 y liderado por la Dra. Laura García González, este proyecto permite simular el desarrollo del Alzheimer y estudiar sus factores genéticos en un entorno controlado, alcanzando organoides de hasta 3-4 mm³.\n\nGracias a esta tecnología, los investigadores pueden estudiar los mecanismos moleculares y celulares de las primeras etapas del Alzheimer, acercándose cada vez más a prevenir, ralentizar o incluso detener su progreso.\n\nLa campaña \"Minicerebros para pensar en grande\" busca recaudar 250.000€ para ampliar esta línea de investigación — una forma muy visual y emocional de explicar a cualquier persona en la calle qué hace realmente un investigador de Alzheimer.", "dato": "\"Minicerebros\" (organoides cerebrales) desde 2022 · Dra. Laura García González · Sin experimentación animal · Tamaño máx. 3-4 mm³ · Campaña: 250.000€"}, {"emoji": "😴", "name": "Prevención — ALFASleep y PENSA: hábitos que cambian el cerebro", "desc": "Si el Alzheimer empieza a gestarse hasta 20 años antes de los primeros síntomas, la prevención mediante hábitos de vida es una de las líneas más esperanzadoras de la investigación. El estudio ALFA+ (450 participantes sin alteraciones cognitivas de la cohorte ALFA, de los cuales unos 400 activos en 2025) analiza la asociación entre marcadores de fluidos, neuroimagen, biomarcadores y factores clínicos para describir la fase preclínica del Alzheimer.\n\nEl proyecto ALFASleep, con 200 participantes de ALFA+, demostró en 2025 que la fragmentación del sueño causa cambios estructurales en regiones cerebrales vulnerables al Alzheimer, incluso en personas sin deterioro cognitivo — siendo el efecto más pronunciado en mujeres.\n\nEl estudio PENSA demostró que una intervención combinada de hábitos saludables más un compuesto del té verde mejora la cognición hasta 4,5 veces y reduce aproximadamente un 25% el riesgo de desarrollar demencia.\n\nAdemás, la investigación en factores de riesgo modificables (Lancet Commission, 2020) estima que un 40% de las demencias mundiales podrían prevenirse o retrasarse actuando sobre 12 factores. Van desde la educación y la pérdida auditiva hasta el sedentarismo, el tabaquismo, la depresión, el aislamiento social y la contaminación del aire.", "dato": "ALFA+: 450 participantes (≈400 activos en 2025) · ALFASleep: sueño fragmentado → daño cerebral (más en mujeres) · PENSA: hábitos+té verde → ×4,5 cognición, -25% riesgo demencia · 40% demencias mundiales potencialmente prevenibles (12 factores, Lancet 2020)"}, {"emoji": "🔬", "name": "8 grupos de investigación y consorcios internacionales", "desc": "El BBRC cuenta a mediados de 2026 con 8 grupos de investigación. En 2025 se incorporaron dos: el grupo del Dr. Salvador Macip (mecanismos biológicos del envejecimiento y neurodegeneración, incluyendo senescencia celular) y el grupo de la Dra. Sandra Acosta (Modelos de Enfermedades Neurológicas, con organoides cerebrales y células madre pluripotentes).\n\nEn 2026 se sumó un nuevo Grupo de Investigación en IA y Datos de Salud, liderado por el Dr. Joaquín Dopazo, centrado en integrar datos genómicos, clínicos, cognitivos, de neuroimagen y de estilo de vida mediante inteligencia artificial para mejorar la predicción y comprensión del Alzheimer.\n\nTambién en 2026 se incorporó el grupo de Epidemiología Molecular y Ciencia de Datos, liderado por la Dra. Natàlia Vilor-Tejedor — uno de cuyos primeros estudios relaciona el número de partos de una mujer con las fases preclínicas del Alzheimer, aportando evidencia sobre factores reproductivos y acumulación de amiloide. Los grupos restantes cubren: Investigación Clínica y Factores de Riesgo; Neuroimagen; Biomarcadores en Fluidos y Neurología Traslacional; y Genómica.\n\nEl BBRC participa en 6 consorcios internacionales: MenoBrain (red Marie Skłodowska-Curie, menopausia y riesgo de Alzheimer en mujeres), SpeechDx (biomarcadores del habla) y ASTRO-PET (neuroinflamación y trazador PET). También AD-RIDDLE (herramientas de detección y diagnóstico en Europa, 5 años), PROMINENT (IA y economía de la salud en neurodegeneración) y COMMUTE (COVID-19 y riesgo de neurodegeneración).\n\nEn 2025 publicó 80 artículos en revistas científicas (84% en Q1, 65% en D1) y participó en 46 conferencias internacionales.", "dato": "8 grupos · 2 nuevos en 2025 (Macip y Acosta) + 2 en 2026 (Dopazo, IA y Datos de Salud; Vilor-Tejedor, Epidemiología Molecular) · 6 consorcios internacionales · 80 publicaciones (84% Q1) · 46 conferencias"}, {"emoji": "👩‍🦳", "name": "Acompañamiento a personas cuidadoras", "desc": "Cuidar a una persona con Alzheimer puede generar problemas físicos y psicológicos derivados del estrés y la sobrecarga — y el bienestar de quien cuida repercute directamente en la calidad de los cuidados que recibe la persona enferma. Por eso la Fundación ofrece programas grupales gratuitos dirigidos a familiares cuidadores.\n\nLos Grupos Terapéuticos Presenciales (Barcelona y Madrid) organizaron 7 nuevos grupos en 2025 con 70 cuidadores; desde 2013, han atendido a 1.723 personas en 184 grupos en todo el territorio. Gladys Hernández, médica anestesista que cuidaba a su padre, encontró el programa a través de Facebook cuando se sentía \"muy ansiosa y desesperada por conseguir ayuda\". Tras 14 sesiones grupales, aprendió a ser más paciente y a no sentirse culpable — \"lo que aprendes en los grupos terapéuticos no está en los libros\", resume.\n\nEl programa online 'Aprende a Cuidar y a Cuidarte' organizó 32 grupos en 2025 con 320 personas cuidadoras; desde 2021, ha acompañado a 1.090 personas en 120 grupos. Ambos programas abordan la evolución de la enfermedad, el manejo de síntomas, la comunicación con la persona diagnosticada, los recursos comunitarios y, sobre
