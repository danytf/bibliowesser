todo, el autocuidado.\n\nLa Fundación también publicó una Guía de Síntomas Psicológicos y Conductuales del Alzheimer (financiada por la Diputación de Barcelona) y el estudio Cuidar Mejor (con IMSERSO), centrado en cuidadoras profesionales. El 90% son mujeres de entre 45 y 65 años, con más de 8 años de experiencia media, y casi el 70% no ha recibido formación específica sobre Alzheimer pese a tener gran interés en recibirla.", "dato": "184 grupos terapéuticos / 1.723 personas desde 2013 · 120 grupos online / 1.090 personas desde 2021 · 2025: 70 + 320 nuevas personas · Estudio Cuidar Mejor (IMSERSO): 90% mujeres, 70% sin formación · Testimonio real: Gladys Hernández, cuidadora"}, {"emoji": "🌱", "name": "Plenamente Activas — acompañar a quien recibe el diagnóstico", "desc": "Recibir un diagnóstico de Alzheimer es un golpe que requiere acompañamiento para favorecer el bienestar y mantener la autonomía. 'Plenamente Activas' es un programa de intervención psicológica grupal para personas en fases iniciales de la enfermedad y con conciencia de su diagnóstico. Son grupos de 6 personas, 8 sesiones semanales de 1 hora, gratuitas y presenciales con terapeutas profesionales, tras una valoración cognitiva previa. Actualmente se realiza en Barcelona.\n\nEn 2025 organizó 3 grupos con 18 personas diagnosticadas en fase inicial. El programa busca comprender mejor la enfermedad, promover hábitos saludables, dar a conocer tratamientos no farmacológicos, fortalecer la identidad y el propósito de vida, y favorecer la implicación activa en la vida social.\n\nEstá enmarcado en el Estudio PLENA, que busca validar científicamente los beneficios de este tipo de intervención psicosocial.\n\nTodo esto se complementa con la plataforma AreaAlzheimer (financiada por el Fondo Europeo Next Generation, el Plan de Recuperación del Gobierno de España y la Generalitat de Catalunya), con 1.867 usuarios registrados y cuatro espacios: información, comunidad y foros, formación y acompañamiento, y participación en estudios. Incluye el Estudio CuiDem (intervención grupal en cuidadores), la guía Co-Care OCoP sobre innovación TIC en Alzheimer, y el Test de Zarit para medir la sobrecarga de la persona cuidadora.", "dato": "Plenamente Activas: grupos de 6, 8 sesiones/1h semanales, gratuitas (Barcelona) · 2025: 3 grupos/18 personas · Estudio PLENA · AreaAlzheimer: 1.867 usuarios (Next Gen EU + Gob. España + Generalitat)"}, {"emoji": "📢", "name": "Divulgación — Brain Film Fest y 1,4M de visitas al blog", "desc": "La Fundación Pasqual Maragall tiene uno de los programas de divulgación sobre el Alzheimer más activos de España.\n\nEn 2025: 76 charlas divulgativas en todo el territorio, 1,4 millones de visitas al blog 'Hablemos sobre el Alzheimer' y 8ª edición del Brain Film Fest (CCCB Barcelona, 6.389 espectadores, 44 actividades, Premio Especial a la trilogía de Nicolas Philibert sobre salud mental). Además, 3.015 impactos en medios, con una audiencia total de 757 millones de personas y un valor publicitario equivalente de 22 millones de euros, y 137.599 seguidores en redes sociales con 909.208 interacciones.\n\nEn 2026, la Fundación publicó la guía gratuita \"La comunicación con una persona con Alzheimer\", con consejos prácticos para mejorar la relación comunicativa con la persona afectada, descargable desde su web.", "dato": "76 charlas · 1,4M visitas al blog · Brain Film Fest: 6.389 espectadores (8ª edición) · 3.015 impactos en medios, 757M audiencia · 137.599 seguidores redes · Guía gratuita de comunicación (2026)"}, {"emoji": "🏛️", "name": "Acción institucional — el Alzheimer como prioridad de salud pública", "desc": "Más allá de la ciencia y la divulgación, la Fundación trabaja para situar el Alzheimer en la agenda política. Ha trasladado al Parlamento de Cataluña la necesidad de abordar esta enfermedad como una prioridad de salud pública.\n\nEl Observatorio del Alzheimer y las Demencias, impulsado con Novo Nordisk, publicó su Estudio sobre la percepción social del Alzheimer en España (2025). Confirma que la enfermedad se consolida como una de las principales preocupaciones de salud de los españoles — la 2ª tras el cáncer, y la 1ª entre las personas mayores. El mismo estudio revela que 9 de cada 10 personas encuestadas se haría una prueba de detección precoz si existiera, y que la población reclama más inversión en investigación y financiación pública de los nuevos fármacos. También persiste un desconocimiento generalizado sobre los factores de riesgo modificables (como el estrés o el insomnio).\n\nEn 2026, la Fundación recibió la visita de Lenny Shallcross, director ejecutivo del World Dementia Council, y abrió una nueva convocatoria de investigación en colaboración con la Alzheimer's Association de EE.UU. — dos gestos que refuerzan su posición como referente internacional más allá de las fronteras españolas.\n\nLa 4ª edición de los Premios Diana Garrigosa se celebró en el marco del 8º Encuentro Anual con la base social, bajo el lema \"100.000 razones para continuar hacia un futuro sin Alzheimer\" y con más de 1.500 asistentes. La Fundación reconoció a Josep Carreras y Matilde Fernández por su trayectoria y compromiso social.\n\nEn 2026, la Fundación celebró además su primer Encuentro Anual en Madrid (Auditorio Nacional de Música, 19 de junio, más de 500 asistentes), bajo el lema \"Cambiando el rumbo del Alzheimer: investigar más, diagnosticar antes y avanzar juntos\". Participaron el vicepresidente Jordi Camí, los investigadores del BBRC Dr. Salvador Macip y Dra. Marta del Campo, la psicóloga Dra. Elena de Andrés, y el vicepresidente Santiago de Torres en la clausura, con un cierre musical de homenaje a Los Tres Tenores.\n\nLa Fundación impulsó también el HUB Alzheimer Barcelona, una iniciativa pionera con el apoyo del Ayuntamiento de Barcelona que reúne a los principales hospitales públicos de la ciudad (Sant Pau, Clínic, Mar y Vall d'Hebron) junto al BBRC y el Ace Alzheimer Center Barcelona. Fomenta la investigación colaborativa, atrae inversión y acelera la transferencia de los avances científicos a la práctica clínica. En mayo de 2026 el HUB entregó las 3 primeras becas predoctorales colaborativas, de hasta 148.000€ cada una a 4 años. Fueron para Maider Iza Achutegui (Ace + Vall d'Hebron, sobre los mecanismos de limpieza cerebral), Jaume Torres (Clínic-IDIBAPS + Mar, sobre formas atípicas de Alzheimer en pacientes jóvenes) y Shahla Gadheri (BBRC + Sant Pau, sobre inflamación cerebral y diagnóstico precoz).\n\nA nivel catalán, la Fundación coorganizó en junio de 2026 la jornada \"El abordaje del Alzheimer en Cataluña: retos, oportunidades y prioridades\", con unos 50 profesionales, entidades sociales y la FAFAC (Federació d'Associacions de Familiars d'Alzheimer de Catalunya). Su objetivo era identificar áreas prioritarias en prevención, diagnóstico precoz, acceso a innovaciones terapéuticas y organización de servicios asistenciales. El informe de conclusiones se presentará públicamente en otoño de 2026.\n\nEn mayo de 2026, la Fundación firmó también una alianza de dos años (renovable) con CONFEMAC (Confederación Estatal de Mayores Activos) para promover la prevención del Alzheimer y el buen trato a las personas mayores. Incluye campañas de sensibilización, formación para cuidadores y difusión de recursos. El acuerdo se presentó con una conferencia inaugural de la Dra. Nina Gramunt Fombuena, con la presidenta Cristina Maragall y la directora de CONFEMAC, María José Sánchez Morilla.", "dato": "Parlamento de Cataluña: Alzheimer como prioridad de salud pública · Observatorio (con Novo Nordisk): 2ª preocupación de salud tras cáncer, 1ª entre mayores · Visita World Dementia Council (2026) · Convocatoria con Alzheimer's Association · Premios Diana Garrigosa · Primer Encuentro Anual en Madrid (jun. 2026, +500 asistentes) · HUB Alzheimer Barcelona (Ayuntamiento + Sant Pau/Clínic/Mar/Vall d'Hebron + BBRC + Ace): 3 becas predoctorales de hasta 148.000€/4 años (mayo 2026) · Jornada Alzheimer en Cataluña (50 expertos + FAFAC, informe otoño 2026) · Alianza con CONFEMAC (mayo 2026, 2 años)"}, {"emoji": "💰", "name": "Actividad económica — 30,7M€, 57% a investigación", "desc": "La Fundación Pasqual Maragall y el BBRC tuvieron en 2025 un presupuesto conjunto de 30.735.836€. El origen de los ingresos: 59% de particulares (socios y donantes, 18.260.816€); 30% de empresas y fundaciones (9.204.183€); 8% de fondos públicos (subvenciones estatales y europeas, 2.617.677€); 2% de venta de servicios (428.937€); y 1% de ingresos financieros.\n\nEl destino del gasto: 57% a programas de investigación (17.532.360€); 22% a la red de socios y donantes (6.909.741€); 16% a apoyo a familias, sensibilización e incidencia pública (4.823.133€); y solo 4% a administración (1.299.729€). Estos cuatro porcentajes suman 99% por redondeo; el 1% restante (~170.873€) corresponde a partidas menores no desglosadas individualmente.\n\nLa Fundación tiene 290 trabajadores en total (176 en la Fundación y 114 en el BBRC, con 66-68% de mujeres en ambas entidades). Por cada euro destinado a conseguir nuevos socios, se obtiene un retorno de 3 euros. Del 2013 al 2025, la Fundación ha invertido más de 93 millones de euros en investigación, a través de programas propios como el FPM-ALZ AD/ADRD Fellows Program y el Pasqual Maragall Researchers Programme (PMRP). Ambos están dirigidos a financiar a jóvenes investigadores en el ámbito del Alzheimer.\n\nLa Fundación mantiene además un Programa de Socios y Socias Embajadores, que ofrece a la base social la oportunidad de participar de forma directa en el día a día de la organización. En 2025 se seleccionó a tres embajadores por su compromiso social y vínculo con el Alzheimer: Ana, participante del Estudio Alfa; Antonio, de 59 años; y Esther, farmacéutica de 35 años.", "dato": "30,7M€ presupuesto · 57% a investigación (17,5M€) · 4% administración · 290 trabajadores · 93M€ histórico en investigación (2013-2025) · Retorno ×3 · Programa de Socios Embajadores (2025: Ana, Antonio, Esther)"}], "fondos": [{"label": "Programas de investigación (BBRC y becas)", "pct": 57}, {"label": "Red de socios y campañas (retorno ×3)", "pct": 22}, {"label": "Apoyo familias, sensibilización e incidencia", "pct": 16}, {"label": "Administración", "pct": 4}, {"label": "Otras partidas no desglosadas (redondeo)", "pct": 1}], "web": "https://fpmaragall.org", "problema": "El Alzheimer empieza a desarrollarse hasta 20 años antes de que aparezcan los primeros síntomas. Cuando llega el olvido, el daño lleva dos décadas acumulándose silenciosamente en el cerebro — la ventana real para intervenir es ahora, no cuando ya hay diagnóstico.\n\nEn España hay 900.000 personas con Alzheimer u otra demencia. A nivel mundial, 416 millones de personas están ya en algún punto del \"continuo\" de la enfermedad (32 millones con demencia, 69 millones en fase prodrómica y el resto en fase preclínica).\n\nSi nada cambia, 1 de cada 2 personas verá su vida devastada por la demencia: bien por desarrollarla ella misma, bien por tener que cuidar a alguien que la padece. No es una enfermedad \"de otros\" — es prácticamente una moneda al aire.\n\nY aunque por primera vez existen fármacos que modifican el curso de la enfermedad (Lecanemab, Donanemab), solo alrededor del 6% de los pacientes son elegibles para recibirlos según estudios europeos en clínicas especializadas. Llegan cuando el daño ya está muy avanzado. Por eso la detección precoz no es un detalle técnico: es la diferencia entre poder actuar cuando el cerebro todavía puede protegerse o llegar cuando el daño ya es irreversible.", "motivosSocio": ["El pitch que se explica solo: han descubierto un análisis de sangre que detecta el Alzheimer 20 años antes de que aparezca, con más del 90% de precisión, publicado en Nature Medicine. Es comparable a la punción lumbar pero accesible y poco invasivo, y probablemente el avance más fácil de transmitir de toda esta guía.", "Esto le toca a casi todo el mundo, no es \"cosa de otros\": 2 de cada 3 españoles tienen o han tenido en su entorno cercano a alguien con Alzheimer. Y para quienes ya cuidan a esa persona, la Fundación ofrece Grupos Terapéuticos gratuitos para familiares cuidadores — 184 grupos y 1.723 personas acompañadas desde 2013. El bienestar de quien cuida repercute directamente en la calidad de los cuidados que recibe el enfermo. La Fundación pasó de 147 socios en 2012 a más de 112.000 en 2025, alcanzando el hito de los 100.000 durante este último año: cada vez más gente entiende que esto les afecta directamente. Muestra de ese crecimiento: en 2026 la Fundación celebró en el Auditorio Nacional de Música de Madrid su primer gran encuentro de socios en la capital desde su creación hace 18 años. Tuvo más de 500 asistentes y el testimonio de Manuel Sánchez Pingarrón, una persona diagnosticada de Alzheimer.", "Escala europea real: ALFA10, el proyecto más ambicioso del BBRC para esta década, está conectado al consorcio europeo AD-RIDDLE — 31 millones de euros, 6 países europeos más EE.UU. Busca crear un sistema de cribado del Alzheimer mediante análisis de sangre que podría implementarse en sistemas de salud reales.", "Ciencia sin experimentación animal: el BBRC ha creado \"minicerebros\" — organoides cerebrales cultivados en laboratorio a partir de una simple muestra de sangre — que permiten simular el Alzheimer y probar tratamientos en un entorno controlado, sin recurrir a animales.", "Lo que financias no es solo ciencia de laboratorio, también cambia hábitos cotidianos: el 40% de los casos de demencia en el mundo son potencialmente prevenibles actuando sobre 12 factores de riesgo (Lancet 2020). El estudio PENSA de la Fundación, que combina hábitos saludables con té verde, ha demostrado mejoras de hasta ×4,5 en cognición y una reducción del 25% en el riesgo de demencia. Y el proyecto ALFASleep está investigando algo tan cotidiano como el sueño fragmentado y su relación con el daño cerebral — especialmente en mujeres."], "fuentesCompletas": [{"texto": "Fundación Pasqual Maragall · Informe de Impacto 2025 (documento principal de esta ficha)", "url": "https://fpmaragall.org/memoria2025/files/Memoria_2025_ES.pdf"}, {"texto": "BBRC · Estudio Alfa, ALFA10 y AD-RIDDLE (31M€, 24 partners EU+UKRI)", "url": "https://www.barcelonabeta.org/en/news/news/ihi-launches-ad-riddle-interdisciplinary-initiative-help-prevent-and-treat-alzheimers"}, {"texto": "Fundación Pasqual Maragall · Pasqual Maragall (biografía y trayectoria institucional)", "url": "https://fpmaragall.org/pasqual-maragall/"}, {"texto": "Fundación Pasqual Maragall · Actualidad: 4ª edición Premios Diana Garrigosa, nuevo grupo de investigación (Dra. Vilor-Tejedor) y estudio sobre historia reproductiva y Alzheimer", "url": "https://fpmaragall.org/actualidad/"}, {"texto": "Fundación Pasqual Maragall · Blog: testimonio de Gladys Hernández, cuidadora (Grupos Terapéuticos)", "url": "https://blog.fpmaragall.org/cuidado-de-personas-con-alzheimer-gladys-el-testimonio-de-una-cuidadora"}, {"texto": "Fundación Pasqual Maragall · Blog: testimonios de voluntarios del Estudio Alfa (Julián y Celia)", "url": "https://blog.fpmaragall.org/voluntarios-para-cambiar-la-historia-del-alzheimer"}, {"texto": "Fundación Pasqual Maragall · Informe de Impacto 2024 y Formación WES Equipos (jul. 2025): HUB Alzheimer Barcelona", "url": "https://fpmaragall.org"}, {"texto": "MediaHub Fundación \"la Caixa\" / BBRC · Estudio: la acumulación de beta-amiloide causa daño cerebral temprano en el Alzheimer (feb. 2025)", "url": "https://mediahub.fundacionlacaixa.org/es/investigacion-salud/salud/investigacion-cientifica/2025-02-03/acumulacion-beta-amiloide-dano-cerebral-temprano-alzheimer-6794.html"}, {"texto": "Fundación Pasqual Maragall · El HUB Alzheimer Barcelona impulsa el talento emergente (becas predoctorales, mayo 2026)", "url": "https://fpmaragall.org/noticias/el-hub-alzheimer-barcelona-impulsa-el-talento-emergente-en-la-investigacion-del-alzheimer/"}, {"texto": "Fundación Pasqual Maragall · Alianza con CONFEMAC para la prevención del Alzheimer y el buen trato a las personas mayores (mayo 2026)", "url": "https://fpmaragall.org/noticias/fortalecemos-la-alianza-con-confemac-para-promover-la-prevencion-del-alzheimer-y-el-buen-trato-a-las-personas-mayores/"}, {"texto": "Fundación Pasqual Maragall · Jornada sobre el abordaje del Alzheimer en Cataluña (junio 2026)", "url": "https://fpmaragall.org/noticias/50-experts-i-entitats-analitzen-els-principals-reptes-sobre-labordatge-de-lalzheimer-a-catalunya/"}, {"texto": "Fundación Pasqual Maragall · Primer Encuentro Anual en Madrid (junio 2026)", "url": "https://fpmaragall.org/noticias/celebramos-por-primera-vez-en-madrid-nuestro-encuentro-anual-sobre-alzheimer/"}], "verificado": "Datos verificados junio 2026", "captacion": {"resumen30": {"cifras": ["900.000", ">90%", "112.842"], "labels": ["personas con Alzheimer u otra demencia en España", "precisión de un análisis de sangre para detectar el Alzheimer, publicado en Nature Medicine", "socios y socias a cierre de 2025, hito de los 100.000 alcanzado este año"], "cierre": "Por eso la detección precoz no es un detalle técnico: es la diferencia entre poder actuar o llegar demasiado tarde.", "videoDestacado": {"url": "https://www.youtube.com/watch?v=_jY8QtNU1b4", "titulo": "Por un futuro sin Alzheimer", "duracion": "4:19"}}, "proyectosClave": [0, 1, 3], "argumentario": [0, 1, 2]}, "speech": {"parada": "¿Te puedo contar algo de minuto y medio? Es sobre el Alzheimer, y probablemente no lo sabes — cambia bastante las cosas.", "discurso": "El Alzheimer no empieza cuando aparecen los primeros olvidos. Empieza hasta 20 años antes — en silencio, sin ningún síntoma, mientras la persona vive su vida totalmente normal. Cuando llega el diagnóstico, el daño ya lleva dos décadas acumulándose. Eso significa que alguien que hoy tiene 50 o 55 años y se siente perfectamente bien, podría estar ya en ese proceso sin saberlo.\n\nEn España hay 900.000 personas con Alzheimer u otra demencia. Y la cifra que de verdad debería hacernos parar: si nada cambia, 1 de cada 2 personas verá su vida afectada por esta enfermedad. Bien porque la desarrolle ella misma, bien porque tenga que cuidar a alguien que la tiene. No es \"cosa de otros\". Es, literalmente, una moneda al aire para cualquiera.\n\nAquí es donde entra algo que ha cambiado en 2025: un equipo de investigadores descubrió un análisis de sangre capaz de detectar el Alzheimer con más del 90% de precisión, antes de que aparezca ningún síntoma. Está publicado en Nature Medicine, y es comparable a una punción lumbar pero sin necesidad de sedación. Esto importa porque ahora mismo existen fármacos que pueden modificar el curso de la enfermedad —Lecanemab, Donanemab— pero solo alrededor del 6% de los pacientes son elegibles según estudios europeos, porque normalmente llegan cuando el daño ya está muy avanzado. Con detección 20 años antes, eso cambia por completo.\n\nDetrás de este avance está la Fundación Pasqual Maragall, a través del BBRC — uno de los centros de investigación sobre Alzheimer más importantes de Europa. Tienen una cohorte de más de 2.700 personas en seguimiento desde hace años. Y tienen un proyecto, ALFA10, conectado a un consorcio europeo de 8 países con 31 millones de euros. Incluso investigan sin experimentación animal, usando \"minicerebros\" — organoides cerebrales cultivados a partir de una simple muestra de sangre.\n\nY no es solo investigación de laboratorio: el 40% de los casos de demencia en el mundo son potencialmente prevenibles actuando sobre hábitos cotidianos —sueño, ejercicio, alimentación— y la Fundación tiene programas específicos sobre esto. También ofrece acompañamiento gratuito para las más de 1.700 personas que ya cuidan a un familiar con Alzheimer.", "cierre": "El 57% del presupuesto de la Fundación va directo a investigación. Por unos 12 euros al mes — unos 140-150 al año — formas parte de los 112.842 socios que hacen posible que, la próxima vez que alguien tenga ese 50% de probabilidades, exista una forma de saberlo a tiempo. ¿Te apuntas?"}, "videos": [{"titulo": "Por un futuro sin Alzheimer", "tipo": "Spot institucional de campaña", "duracion": "4:19", "url": "https://www.youtube.com/watch?v=_jY8QtNU1b4", "anio": "2024"}, {"titulo": "Día Mundial del Alzheimer — Para que nadie pierda su identidad", "tipo": "Spot campaña Día Mundial sep.", "duracion": "1:15", "url": "https://www.youtube.com/watch?v=DsQ2T9Ruwxs", "anio": "2024"}, {"titulo": "100.000 socios — Esther y Víctor Manuel", "tipo": "Testimonio de socios — hito 100.000", "duracion": "2:01", "url": "https://www.youtube.com/watch?v=gHHw7htuTXw", "anio": "2023"}, {"titulo": "100.000 socios — Montserrat y Enrique", "tipo": "Testimonio de socios — hito 100.000", "duracion": "1:56", "url": "https://www.youtube.com/watch?v=YGWpLGXa1NY", "anio": "2023"}, {"titulo": "¿Es posible detectar el Alzheimer antes de los primeros síntomas?", "tipo": "Divulgación científica — detección precoz", "duracion": "1:48", "url": "https://www.youtube.com/watch?v=BGp65TN5OVQ", "anio": "2024"}, {"titulo": "¿Cómo empieza el Alzheimer? — Conoce la Investigación", "tipo": "Divulgación científica", "duracion": "1:57", "url": "https://www.youtube.com/watch?v=9t1huEf2cUw", "anio": "2024"}, {"titulo": "El camino del Alzheimer — Cap. 1: Poniendo nombre al Alzheimer", "tipo": "Serie divulgativa — episodio 1", "duracion": "1:11", "url": "https://www.youtube.com/watch?v=UR4lZmpxUwU", "anio": "2024"}, {"titulo": "El camino del Alzheimer — Cap. 2: La principal causa de demencia", "tipo": "Serie divulgativa — episodio 2", "duracion": "1:17", "url": "https://www.youtube.com/watch?v=cA6BRL0Txdo", "anio": "2024"}, {"titulo": "El camino del Alzheimer — Cap. 3: Las proteínas beta-amiloide y tau", "tipo": "Serie divulgativa — episodio 3", "duracion": "1:21", "url": "https://www.youtube.com/watch?v=T8tuK6E_06s", "anio": "2024"}, {"titulo": "El camino del Alzheimer — Cap. 4: Técnicas de neuroimagen", "tipo": "Serie divulgativa — episodio 4", "duracion": "1:14", "url": "https://www.youtube.com/watch?v=20eUq_gobt4", "anio": "2024"}, {"titulo": "El camino del Alzheimer — Cap. 5: Cuando te cuidas, el Alzheimer da un paso atrás", "tipo": "Serie divulgativa — episodio 5", "duracion": "1:05", "url": "https://www.youtube.com/watch?v=7SETRpdQsko", "anio": "2024"}], "ultimaActualizacion": "julio 2026"}</script>
<script type="application/json" id="data-fec">{"id": "fec", "emoji": "❤️", "nombre": "FEC", "full": "Fundación Española del Corazón", "color": "#ef4444", "claim": "Promovida por la Sociedad Española de Cardiología (8.593 miembros): el conocimiento médico más especializado de España puesto directamente al servicio de la prevención cardiovascular en la calle.\n\nFundada en 1967 como Fundación Hispana de Cardiología; adoptó su nombre actual (\"Fundación Española del Corazón\") en 1995, con S.A.R. la Infanta Doña Margarita de Borbón como presidenta de honor desde entonces.\n\n14.306 socios, 53 asociaciones de pacientes, 29.164 DEAs en la app Ariadna.\n\nPresidida desde 2022 por el Dr. Andrés Íñiguez Romo, jefe de Cardiología del Hospital Álvaro Cunqueiro de Vigo y expresidente de la SEC (2015-2017), creador de SEC-Calidad. Como él mismo resume: \"Lo relevante es la promoción de la salud: no se trata solo de hábitos cardiosaludables, sino de mejorar la nutrición, el comportamiento o el ejercicio. La responsabilidad del ciudadano es muy importante.\"", "meta": [{"label": "Fundada", "val": "1967"}, {"label": "Promotora", "val": "SEC (8.593 miembros)"}, {"label": "Socios FEC", "val": "14.306"}, {"label": "DEAs Ariadna", "val": "29.164 registrados"}], "cifras": [{"num": "17,9 M", "label": "Muertes al año en el mundo por enfermedad cardiovascular (ECV) — más que todas las formas de cáncer combinadas. En España, las ECV causan unas 120.000 muertes al año (una cada 4 minutos) y generan un coste anual superior a 7.700 millones € (estimación PwC/Farmaindustria 2020, incluyendo atención sanitaria y pérdida de productividad).", "fuente": "OMS (mortalidad mundial y España) / PwC-Farmaindustria 2020 (coste económico)"}, {"num": "80%", "label": "De los eventos cardiovasculares mayores son prevenibles actuando sobre los factores de riesgo modificables. La enfermedad cardiovascular es la que más mata y la más evitable.", "fuente": "OMS / FEC"}, {"num": "57,3%", "label": "De los españoles tiene 2 o más factores de riesgo cardiovascular simultáneos (ESFEC 2021). El factor más prevalente no es el colesterol: es dormir mal (36,2% de los españoles).", "fuente": "FEC · Encuesta de Salud Cardiovascular ESFEC 2021"}, {"num": "10 M", "label": "Personas con hipertensión en España, de las cuales 3 millones no saben que la padecen. Es el principal factor de riesgo prevenible de la enfermedad cardiovascular.", "fuente": "Revista FEC nº 160 · Verano 2026"}, {"num": "10,8%", "label": "Supervivencia media ante parada cardíaca extrahospitalaria en España. Con RCP inmediata y desfibrilador en menos de 5 minutos, la probabilidad aumenta significativamente.", "fuente": "Fundación MAPFRE / OHSCAR 2025"}, {"num": "29.164", "label": "DEAs (desfibriladores) registrados en la app Ariadna del programa PACS, con 71.099 usuarios voluntarios. Galicia es la primera CCAA en integrar Ariadna en el sistema de emergencias 061.", "fuente": "FEC · Memoria Anual 2025"}, {"num": "775.225€", "label": "Otorgados en 2025 por la Sociedad Española de Cardiología en becas y proyectos de investigación cardiovascular (25 proyectos activos, 23 nuevos evaluados).", "fuente": "FEC · Memoria Anual 2025"}, {"num": "+32,46%", "label": "Crecimiento de la base de socios de la FEC en 2025 respecto al año anterior, hasta los 14.306 socios — una base social en expansión, no estancada.", "fuente": "FEC · Informe de Actividad 2025"}], "programas": [{"emoji": "👩‍⚕️", "name": "Mujer y Corazón — cerrar la brecha de género en cardiología", "desc": "La enfermedad cardiovascular es la primera causa de muerte en mujeres en España: 64.492 mujeres al año (34,29% de las muertes femeninas, por delante del cáncer con 22,50% y de las enfermedades respiratorias con 9,42%). En términos prácticos, una mujer muere cada 8 minutos en España por enfermedad cardiovascular.\n\nSin embargo, persiste un desconocimiento generalizado: el 74% de los españoles no sabe que la ECV es la primera causa de muerte en la mujer, y la creencia popular (equivocada) es que el infarto es \"cosa de hombres\". Esa brecha de percepción tiene un correlato asistencial real: solo el 15% de las mujeres con problemas cardíacos recibe un tratamiento adecuado, frente al 56% de los hombres.\n\n\"Mujer y Corazón\" es un proyecto estratégico de la Sociedad Española de Cardiología (SEC) para el bienio 2023-2025, con el objetivo de mejorar el conocimiento sobre las enfermedades cardiovasculares en la mujer y sensibilizar sobre su salud cardiovascular. El proyecto documenta cinco brechas concretas en la atención a las mujeres. Se minimiza su riesgo cardiovascular. Se ignora que antecedentes obstétricos (como la diabetes gestacional o la preeclampsia) aumentan su riesgo cardiovascular futuro. Hay retrasos diagnósticos en patologías tan prevalentes como el infarto de miocardio o la insuficiencia cardiaca. Reciben procedimientos diagnósticos y terapéuticos menos agresivos. Y se las deriva menos a unidades de rehabilitación cardiaca, con una aplicación insuficiente de protocolos específicos para mujeres. Además, cuando una mujer sufre un infarto, suele tener de media 10 años más que un hombre en la misma situación y presentar más comorbilidades.\n\nEntre sus objetivos: maximizar el apoyo institucional para mejorar el reconocimiento del riesgo y el manejo de la enfermedad en la mujer, y fomentar iniciativas multidisciplinares con otras sociedades científicas. También impulsar el liderazgo y desarrollo profesional de la mujer en cardiología, promoviendo la equidad, y potenciar la concienciación global, tanto en la comunidad médica como en la sociedad.\n\nEl proyecto (bienio 2023-2025) cerró con la jornada \"La Tarde de Mujer y Corazón\" en la Casa del Corazón (Madrid, más de 100 asistentes presenciales), abordando menopausia, embarazo, alimentación y deporte según la edad. Tuvo también presencia mediática, incluida una intervención en el programa \"Y ahora Sonsoles\" (Atresplayer, septiembre 2024).\n\nEl proyecto dio como fruto un documento de consenso multisocietario: \"Prevención cardiovascular primaria y secundaria en los ciclos vitales de la mujer\", publicado en la Revista Española de Cardiología. Se elaboró junto con la Asociación de Cardiología Preventiva de la SEC, la Sociedad Española de Ginecología y Obstetricia (SEGO), la Asociación Española para el Estudio de la Menopausia (AEEM), la Sociedad Española de Endocrinología y Nutrición (SEEN), la Sociedad Española de Medicina de Familia y Comunitaria (semFYC), SEMERGEN y otras sociedades. Es la primera vez que cardiología, ginecología, endocrinología y atención primaria en España acuerdan un protocolo común para la prevención cardiovascular en cada etapa de la vida de la mujer (embarazo, menopausia, etc.).", "dato": "64.492 muertes/año en mujeres por ECV (34,29%) · 1 mujer fallece cada 8 min · 74% de españoles desconoce que es la 1ª causa de muerte en mujeres · Solo 15% recibe tratamiento adecuado vs 56% de los hombres · Infarto en mujeres: +10 años de media, más comorbilidades · Proyecto SEC 2023-2025 (5 brechas documentadas) · Jornada Mujer y Corazón: +100 asistentes · Consenso multisocietario (SEC+SEGO+AEEM+SEEN+semFYC+SEMERGEN) publicado en Revista Española de Cardiología", "categoria": "📢 Prevención y divulgación pública", "resumenClave": "La enfermedad cardiovascular mata a una mujer cada 8 minutos en España, pero el 74% de la población no sabe que es la primera causa de muerte femenina. Además, solo el 15% de las mujeres con problemas cardíacos recibe un tratamiento adecuado, frente al 56% de los hombres. El proyecto de la SEC documentó cinco brechas concretas en la atención a las mujeres y logró el primer consenso multisocietario —con cardiología, ginecología, endocrinología y atención primaria— para empezar a cerrarlas."}, {"emoji": "🎯", "name": "Campaña hipertensión — Hay peligros que no te ves venir", "desc": "Una encuesta de la FEC (mayo 2026) reveló que 4 de cada 10 españoles sitúan mal las cifras que definen la hipertensión, subestimando el riesgo de valores que ya requieren control médico.\n\nCampaña de concienciación lanzada por la FEC y la Sociedad Española de Cardiología (SEC), avalada por más de 20 entidades. Su objetivo es concienciar a la población de la importancia de medirse la presión arterial de forma habitual: una cifra igual o superior a 140/90 mmHg en dos o tres ocasiones requiere acudir al médico.\n\nLa campaña incluye spot, infografías, materiales descargables y activaciones con mediciones de tensión en hospitales de toda España (Rey Juan Carlos, Infanta Elena, Hospital de Canarias, Álvaro Cunqueiro, Hospital Central de la Defensa…).\n\nCuenta con el apoyo de cardiólogos influencers como Aurelio Rojas y José Abellán. Materiales disponibles en peligrosquenotevesvenir.com.\n\nJoaquín Henrich, 53 años, estaba una mañana en su oficina cuando notó dificultades para hablar: \"Empecé a hablar raro, como si se me quedaran trabadas las palabras\", cuenta. Había sufrido un ictus causado por hipertensión que no sabía que tenía. Tres días en la UCI después, se recuperó bien y sin secuelas — el mismo diagnóstico tardío que la campaña busca evitar.", "dato": "140/90 mmHg: umbral de hipertensión · Avalada por +20 entidades · Activaciones en hospitales de toda España · Testimonio real: Joaquín Henrich, ictus por hipertensión no diagnosticada · peligrosquenotevesvenir.com", "categoria": "📢 Prevención y divulgación pública"}, {"emoji": "🏫", "name": "Cardioescuelas y RCP — Premios RCP Escuelas (5ª ed.)", "desc": "La formación en reanimación cardiopulmonar (RCP) desde la infancia es uno de los pilares de la FEC. Los Premios RCP Escuelas tienen tres categorías: Originalidad y Creatividad, Proyecto Formativo Integral, y Máxima Participación.\n\nEn su 4ª edición (2025) presentaron sus proyectos 16 colegios y centros de formación; la FEC ya ha convocado la 5ª edición (2026), con el plazo de candidaturas abierto hasta el 8 de octubre. El objetivo: que la RCP se enseñe en todos los colegios, desde infantil hasta bachillerato y formación profesional.\n\nLa FEC también organiza la Semana del Corazón (en torno al 29 de septiembre, Día Mundial del Corazón) con talleres de RCP y nutrición en varias ciudades de toda España.", "dato": "Premios RCP Escuelas: 4ª ed. 2025 (16 colegios participantes) · 5ª ed. 2026 convocada (plazo hasta 8 oct.) · 3 categorías · Semana del Corazón: talleres RCP y nutrición", "categoria": "📢 Prevención y divulgación pública"}, {"emoji": "⚡", "name": "PACS y app Ariadna — 29.164 DEAs, 71.099 usuarios", "desc": "El Programa de Áreas Cardioseguras (PACS) certifica espacios con desfibrilador (DEA) y personal formado en RCP. Su pieza central es la app Ariadna RCP, creada conjuntamente por la FEC, la Sociedad Española de Cardiología (SEC) y Cruz Roja. Está diseñada para localizar en segundos al voluntario con conocimientos en RCP y el DEA más cercano cuando se produce una parada cardiorrespiratoria.\n\nEn España se producen unas 30.000 muertes al año por muerte súbita cardíaca. La supervivencia ante una parada cardíaca extrahospitalaria es del 10,8%, y cada minuto sin desfibrilación reduce las posibilidades entre un 7 y un 10%. Ariadna resuelve exactamente ese problema.\n\nEn 2025, Ariadna tiene 29.164 DEAs registrados y 71.099 usuarios voluntarios en toda España.\n\nEn 2025 se produjo un hito clave: Galicia fue la primera comunidad autónoma en integrar Ariadna en el sistema de Emergencias Sanitarias de Galicia-061. De este modo, cuando se llama al 061 por una parada cardíaca, el sistema activa automáticamente a los voluntarios Ariadna más cercanos. Esa integración (abril 2025) sumó de golpe 554 nuevos voluntarios y 300 desfibriladores nuevos a la red gallega, hasta alcanzar los 3.200 voluntarios formados en RCP en la comunidad. Además, la FEC firmó un convenio con Gestión de Servicios para la Salud y Seguridad de Canarias (GSC) para la integración en Canarias.", "dato": "29.164 DEAs · 71.099 usuarios Ariadna · Galicia: primera CCAA integrada en 061 · ~30.000 muertes/año por muerte súbita · 10,8% supervivencia media parada cardiaca extrahospitalaria · Ariadna: creada junto con Cruz Roja y SEC", "categoria": "🚨 Emergencias y respuesta vital", "resumenClave": "En España, la supervivencia ante una parada cardíaca extrahospitalaria es del 10,8%, frente a más del 30% en los países nórdicos — la diferencia es la cultura de RCP y la densidad de desfibriladores. La app Ariadna, creada junto con la SEC y Cruz Roja, localiza en segundos al voluntario con RCP y el DEA más cercano: ya tiene 29.164 desfibriladores registrados y 71.099 voluntarios en toda España. En 2025, Galicia se convirtió en la primera comunidad autónoma en integrarla directamente en su sistema de emergencias 061."}, {"emoji": "🔬", "name": "Investigación e I+D — SEC: 775.225€ en becas y proyectos", "desc": "España ocupa el puesto 22 de 34 países de la OCDE en apoyo público a la investigación sobre enfermedad cardiovascular — la primera causa de muerte en el país.\n\nLa Sociedad Española de Cardiología (SEC), promotora de la FEC, tiene una potente agencia de investigación propia que compensa parte de ese déficit. En 2025 otorgó 775.225€ en proyectos, becas y premios, con 25 proyectos y estudios activos y 23 nuevos proyectos evaluados. La convocatoria 2026 de becas SEC-FEC para investigación clínica o epidemiológica reparte 150.000€ en 10 becas de 15.000€ cada una. Van 7 a las líneas de investigación clínica y epidemiológica, 2 a intervención social y, por primera vez, 1 se dedica específicamente a la línea de investigación \"Mujer y Corazón\". A esto se suman becas específicas de 20.000€ para cardiología clínica y 12.000€ para trasplante cardiaco.\n\nLa SEC mantiene además una alianza estratégica con el Centro Nacional de Investigaciones Cardiovasculares (CNIC) en investigación, formación e innovación. Dentro de ella, el programa INVESMIR forma a médicos residentes de cardiología de toda España en investigación cardiovascular en los propios laboratorios del CNIC. Y el ensayo REBOOT, liderado por el CNIC con apoyo de la SEC (8.505 pacientes en 109 hospitales de España e Italia), demostró que los betabloqueantes tras un infarto no aportan beneficio en mortalidad, reinfarto ni hospitalización por insuficiencia cardiaca. Es un hallazgo que cambia una práctica médica vigente desde hacía más de 40 años, publicado simultáneamente en The New England Journal of Medicine y The Lancet.\n\nEl Congreso SEC25 (Granada, 23-25 octubre) reunió a 3.107 inscritos con 319 sesiones y 1.577 comunicaciones presentadas. El Congreso SEC26 ya está convocado en Sevilla (29-31 de octubre), con más de 1.500 comunicaciones esperadas, cerca de 4.000 profesionales y más de 200 sesiones. La Revista Española de Cardiología recibió más de 500 originales y mantiene un factor de impacto de 4,9 (Q1). REC: Interventional Cardiology logró en 2025 su inclusión en PubMed Central.\n\nLa Liga de los Casos Clínicos 2025 tuvo 2.182 profesionales en 59 equipos y 159 casos clínicos. La SEC impulsa también SECoopera, su programa de cooperación internacional, con actividad destacada en Bolivia y Ruanda durante 2025 (ver Formación y divulgación científica).", "dato": "España: puesto 22/34 OCDE en apoyo público a investigación CV · 775.225€ en becas y proyectos SEC · Convocatoria 2026: 150.000€ en 10 becas (incl. 1ª beca específica \"Mujer y Corazón\") · 3.107 inscritos Congreso SEC25 · Congreso SEC26 (Sevilla, 29-31 oct.): +1.500 comunicaciones, ~4.000 profesionales · Factor impacto REC 4,9 (Q1) · Alianza SEC-CNIC: INVESMIR + ensayo REBOOT (8.505 pacientes, NEJM y The Lancet, cambia práctica de 40 años)", "categoria": "🔬 Investigación y ciencia", "resumenClave": "España ocupa el puesto 22 de 34 países de la OCDE en apoyo público a la investigación cardiovascular, pese a ser la primera causa de muerte del país. La SEC compensa parte de ese déficit con una agencia de investigación propia: 775.225€ en becas y proyectos en 2025, más una alianza estratégica con el CNIC. Fruto de esa alianza, el ensayo REBOOT cambió una práctica médica vigente desde hacía más de 40 años, publicado a la vez en The New England Journal of Medicine y The Lancet."}, {"emoji": "🎓", "name": "Formación y divulgación científica — Campus SEC, CardioTV y SECoopera", "desc": "La Sociedad Española de Cardiología (SEC), promotora de la FEC, es la principal plataforma de formación cardiológica de habla hispana. En el curso 2024-2025, el Campus SEC online tuvo 45 cursos y 8.749 alumnos matriculados, con 9 cursos presenciales (348 alumnos) y 14 postgrados (1.164 alumnos activos). A esto se suma el Programa de Simulación para residentes (159 R2 formados, más 12 en nivel avanzado R4-R5). El examen europeo de cardiología para residentes tuvo 71 inscritos españoles con un 97% de aprobados.\n\nEn divulgación científica, CardioTV produjo 57 piezas audiovisuales en 2025 (Live, Focus, Flash y Talks), con hasta 2.163 visualizaciones por pieza. CardioPODCAST alcanzó su 4ª temporada con 32 episodios y una media de 1.092 escuchas en los primeros 30 días. El Blog 'Cardiología hoy' publicó 142 artículos originales con más de 1,6 millones de visitas totales. La FEC mantiene además un segundo blog, \"Impulso Vital\", centrado en estilo de vida saludable (ejercicio, nutrición, hábitos).\n\nSECoopera extiende este conocimiento a países en desarrollo. En 2025, 12 voluntarios realizaron formación en Ruanda sobre fiebre reumática, y en Bolivia se gestionaron 344 casos de telemedicina, 27 implantes de marcapasos, 28 cirugías y 70 ecocardiografías en una sola semana. El programa cuenta ya con más de 200 voluntarios (médicos y enfermería). Se ha extendido también a los campamentos de refugiados saharauis, con materiales formativos y soporte técnico remoto para casos complejos. Y a Camerún, facilitando el acceso a medicación para pacientes cardiópatas que no está disponible o es muy difícil de conseguir en el país.\n\nEn 2025, la FEC puso en marcha su tienda solidaria online, un nuevo canal para acercar productos con causa a la ciudadanía y generar recursos para sus fines sociales. También amplió su presencia digital con nuevos perfiles en TikTok, Threads y Bluesky, y su newsletter alcanza ya a 44.882 suscriptores.", "dato": "Campus SEC: 45 cursos · 8.749 alumnos · CardioTV: 57 piezas · CardioPODCAST: 32 ep/1.092 escuchas · Blog: 1,6M visitas · SECoopera: +200 voluntarios en Bolivia, Ruanda, Sáhara y Camerún · Newsletter: 44.882 suscriptores · Nueva tienda solidaria online · Presencia en TikTok/Threads/Bluesky", "categoria": "🔬 Investigación y ciencia"}, {"emoji": "🥗", "name": "PASFEC — Sello de Alimentación Cardiosaludable", "desc": "El Programa de Alimentación y Salud (PASFEC) evalúa productos alimenticios con criterios nutricionales definidos por un comité de cardiólogos de la SEC. Las empresas pagan la evaluación técnica, pero el sello solo se otorga si el producto cumple los criterios establecidos, que son públicos y transparentes.\n\nEn 2025, el programa cuenta con 25 empresas adheridas, 39 productos evaluados y 200 referencias disponibles en el mercado, con las nuevas adhesiones de Monte Nevado y Aperitivos Medina. Los criterios están disponibles en pasfec.fundaciondelcorazon.com.\n\nEl programa genera un incentivo de mercado para que las empresas alimentarias mejoren el perfil nutricional de sus productos. Entre las marcas con sello PASFEC hay productos muy conocidos por los consumidores como Danacol y ProActiv Original (lácteos para reducir el colesterol), además de Boadas 1880, Gullón Ligera, Exkimo o Aromais, entre otras.\n\nPASFEC fue premiado por la Academia Española de Nutrición y Dietética por su labor de mejora del perfil nutricional de los alimentos en España.", "dato": "25 empresas · 39 productos · 200 referencias · Comité médico SEC independiente · Nueva adhesión: Monte Nevado · Criterios públicos · Marcas con sello: Danacol, ProActiv, Gullón Ligera... · Nueva adhesión: Aperitivos Medina · Premio Academia Española de Nutrición", "categoria": "🏢 Empresas y alimentación"}, {"emoji": "🏢", "name": "PECS — Programa de Empresas Cardiosaludables", "desc": "El Programa de Empresas Cardiosaludables (PECS) proporciona a las empresas adheridas herramientas y recomendaciones para mejorar la salud cardiovascular de sus empleados. En 2025 participan 9 empresas: Cruz Roja, Renfe, SEUR, Generali, Universidad Europea, Parque Móvil del Estado, ABANCA, Holcim y la nueva incorporación SEIASA (Sociedad Mercantil Estatal de Infraestructuras Agrarias).\n\nLa FEC organiza también una jornada conjunta con el Instituto Nacional de Seguridad y Salud en el Trabajo (INSST) enfocada a entornos cardioseguros y cardiosaludables en las empresas. El programa incluye formación en RCP, medición de factores de riesgo en el entorno laboral y asesoramiento en hábitos cardiovasculares.", "dato": "9 empresas adheridas 2025 · Cruz Roja, Renfe, SEUR, Generali, Holcim... · Jornada conjunta INSST · RCP y prevención en el trabajo", "categoria": "🏢 Empresas y alimentación"}, {"emoji": "📚", "name": "Escuela de Paciente Experto — formación gratuita para pacientes", "desc": "La Escuela de Paciente Experto de la FEC ofrece formación online gratuita para pacientes cardiópatas y sus familiares o cuidadores. Cuenta con 32 profesores especializados (cardiólogos y otros especialistas) que imparten cursos sobre fibrilación auricular, insuficiencia cardiaca, cardiopatía isquémica y lípidos, además de materias generales sobre la cardiopatía. El objetivo: que el paciente conozca su propia enfermedad para adoptar comportamientos y conductas saludables que mejoren su evolución hacia la cronicidad.\n\nLa Escuela incluye también un espacio específico de \"Cuidado del Cuidador\", reconociendo que la enfermedad cardiovascular no solo afecta al paciente sino también a quienes lo acompañan.", "dato": "4 cursos gratuitos online (FA, IC, cardiopatía isquémica, lípidos) + materias generales · 32 profesores especializados · Espacio \"Cuidado del Cuidador\"", "categoria": "🤝 Apoyo al paciente"}, {"emoji": "🫀", "name": "Organización de Asociaciones de Pacientes — 53 asociaciones en todo el territorio", "desc": "La Fundación Española del Corazón coordina una red de 53 asociaciones de pacientes cardiovasculares distribuidas por todo el territorio nacional, con el objetivo de defender los intereses de los pacientes y desarrollar actividades útiles para ellos y su salud.\n\nEn 2025, el III Congreso Nacional de la Organización de Asociaciones de Pacientes FEC se celebró en la Casa del Corazón (Madrid) con 107 participantes, 7 charlas sobre patologías cardiovasculares y un taller práctico. Se realizaron dos CardioTV Live sobre la encuesta \"Percepción del riesgo cardiovascular en pacientes con cardiopatías y/o diabetes\" (880 y 151 visualizaciones respectivamente).\n\nLa campaña \"Siente tu ritmo\" (Día del Pulso, 1 de marzo), sobre fibrilación auricular, incluyó jornadas en hospitales de Madrid, Tarragona, La Paz, Granada (Hospital Clínico San Cecilio y Virgen de las Nieves) y La Princesa. El CardioTV Live asociado tuvo 4.600 visualizaciones.", "dato": "53 asociaciones · 107 pacientes III Congreso · Siente tu ritmo: FA en hospitales (4.600 visualizaciones)", "categoria": "🤝 Apoyo al paciente"}, {"emoji": "🏛️", "name": "Incidencia política — Comprometidos por el corazón", "desc": "El 29 de septiembre de 2025, Día Mundial del Corazón, la FEC organizó la firma de la Declaración de Compromiso \"Comprometidos por el corazón\". La suscribieron las comisiones de sanidad del Congreso de los Diputados y de las cámaras legislativas de todas las comunidades autónomas, comprometiéndose a impulsar medidas que refuercen la prevención, diagnóstico y tratamiento de las enfermedades cardiovasculares. Este es el tipo de incidencia política que financia la base social de la FEC: conseguir que todos los gobiernos autonómicos y el Congreso firmen un compromiso formal sobre salud cardiovascular, con 14.306 socios y sin financiación pública dominante.\n\nLa campaña \"PACTOS por tu corazón\" trabaja los factores de riesgo cardiovascular modificables (presión arterial, alimentación, colesterol, contaminación, tabaco, obesidad, sedentarismo y soledad).\n\nEn 2025 se celebró también la 3ª edición de los Premios imPULSO, que reconocen a entidades que impulsan la salud cardiovascular, con una nueva categoría para Centros de Educación y la participación de 28 empresas.\n\nEl 24 de marzo de 2026, la SEC y la FEC defendieron ante el Senado la necesidad de \"pasar a la acción\" en materia de prevención cardiovascular.\n\nUn día después, el 26 de marzo de 2026, la FEC se sumó a la Alianza Estratégica para la Salud Vascular (AESV), la primera coalición de este tipo en España. La forman diez entidades: SEC, FEC, Sociedad Española de Angiología y Cirugía Vascular, Sociedad Española de Medicina Interna, SEMERGEN, Sociedad Española de Directivos de la Salud, Foro Español de Pacientes, Consejo General de Colegios de Farmacéuticos, Consejo General de Enfermería y el Grupo OAT. Juntas firmaron un manifiesto que reclama que las enfermedades vasculares —responsables del 26% de las muertes en España— se conviertan en prioridad política y sanitaria nacional, con modelos de atención coordinados y estándares de cuidado homogéneos entre comunidades autónomas.", "dato": "Declaración de Compromiso firmada por Congreso + cámaras autonómicas (sept. 2025) · Campaña PACTOS por tu corazón · Premios imPULSO (3ª ed.): 28 empresas · Alianza Estratégica para la Salud Vascular (AESV, marzo 2026): 10 entidades, enfermedades vasculares = 26% de las muertes en España", "categoria": "🏛️ Incidencia y alianzas institucionales"}, {"emoji": "🌐", "name": "Internacional — EHN, WHF y congresos europeos", "desc": "La FEC participa activamente en la European Heart Network (EHN) y en la World Heart Federation (WHF). En 2025, asistió al Annual Workshop de la EHN en Estocolmo (junio) y al EACH Summit de Bruselas (diciembre), donde se presentó el Plan Europeo de Salud Cardiovascular como marco de referencia para una acción coordinada a nivel europeo.\n\nCon la WHF, participó en el World Heart Summit de Ginebra (mayo) y colaboró en el Adherence Day sobre adherencia terapéutica. En el Congreso Europeo de Cardiología celebrado en Madrid en 2025, la FEC dio soporte al cribado cardiovascular en el Cardiovascular Health Checkpoint, analizando a 1.360 personas.", "dato": "EHN: Annual Workshop Estocolmo + EACH Summit Bruselas (Plan Europeo Salud CV) · WHF: World Heart Summit Ginebra + Adherence Day · 1.360 cribados Congreso ESC Madrid", "categoria": "🏛️ Incidencia y alianzas institucionales"}, {"emoji": "🤝", "name": "Alianzas estratégicas — Sanitas, oncología y medio ambiente", "desc": "En 2025, la FEC se incorporó como partner científico de Healthy Cities, el programa de sostenibilidad de Sanitas para mejorar la salud de las personas y del entorno urbano fomentando la actividad física y los espacios verdes en las ciudades.\n\nTambién participó en CardiTox, una iniciativa de concienciación sobre la protección de la salud cardiovascular durante los tratamientos oncológicos, con mediciones de riesgo cardiovascular in situ — un cruce poco conocido entre cardiología y oncología.\n\nSEC-FEC Verde es una iniciativa estratégica conjunta de la SEC y la FEC que estudia el impacto de la contaminación ambiental y el cambio climático sobre la salud cardiovascular. Genera evidencia científica para cuantificar ese riesgo y promover intervenciones desde una perspectiva de sostenibilidad, conectando directamente con el factor \"Contaminación\" de la campaña PACTOS por tu corazón.\n\nEl 93% de la población española respira aire que excede los límites de calidad recomendados. La contaminación atmosférica es responsable del 25% de las muertes por enfermedades del corazón y del 24% de los ictus en España.", "dato": "Healthy Cities (Sanitas): FEC partner científico · CardiTox: cardiología + oncología · SEC-FEC Verde: contaminación, cambio climático y salud CV (93% de españoles respira aire contaminado, 25% de muertes cardiacas atribuibles)", "categoria": "🏛️ Incidencia y alianzas institucionales"}, {"emoji": "🏃", "name": "Carrera Popular del Corazón — XVII edición 2026", "desc": "La Carrera Popular del Corazón surgió como herramienta para concienciar a la sociedad y promocionar el deporte como medio para combatir las enfermedades cardiovasculares. En 2025 (16ª edición presencial y 6ª virtual) participaron 4.632 personas. La presentación fue conducida por el periodista Javier Callejo (Telemadrid), con el apoyo de los atletas olímpicos Yago Rojo y Azucena Díaz, además de la enfermera divulgadora Esther Gómez (@mienfermerafavorita).\n\nLa 17ª edición presencial y 7ª virtual ya está convocada para el 26 de septiembre de 2026 en Madrid Río (salida en la explanada Puente del Rey). Incluye carrera de 10km, marcha de 4,5km y carreras infantiles según edad, con Medtronic como patrocinador oficial.", "dato": "2025: 4.632 inscritos, atletas Yago Rojo y Azucena Díaz · 2026: XVII edición, 26 sept., Madrid Río, patrocinador Medtronic", "categoria": "🎉 Comunidad"}], "fondos": [], "web": "https://fundaciondelcorazon.com", "problema": "La enfermedad cardiovascular mata a 17,9 millones de personas al año en el mundo — más que todo el cáncer combinado — y en España causa unas 120.000 muertes anuales. El 80% de esos eventos son prevenibles actuando sobre factores de riesgo modificables.\n\nY sin embargo, el 57,3% de los españoles tiene dos o más factores de riesgo cardiovascular simultáneos: el más prevalente no es el colesterol ni la hipertensión, sino algo tan cotidiano como dormir mal (un 36,2% lo hace).\n\nA esas dos brechas se suma una tercera: la de la inversión. España ocupa el puesto 22 de 34 países de la OCDE en apoyo público a la investigación cardiovascular, pese a ser la primera causa de muerte del país.\n\nCuando ocurre una parada cardíaca fuera del hospital, la supervivencia en España es del 10,8% — en los países nórdicos supera el 30%. La diferencia no es genética ni de sistema sanitario: es la cultura de RCP y la densidad de desfibriladores disponibles.\n\nEsa brecha entre lo que podríamos hacer y lo que hacemos —en prevención, en investigación y en supervivencia— es exactamente el espacio donde trabaja la FEC.", "motivosSocio": ["El infarto no es \"cosa de hombres\": la enfermedad cardiovascular es la primera causa de muerte en las mujeres en España (una fallece cada 8 minutos), pero el 74% de la población no lo sabe. Solo el 15% de las mujeres con problemas cardíacos recibe un tratamiento adecuado, frente al 56% de los hombres. El proyecto estratégico de la SEC \"Mujer y Corazón\" (2023-2025) documentó esta brecha y logró el primer consenso multisocietario (con ginecología, endocrinología y atención primaria) para la prevención cardiovascular en cada etapa de la vida de la mujer.", "La brecha de supervivencia que la tecnología puede cerrar: en una parada cardíaca extrahospitalaria, España sobrevive al 10,8% de los casos frente a más del 30% en los países nórdicos. La diferencia es la cultura de RCP y la densidad de desfibriladores. Ariadna, la app de DEAs de la FEC, es la primera de su tipo integrada en un sistema de emergencias 061 en España: 29.164 desfibriladores registrados y 71.099 voluntarios. En 2025, Galicia fue la primera comunidad en integrarla: cuando alguien llama al 061 por una parada cardíaca, el sistema activa automáticamente a los voluntarios cercanos.", "El conocimiento médico más especializado de España, traducido a la calle: la FEC está promovida por la Sociedad Española de Cardiología (8.593 miembros). La ciencia que hacen los cardiólogos se convierte en programas que llegan a colegios, empresas y a la cocina de cualquier familia (PASFEC, Cardioescuelas, PECS).", "Incidencia política con resultados medibles: en septiembre de 2025, las comisiones de sanidad del Congreso de los Diputados y de todas las cámaras autonómicas firmaron la Declaración de Compromiso \"Comprometidos por el corazón\", impulsada por la FEC. Lo consiguió con 14.306 socios — sin la financiación ni la estructura de una gran organización internacional.", "Lo que tu cuota financia se puede ver y vivir cada año: la Carrera Popular del Corazón nació para concienciar sobre las enfermedades cardiovasculares y promover el deporte como herramienta para combatirlas. En 2025 (16ª edición presencial y 6ª virtual) participaron 4.632 personas, con el apoyo de atletas olímpicos. La XVII edición de 2026 se celebrará el 26 de septiembre en Madrid Río — no es una gala cerrada, es un evento al que cualquier socio puede ir y participar."], "fuentesCompletas": [{"texto": "Fundación Española del Corazón · Memoria Anual 2025 (documento principal de esta ficha)", "url": "https://fundaciondelcorazon.com/images/Memorias/Memoria_anual_FEC_2025.pdf"}, {"texto": "SEC · Informe de Actividad SEC-FEC 2025 (fuente de todos los datos SEC y FEC de esta ficha)", "url": "https://secardiologia.es/images/publicaciones/infografias/Memoria_anual_2025.pdf"}, {"texto": "Fundación Española del Corazón · Revista FEC nº160 (Verano 2026) — convocatoria de la 5ª edición de los Premios RCP Escuelas y testimonio de Joaquín Henrich", "url": "https://fundaciondelcorazon.com/images/revista-fc/RevistaFundaciondelCorazon_160.pdf"}, {"texto": "Fundación Española del Corazón · Nota de prensa: la mujer, \"cenicienta\" de la salud cardiovascular en España (64.492 muertes/año, 15% vs 56% tratamiento)", "url": "https://fundaciondelcorazon.com/prensa/notas-de-prensa/2543-mujer-sigue-siendo-cenicienta-de-salud-cardiovascular-en-espana.html"}, {"texto": "Sociedad Española de Cardiología · Proyecto Mujer y Corazón (objetivos y brechas de género oficiales)", "url": "https://mujerycorazon.secardiologia.es/que-es"}, {"texto": "Sociedad Española de Cardiología · Nota de prensa: el 74% de los españoles no sabe que la ECV es la primera causa de muerte en la mujer", "url": "https://secardiologia.es/comunicacion/notas-de-prensa/notas-de-prensa-sec/14885-el-74-de-los-espanoles-no-sabe-que-la-enfermedad-cardiovascular-es-la-primera-causa-de-muerte-en-la-mujer"}, {"texto": "Sociedad Española de Cardiología · Nota de prensa: SEC y FEC se unen a la Alianza Estratégica para la Salud Vascular (marzo 2026)", "url": "https://secardiologia.es/comunicacion/noticias-sec/16351-profesionales-gestores-y-pacientes-entre-ellos-la-sec-y-la-fec-se-unen-en-la-alianza-estrategica-para-la-salud-vascular"}, {"texto": "CNIC · Ensayo REBOOT: modifica una práctica médica vigente desde hace más de 40 años en el manejo del infarto", "url": "https://www.cnic.es/es/noticias/nejm-lancet-ensayo-reboot-liderado-por-cnic-modifica-practica-medica-vigente-desde-hace-mas"}, {"texto": "Galicia Press · Sanidade destaca la integración del 061 en Ariadna, que suma 554 voluntarios y 300 desfibriladores nuevos", "url": "https://www.galiciapress.es/articulo/sanidad/2025-04-21/5261777-sanidade-destaca-integracion-061-proyecto-ariadna-suma-554-voluntarios-300-nuevos-desfibriladores"}, {"texto": "Revista Española de Cardiología · Documento de consenso: prevención cardiovascular en los ciclos vitales de la mujer", "url": "https://www.revespcardiol.org/es-prevencion-cardiovascular-primaria-y-sec-articulo-S0300893225000375"}, {"texto": "FEC · Donaciones (ranking OCDE, muerte súbita, contaminación del aire)", "url": "https://donaciones.fundaciondelcorazon.com/"}], "verificado": "Datos verificados julio 2026", "captacion": {"resumen30": {"cifras": ["74%", "10,8%", "29.164"], "labels": ["de los españoles no sabe que la enfermedad cardiovascular es la primera causa de muerte en las mujeres — solo el 15% de ellas recibe un tratamiento adecuado, frente al 56% de los hombres", "supervivencia ante parada cardíaca extrahospitalaria en España — en los países nórdicos supera el 30%", "DEAs registrados en la app Ariadna, con 71.099 voluntarios — Galicia ya la integra en el 061"], "cierre": "Esa brecha entre lo que podríamos hacer y lo que hacemos —en prevención, en investigación y en supervivencia— es exactamente el espacio donde trabaja la FEC.", "videoDestacado": {"url": "https://www.youtube.com/watch?v=qu9mc7-srT8", "titulo": "Salva vidas con Ariadna: actúa a tiempo ante una parada cardiaca", "duracion": "0:59"}}, "proyectosClave": [0, 3, 4], "argumentario": [0, 1, 2]}, "speech": {"parada": "Oye, ¿tienes un minuto y medio? Te voy a contar la historia de Javier — es ficticia, pero le pasa a gente real cada día.", "discurso": "Javier tiene 52 años. Como el 57% de los españoles, tiene dos o más factores de riesgo cardiovascular sin darle demasiada importancia. El más común ni siquiera es el colesterol o la tensión: es dormir mal, algo que le pasa a más de un tercio de la población. Javier lleva años durmiendo mal, y nunca lo ha relacionado con su corazón.\n\nUn día, en la calle, Javier sufre una parada cardíaca. Cae al suelo, delante de varias personas.\n\nEn España, la probabilidad de sobrevivir a esto es del 10,8%. En los países nórdicos, es más del 30%. La diferencia no es genética, ni el sistema sanitario: es si alguien cerca sabe hacer RCP y si hay un desfibrilador a mano en los primeros minutos.\n\nEsta vez, Javier tiene suerte: una persona que pasaba por allí tiene la app Ariadna, del programa PACS de la Fundación Española del Corazón. La app le avisa de que hay una parada cardíaca a pocos metros y le indica dónde está el desfibrilador más cercano — uno de los 29.164 registrados en toda España. Esa persona empieza la RCP mientras otra va a buscar el DEA. Cuando llega la ambulancia, Javier ya tiene pulso.\n\nJavier sobrevive. En la revisión, le diagnostican la hipertensión que llevaba años sin detectar — uno de los 10 millones de españoles que la tienen, 3 de cada 10 sin saberlo. Ahora sigue uno de los cursos gratuitos de la Escuela de Paciente Experto de la FEC, para aprender a cuidar su corazón de verdad.\n\nSu hija adolescente ya sabe hacer RCP: se la enseñaron en el colegio, con las Cardioescuelas de la FEC. Pero ni Javier ni su mujer sabían, hasta este susto, que la enfermedad cardiovascular es la primera causa de muerte en las mujeres en España — igual que el 74% de la población. Es la siguiente brecha que la FEC quiere cerrar: que ellas tengan la misma información sobre su propio riesgo. Y si llega el momento, el mismo tratamiento — hoy, solo el 15% de las mujeres con problemas cardíacos recibe uno adecuado, frente al 56% de los hombres.\n\nTodo esto existe porque la FEC está promovida por la Sociedad Española de Cardiología, más de 8.500 cardiólogos que traducen su conocimiento en programas reales. Cardioescuelas, un sello que identifica qué alimentos son de verdad cardiosaludables, desfibriladores también en las empresas. Y en investigación: España ocupa el puesto 22 de 34 países de la OCDE en apoyo público a la investigación cardiovascular — la FEC compensa parte de ese déficit con sus propias becas.\n\nEn 2025, las comisiones de sanidad del Congreso y de todas las comunidades autónomas firmaron un compromiso conjunto, impulsado por la FEC, para que historias como la de Javier terminen así con más frecuencia — y no al revés.", "cierre": "Esa brecha —entre lo que ya sabemos hacer y lo que realmente hacemos, en prevención, en investigación y en supervivencia— es exactamente donde trabaja la FEC, y la financian 14.306 socios. Por unos 12 euros al mes — unos 140-150 al año — formas parte de quienes hacen que, la próxima vez, haya un desfibrilador cerca y alguien sepa usarlo. ¿Quieres ser parte de esa diferencia?"}, "videos": [{"titulo": "Salva vidas con Ariadna: actúa a tiempo ante una parada cardiaca", "tipo": "Spot divulgativo — app Ariadna y DEAs", "duracion": "0:59", "url": "https://www.youtube.com/watch?v=qu9mc7-srT8", "anio": "2024"}, {"titulo": "Parte de mí: vivir con una cardiopatía congénita", "tipo": "Testimonio de pacientes — #ParteDeMí", "duracion": "5:43", "url": "https://www.youtube.com/watch?v=1JOaTUwnMUs", "anio": "2024"}, {"titulo": "Hay peligros que no te ves venir", "tipo": "Spot de prevención cardiovascular", "duracion": "1:31", "url": "https://www.youtube.com/watch?v=O0hVQsgKsy4", "anio": "2024"}, {"titulo": "Semana del Corazón 2025", "tipo": "Spot de campaña anual", "duracion": "2:01", "url": "https://www.youtube.com/watch?v=ZI0g4zfZT4A", "anio": "2025"}, {"titulo": "Si te cuidas hoy, te lo agradecerás mañana", "tipo": "Spot de hábitos saludables — #SiTeCuidasHoy", "duracion": "2:38", "url": "https://www.youtube.com/watch?v=SqpMz2tj-_Y", "anio": "2024"}, {"titulo": "¿Qué es #PACTOSportucorazón?", "tipo": "Divulgación — campaña de prevención", "duracion": "1:05", "url": "https://www.youtube.com/watch?v=bpCOeIADtuQ", "anio": "2023"}, {"titulo": "¿Cuántas personas padecen y mueren por insuficiencia cardiaca en España?", "tipo": "Divulgación — enfermedad cardiovascular", "duracion": "0:57", "url": "https://www.youtube.com/watch?v=_TerFHllV3k", "anio": "2023"}], "ultimaActualizacion": "julio 2026", "fondosNota": "La FEC no publica un desglose de gasto por área: su Memoria Anual es narrativa, sin cifras, y sus cuentas depositadas en el Registro de Fundaciones no son de acceso público online. Se documenta esta limitación en vez de estimar un reparto sin respaldo real."}</script>
<script type="application/json" id="data-aldeas">{"id": "aldeas", "emoji": "🏠", "nombre": "AI", "full": "Aldeas Infantiles SOS España", "color": "#f59e0b", "claim": "Nacida en Austria en 1949 para dar hogar a niños huérfanos de la Segunda Guerra Mundial, Aldeas Infantiles SOS opera en España desde 1967. Hoy es parte de una red en 137 países y territorios que atiende a 7,9 millones de personas en todo el mundo.\n\nEn España, la expansión fue rápida: la primera Aldea abrió en Barcelona en 1972, seguida por Pontevedra en 1975. En 1981 se completaron las 8 Aldeas que sostiene hoy, con nuevas sedes en Madrid, Granada, Cuenca, Zaragoza, Santa Cruz de Tenerife y Gran Canaria. En 1994 comenzaron los programas de prevención familiar, y en 1996 la organización alcanzó la autosuficiencia económica en España, lo que le permitió empezar a financiar programas propios en Latinoamérica y África. En 2008, en plena crisis económica, llegó a duplicar el número de niños atendidos.\n\nCuida a niños, niñas y jóvenes que han perdido el cuidado parental o están en riesgo de perderlo, desde el primer día de vida hasta la plena emancipación. En 2025, atendió en España a 20.900 niños, niñas y jóvenes y a 4.763 familias (de los que 18.329 estaban en situación de vulnerabilidad y desamparo familiar), y a 47.505 menores y 13.567 familias en total entre España y Latinoamérica.\n\nPresidida desde 2012 por Pedro Puig Pérez —incorporado a la organización en 1991 como director de la Aldea de Cuenca, y director general desde 2002—, quien resume así el momento: \"Respondemos a crisis simultáneas — emergencias climáticas como la DANA de Valencia, guerras como Ucrania y Gaza — ayudando a quienes soportan las peores consecuencias.\" En 2016, Aldeas Infantiles SOS Internacional recibió el Premio Princesa de Asturias de la Concordia — uno de los reconocimientos más prestigiosos a nivel mundial — por su labor en favor de la infancia.", "meta": [{"label": "En España desde", "val": "1967"}, {"label": "En el mundo", "val": "137 países y territorios"}, {"label": "Socios/padrinos/donantes", "val": "307.991"}, {"label": "Niños/as España 2025", "val": "20.900 (4.763 familias)"}], "cifras": [{"num": "2,7 M", "label": "Niños, niñas y adolescentes en riesgo de pobreza o exclusión social en España (2024) — más de un tercio de la población infantil del país. La pobreza infantil volvió a aumentar pese a descender en el resto de la población."}, {"num": "40,9%", "label": "Personas que crecieron en el sistema de protección en España y hoy están en riesgo de pobreza o exclusión social, frente al 24,5% de la población general. Muchas debieron emanciparse a los 18 años sin red familiar o económica suficiente. Dato del informe \"Condiciones de vida tras salir del sistema de protección\", Memoria 2025."}, {"num": "20.900", "label": "Niños, niñas y jóvenes atendidos en España en 2025, junto a 4.763 familias, a través de programas de prevención, protección y apoyo a jóvenes. De ellos, 18.329 estaban en situación de vulnerabilidad y desamparo familiar."}, {"num": "47.505", "label": "Menores atendidos en el mundo en 2025 (España + 7 países de Latinoamérica), junto a 13.567 familias. En Latinoamérica: 26.605 niños/as y 8.804 familias en Bolivia, El Salvador, Guatemala, Honduras, Nicaragua, Perú y Venezuela."}, {"num": "75 años", "label": "Aldeas Infantiles SOS cumplió 75 años de historia en 2024, nacida en Austria en 1949 y presente en España desde 1967 — una de las organizaciones de infancia con mayor trayectoria y reconocimiento internacional del país."}, {"num": "59,9 M€", "label": "Ingresos totales en 2025, según la Memoria Socios 2025 y las cuentas anuales auditadas. El 72,1% procede de financiación privada (socios, padrinos, donantes y empresas) y el 27,9% de subvenciones públicas."}, {"num": "307.991", "label": "Socios, padrinos y donantes que sostienen la labor de Aldeas Infantiles SOS en España en 2025, junto al apoyo de más de 400 empresas, fundaciones e instituciones públicas."}], "programas": [{"emoji": "👨‍👩‍👧", "name": "Programas de Prevención — 30 Centros de Día y fortalecimiento familiar", "desc": "Los Programas de Prevención de Aldeas buscan evitar que los niños y niñas sean separados de sus familias, trabajando con las familias en riesgo antes de que la situación se deteriore. En 2025 cuentan con 30 Centros de Día en toda España, 9 Programas de Familias y 5 Centros de Educación Infantil (0-3 años).\n\nLos Centros de Día ofrecen apoyo escolar, talleres socioeducativos, apoyo emocional e intervención familiar a niños en situación de vulnerabilidad. Los Programas de Familias incluyen terapia familiar e individual, mediación, orientación parental, atención a madres y padres jóvenes, y grupos de apoyo.\n\nLos programas Caixa Proinfancia atienden a la infancia más vulnerable de 0 a 18 años en colaboración con la Obra Social La Caixa. En Aragón, el proyecto Aulas de Convivencia lleva el modelo preventivo directamente a los colegios.\n\nLa familia G.O., del Centro de Día de Madrid, llegó buscando apoyo psicológico para su hijo menor: \"al principio le costó venir, pero hoy es el primero en llegar y el último en irse\", cuentan; \"para nuestra familia ha supuesto un antes y un después\". Junto con los programas de educación en valores y proyectos escolares, comunitarios y de educación ambiental, los Programas de Prevención atendieron en 2025 a 18.329 niños, niñas y adolescentes y a 3.639 familias. Es el grueso de toda la actividad de Aldeas en España.", "dato": "2025: 18.329 niños/as · 3.639 familias · 30 Centros de Día · 5 CEI (0-3 años) · 9 Programas de Familias · Caixa Proinfancia · Aulas de Convivencia", "categoria": "👨‍👩‍👧 Prevención", "resumenClave": "Evitar que una familia se rompa, antes de que llegue a romperse: los Programas de Prevención son el grueso de toda la actividad de Aldeas en España, con 30 Centros de Día, 9 Programas de Familias y 5 Centros de Educación Infantil. En 2025 llegaron a 18.329 niños, niñas y adolescentes y 3.639 familias."}, {"emoji": "🏠", "name": "Aldea Infantil SOS y Residencias de Jóvenes — acogimiento residencial", "desc": "Las 8 Aldeas Infantiles SOS de España ofrecen un entorno familiar protector a niños, niñas y adolescentes que por distintos motivos no pueden vivir con su familia biológica. En cada hogar conviven entre 5 y 6 niños, principalmente grupos de hermanos, junto a una educadora de referencia y educadores de apoyo. Entre 6 y 10 hogares de este tipo, con espacios de ocio compartidos (parque infantil, zona deportiva, sala de usos múltiples), forman una Aldea Infantil SOS.\n\nLa Aldea de Granada está situada en el Albaicín y se compone de 5 casas con biblioteca, sala de actividades, pista de baloncesto y amplios jardines. Alexandra llegó a la Aldea Infantil SOS de Cuenca a los 14 años, tras complicaciones familiares que le impidieron seguir viviendo con sus padres: \"Afortunadamente, siempre hay una luz en la oscuridad, esta luz para mí era toda la gente y los profesionales que encontré en mi nuevo camino\", cuenta seis años después. Tomás Moreno también llegó a la Aldea de Cuenca con 13 años: hoy es jefe de sala en uno de los restaurantes de referencia de Alicante, ganó el concurso al mejor sommelier de la ciudad y representa a la Comunidad Valenciana en el concurso nacional de sommeliers.\n\nEn las 5 Residencias de Jóvenes de España conviven entre 6 y 8 chicos y chicas en su etapa previa a la emancipación, con una intervención basada en normalización, atención integral, educabilidad e individualización. El Programa de Primera Acogida y Valoración completa el dispositivo, ofreciendo respuesta inmediata y temporal a niños en situación de urgencia mientras se define su futuro.\n\nEn conjunto, todos los Programas de Protección (Aldeas, Residencias, Primera Acogida y Acogimiento Familiar) acogieron en 2025 a 1.430 niños, niñas y adolescentes y apoyaron a 1.124 familias.", "dato": "2025: 1.430 niños/as acogidos · 1.124 familias apoyadas (todos los Programas de Protección) · 8 Aldeas (5-6 niños/hogar, 6-10 hogares/Aldea) · 5 Residencias Jóvenes (6-8 jóvenes) · 1 Primera Acogida y Valoración · Testimonio real: Alexandra, Aldea de Cuenca", "categoria": "🏠 Protección y acogimiento"}, {"emoji": "🤝", "name": "Acogimiento Familiar — AcogES+ e Historias en Juego", "desc": "Para muchos niños en el sistema de protección, mantener el vínculo con sus hermanos es el único lazo familiar estable que les queda — por eso Aldeas prioriza que los grupos de hermanos permanezcan siempre juntos en el mismo hogar de acogida.\n\nEl Programa de Apoyo al Acogimiento en Familia se divide en tres líneas: Familia Extensa, Familia Ajena y Familia Ajena Especializada. Incluye servicios como sensibilización y formación a familias acogedoras, Puntos de Encuentro y Mediación Familiar, grupos de autoayuda y \"respiro familiar\" para dar descanso a las familias acogedoras.\n\nDentro de esta línea, el programa AcogES+ (Acogimiento Familiar Especializado con Dedicación Exclusiva) ha acercado el acogimiento especializado a más de 1.500 familias y formado a 160 profesionales a lo largo del proyecto. Stephana, madre biológica de un niño en el Programa de Acogimiento en Familia Ajena de Tenerife, recuperó su custodia tras trabajar con el equipo de Aldeas y la familia de acogida: \"esperaba toda la semana las visitas en el punto de encuentro, pero las despedidas siempre me rompían el corazón (...) actualmente, mi hijo vive conmigo y estamos muy felices\".\n\nDesde el otro lado del acogimiento, Ana tiene en acogimiento familiar (línea de Familia Extensa) a su sobrino de 14 meses mientras sus padres se recuperan: \"te das cuenta de que necesitas mucha ayuda porque vienen cosas que no te esperas\", explica. \"No sabemos si el niño estará mucho o poco tiempo con nosotros, pero hago exactamente las mismas cosas que con mis hijos. Es uno más para nosotros\".\n\nVinculada a AcogES+, la campaña \"Historias en Juego\" recogió 14.172 firmas ciudadanas para promover el acogimiento familiar especializado a nivel legislativo y fue presentada a las administraciones autonómicas. La exposición itinerante \"Juntos porque somos hermanos\" (33 fotografías, muchas del fotógrafo Iván Hidalgo, sobre el vínculo fraterno en acogimiento en países como Indonesia, México, Togo, Siria, Marruecos y Ucrania) sigue de gira en su tercer año consecutivo: ha recorrido ya Madrid, Granada, Málaga, Valencia, Vigo, Santander, Bilbao, Oviedo, Albacete, Sevilla y San Sebastián, entre otras ciudades.", "dato": "10 Programas de Acogimiento Familiar (Extensa/Ajena/Ajena Especializada) · AcogES+: +1.500 familias contactadas, 160 profesionales formados · Historias en Juego: 14.172 firmas · Exposición Juntos porque somos hermanos: 3er año de gira, 11+ ciudades", "resumenClave": "Mantener unidos a los grupos de hermanos es una prioridad: para muchos niños es el único vínculo familiar estable que les queda. La campaña 'Historias en Juego' recogió 14.172 firmas para llevar esta prioridad más allá de las propias Aldeas, y el programa AcogES+ ya ha acercado el acogimiento especializado a más de 1.500 familias.", "categoria": "🏠 Protección y acogimiento"}, {"emoji": "🚀", "name": "Programa de Jóvenes — de la protección a la emancipación", "desc": "Aldeas Infantiles SOS acompaña a los jóvenes que han crecido en el sistema de protección mucho más allá de los 18 años. El sistema público los desampara al cumplir la mayoría de edad: Aldeas garantiza continuidad.\n\nEn 2025, el Programa de Jóvenes en España apoyó a 1.141 chicos y chicas a través de 8 Proyectos de Autonomía (pisos asistidos con acompañamiento educativo y social), 8 Proyectos de Emancipación (seguimiento a jóvenes que ya viven solos y vuelven a necesitar apoyo) y 8 Servicios de Empleo (orientación, talleres, contacto con empresas, apoyo al emprendimiento). Se suman el Proyecto Ágora en Granada (competencias personales, sociales y laborales en barrios vulnerables), 2 Programas Profesionales (formación en oficios como cocina y automoción) y un nuevo Servicio de Postacogimiento para quienes ya han salido de los programas pero necesitan apoyo puntual.\n\nLa ayuda cubre vivienda, formación, búsqueda de empleo y apoyo psicológico cuando es necesario. Antes de los proyectos de Autonomía y Emancipación, el Proyecto Tránsito a la Vida Adulta prepara a los jóvenes para el paso a la mayoría de edad, ayudándoles a tomar conciencia de su propio proyecto de vida. Los Programas Profesionales están dirigidos a jóvenes mayores de 16 años sin el título de Graduado en ESO ni de Formación Profesional, ofreciéndoles una vía de cualificación y reinserción educativa y laboral.\n\nYaritsa, de 24 años, pasó por el Programa de Jóvenes de Las Palmas tras una infancia sin los recursos ni el apoyo necesarios: hoy ha terminado un ciclo formativo, una carrera universitaria y el B1 de inglés. \"Todo este proceso ha sido, para mí, reparar el corazón y llenar mi maleta de herramientas para seguir caminando\", cuenta.", "dato": "2025: 1.141 jóvenes apoyados · 8 Proyectos Autonomía · 8 Proyectos Emancipación · 8 Servicios Empleo · Proyecto Ágora Granada · 2 Programas Profesionales · Nuevo: Servicio Postacogimiento", "resumenClave": "Acompaña a los jóvenes tutelados mucho después de los 18, cuando el sistema público los da por emancipados. En 2025 apoyó a 1.141 jóvenes con proyectos de autonomía, emancipación y empleo, y desde este año suma un servicio de postacogimiento para quienes ya salieron del sistema.", "categoria": "🏠 Protección y acogimiento"}, {"emoji": "🏛️", "name": "Incidencia política — derechos de la infancia", "desc": "Aldeas Infantiles SOS no solo cuida a la infancia: trabaja para cambiar las leyes y políticas que afectan a los niños más vulnerables.\n\nEn 2024 colideró la campaña \"Vota por la infancia\" con motivo de las elecciones europeas, para situar los derechos de la infancia en la agenda comunitaria. Visibilizó en el Congreso de los Diputados la realidad de los jóvenes que salen del sistema de protección, lo que culminó con el registro de una Proposición no de Ley. Organizó un evento paralelo en la Cumbre del Futuro de Naciones Unidas en Nueva York.\n\nCerró el proyecto europeo Together (participación política de infancia y juventud vulnerable), premiado como Experiencia Transformadora por la EAPN. Se unió a la Alianza Global por los Cuidados y forma parte del Comité de Emergencia y de la Coordinadora de Organizaciones para el Desarrollo (CONGDE).\n\nEn 2025, contribuyó a la evaluación de la Estrategia de Erradicación de la Violencia contra la Infancia y la Adolescencia, y participó en el ECOSOC Youth Forum 2025 de Naciones Unidas. También promovió la participación de niños, niñas y jóvenes en iniciativas sobre salud mental, paz e inteligencia artificial, incluyendo un Diálogo de Alto Nivel sobre IA y cooperación en la SEGIB (Madrid, abril 2025).\n\nEn el ámbito digital, participó activamente en la redacción del Proyecto de Ley Orgánica para la protección de las personas menores de edad en los entornos digitales (anteproyecto aprobado por el Gobierno en junio de 2024, remitido al Congreso en marzo de 2025, actualmente en tramitación parlamentaria). Aportó propuestas concretas: prohibición de las loot boxes en videojuegos, verificación eficaz de la edad en redes sociales, controles parentales activados por defecto, y un presupuesto estable para la estrategia de protección digital.\n\nEn febrero de 2026 publicó la guía \"Enredados con las pantallas\", dirigida a familias y educadores para acompañar a la infancia y la adolescencia en una convivencia digital responsable.\n\nEn esta misma línea, desde 2026 participa en Ctrl+SAFE, un proyecto europeo de dos años (2026-2028) cofinanciado por el programa CERV de la Unión Europea, coordinado por SOS Children's Villages International, con un consorcio de 12 entidades en 5 países (España, Italia, Albania, Kosovo y Ucrania). Busca un diálogo intergeneracional para el uso seguro de los entornos digitales, con 25.627 me
