nores y 12.928 personas cuidadoras como beneficiarios directos.\n\nAldeas Infantiles SOS trabaja también la incidencia sobre cómo los medios de comunicación retratan a la infancia vulnerable. Su Guía y Código Deontológico está elaborada con el Grupo de Sociología de la Infancia y la Adolescencia, y avalada por el Consejo General de la Abogacía Española y la FAPE. Ofrece 26 consejos sobre lenguaje, fuentes y protocolos para entrevistas y fotografías de menores. Cada año, el Informe \"La infancia vulnerable en los medios de comunicación\" evalúa cómo la prensa española cumple estas recomendaciones. La edición de 2025 (la décima) analizó 100 noticias según 6 criterios, con la sensibilización sobre las necesidades de la infancia como aspecto mejor valorado (4,18 sobre 5).", "dato": "'Vota por la infancia' (elecciones europeas 2024) · Proposición no de Ley en el Congreso · Cumbre ONU Nueva York · Premio EAPN Proyecto Together · Alianza Global por los Cuidados · CONGDE · 2025: Estrategia Erradicación Violencia Infancia · ECOSOC Youth Forum · Diálogo IA SEGIB Madrid · Ctrl+SAFE (proyecto UE 2026-2028) · Guía y Código Deontológico sobre infancia en medios (26 consejos) · X Informe 2025: 100 noticias analizadas", "resumenClave": "Aldeas no solo cuida a la infancia: trabaja para cambiar las leyes y políticas que la afectan, desde el Congreso de los Diputados hasta la ONU y la Unión Europea. En 2024 colideró la campaña 'Vota por la infancia' y en 2025 participó en el ECOSOC Youth Forum y en la evaluación de la Estrategia de Erradicación de la Violencia contra la Infancia.", "categoria": "🏛️ Incidencia política"}, {"emoji": "📚", "name": "Educación en Valores — Abraza tus Valores y Párate a Pensar", "desc": "\"Abraza tus Valores\" (Infantil y Primaria) y \"Párate a Pensar\" (Secundaria) son los programas de Aldeas Infantiles SOS para enseñar respeto, empatía, confianza, tolerancia, responsabilidad e igualdad en las aulas. En el curso 2025-2026 llegaron a 230.000 escolares (130.000 de Infantil/Primaria y 100.000 de Secundaria) en 2.300 centros educativos de toda España — su 28ª y 22ª edición respectivamente, activos desde 1997 y 2004.\n\nEste curso están centrados en el valor de la convivencia. La actividad \"Diputados por un Día\" llevó a 140 niños y niñas de 7 colegios al Congreso de los Diputados, donde ejercieron activamente su derecho a la participación y votaron 14 propuestas.\n\nCada junio, la Jornada Nacional de Jóvenes reúne en Madrid a representantes de todas las comunidades autónomas. La VII edición (2024) elaboró un Decálogo sobre el uso de las tecnologías, y la VIII (junio 2026) presentó los resultados del Observatorio de la Adolescencia 2026, una encuesta a 2.332 estudiantes de secundaria de 12 a 16 años. Entre sus hallazgos: el 43% querría mirar menos el móvil al estudiar, el 22% preferiría dormir sin pantallas cerca, y el 43,1% cree que un mundo sin redes sociales favorecería las relaciones interpersonales. Un informe anterior del Observatorio, de 2025, con 2.021 estudiantes, ya había encontrado que el 78% reconoce un \"enganche\" medio-alto a los dispositivos y que la mitad ha presenciado ciberacoso.", "dato": "230.000 escolares en 2.300 centros (curso 2025-26) · Abraza tus Valores: 28ª ed. (desde 1997) · Párate a Pensar: 22ª ed. (desde 2004) · Diputados por un Día: 140 niños, 7 colegios, 14 propuestas votadas · Observatorio de la Adolescencia 2026: 2.332 estudiantes, 43% quiere usar menos el móvil · VIII Jornada Nacional de Jóvenes", "categoria": "📚 Educación y valores"}, {"emoji": "🌱", "name": "Naturaleza Educa y Educación Afectivo-Sexual", "desc": "El programa \"Naturaleza Educa\" utiliza el medio natural como herramienta educativa: huertos, equinoterapia social, granjas escuela y actividades de educación ambiental, presentes en todas las Aldeas, incluyendo la EcoGranja de Tenerife y el Espacio Malvaseda de Zaragoza (con terapia ecuestre). En la EcoGranja, cada verano un Campo de Verano ofrece a unos 80 adolescentes y jóvenes del sistema de protección tres semanas de bioconstrucción, agricultura ecológica, cocina saludable y primeros auxilios — continuación del proyecto \"Construyendo una Ecoaldea\", activo desde 2010 y con cerca de 3.000 participantes acumulados. Incluye proyectos como \"Un día rural\", \"Hogares sostenibles\" (retos de ahorro de agua, luz y reciclaje por hogar) y \"Pequeños grandes granjeros\" (cuidado de animales, siembra y recolección).\n\nEl Programa de Educación Afectivo-Sexual trabaja relaciones saludables, prevención de violencia, identidades y diversidad con los niños y jóvenes de todos los programas de Aldeas.\n\nEn Cataluña, el servicio Connectem impartió 47 talleres en institutos sobre gestión emocional, autoestima y salud digital. Su campaña \"Una Semana Sin Pantallas\" invitó a toda la Comunidad Escolar (alumnos, profesores y familias) a desconectarse temporalmente de los dispositivos digitales.", "dato": "Naturaleza Educa: equinoterapia, EcoGranja Tenerife (Campo de Verano, ~80 jóvenes/año), Espacio Malvaseda Zaragoza, Un día rural, Hogares sostenibles, Pequeños grandes granjeros · Connectem (Cataluña): 47 talleres · Una Semana Sin Pantallas", "categoria": "📚 Educación y valores"}, {"emoji": "🌎", "name": "Cooperación internacional — 7 países de Latinoamérica", "desc": "Desde Aldeas Infantiles SOS de España se impulsan proyectos de cooperación internacional con el objetivo de reducir la pobreza, frenar la desigualdad y generar oportunidades para la infancia y las familias en situación de vulnerabilidad. En 2025 financió programas en 7 países latinoamericanos — Bolivia, El Salvador, Guatemala, Honduras, Nicaragua, Perú y Venezuela — trabajando en fortalecimiento de capacidades parentales, vínculos afectivos seguros y acceso a educación, salud y acompañamiento psicosocial.\n\nEn total, apoyó a 26.605 niños, niñas y jóvenes y a 8.804 familias a través de 13 Programas de Cuidado Alternativo, 15 Programas de Jóvenes, 35 Programas de Fortalecimiento Familiar y Comunitario y 26 Programas de Educación y Capacitación. En Honduras, el proyecto \"Modelo Comunitario de Crianza y Protección: Vínculos para el Desarrollo Integral en Choluteca y Tegucigalpa\", financiado por el Gobierno de Canarias, alcanzó importantes avances en sus primeros seis meses de ejecución. En 2024, la cartera de cooperación incluyó también Senegal, aunque en 2025 la financiación se concentró en los 7 países latinoamericanos ya citados.\n\nAldeas Infantiles SOS también responde a emergencias humanitarias. En junio y julio de 2026, tras los terremotos más potentes en un siglo en la costa caribeña de Venezuela (La Guaira y Caracas), activó un plan de respuesta centrado en evitar la separación familiar, identificar a niños solos o desprotegidos y cubrir agua, alimentos, atención sanitaria y apoyo psicosocial. Llevaba ya 47 años trabajando en el país. Y en Ucrania, donde ha apoyado a más de 630.000 niños y familias desde el inicio del conflicto en 2022, un bombardeo masivo sobre Kiev en la noche del 2 de julio de 2026 dañó un Centro de Fortalecimiento Familiar y un Centro Juvenil de la organización (roturas de ventanas y puertas, daños estructurales). No hubo heridos entre los equipos ni las familias atendidas.", "dato": "2025: 26.605 niños/as · 8.804 familias · 7 países: Bolivia, El Salvador, Guatemala, Honduras, Nicaragua, Perú, Venezuela · 13 Cuidado Alternativo + 15 Jóvenes + 35 Fortalecimiento Familiar + 26 Educación · Honduras: proyecto financiado por Gobierno de Canarias · Emergencia Venezuela (terremotos jun-jul 2026, 47 años en el país) · Ucrania: +630.000 apoyados desde 2022, instalaciones dañadas por bombardeo en Kiev (jul. 2026)", "categoria": "🌎 Cooperación internacional"}, {"emoji": "🛡️", "name": "Política de Protección Infantil y certificaciones de calidad", "desc": "Toda la labor de Aldeas Infantiles SOS se apoya en su Política de Protección Infantil, gestionada por un Comité de Política Infantil propio. Está basada en la Convención de Derechos del Niño de la ONU y los estándares de la coalición \"Keeping Children Safe\". Se estructura en tres pilares: Conciencia (espacios formales de diálogo sobre protección infantil entre niños y adultos, y una red de protección activa con otras entidades) y Prevención (formación y sensibilización de todos los colaboradores, y empoderamiento de los niños como agentes activos de su propia protección y la de sus compañeros). El tercer pilar es Denuncia: la investigación de cualquier caso de desprotección.\n\nEsta política se traduce en certificaciones externas de primer nivel: el Sello EFQM 400+ (una de las acreditaciones de excelencia más exigentes de Europa), la Certificación AENOR ISO 9001 de gestión de calidad y Quality4Children (estándares específicos de acogimiento). También la Certificación de Nivel 1 de Keeping Children Safe, que verifica el cumplimiento de los estándares globales de protección infantil.", "dato": "Comité de Política Infantil: Conciencia-Prevención-Denuncia (CDN ONU + Keeping Children Safe) · Sello EFQM 400+ · AENOR ISO 9001 · Quality4Children · Keeping Children Safe Nivel 1", "categoria": "🎖️ Calidad y formación institucional"}, {"emoji": "🏫", "name": "Academia SOS — Formación, calidad e investigación institucional", "desc": "La Academia SOS es el recurso estratégico de Aldeas Infantiles SOS para fortalecer la formación, impulsar la calidad e integrar la investigación como ejes fundamentales para la mejora continua. En 2024, Aldeas obtuvo la certificación en Transparencia y Buen Gobierno de la Coordinadora de Organizaciones para el Desarrollo (CONGDE) — un sello distinto pero complementario al Sello EFQM 400+ que sustenta la Política de Protección Infantil (ver ese programa). Entre sus criterios: ningún colectivo puede ocupar el 40% o más de los puestos de la Junta Directiva, y sus miembros no pueden compatibilizar el cargo con puestos públicos en un mismo partido, sindicato o administración — condiciones de independencia que se suman a políticas internas documentadas de Trazabilidad de Fondos, Canal Ético y Plan de Igualdad.\n\nEn formación: 3.229 personas participaron en 74 acciones formativas programadas con una satisfacción promedio de 4,3 sobre 5. La formación incluye formación inicial (obligatoria para todas las incorporaciones, tanto plantilla como voluntariado), formación continua (protección infantil, trauma, gestión emocional, herramientas digitales) y formación especializada para familias acogedoras.\n\nEn investigación, destacan cuatro estudios en 2024: Evaluación del modelo AcogES+ (mejoras significativas en bienestar y vínculo afectivo), Sentirse en familia (más de 300 niños en entornos residenciales, factores de sentido de pertenencia) y Evaluación de los cuidados en acogimiento residencial (realizada en 2024 en 8 Aldeas, 4 Residencias de Jóvenes —hoy ya son 5—, Pisos y Programa de Primera Acogida). El cuarto es la Encuesta general de salud mental infanto-juvenil (más de 3.700 niños, niñas y jóvenes en 77 programas), que detectó la necesidad de reforzar enfoques terapéuticos orientados al trauma y neurodesarrollo. Los resultados se han presentado en el XIII Congreso Iberoamericano de Psicología y en la Universidad Pontificia de Comillas.\n\nLa medición de satisfacción de 2024 alcanzó a 4.598 participantes en encuestas, incluyendo 2.467 niños, niñas, adolescentes y jóvenes (1.252 niñas y 1.215 niños), 1.432 familias, 379 colegios y 195 personas de la administración. Los grados de satisfacción (sobre 5): niños/as y jóvenes: 4,36; familias: 4,63; administración: 4,60; centros educativos: 4,68; voluntarios y profesionales en prácticas: 4,61.", "dato": "Transparencia y Buen Gobierno CONGDE · 3.229 personas en 74 acciones formativas · Satisfacción 4,3/5 · Encuesta salud mental: 3.700 niños en 77 programas · 4 estudios de investigación · 4.598 encuestados · Satisfacción familias 4,63 · centros educativos 4,68", "categoria": "🎖️ Calidad y formación institucional"}, {"emoji": "♿", "name": "Aldeas Inclusiva — Centro Especial de Empleo e inclusión real", "desc": "Aldeas Inclusiva trabaja para contribuir a la plena inclusión de las personas con discapacidad en la sociedad, dando respuesta a sus necesidades y generando oportunidades reales. Su eje central es el Centro Especial de Empleo de Iniciativa Social (CEEIS), con cuatro líneas de negocio: Ecoembalajes (embalaje sostenible, reconocida como referente del sector) y Ecoagricultura (reconocida por la Red Rural Nacional como buena práctica de dinamización rural). Se suman Manipulados y Educa (educación inclusiva, con más de 3.489 alumnos en 2024).\n\nEn 2024, 69 personas con discapacidad intelectual trabajaron en el CEEIS, de las que 15 proceden de Aldeas Infantiles SOS. El Proyecto SENDA (cofinanciado por CEPES con cargo al Fondo Social Europeo Plus) mejoró la productividad, la estructura organizativa y el clima laboral.\n\nEl Proyecto Social incluye el programa Serendipia (autonomía e independencia: 3 personas completaron su proceso de emancipación en 2024) y Kairós (Escuela de Ocio y Tiempo Libre Inclusiva inaugurada en 2024 en colaboración con la Universidad de Granada, Fundación 'la Caixa' y el Ayuntamiento de Deifontes, con formación homologada y certificados del sector del ocio). Se suman el Servicio de Ajuste Personal y Social (SAPS, con 21 planes individuales de trabajo) y la Comisión de Ocio y Tiempo Libre (actividades como el Desafío VALE). Aldeas Inclusiva trabaja en alianza con CEPES, Fundación Unicaja y Fundación 'la Caixa'.", "dato": "69 personas con discapacidad en CEEIS · 4 líneas: Ecoembalajes, Ecoagricultura, Manipulados, Educa · 3.489 alumnos Educa · Kairós inaugurada 2024 · Serendipia: 3 emancipaciones · SAPS: 21 planes individuales", "categoria": "💼 Inclusión laboral"}, {"emoji": "🙋", "name": "Voluntariado — presencia territorial en toda España", "desc": "El programa de Voluntariado es transversal: gestiona la incorporación, participación, seguimiento y salida de personas voluntarias en los proyectos y servicios que Aldeas Infantiles SOS desarrolla en cada territorio. Facilita la vinculación entre la sociedad y la organización, y proporciona la formación necesaria para su actividad. En el último año, 409 personas voluntarias participaron en estos proyectos.\n\nAldeas Infantiles SOS participa activamente en plataformas de voluntariado de toda España: es miembro de la Junta Directiva de la Plataforma de Voluntariado de Granada (Andalucía) y forma parte de la Coordinadora Aragonesa de Voluntariado y la Federación Aragonesa de Solidaridad. También de la Federación Plataforma de Entidades de Voluntariado de Canarias, la Federación Catalana de Voluntariado Social y la Plataforma de Voluntariado Galego. Esta presencia institucional en plataformas regionales muestra el arraigo territorial de Aldeas más allá de sus propios centros.\n\nMás de 400 empresas, fundaciones e instituciones públicas colaboran con Aldeas, muchas a través de acciones concretas de voluntariado corporativo. El Reto Solidario Interempresas, en su 2ª edición (2026), movilizó a más de 700 personas de 17 empresas en una competición virtual de retos físicos y digitales. Acumuló 2.192.967 puntos —más del doble que la edición anterior— con entrega de premios en la Aldea de San Lorenzo de El Escorial. Otras alianzas activas incluyen a QTS (Zaragoza), Mazda (\"Constructor de Futuro\"), MediaMarkt (cierre de la brecha digital infantil) y Scania (jornadas de voluntariado en Vigo).", "dato": "409 voluntarios/año · Junta Directiva Plataforma Voluntariado Granada (Andalucía) · Coordinadora Aragonesa de Voluntariado · Federación Plataforma Entidades Voluntariado Canarias · Federación Catalana de Voluntariado Social · Plataforma de Voluntariado Galego · Reto Solidario Interempresas (2ª ed. 2026): 700+ personas, 17 empresas, 2,19M puntos · Alianzas: QTS, Mazda, MediaMarkt, Scania", "categoria": "🤝 Comunidad y voluntariado"}], "fondos": [{"label": "Programas sociales (España + cooperación internacional)", "pct": 80}, {"label": "Captación de recursos, gestión de socios y justificación de subvenciones", "pct": 14.2}, {"label": "Administración y gestión de la entidad", "pct": 5.8}], "fondosNota": "Nota: desglose oficial de la Memoria Socios 2025 (\"Nuestras cuentas en 2025\"), en miles de euros: total gastos 59.648, de los que 47.728 a programas sociales (80,0%), 8.438 a captación de recursos (14,2%) y 3.482 a administración (5,8%). Total ingresos 59.886, de los que 43.194 de financiación privada (72,1%) y 16.692 de subvenciones públicas (27,9%).", "web": "https://www.aldeasinfantiles.es", "problema": "En España, más de 2,7 millones de niños, niñas y adolescentes están en riesgo de pobreza o exclusión social — más de un tercio de la población infantil del país. Es una cifra que volvió a aumentar en 2024 pese a descender en el resto de la población.\n\nEl sistema de protección a la infancia no deja de crecer: en 2024 ya superaba los 55.010 niños, niñas y adolescentes (+5,85% interanual). Por primera vez, el acogimiento residencial (55%, 19.977 casos) supera al acogimiento familiar (45%, 16.486 casos), pese a que la ley exige priorizar el entorno familiar. Casi 1 de cada 5 menores de 6 años con medida de protección está en régimen residencial.\n\nAldeas Infantiles SOS trabaja dentro de este sistema: en 2025 atendió en España a 1.430 niños, niñas y jóvenes en situación de desamparo (acogidos en Aldeas, Residencias de Jóvenes o familias de acogida). A esto se suman 18.329 menores y 3.639 familias dentro de sus programas de prevención, dirigidos a evitar que la separación llegue a producirse.\n\nEl sistema público de protección tiene, además, un punto ciego: al cumplir 18 años, miles de jóvenes que han crecido sin familia salen del sistema de un día para otro. Se quedan sin red de apoyo, sin vivienda y muchas veces sin empleo: el 40,9% de quienes crecieron en el sistema están hoy en riesgo de pobreza o exclusión social, frente al 24,5% de la población general.\n\nAldeas es una de las pocas organizaciones que sigue acompañando a estos jóvenes después de la mayoría de edad, en vez de darlos por emancipados de golpe.", "motivosSocio": ["Acompañamiento de por vida, no hasta los 18: el sistema público desampara a los jóvenes tutelados al cumplir la mayoría de edad. Aldeas es de las pocas organizaciones que sigue a su lado después: en 2025, 1.141 jóvenes recibieron apoyo en proyectos de autonomía, emancipación y empleo. Desde 2025 existe además un nuevo servicio de postacogimiento para quienes ya salieron del programa pero necesitan ayuda puntual más adelante. El coste de no hacerlo es real: el 40,9% de quienes crecieron en el sistema de protección están hoy en riesgo de pobreza o exclusión social, frente al 24,5% de la población general.", "Los hermanos nunca se separan: en las 8 Aldeas de España, mantener unidos a los grupos de hermanos en el mismo hogar es una prioridad — para muchos niños es el único vínculo familiar estable que les queda. La campaña \"Historias en Juego\" llevó esta lucha más allá de las Aldeas, recogiendo 14.172 firmas para que las familias de acogida también prioricen acoger a hermanos juntos.", "Evitar que una familia se rompa, antes de que llegue a romperse: los Programas de Prevención son el grueso de toda la actividad de Aldeas en España, con 30 Centros de Día, 9 Programas de Familias y 5 Centros de Educación Infantil. En 2025 llegaron a 18.329 niños, niñas y adolescentes y 3.639 familias — como la de G.O., en Madrid, que buscaba apoyo psicológico para su hijo menor: \"al principio le costó venir, pero hoy es el primero en llegar y el último en irse\", cuentan; \"para nuestra familia ha supuesto un antes y un después\".", "75 años de trayectoria y máximas certificaciones de calidad: nacida en Austria en 1949 para dar hogar a niños huérfanos de la Segunda Guerra Mundial, hoy opera en 137 países. En España, desde 1967, mantiene el Sello EFQM 400+ — una de las acreditaciones más exigentes de Europa — y la Certificación Keeping Children Safe Nivel 1, además del sello de Transparencia y Buen Gobierno de la CONGDE.", "Una organización a la vanguardia de los riesgos de hoy: Aldeas no se ha quedado anclada en el modelo de \"hogar de acogida\" de 1949. En marzo de 2026 publicó \"Enredados con las pantallas\", una guía elaborada con una docena de expertos (psicólogos, fiscales, sociólogos) sobre ciberacoso, adicción a pantallas, IA y salud mental infantil. También participó activamente en la redacción del Proyecto de Ley Orgánica para la protección de menores en entornos digitales, aportando recomendaciones concretas sobre control parental, verificación de edad y prevención de adicciones. Desde 2026 participa además en Ctrl+SAFE, un proyecto europeo de dos años cofinanciado por la UE con un consorcio de 12 entidades en 5 países, que ya llega a 25.627 menores y 12.928 personas cuidadoras."], "fuentesCompletas": [{"texto": "Aldeas Infantiles SOS · Área de prensa (cifras oficiales 2025; nota de prensa sobre el bombardeo en Kiev, julio 2026)", "url": "https://www.aldeasinfantiles.es/area-prensa"}, {"texto": "Aldeas Infantiles SOS · Informe de auditoría de cuentas anuales 2025", "url": "https://www.aldeasinfantiles.es/wp-content/uploads/2026/07/Informe-de-auditoria-2025.pdf"}, {"texto": "Aldeas Infantiles SOS · Memoria 2024 / Finanzas 2024 (año anterior, usada para datos de programas de Educación en Valores y contexto histórico)", "url": "https://cms.aldeasinfantiles.es/uploads/2025/07/memoria-2024-extensa.pdf"}, {"texto": "Aldeas Infantiles SOS · Enredados con las pantallas (febrero 2026)", "url": "https://www.aldeasinfantiles.es/area-prensa/guia-enredados-con-las-pantallas"}, {"texto": "Aldeas Infantiles SOS · Testimonio de Alexandra, \"Somos supervivientes de nuestro pasado\" (27 marzo 2019)", "url": "https://www.aldeasinfantiles.es/actualidad/testimonios/somos-supervivientes-de-nuestro-pasado/"}, {"texto": "Aldeas Infantiles SOS · Memoria Aldeas 2025 (testimonios de Yaritsa, Stephana y familia G.O.; cifras de socios, financiación e informes 2025)", "url": "https://www.aldeasinfantiles.es/wp-content/uploads/2026/06/Memoria-Socios-2025.pdf"}, {"texto": "Aldeas Infantiles SOS · Nota de prensa: aumenta el número de niños y adolescentes en el sistema de protección, que ya supera los 55.000", "url": "https://www.aldeasinfantiles.es/area-prensa/ninos-ninas-adolescentes-en-el-sistema-de-proteccion"}, {"texto": "Aldeas Infantiles SOS · Emergencia Venezuela (terremotos junio-julio 2026)", "url": "https://www.aldeasinfantiles.es/dona/emergencia-venezuela/"}, {"texto": "Aldeas Infantiles SOS · Reto Solidario Interempresas 2026", "url": "https://www.aldeasinfantiles.es/area-prensa/reto-solidario-interempresas-2026/"}, {"texto": "Aldeas Infantiles SOS · Programas educativos 2026 (28ª/22ª edición, curso 2025-2026)", "url": "https://www.aldeasinfantiles.es/area-prensa/programas-eduicativos-2026"}, {"texto": "Aldeas Infantiles SOS · Observatorio de la Adolescencia 2025 y 2026", "url": "https://www.aldeasinfantiles.es/area-prensa/adolescentes"}, {"texto": "Aldeas Infantiles SOS · Guía y Código Deontológico para proteger los derechos de la infancia en los medios de comunicación", "url": "https://www.aldeasinfantiles.es/area-prensa/aldeas-infantiles-sos-presenta-una-guia-y-codigo-deontologico-para-proteger-los-derechos-de-la-infancia-en-los-medios-de-comunicacion/"}, {"texto": "Aldeas Infantiles SOS · Junta Directiva y composición institucional", "url": "https://www.aldeasinfantiles.es/junta-directiva/"}, {"texto": "Aldeas Infantiles SOS · Historia y expansión en España (1949-2008)", "url": "https://www.aldeasinfantiles.es/historia/"}, {"texto": "Aldeas Infantiles SOS · Proyecto Ctrl+SAFE (2026-2028, programa CERV de la UE)", "url": "https://www.aldeasinfantiles.es/ctrl-safe/"}, {"texto": "Aldeas Infantiles SOS · Transparencia y gobierno corporativo", "url": "https://www.aldeasinfantiles.es/transparencia/"}, {"texto": "Aldeas Infantiles SOS · Testimonio de Ana, ac <script>
/* ==================================================
   CONFIG
================================================== */
var ONG_IDS=['aecc','aldeas','cruzroja','fec','fjc','fpm','wwf'];

/* ==================================================
   DATOS
   Cada ONG vive en su propio <script type="application/json" id="data-{id}">
================================================== */
/* Un bloque malformado no debe tumbar la app: se omite esa ONG y se avisa por consola */
var ONGS=[];
var ONG_BY_ID={};
ONG_IDS.forEach(function(id){
  try{
    var o=JSON.parse(document.getElementById('data-'+id).textContent);
    ONGS.push(o);
    ONG_BY_ID[o.id]=o;
  }catch(e){
    console.error('Bloque de datos inválido, ONG omitida: '+id,e);
  }
});

/* ==================================================
   ESTADO
   Única fuente de verdad de la UI
================================================== */
var state={
  currentOng:ONGS.length?ONGS[0].id:null,
  captacionMode:false
};

/* ==================================================
   UTILIDADES
================================================== */
var ESC_RE=/[&<>"]/g,ESC_MAP={'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'};
function esc(s){return String(s).replace(ESC_RE,function(c){return ESC_MAP[c];});}
function safeUrl(u){return(typeof u==='string'&&/^https?:\/\//i.test(u.trim()))?u:'#';}
function getOng(){return ONG_BY_ID[state.currentOng]||null;}

/* ==================================================
   DOM
   Referencias cacheadas (el script va al final del body)
================================================== */
var dom={
  body:document.body,
  hdr:document.querySelector('.hdr'),
  themeBtn:document.getElementById('thbtn'),
  tabs:document.getElementById('ongTabs'),
  ficha:document.getElementById('fichaView')
};

/* ==================================================
   RENDER · componentes reutilizables
================================================== */
/* Sección plegable de la ficha (acordeón) */
function fsec(ongId,num,icon,title,body,open){
  var bid=`fsec-${ongId}-${num}-b`;
  return `<div class="fsec"><button type="button" class="fsec-h${open?' open':''}" aria-expanded="${open?'true':'false'}" aria-controls="${bid}"><span class="fsec-i" aria-hidden="true">${icon}</span><span class="fsec-t">${title}</span><span class="fsec-arr" aria-hidden="true">▼</span></button><div class="fsec-b" id="${bid}"><div>${body}</div></div></div>`;
}
/* Fila numerada (motivos para colaborar) */
function sorpItem(n,dato,fuente){
  return `<div class="sorp"><div class="sorp-num" aria-hidden="true">${n}</div><div class="sorp-body"><div class="sorp-dato">${esc(dato)}</div>${fuente?`<div class="sorp-fuente">${esc(fuente)}</div>`:''}</div></div>`;
}
/* Bloque de storytelling */
function speechPart(lbl,txt){
  return `<div class="speech-part"><div class="speech-lbl">${lbl}</div><div class="speech-txt">${txt}</div></div>`;
}
/* Enlace a la web oficial + líneas de verificación (compartido por ambas ramas de fuentes) */
function webVerif(ong){
  var h=`<a href="${safeUrl(ong.web)}" target="_blank" rel="noopener" class="wlink" aria-label="Web oficial de ${esc(ong.full)} (abre en nueva pestaña)">${ong.emoji} ${esc(ong.full)} → ${esc(ong.web)}</a>`;
  if(ong.verificado)h+=`<div class="verif">✅ Datos verificados: ${esc(ong.verificado)}</div>`;
  if(ong.ultimaActualizacion)h+=`<div class="verif">🗓️ Última actualización: ${esc(ong.ultimaActualizacion)}</div>`;
  return h;
}

/* ==================================================
   RENDER · tabs
   Los tonos derivados del color de marca (fondo activo, degradado
   del sidebar, sombra) se calculan aquí una sola vez por ONG y se
   pasan como variables CSS ya resueltas (rgb/rgba planos). Así el
   navegador nunca evalúa color-mix() en tiempo real — una función
   relativamente nueva y con implementaciones inconsistentes entre
   motores, sospechosa de un glitch de pintado visto en móvil.
================================================== */
function hexToRgb(hex){
  var m=/^#?([0-9a-f]{3}|[0-9a-f]{6})$/i.exec(hex||'');
  var full=m?(m[1].length===3?m[1].split('').map(function(c){return c+c;}).join(''):m[1]):'888888';
  var n=parseInt(full,16);
  return {r:(n>>16)&255,g:(n>>8)&255,b:n&255};
}
function mixRgb(a,b,pctA){
  var p=pctA/100;
  return {r:Math.round(a.r*p+b.r*(1-p)),g:Math.round(a.g*p+b.g*(1-p)),b:Math.round(a.b*p+b.b*(1-p))};
}
function tabColorVars(hex){
  var c=hexToRgb(hex);
  var white={r:255,g:255,b:255},navy={r:10,g:19,b:34};
  var gradA=mixRgb(c,white,90),gradB=mixRgb(c,navy,78);
  return `--tab-color:${hex};`
    +`--tab-bg-a:rgba(${c.r},${c.g},${c.b},.18);`
    +`--tab-bg-a-light:rgba(${c.r},${c.g},${c.b},.14);`
    +`--tab-grad-a:rgb(${gradA.r},${gradA.g},${gradA.b});`
    +`--tab-grad-b:rgb(${gradB.r},${gradB.g},${gradB.b});`
    +`--tab-shadow:rgba(${c.r},${c.g},${c.b},.55)`;
}
function renderTabs(){
  var h='';
  for(let i=0;i<ONGS.length;i++){var o=ONGS[i],sel=o.id===state.currentOng;h+=`<button type="button" class="otab${sel?' active':''}" id="tab-${o.id}" data-id="${o.id}" role="tab" aria-selected="${sel?'true':'false'}" aria-controls="fichaView" tabindex="${sel?'0':'-1'}" aria-label="${esc(o.full)}${sel&&state.captacionMode?' (vista rápida)':''}" title="${esc(o.full)}" style="${tabColorVars(o.color)}"><span class="otab-main">${o.emoji} ${esc(o.nombre)}${sel&&state.captacionMode?'<span class="cap-badge" aria-hidden="true">30s</span>':''}</span><span class="otab-full" aria-hidden="true">${esc(o.full)}</span></button>`;}
  dom.tabs.innerHTML=h;
}
/* Actualiza selección y badge "30s" sin reconstruir la lista de tabs */
function updateTabs(){
  dom.tabs.querySelectorAll('.otab').forEach(function(b){
    var sel=b.getAttribute('data-id')===state.currentOng;
    var showBadge=sel&&state.captacionMode;
    b.classList.toggle('active',sel);
    b.setAttribute('aria-selected',sel?'true':'false');
    b.setAttribute('tabindex',sel?'0':'-1');
    b.setAttribute('aria-label',b.getAttribute('title')+(showBadge?' (vista rápida)':''));
    var badge=b.querySelector('.cap-badge');
    if(showBadge&&!badge){
      badge=document.createElement('span');
      badge.className='cap-badge';
      badge.setAttribute('aria-hidden','true');
      badge.textContent='30s';
      b.querySelector('.otab-main').appendChild(badge);
    }else if(!showBadge&&badge){
      badge.parentNode.removeChild(badge);
    }
  });
}

/* ==================================================
   RENDER · vista captación ("en 30 segundos")
================================================== */
function renderCaptacion(view,ong){
  var c=ong.captacion,r=c.resumen30,h=`<div class="cwrap" style="--ong-c:${esc(ong.color)}">`;
  h+=`<button type="button" class="cappill cappill-back">← Volver a la ficha completa</button>`;
  h+=`<div class="chero"><div class="cemoji" aria-hidden="true">${ong.emoji}</div><div class="ctitle">${esc(ong.full)} EN 30 SEGUNDOS</div></div>`;
  h+=`<div class="cstats">`;
  for(let i=0;i<r.cifras.length;i++){
    h+=`<div class="cstat"><div class="cnum">${esc(r.cifras[i])}</div><div class="clabel">${r.labels&&r.labels[i]?esc(r.labels[i]):''}</div></div>`;
  }
  h+=`</div>`;
  h+=`<div class="ccierre">${esc(r.cierre)}</div>`;
  h+=`<div class="csection"><div class="cstitle">🚀 3 proyectos clave</div><div class="clist">`;
  for(let j=0;j<c.proyectosClave.length;j++){
    var p=ong.programas[c.proyectosClave[j]];
    if(!p)continue;
    h+=`<div class="citem"><div class="citem-h">${p.emoji} ${esc(p.name)}</div><div class="citem-d">${p.resumenClave?esc(p.resumenClave):(p.dato?esc(p.dato):'')}</div></div>`;
  }
  h+=`</div></div>`;
  h+=`<div class="csection"><div class="cstitle">💬 Argumentario</div><div class="clist">`;
  for(let k=0;k<c.argumentario.length;k++){
    var mot=ong.motivosSocio[c.argumentario[k]];
    if(mot)h+=`<div class="citem citem-arg">${esc(mot)}</div>`;
  }
  h+=`</div></div>`;
  if(r.videoDestacado){h+=`<a href="${safeUrl(r.videoDestacado.url)}" target="_blank" rel="noopener" class="wlink wlink-col"><span style="font-weight:700;font-size:.82rem">🎬 Vídeo destacado</span><span style="font-size:.75em;color:var(--muted)">▶ ${esc(r.videoDestacado.titulo)}</span><span style="font-size:.72em;color:var(--dim)">${esc(r.videoDestacado.duracion)}</span></a>`;}
  h+=`</div>`;
  view.innerHTML=h;
}

/* ==================================================
   RENDER · ficha completa
   Se construye como string y se asigna con un único innerHTML:
   el contenido cambia por completo entre ONGs (secciones opcionales,
   número variable de filas), así que un solo parse + un solo layout
   es la vía más barata para el navegador.
================================================== */
function renderFicha(){
  var view=dom.ficha,ong=getOng();
  if(!ong){view.innerHTML='';return;}
  if(state.captacionMode&&ong.captacion){renderCaptacion(view,ong);return;}
  var h=`<div class="fwrap" style="--ong-c:${esc(ong.color)}">`;
  h+=`<div class="fhero"><div class="hband"><div class="hemoji" aria-hidden="true">${ong.emoji}</div><h1 class="hband-name">${esc(ong.nombre)}</h1></div><div class="hbody">`;
  h+=`<div class="hfull">${esc(ong.full)}</div>`;
  h+=`<div class="hclaim">${esc(ong.claim)}</div>`;
  h+=`<div class="hmeta">`;
  for(let i=0;i<ong.meta.length;i++) h+=`<div class="mchip">${esc(ong.meta[i].label)}: <b>${esc(ong.meta[i].val)}</b></div>`;
  h+=`</div></div></div>`;
  if(ong.captacion){h+=`<button type="button" class="cappill cappill-sec">⚡ En 30 segundos</button>`;}
  h+=`<div class="sec-actions"><button type="button" class="sec-toggle-all" data-expanded="false" aria-label="Expandir todas las secciones de la ficha">⊞ Expandir todo</button></div>`;

  var b='<div class="cgrid">';
  for(let i=0;i<ong.cifras.length;i++){var c=ong.cifras[i];b+=`<div class="ccard"><div class="cnum2">${esc(c.num)}</div><div class="clbl">${esc(c.label)}</div>${c.fuente?`<div class="csrc">${esc(c.fuente)}</div>`:''}</div>`;}
  h+=fsec(ong.id,2,'📊','Cifras clave',b+'</div>',true);

  if(ong.problema){
    h+=fsec(ong.id,4,'❗','Problema que intenta resolver',`<div class="utxt" style="padding: 10px 0;">${esc(ong.problema)}</div>`);
  }

  b='';
  var progCat=null;
  for(let i=0;i<ong.programas.length;i++){var p=ong.programas[i],pid=`p-${ong.id}-${i}`;
    if(p.categoria&&p.categoria!==progCat){b+=`<div class="prog-cat">${esc(p.categoria)}</div>`;progCat=p.categoria;}
    b+=`<div class="prog" id="${pid}"><button type="button" class="phdr" data-pid="${pid}" aria-expanded="false" aria-controls="${pid}-body"><span class="pemi" aria-hidden="true">${p.emoji}</span><span class="pnam">${esc(p.name)}</span><span class="parr" aria-hidden="true">▼</span></button><div class="pshort">${esc(p.desc.substring(0,130))}${p.desc.length>130?'...':''}</div><div class="pfull" id="${pid}-body"><div>${esc(p.desc)}${p.dato?`<div class="pdato">→ ${esc(p.dato)}</div>`:''}</div></div></div>`;}
  h+=fsec(ong.id,5,'🚀',`Programas (${ong.programas.length})`,b);

  b='';
  for(let i=0;i<ong.fondos.length;i++){var f=ong.fondos[i];var fpct=Number.isInteger(f.pct)?f.pct:parseFloat(f.pct.toFixed(1));b+=`<div class="fbar"><div class="fbl"><span class="fn">${esc(f.label)}</span><span class="fp">${fpct}%</span></div><div class="btrack"><div class="bfill" style="width:${fpct}%"></div></div></div>`;}
  if(ong.fondosNota){b+=`<p class="fondos-nota">${esc(ong.fondosNota)}</p>`;}
  h+=fsec(ong.id,7,'💰','Uso de fondos',b);

  if(ong.motivosSocio&&ong.motivosSocio.length){
    b='';
    for(let i=0;i<ong.motivosSocio.length;i++)b+=sorpItem(i+1,ong.motivosSocio[i]);
    h+=fsec(ong.id,9,'🎤','5 motivos para colaborar como socio',b);
  }

  if(ong.speech){
    b='<div class="speech">'
      +speechPart('🚦 Parada',esc(ong.speech.parada))
      +speechPart('🗣️ Discurso',esc(ong.speech.discurso).replace(/\n+/g,'<br><br>'))
      +speechPart('🤝 Cierre',esc(ong.speech.cierre))
      +'</div>';
    h+=fsec(ong.id,1,'🎙️','Ejemplo de storytelling',b);
  }

  if(ong.dato){
    b=`<div class="datobox"><div class="datobadge" aria-hidden="true">📌 Fuente</div><div class="datotext">${esc(ong.dato)}</div><div class="datosrc">Fuente: <a href="${safeUrl(ong.dato_url)}" target="_blank" rel="noopener">${ong.dato_fuente?esc(ong.dato_fuente):(ong.dato_url?esc(ong.dato_url):'')}</a></div></div>`;
    h+=fsec(ong.id,10,'📅','Dato del año',b);
  }

  if(ong.videos&&ong.videos.length){
    b='';
    for(let vi=0;vi<ong.videos.length;vi++){var v=ong.videos[vi];b+=`<a href="${safeUrl(v.url)}" target="_blank" rel="noopener" class="wlink wlink-col"><span style="font-weight:700">▶ ${esc(v.titulo)}</span><span style="font-size:.75em;color:var(--muted)">${esc(v.tipo)} · ${esc(v.duracion)} · ${esc(v.anio)}</span></a>`;}
    h+=fsec(ong.id,13,'🎬','Vídeos',b);
  }

  if(ong.fuentesCompletas&&ong.fuentesCompletas.length){
    b='';
    for(let i=0;i<ong.fuentesCompletas.length;i++){var fc=ong.fuentesCompletas[i];b+=`<a href="${safeUrl(fc.url)}" target="_blank" rel="noopener" class="wlink wlink-spaced" aria-label="${esc(fc.texto)} (abre en nueva pestaña)">🔗 ${esc(fc.texto)}</a>`;}
    h+=fsec(ong.id,11,'📚','Fuentes y web',b+webVerif(ong));
  } else {
    h+=fsec(ong.id,12,'🔗','Web oficial',webVerif(ong));
  }
  h+=`</div>`;
  view.innerHTML=h;
}

/* ==================================================
   EVENTOS · transiciones de estado
================================================== */
function selectOng(id){
  state.currentOng=id;
  var o=getOng();
  if(o)document.title=o.nombre;
  updateTabs();
  renderFicha();
  dom.ficha.setAttribute('aria-labelledby','tab-'+id);
  window.scrollTo({top:0,behavior:'smooth'});
}
function toggleCaptacion(){
  state.captacionMode=!state.captacionMode;
  updateTabs();
  renderFicha();
  var btn=dom.ficha.querySelector('.cappill');
  if(btn)btn.focus();
}
function toggleTheme(){
  var l=dom.body.classList.toggle('light');
  dom.themeBtn.textContent=l?'☀️':'🌙';
  dom.themeBtn.setAttribute('aria-pressed',l?'true':'false');
  try{localStorage.setItem('wt',l?'1':'0');}catch(e){}
}
function toggleAllSections(btn){
  var expand=btn.getAttribute('data-expanded')==='false';
  dom.ficha.querySelectorAll('.fsec-h').forEach(function(x){
    x.classList.toggle('open',expand);
    x.setAttribute('aria-expanded',String(expand));
  });
  btn.setAttribute('data-expanded',String(expand));
  btn.textContent=expand?'⊟ Colapsar todo':'⊞ Expandir todo';
  btn.setAttribute('aria-label',(expand?'Colapsar':'Expandir')+' todas las secciones de la ficha');
}
/* Delegación: un solo listener para tabs y otro para toda la ficha */
function tabsClick(e){
  var t=e.target.closest('.otab');
  if(t)selectOng(t.getAttribute('data-id'));
}
function fichaClick(e){
  var t=e.target.closest('.cappill-sec,.cappill-back,.sec-toggle-all,.fsec-h,.phdr');
  if(!t)return;
  if(t.classList.contains('cappill-sec')||t.classList.contains('cappill-back')){toggleCaptacion();return;}
  if(t.classList.contains('sec-toggle-all')){toggleAllSections(t);return;}
  if(t.classList.contains('fsec-h')){
    var open=t.classList.toggle('open');
    t.setAttribute('aria-expanded',open?'true':'false');
    return;
  }
  var p=document.getElementById(t.getAttribute('data-pid'));
  var openP=p.classList.toggle('open');
  t.setAttribute('aria-expanded',openP?'true':'false');
}
function tabKeydown(e){
  var tabs=Array.from(dom.tabs.querySelectorAll('.otab'));
  var idx=tabs.findIndex(function(t){return t.getAttribute('data-id')===state.currentOng;});
  var next=-1;
  if(e.key==='ArrowRight'||e.key==='ArrowDown') next=(idx+1)%tabs.length;
  else if(e.key==='ArrowLeft'||e.key==='ArrowUp') next=(idx-1+tabs.length)%tabs.length;
  else if(e.key==='Home') next=0;
  else if(e.key==='End') next=tabs.length-1;
  else return;
  e.preventDefault();
  selectOng(tabs[next].getAttribute('data-id'));
  tabs[next].focus();
}
function setHdrH(){if(dom.hdr)document.documentElement.style.setProperty('--hdr-h',dom.hdr.offsetHeight+'px');}

/* ==================================================
   INICIALIZACIÓN
================================================== */
window.addEventListener('DOMContentLoaded',function(){
  /* el tema ya lo aplicó el script inline del body; aquí solo se sincroniza el botón */
  if(dom.body.classList.contains('light')){dom.themeBtn.textContent='☀️';dom.themeBtn.setAttribute('aria-pressed','true');}
  dom.themeBtn.addEventListener('click',toggleTheme);
  renderTabs();renderFicha();
  dom.tabs.addEventListener('click',tabsClick);
  dom.tabs.addEventListener('keydown',tabKeydown);
  dom.ficha.addEventListener('click',fichaClick);
  setHdrH();
  window.addEventListener('resize',setHdrH);
  requestAnimationFrame(function(){dom.body.classList.add('ready');});
});
</script>
