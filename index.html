ue esa capacidad no era excepcional: es el ADN de Cruz Roja.\n\nUn año después, el 27 de octubre de 2025, Cruz Roja hizo balance del plan de recuperación de 36 meses: 143.000 personas atendidas y 490.000 asistencias acumuladas desde el inicio, con 7.000 personas voluntarias y de personal movilizadas. Las donaciones recibidas alcanzaron los 115M€ (48M de particulares, 58,7M de empresas y fundaciones, 5,5M de otras Cruces Rojas y 2,8M de administraciones públicas), de los que ya se habían ejecutado 61,5M€ (54% del total). Se apoyó a 2.547 negocios con 12,14M€ en ayudas económicas (el 90% reanudó su actividad), 6.177 personas recuperaron sus medios de vida, se entregaron 22.673 tarjetas monedero (31,09M€), se repusieron 14.510 electrodomésticos y se realizaron 7.535 intervenciones psicosociales individuales.\n\nCruz Roja también respondió ese mismo año a una ola de desinformación sobre su actuación en la DANA: acusaciones falsas de ausencia, fotos manipuladas y bulos sobre desvío de ayuda. El Informe Mundial sobre Desastres 2026 de la Federación Internacional (presentado en Madrid por Cruz Roja Española) lo señala como ejemplo de cómo la desinformación se ha convertido en una crisis humanitaria en sí misma: \"poner la confianza en el centro de la respuesta\" es una de sus recomendaciones clave.\n\nMás allá de las cuotas de socios, el Sorteo de Oro es una de las grandes vías de financiación de Cruz Roja. En su 47ª edición (2026), repartió más de 7 millones de euros en 23.400 premios (el doble que el año anterior), con boletos a 6€ y sorteo el 23 de julio en Granada. Y cada Día Mundial de la Cruz Roja, la organización entrega sus Medallas de Oro a personas y entidades que han destacado por su compromiso social: en 2026, presididas por S.M. la Reina Letizia en Pamplona, reconocieron entre otros a la Fundación Maldita.es, Verifica RTVE, la escritora Irene Vallejo y el Dr. Julio Ancochea.", "dato": "323.063 asistencias iniciales · 112M€ recaudados (récord histórico) · Balance al año (oct. 2025): 143.000 personas atendidas, 490.000 asistencias, 115M€ recaudados, 61,5M€ ejecutados (54%) · 2.547 negocios apoyados · Informe Mundial sobre Desastres 2026 (IFRC): la desinformación tras la DANA como caso de estudio · Plan RESPONDE COVID: 3,7M personas, 66.000 voluntarios · Sorteo de Oro 2026 (47ª ed.): 23.400 premios, +7M€ · Medallas de Oro 2026: S.M. la Reina Letizia, Pamplona"}, {"emoji": "❤️", "name": "Salud y salud mental — 1.177.803 personas", "desc": "El área de salud de Cruz Roja atendió en 2024 a 1.177.803 personas. El enfoque es integral: prevención, promoción de hábitos saludables, adherencia terapéutica en enfermedades crónicas y apoyo emocional.\n\nLos servicios incluyen talleres de gestión emocional en más de 200 localidades (más de 10.000 personas), derivación de más de 3.500 personas a servicios especializados de salud mental, e intervenciones específicas durante olas de frío y calor. También distribución de kits de salud e higiene en emergencias y el servicio Cruz Roja Te Escucha (900 107 917), un teléfono gratuito de apoyo emocional atendido por voluntariado formado, lanzado durante la pandemia de COVID-19 y activo desde entonces para cualquier persona en situación de vulnerabilidad. Más de 250 campañas en redes sobre salud y prevención alcanzaron a 2 millones de personas.\n\nEn 2024 se puso en marcha el Plan para la Estrategia Nacional de Salud Mental, y se atendió a 782.571 personas con problemas de salud. Cruz Roja también atendió a 264.639 personas por estilos de vida no saludables y acompañó a 45.362 en la gestión de su enfermedad crónica.", "dato": "1.177.803 personas en acciones de salud · 782.571 con problemas de salud · Gestión emocional +200 localidades · Cruz Roja Te Escucha · 3.500 derivaciones"}, {"emoji": "🤝", "name": "Inclusión social y soledad no deseada — 933.514 personas", "desc": "El área de Inclusión Social de Cruz Roja atendió en 2024 a 933.514 personas. Los programas abordan la pobreza, la exclusión residencial, la soledad no deseada, la brecha digital y la violencia.\n\nLa campaña 'Un café en compañía' visibiliza la soledad no deseada y crea vínculos reales entre personas mayores y voluntarios. En esa misma línea, la iniciativa 'Voces en Red', desarrollada con la Fundación Amancio Ortega, conecta telefónicamente a 25.500 personas mayores en situación de soledad con más de 15.130 personas voluntarias repartidas en 52 provincias.\n\nEl fenómeno tiene una escala medible: el 26% de las personas atendidas por Cruz Roja vive en situación de soledad (72,4% mujeres, 27% hombres), y el 51% son mayores de 80 años, según el Informe de vulnerabilidad de la organización.\n\nEl programa Housing First acompaña a personas sin hogar hacia una vida autónoma. Juanjo, de 56 años, vivió en sinhogarismo entre 2012 y 2022; tras 2 años en el programa está plenamente integrado en la sociedad, con trabajo y vivienda propia. El servicio de asistencia a víctimas de discriminación racial o étnica tiene 27 puntos de acceso en todo el territorio. La brecha digital se aborda con orientación y formación específica para personas mayores mediante sesiones individuales y grupales con voluntariado.\n\nEn situación de extrema vulnerabilidad: 86.773 atenciones por necesidades básicas y 74.404 personas beneficiarias de prestaciones extraordinarias. Además — y aquí el recuento cambia de personas a unidades familiares — 63.750 familias (no personas) recibieron asistencia material básica.", "dato": "933.514 personas · 86.773 atenciones por necesidades básicas · Housing First · Voces en Red (con Fundación Amancio Ortega): 25.500 mayores, 15.130 voluntarios, 52 provincias · 27 puntos anti-discriminación · Brecha digital mayores · 5 millones de personas se sienten solas en España (campaña Te Acompaña / Unidas contra la soledad) · 8 de cada 10 personas mayores víctimas de maltrato atendidas son mujeres"}, {"emoji": "💼", "name": "Empleo e inserción laboral — 274.978 personas", "desc": "Cruz Roja es la principal organización de inserción laboral para personas con alta barrera de acceso al mercado de trabajo en España. En 2024, 274.978 personas participaron en acciones de empleo.\n\nLos colectivos prioritarios son mujeres, personas migrantes, jóvenes, mayores de 45 años y personas con baja cualificación. Los servicios incluyen orientación laboral personalizada, formación en competencias básicas y digitales, prácticas en empresas y acompañamiento post-inserción.\n\nEn 2024, Cruz Roja lanzó un simulador de entrevistas de trabajo con inteligencia artificial para entrenar procesos de selección reales. También desarrolló itinerarios de formación en sectores emergentes (economía verde y digital) y apoyo al emprendimiento. El servicio estatal de orientación jurídico-laboral es un nuevo recurso de 2024, accesible para resolver dudas sobre derechos laborales y prestaciones.\n\nEn total: 178.816 personas en medidas de acceso al empleo; 51.487 en itinerarios integrales de inserción; 3.435 en iniciativas de desarrollo empresarial.", "dato": "274.978 personas · Simulador de entrevistas con IA · 178.816 en medidas de acceso al empleo · 51.487 en itinerarios integrales"}, {"emoji": "📱", "name": "Teleasistencia y atención a personas mayores — 225.010 atendidas", "desc": "Cruz Roja fue pionera en la teleasistencia en España hace más de 30 años y sigue siendo uno de los principales proveedores. En 2024 atendió en este ámbito a 225.010 personas mayores y cuidadoras.\n\nEl desglose: 125.712 personas en teleasistencia domiciliaria y 7.274 en teleasistencia móvil con GPS para personas con deterioro cognitivo que pueden desorientarse fuera del hogar. Además, 24.557 con ayuda a domicilio complementaria, 1.366 con ayuda a domicilio básica y 966 con deterioro cognitivo geolocalizado. Adicionalmente: 13.175 personas con deterioro cognitivo, 20.505 en seguimiento de salud, 44.015 en redes sociales para mayores y 5.080 en procesos de envejecimiento activo.\n\nEl servicio va mucho más allá del 'botón rojo': incluye seguimiento proactivo de salud, coordinación automática con emergencias, teleasistencia específica para personas con discapacidad auditiva y aplicación móvil para familiares. Para el 17% que vive en ámbito rural, Cruz Roja es frecuentemente el único recurso disponible.\n\nLa brecha digital agrava esta vulnerabilidad: según el Plan Cruz Roja Responde, el 63,8% de los hogares atendidos no dispone de internet en casa.\n\nTambién se atendió a 4.954 cuidadoras y se formó a 286 cuidadoras no profesionales. Estas categorías no son excluyentes entre sí: una misma persona puede recibir varios servicios a la vez (por ejemplo, teleasistencia domiciliaria y seguimiento de salud), por lo que no deben sumarse al total. Entre teleasistencia domiciliaria y móvil, más de 132.000 personas mayores tienen hoy un botón que las conecta 24 horas al día, 365 días al año, con Cruz Roja.\n\nAdemás, 532 personas fueron atendidas en centros de día para mayores (168 en centros especializados), 20.942 en procesos de intervención directa y 3.106 en programas de buen trato y protección frente al maltrato.\n\nCruz Roja es la única organización que ofrece teleasistencia móvil accesible certificada para personas con dificultades de audición o habla, personas invidentes, o con esclerosis, ELA o parálisis cerebral, entre otras. Pilar Lou, usuaria desde hace 16 años, lo resume así: \"Ha sido mi vida. Yo estoy sola, no tengo hijos, ni familia, y me he visto muy acogida. Me da mucha tranquilidad. Lo uso desde que me levanto hasta que me voy a dormir\".", "dato": "225.010 mayores atendidas · 125.712 teleasistencia domiciliaria · 7.274 teleasistencia móvil GPS · 13.175 con deterioro cognitivo · 532 en centros de día (168 especializados) · 3.106 en programas de buen trato y protección · Categorías no excluyentes (una persona puede recibir varios servicios)"}, {"emoji": "🧒", "name": "Infancia — 152.564 niños atendidos", "desc": "En 2024, Cruz Roja atendió a 152.564 niños, niñas y adolescentes.\n\nLos servicios abarcan todo el ciclo: 38.500 niños acompañados en hospitales durante sus ingresos (Cruz Roja Juventud lleva lúdica y normalización a los hospitales), 50.067 con acceso a juguetes educativos y 14.242 con refuerzo educativo. Además, 7.270 en programas de fortalecimiento de capacidades parentales, 3.554 en acogimiento familiar, 325 en apoyo a procesos de adopción, 63 menores no acompañados en proceso de emancipación y 7.154 en educación emocional.\n\nCruz Roja también atiende a familias con bebés (453 en desarrollo temprano, 496 en servicios de primera infancia) y trabaja específicamente la violencia filio-parental (250 intervenciones). La brecha digital se aborda con 1.538 menores mejorando competencias digitales básicas y 7.389 con acceso a tecnología.\n\nDurante la pandemia, Cruz Roja distribuyó 70.000 dispositivos (tablets y conexiones a internet) a niños y niñas de familias sin recursos para garantizar su acceso a la educación online, a través del Programa de Éxito Escolar.", "dato": "152.564 niños/as · 38.500 acompañados en hospitales · 50.067 con juguetes educativos · 14.242 con refuerzo escolar · 3.554 en acogimiento familiar · 70.000 dispositivos (tablets+internet) durante COVID"}, {"emoji": "🌐", "name": "Cooperación Internacional — 41 países, 122 M€, 7,3 millones de personas", "desc": "En 2024, Cruz Roja Española desarrolló 301 proyectos de cooperación internacional en 41 países, con un presupuesto de 122,2 millones de euros y 7.295.659 personas beneficiarias.\n\nLa intervención se organiza por regiones: África (15 países, 125 proyectos, 39,85M€, 4.638.244 beneficiarios), América (14 países, 88 proyectos, 43,77M€, 1.682.792 beneficiarios, incluyendo Darién, Haití, Ecuador, Colombia) y Oriente Medio (4 países, 38 proyectos, 9,2M€, 325.287 beneficiarios, incluyendo respuesta en Gaza, Cisjordania y Líbano). También Europa (6 países, 18 proyectos, 16,72M€, 105.591 beneficiarios, incluyendo Ucrania) y Asia-Pacífico (1 país, 8 proyectos, 5,18M€, 32.217 beneficiarios).\n\nLa cooperación técnica e institucional apoyó a 31 Sociedades Nacionales en voluntariado, gobernanza, logística, digitalización y captación de fondos. Los ejes de actuación son: acción humanitaria y seguridad alimentaria; salud y protección frente a violencia sexual y de género; migración y desplazamiento; adaptación y respuesta climática; y fortalecimiento de capacidades locales. La cooperación internacional es posible gracias a la base social comprometida en España.\n\nEn junio de 2026, dos terremotos (magnitud 7.2 y 7.5) sacudieron la región de Yaracuy, en Venezuela. Cruz Roja Española desplegó una clínica de emergencia con 14 expertos, con capacidad para atender a 30.000 personas afectadas, en apoyo a la Cruz Roja Venezolana.\n\nEn Ucrania, cuatro años después del inicio del conflicto (febrero 2026), Cruz Roja Española ha atendido en territorio nacional a más de 167.000 personas y acogido a 62.737. Ha movilizado a más de 15.000 voluntarios en España, con apoyo psicosocial y lúdico a más de 12.000 niños y niñas. Solo en el invierno de 2025-2026 se distribuyeron 112 generadores eléctricos y se instalaron 18 \"power stations\" en el país.\n\nEn Sudán, donde más de 33 millones de personas necesitarán ayuda humanitaria en 2026 (la cifra más alta de todo el mundo), Cruz Roja Española lleva más de 25 años colaborando con la Media Luna Roja Sudanesa. Su apoyo se centra en tres ejes: salud, seguridad alimentaria y fortalecimiento institucional.", "dato": "41 países · 301 proyectos · 122,2M€ · 7.295.659 beneficiarios · Gaza, Ucrania, Sudán, Haití, Darién · 31 Sociedades Nacionales apoyadas · Emergencia Venezuela (terremotos jun. 2026): clínica de 14 expertos, 30.000 personas · Ucrania (4 años, feb. 2026): +167.000 atendidos, 62.737 acogidos, +15.000 voluntarios en España · Sudán: +25 años de colaboración con la Media Luna Roja Sudanesa"}, {"emoji": "🌍", "name": "Acogida a migrantes y refugiados — 48.496 solicitantes de asilo", "desc": "Cruz Roja tiene la mayor red de acogida a personas en movilidad humana de España. En 2024 atendió a 48.496 solicitantes de asilo y personas refugiadas, con 10.000 plazas de acogida activas distribuidas en 45 provincias. En un año con más de 167.000 solicitudes de asilo en España (récord histórico), la organización atendió además a otras 231.245 personas migrantes en distintos programas. Sumando ambos grupos, casi 280.000 personas migrantes y refugiadas fueron atendidas en total durante 2024.\n\nLos servicios incluyen alojamiento temporal, orientación jurídica para la tramitación del asilo, aprendizaje del español, apoyo psicológico, mediación intercultural, tramitación de documentación y acompañamiento laboral. Cruz Roja también tiene presencia en los puntos de llegada en el litoral mediterráneo y canario, y en la selva del Darién (Panamá) para atención a migrantes en tránsito.\n\nEl Restablecimiento del Contacto Familiar es uno de los servicios más distintivos del Movimiento Internacional de la Cruz Roja y la Media Luna Roja. En catástrofes naturales, conflictos bélicos o crisis migratorias, Cruz Roja es en ocasiones la única organización que ofrece este tipo de búsqueda y reunificación familiar, como hizo durante la crisis de Ucrania de 2022. Su Red de Vínculos Familiares tiene presencia física en todo el mundo, con servicios de búsqueda, mensajería y apoyo psicosocial para familias separadas por la migración, el conflicto o el desastre.\n\nEl servicio de atención a personas en situación de sinhogarismo atendió a 42.772 personas y el de prevención de exclusión residencial a 4.199 personas más.", "dato": "48.496 solicitantes asilo · 231.245 migrantes · 10.000 plazas en 45 provincias · 42.772 personas sin hogar · Darién, litoral mediterráneo y canario"}, {"emoji": "👩", "name": "Violencia de género y mujeres en dificultad — 55.505 atendidas (ATENPRO + apoyo integral)", "desc": "Cruz Roja gestiona el servicio ATENPRO de teleasistencia móvil para víctimas de violencia de género, que permite localización GPS y asistencia inmediata en situaciones de peligro. En 2024, 26.697 mujeres eran usuarias del servicio. El total de mujeres en dificultad social atendidas fue de 55.505.\n\nLos servicios incluyen: 11.726 mujeres en acciones de empoderamiento; 13.324 en programas de empleo e inserción; 4.101 en participación social; 2.869 en entornos de prostitución; 2.851 en promoción de hábitos saludables.\n\nCruz Roja trabaja también activamente en prevención con programas en centros educativos. En el área de jóvenes, 10.720 participaron en actividades de prevención de violencia de género. La intervención está coordinada con fuerzas de seguridad, servicios sociales y juzgados de violencia, con presencia en todo el territorio nacional.\n\nNeus Ribas, del Programa de Atención Integral a madres e hijos/as víctimas de violencia de género en Cruz Roja Barcelona, describe así a las mujeres que atiende: \"Son mujeres muy potentes y al mismo tiempo muy vulnerables, muy valientes, que luchan para pasar página y construir una vida en términos de 'normalidad'\".", "dato": "26.697 usuarias ATENPRO · 55.505 mujeres en dificultad · 11.726 en empoderamiento · 13.324 en empleo · Presencia en todo el territorio"}, {"emoji": "🧑‍🦳", "name": "SerCuidadorA — apoyo a quienes cuidan sin que nadie les cuide a ellos", "desc": "Detrás de cada persona mayor o dependiente que recibe ayuda, casi siempre hay otra persona cuidándola: un hijo, una hija, una pareja, un familiar — habitualmente sin formación, sin descanso y sin remuneración. En más del 80% de los casos es una mujer, y en muchos casos lo hace sola.\n\nCruz Roja trabaja con personas cuidadoras no profesionales desde 1997. Desde 2007 dispone del Multicanal SerCuidadorA (en colaboración con el Ministerio de Sanidad y el IMSERSO): web, teléfono gratuito, email, WhatsApp y redes sociales para ofrecer información, orientación y apoyo emocional, disponible 24 horas desde cualquier lugar.\n\nLos recursos incluyen formación en cuidados básicos para no dañar la propia salud y un servicio de respiro (una persona voluntaria se queda con el dependiente para que el cuidador descanse). También grupos de apoyo entre personas en situación similar, y materiales sobre el síndrome de la persona cuidadora (burn-out), codependencia, autocuidado y planificación de los cuidados.\n\nDurante la pandemia de COVID-19, SerCuidadorA mantuvo el apoyo emocional a través del teléfono 900 365 100 con iniciativas como #YoMeQuedoACuidarEnCasa. Cruz Roja recuerda una idea central: cuidar bien empieza por cuidarse a uno mismo, y nadie debería tener que hacerlo en soledad.", "dato": "Servicio desde 1997 · Multicanal SerCuidadorA desde 2007 (web, tel., WhatsApp 24h) · +240.000 personas mayores y cuidadoras atendidas/año · >80% cuidadoras son mujeres · Servicio de respiro + grupos de apoyo + síndrome del cuidador"}, {"emoji": "🧒", "name": "Cruz Roja Juventud — 16.520 voluntarios, 489.000 horas", "desc": "Cruz Roja Juventud (CRJ) es la sección juvenil de Cruz Roja Española, que trabaja con personas de 6 a 30 años 'de iguales para iguales'. En 2024 movilizó a 16.520 voluntarios en más de 650 centros, acumulando 489.000 horas de ayuda y realizando 285.257 actividades. Es el despliegue juvenil de voluntariado más amplio de España.\n\nCRJ preside la red europea-centroasiática ECAYN y forma parte de la Comisión de Jóvenes de la Federación Internacional, participando en la definición de la agenda global juvenil. En 2024 su alcance en redes sociales pasó de 2,7 a 24,4 millones de personas, con 191.000 interacciones.\n\nLas áreas de intervención incluyen: refuerzo escolar con kits digitales y becas; apoyo a menores en riesgo; formación digital en 19 provincias; más de 20 campañas sobre salud sexual, bienestar mental y igualdad; y plataforma interactiva de prevención de adicciones. Participaron 60.444 personas en intervención e inclusión social, 230.798 en sensibilización y prevención y 32.804 en participación.", "dato": "16.520 voluntarios · 489.000 horas · 285.257 actividades · Preside red europea ECAYN · 24,4M personas alcanzadas en redes"}, {"emoji": "🌱", "name": "Medio ambiente y pobreza energética — acción climática comunitaria", "desc": "En 2024, Cruz Roja atendió en el área de Medio Ambiente a 24.496 personas y realizó intervenciones de acción climática con enfoque de vulnerabilidad.\n\nEl programa de instalación gratuita de placas solares para hogares vulnerables ha transformado la economía de familias en riesgo de pobreza energética. Isabel, en Segovia, pasó de facturas inasumibles a pagar 25€ al mes; Melisa, en Zaragoza, dejó de planificar su día en función de las horas de sol.\n\nEl proyecto de kits de eficiencia energética y talleres de ahorro atendió a más de 23.000 familias en 2023, con más de 21.000 kits repartidos y 480 hogares rehabilitados. El ahorro medio fue de entre 104 y 121€ al año por familia.\n\nSe realizaron talleres sobre sostenibilidad en más de 250 localidades, más de 300 contenidos sobre crisis climática en redes y jornadas de reforestación participativa en zonas afectadas por incendios. La Estrategia de Acción Climática local se lanzó en 2024 para integrar la acción ambiental en los planes de emergencia municipales. Cruz Roja es consciente de que los efectos del cambio climático (olas de calor, inundaciones, incendios) golpean especialmente a quienes menos recursos tienen.\n\nEn movilidad, Cruz Roja presentó en 2023 un proyecto piloto de 17 ambulancias cero emisiones — la primera iniciativa de este tipo a nivel estatal, y posiblemente internacional, con materiales reciclados en su construcción. La flota terrestre representa más del 52% de las emisiones totales de la organización, y ya un 19% de sus vehículos cuentan con etiqueta eco o cero.", "dato": "24.496 personas · Placas solares gratuitas para hogares vulnerables · +23.000 familias con kits de eficiencia (ahorro 104-121€/año) · Ambulancias cero emisiones (proyecto piloto, 17 unidades) · Reforestación · Talleres en +250 localidades · Pobreza energética"}, {"emoji": "📚", "name": "Educación y Formación ciudadana", "desc": "Cruz Roja tiene una 7ª área de actuación que muchas personas desconocen: la Educación. Su objetivo es garantizar una educación inclusiva y equitativa de calidad y promover oportunidades de aprendizaje permanente para todos.\n\nLos cuatro ejes del programa son: facilitar la adquisición de competencias para reducir la vulnerabilidad y aumentar la empleabilidad, y formar en valores, hábitos y conductas que fomenten la tolerancia y las sociedades pacíficas. También formar al voluntariado y al personal en principios, valores y competencias técnicas, y compartir la experiencia y conocimientos propios de Cruz Roja con la ciudadanía en general.\n\nEn formación ciudadana, Cruz Roja ofrece cursos de Primeros Auxilios (referente nacional en esta materia), cursos para empresas, estudios profesionales reglados, cursos eLearning, formación en Derechos Humanos y Derecho Internacional Humanitario (DIH), y formación en cooperación internacional. También gestiona el programa Info Prevención VIH/ITS/TBC, y presta apoyo a iniciativas de acompañamiento emocional como Cruz Roja Te Escucha (ver área de Salud).", "dato": "7ª área oficial de Cruz Roja · Formación en valores y competencias · Primeros Auxilios · DIH · Derechos Humanos · Info Prevención VIH/ITS/TBC · Cruz Roja Te Escucha"}, {"emoji": "🛟", "name": "Socorros — vigilancia, salvamento y respuesta a emergencias", "desc": "Cruz Roja es la organización que gestiona la vigilancia y el salvamento en las playas españolas — una de las imágenes más reconocibles de su trabajo, aunque prácticamente ausente de sus memorias y balances públicos. En 2023 atendió a 948 personas con discapacidad en playas y realizó 35 rescates en salvamento marítimo, con actuaciones en 229 lugares distintos.\n\nEl servicio de baño asistido, presente en 37 de las 220 playas cubiertas por Cruz Roja en 2023, permite a personas con movilidad reducida disfrutar del mar con sillas y muletas anfibias. También ofrece a sus familias cuidadoras un espacio de respiro. En conjunto, los servicios preventivos acuáticos atendieron a 47.602 personas ese año, con el apoyo de drones y tecnología de geolocalización incorporados desde 2022.\n\nA escala internacional, Cruz Roja despliega Equipos de Respuesta a Emergencias (ERU): unidades técnicas transportables a cualquier punto del planeta en menos de 72 horas. La ERU de Agua y Saneamiento, por ejemplo, puede captar, potabilizar, almacenar y distribuir hasta 225.000 litros de agua al día — suficiente para abastecer a 15.000 personas durante tres meses tras una catástrofe.\n\nCruz Roja también presta servicios preventivos sanitarios en eventos de gran afluencia (conciertos, competiciones deportivas, actos multitudinarios). Sus equipos pueden activar la cadena asistencial en menos de 1 minuto y garantizar el acceso a un desfibrilador en menos de 4 minutos a cualquier persona presente en el recinto.", "dato": "948 personas con discapacidad atendidas en playas (2023) · 35 rescates marítimos · 47.602 en servicios preventivos acuáticos · 37/220 playas con baño adaptado · ERU: hasta 225.000 L de agua/día para 15.000 personas en menos de 72h"}], "fondos": [{"label": "Inclusión social", "pct": 52}, {"label": "Centros sociosanitarios", "pct": 13}, {"label": "Promoción de fondos", "pct": 8}, {"label": "Empleo", "pct": 6}, {"label": "Socorros y emergencias", "pct": 5}, {"label": "Internacional", "pct": 4}, {"label": "Servicios tecnológicos digitales", "pct": 3}, {"label": "Salud, Educación, Juventud, Formación, Voluntariado, Desarrollo Local y otros", "pct": 9}], "web": "https://www2.cruzroja.es", "problema": "En cualquier momento, una persona puede pasar de llevar una vida normal a encontrarse en una situación de gran vulnerabilidad. Una catástrofe natural, una enfermedad, la pérdida del empleo, la soledad o un conflicto pueden dejarla sin recursos, apoyo o acceso a necesidades básicas. Esa vulnerabilidad adopta cuatro grandes formas en España y en el mundo.\n\nPrimero, las grandes emergencias: la DANA de Valencia (29 oct. 2024) dejó más de 200 fallecidos y 78 municipios afectados, y requiere años de recuperación. Segundo, la soledad de las personas mayores: 5 millones de personas se sienten solas en España, y muchas viven sin nadie que las atienda si tienen una caída o una urgencia.\n\nTercero, la exclusión social: casi un millón de personas (933.514 en 2024) viven en pobreza, sinhogarismo o aislamiento. Y cuarto, las crisis internacionales: guerras y desastres climáticos dejan a millones de personas sin alimentos, agua o atención médica básica, donde solo organizaciones neutrales como Cruz Roja pueden entrar.\n\nPara abordar todo esto, Cruz Roja trabaja en España en 9 grandes áreas (Emergencias, Mayores, Infancia, Empleo, Salud, Inclusión Social, Migración, Medio Ambiente y Educación) y en cooperación internacional en 41 países.", "fuentesCompletas": [{"texto": "Cruz Roja Española · Memoria 2024 (documento principal de esta ficha)", "url": "https://www2.cruzroja.es/documents/5640665/13539885/CR-Memoria-24-Reducida_WEB+(1).pdf"}, {"texto": "Cruz Roja Española · Presupuesto Ordinario 2024 (presupuesto de ingresos y reparto de gasto por planes)", "url": "https://www2.cruzroja.es/documents/5640665/43271541/Presupuesto-Cruz-Roja-Espa%C3%B1ola-2024.pdf"}, {"texto": "Cruz Roja Española · Portal de Transparencia y cuentas anuales", "url": "https://www2.cruzroja.es/transparencia"}, {"texto": "Cruz Roja Española · Qué hacemos (áreas de actuación)", "url": "https://www2.cruzroja.es/que-hacemos"}, {"texto": "Cruz Roja Española · Balance al año de la DANA (oct. 2025)", "url": "https://www2.cruzroja.es/en/-/un-a-c3-b1o-despues-de-la-dana-cruz-roja-ha-materializado-ya-el-54-de-las-donaciones-y-atendido-a-mas-de-143000-personas-afectadas"}, {"texto": "Cruz Roja Española · Informe Mundial sobre Desastres 2026 (IFRC) — desinformación como crisis humanitaria", "url": "https://www2.cruzroja.es/web/ahora/-/desinformacion-nueva-crisis-humanitaria"}, {"texto": "Cruz Roja Española · Memoria 2024 — desglose de ingresos (976M€ totales, 502M€ en subvenciones públicas)", "url": "https://www2.cruzroja.es/documents/5640665/13539885/CR-Memoria-24-Reducida_WEB+(1).pdf"}, {"texto": "IFRC · About National Societies (191 Sociedades Nacionales en el Movimiento Internacional)", "url": "https://www.ifrc.org/who-we-are/international-red-cross-and-red-crescent-movement/about-national-societies"}, {"texto": "Cruz Roja Española · Clínica de emergencia en Venezuela tras los terremotos (jun. 2026)", "url": "https://www2.cruzroja.es/-/cruz-roja-espamola-despliega-una-clinica-de-emergencia-en-venezuela"}, {"texto": "Cruz Roja Española · Cuatro años después, Ucrania nos sigue necesitando (feb. 2026)", "url": "https://www2.cruzroja.es/web/ahora/cuatro-anos-despues-ucrania-nos-sigue-necesitando"}, {"texto": "Cruz Roja Española · Sudán, una crisis que no puede esperar", "url": "https://www2.cruzroja.es/web/ahora/sudan-crisis-no-puede-esperar"}, {"texto": "Cruz Roja Española · El Sorteo de Oro amplía sus premios para seguir transformando vidas (2026)", "url": "https://www2.cruzroja.es/web/ahora/-/el-sorteo-de-oro-de-cruz-roja-amplia-sus-premios-para-seguir-transformando-vidas"}, {"texto": "Cruz Roja Española · S.M. la Reina entrega las Medallas de Oro 2026", "url": "https://www2.cruzroja.es/-/sm-la-reina-entrega-las-medallas-de-oro-2026-de-cruz-roja-espanola"}], "motivosSocio": ["La red más completa: ninguna otra organización en España cubre el mismo espectro. En un solo día, Cruz Roja puede estar atendiendo a una víctima de violencia de género en Madrid e instalando placas solares en un hogar vulnerable en Sevilla. Al mismo tiempo, puede estar orientando a un migrante en Melilla y asistiendo a un mayor solo en Bilbao.", "160 años de historia (fundada en 1864) convertidos en capacidad real: en 2024, año de su 160 aniversario, Cruz Roja respondió a la mayor catástrofe natural en décadas en España, la DANA del 29 de octubre. A pesar de que sus propias sedes y vehículos quedaron destruidos por la riada, ya tenía a 6.019 personas trabajando sobre el terreno mientras las instituciones aún evaluaban los daños. Esa capacidad de ser 'la primera en llegar y la última en irse' solo existe porque entrena a sus 231.236 voluntarios durante todo el año, no solo en emergencias.", "Principio de neutralidad: Cruz Roja puede operar en Gaza, Ucrania y Sudán porque no toma partido, no financia ejércitos ni hace propaganda — es el único 'pasaporte' que permite trabajar con todas las partes de un conflicto. Sin ese principio, y sin socios que lo financien, la cooperación internacional desaparece.", "Cercanía: la teleasistencia llega a más de 132.000 personas mayores en toda España, muchas de ellas viviendo solas. Para quienes viven en zonas rurales o aisladas, Cruz Roja es a menudo el único recurso disponible las 24 horas, los 365 días del año.", "Lo que recibe el socio: Cruz Roja publica memorias y cuentas anuales auditadas externamente, con el desglose exacto por programa, accesibles a cualquier socio que quiera saber a dónde va su cuota. Además, esa cuota se gestiona a nivel provincial, no en una sede central lejana: cada socio forma parte de la red de su propia provincia, con programas y resultados concretos en su entorno."], "verificado": "Datos verificados junio 2026", "captacion": {"resumen30": {"cifras": ["11.687.497", "323.063", "1.285.834"], "labels": ["personas atendidas en 2024 en España y en 41 países", "asistencias en la respuesta a la DANA de Valencia — la mayor recaudación de la historia de Cruz Roja: 112M€", "socios y empresas colaboradoras, junto a 231.236 voluntarios"], "cierre": "No es una organización que ayuda \"fuera\": es la red con más presencia en España, en tu barrio, en tu provincia, donde haga falta.", "videoDestacado": {"url": "https://www.youtube.com/watch?v=9UtC-1pIyTQ", "titulo": "Historia Extraordinaria — Adiós Soledad: Jerónima y Ramona", "duracion": "3:03"}}, "proyectosClave": [0, 1, 2], "argumentario": [0, 1, 2]}, "speech": {"parada": "Oye, ¿tienes un minuto y medio? Quiero contarte el día de alguien que no conoces, pero que seguro reconoces.", "discurso": "Imagina un día cualquiera, en cualquier ciudad de España.\n\nA las 8 de la mañana, una mujer de 84 años que vive sola tiene un mareo en su cocina. Lleva colgado al cuello un dispositivo: pulsa el botón, y en segundos contesta una persona real, que avisa a su hija y, si hace falta, a una ambulancia. Eso existe gracias a la teleasistencia de Cruz Roja — más de 132.000 personas mayores la tienen en España, 24 horas, 365 días al año.\n\nA las 10, en un hospital, hay un niño ingresado para una operación que le da miedo. Una voluntaria de Cruz Roja se sienta con él, juega, le hace el rato menos largo. El año pasado acompañaron así a más de 38.000 niños y niñas en hospitales de toda España.\n\nA mediodía, una persona que lleva ocho meses sin trabajo entra a una oficina de Cruz Roja. Allí le ayudan a actualizar su currículum, a practicar una entrevista — incluso con un simulador con inteligencia artificial — y a encontrar ofertas reales. El año pasado, más de 270.000 personas pasaron por estos programas de empleo.\n\nPor la tarde, una mujer que ha sufrido violencia de género recibe una llamada de seguimiento de su teleasistencia con GPS, que puede activar en cualquier momento si se siente en peligro. Más de 55.000 mujeres tienen acceso a este tipo de apoyo.\n\nY por la noche, alguien que no puede dormir por la ansiedad llama a un teléfono gratuito, y al otro lado hay una persona formada para escucharle. Casi 1,2 millones de personas recibieron apoyo de salud mental el año pasado.\n\nTodo esto, en un solo día, en España. Y detrás de cada una de estas historias hay una persona voluntaria — 231.236 en total — y 1.285.834 socios que hacen posible que esa red exista, funcione y llegue a tiempo.", "cierre": "Todo esto sigue pasando hoy, ahora mismo, mientras hablamos. Y solo sigue pasando porque hay gente que decide formar parte de esa red. Por unos 12 euros al mes — unos 140-150 al año — tú también puedes ser esa persona que, sin saberlo, hace que alguien hoy no esté solo. ¿Te apuntas?"}, "videos": [{"titulo": "Historia Extraordinaria — Adiós Soledad: Jerónima y Ramona", "tipo": "Testimonio de beneficiarias", "duracion": "3:03", "url": "https://www.youtube.com/watch?v=9UtC-1pIyTQ", "anio": "2021"}, {"titulo": "Historia Extraordinaria — José Ignacio, un ejemplo a seguir", "tipo": "Testimonio de beneficiario", "duracion": "3:22", "url": "https://www.youtube.com/watch?v=RZaE6SY2NNQ", "anio": "2025"}, {"titulo": "Historia Extraordinaria — Tengo una carta para ti", "tipo": "Testimonio emotivo — mayores y niños", "duracion": "4:36", "url": "https://www.youtube.com/watch?v=DLEjAxay7PU", "anio": "2023"}, {"titulo": "Historia Extraordinaria — Rafael, voluntario de Cruz Roja en Ponferrada", "tipo": "Testimonio de voluntario", "duracion": "3:39", "url": "https://www.youtube.com/watch?v=NcA4wuFrLPg", "anio": "2025"}, {"titulo": "Historia Extraordinaria — El voluntariado transforma a las personas", "tipo": "Testimonio de voluntariado", "duracion": "3:14", "url": "https://www.youtube.com/watch?v=sA7sofr0tRI", "anio": "2025"}, {"titulo": "Historia Extraordinaria — Mar y Dikra, evolución personal y profesional", "tipo": "Testimonio de beneficiarias", "duracion": "5:12", "url": "https://www.youtube.com/watch?v=H8c5sY6K7hQ", "anio": "2025"}, {"titulo": "Testimonio Vincúlate — Almudena", "tipo": "Testimonio breve — soledad no deseada", "duracion": "0:42", "url": "https://www.youtube.com/watch?v=1eSZgdPDdO0", "anio": "2025"}, {"titulo": "Así fue 2025 — Cruz Roja Española", "tipo": "Resumen anual de impacto", "duracion": "3:43", "url": "https://www.youtube.com/watch?v=UB37TXeUWac", "anio": "2025"}, {"titulo": "160 Aniversario de Cruz Roja Española", "tipo": "Spot institucional", "duracion": "2:45", "url": "https://www.youtube.com/watch?v=KZJyfrhdBdU", "anio": "2024"}], "ultimaActualizacion": "julio 2026"}</script>
<script type="application/json" id="data-wwf">{"id": "wwf", "emoji": "🐼", "nombre": "WWF", "full": "WWF España", "color": "#16a34a", "claim": "WWF nació en 1961 con un objetivo muy concreto: salvar las marismas de Doñana de la desecación. En 1963 compró 6.671 hectáreas del Coto de Doñana y las cedió al CSIC para crear la primera reserva biológica integral de España. Esa campaña dio origen en 1968 a ADENA, la delegación española de WWF —presidida entonces por el príncipe Juan Carlos, con Félix Rodríguez de la Fuente como vicepresidente.\n\nParte de la mayor red de conservación del planeta: +6 millones de socios y 30 millones de seguidores en más de 100 países. En España: ~50.000 socios que financian el 53% del presupuesto.\n\nDel lince ibérico (2.663 ejemplares en 2025, rescatado del borde de la extinción) a Doñana, el lobo, los océanos y el clima. Las 3 metas globales de WWF para 2030: cero pérdida neta de especies y hábitats naturales, y reducir a la mitad tanto la huella ecológica como las emisiones de la humanidad.", "meta": [{"label": "Fundada en España", "val": "1968"}, {"label": "Socios España (último dato)", "val": "~50.000"}, {"label": "Socios en el mundo", "val": "+6 millones"}, {"label": "Lince ibérico 2025", "val": "2.663 ejemplares"}], "cifras": [{"num": "73%", "label": "De reducción en poblaciones de vertebrados desde 1970 a escala mundial (Informe Planeta Vivo 2024). El planeta encadena 11 años consecutivos como los más cálidos. La temperatura ya está casi 1,5°C por encima de los niveles preindustriales.", "fuente": "WWF · Informe Planeta Vivo 2024 / Memoria Conservación 2025"}, {"num": "355.000 ha", "label": "Quemadas en España en 2025 — el peor año de incendios forestales en dos siglos, solo superado por 1994. El 90% ardió en solo 15 días, con 8 víctimas mortales y más de 42.000 personas evacuadas.", "fuente": "WWF España · Informe 'Incendios extremos' 2026 / Memoria de Conservación 2025"}, {"num": "2.663", "label": "Linces ibéricos en 2025 (+10% vs 2024, censo 2025). A principios de siglo quedaban menos de 100. Es el mayor éxito de recuperación de un mamífero en toda Europa.", "fuente": "WWF España · web oficial junio 2026 / Censo lince ibérico 2025"}, {"num": "27,5%", "label": "De la superficie marina española está protegida (informe 'Victorias para la naturaleza 2026' de WWF, que suma 5 nuevas Áreas Marinas Protegidas este año; antes 25,7% en 2025 y 22,5% previamente). El objetivo es el 30% en 2030, con más de 40 planes de gestión previstos en los próximos 12 meses. En paralelo, el Tratado Global de los Océanos (BBNJ) entró en vigor en enero de 2026, permitiendo crear áreas protegidas en alta mar.", "fuente": "WWF España · Victorias para la naturaleza 2026"}, {"num": "+134 ha", "label": "De humedales restauradas en el entorno de Doñana en 2025 — los mayores proyectos ejecutados por WWF España hasta la fecha. En 2026 se aprobó LIFE HumedalES (2026-2036), el mayor proyecto de la historia del programa LIFE, para restaurar 26.200 ha más.", "fuente": "WWF España · Memoria de Conservación 2025"}, {"num": "~50.000", "label": "Socios en España (parte de los +6 millones en todo el mundo), que financian el 53% del presupuesto anual de WWF España (~11M€). La independencia financiera es lo que permite llevar casos ante la Comisión Europea sin depender del Gobierno.", "fuente": "WWF España · transparencia económica / web oficial"}], "programas": [{"emoji": "💧", "name": "Agua — Doñana, Tablas de Daimiel y robo de agua", "desc": "El agua dulce es vital para animales, plantas y personas, pero desde 1970 se ha perdido más del 80% de la biodiversidad en los ecosistemas de agua dulce a escala global. En Europa, el 60% de los ríos, humedales y acuíferos están en mal estado. En España, cerca del 80% del agua consumida va a la agricultura de regadío intensiva, un modelo que ignora los límites de los recursos disponibles y acelera la desertificación.\n\nEspaña es el país con mayor sobreexplotación de agua de Europa: 1 de cada 4 acuíferos está sobreexplotado, y se calcula que hay más de medio millón de pozos ilegales en todo el territorio. El CEDEX (2017) estima que los recursos hídricos disponibles se reducirán entre un 3% y un 7% en distintas cuencas de aquí a 2040.\n\nEl programa de Agua de WWF trabaja en cuatro líneas: ahorro de agua en la agricultura (regadío sostenible) y ríos vivos y libres (restauración de riberas y caudales). También sequía y desertificación (causas estructurales, no solo climáticas), y humedales: España tiene más de 1.500 humedales de más de 0,5 ha, pero solo 734 están en el Inventario Español de Zonas Húmedas y solo 74 son sitios Ramsar protegidos. Estos ecosistemas albergan el 12% de todas las especies de agua dulce conocidas.\n\nWWF ha documentado el robo sistemático de agua en cuatro puntos negros de extracción ilegal: Doñana (+4.700 ha regadas ilegalmente), Tablas de Daimiel (51.465 ha) y Mar Menor y Campo de Cartagena (8.460 ha). El cuarto es Los Arenales, en Castilla y León: 23.975 ha regadas ilegalmente de un total de 101.877 ha en 2019. En conjunto, suman 88.645 ha regadas con agua ilegal, una superficie equivalente a 1,5 veces el tamaño de Madrid.\n\nEn Doñana, WWF detecta el robo de agua por satélite y ya ha restaurado más de 134 ha de humedales en 2025. En Tablas de Daimiel, la Confederación reconoció la necesidad de retirar 100.000 ha de regadío. Los Arenales, con su masa de agua subterránea de Tierra del Vino ya por debajo de los 25 metros, sigue el mismo camino de sobreexplotación que llevó a Daimiel a secarse por completo.\n\nEn enero de 2026, 9 de los 16 sectores del acuífero de Doñana entraron en estado de alarma por primera vez desde que hay registros, según datos de la Confederación Hidrográfica del Guadalquivir. Existe además riesgo de salinización por posible intrusión de agua marina, y la masa de agua subterránea del Almonte está en mal estado químico por la agricultura intensiva. WWF acusó al Gobierno de contradecir sus propios datos: pese a un año lluvioso, 10 de los 16 sectores extrajeron más agua de la que cayó.\n\nEn junio de 2026, WWF alertó de que el salmón atlántico ha caído un 82% en una sola década y más de la mitad de su hábitat histórico es hoy inaccesible por presas.\n\nEn 2026 se aprobó el proyecto LIFE HumedalES (2026-2036), el mayor proyecto de la historia del programa LIFE: 26.200 ha en 107 espacios Natura 2000 de las 17 comunidades autónomas, liderado por España. Impulsa el Plan de Restauración de Humedales de España, con WWF España como uno de los socios ejecutores.\n\nEn Baleares, el proyecto RestaurAlcudia (con el Ayuntamiento de Alcúdia y la Universitat de les Illes Balears) restauró el corredor ecológico de los humedales de Maristany y Estany des Ponts. Retiró más de 300 toneladas de escombros y 26 toneladas de residuos y vegetación invasora. Aves, anfibios e invertebrados ya han regresado a la zona.\n\nEl Mar Menor es uno de los casos más emblemáticos del fracaso de la gestión del agua en España: una laguna salada de 135 km². Ha sufrido tres colapsos ecológicos por eutrofización: la 'sopa verde' de 2016, otro episodio en octubre de 2019, y el más grave en agosto de 2021, con millones de peces y crustáceos muertos en sus orillas. La causa es constante: cada día entran unas 5 toneladas de nitratos y fosfatos por ramblas y acuífero desde la agricultura intensiva del Campo de Cartagena. WWF, junto a la organización ANSE, lleva años documentando el problema. Trabaja en su recuperación y en la aplicación de la legislación que obliga a reducir la contaminación agrícola, frente a las presiones del sector del regadío.", "dato": "4 puntos negros de robo de agua: Doñana (+4.700 ha), Daimiel (51.465 ha), Mar Menor (8.460 ha), Los Arenales (23.975 ha) = 88.645 ha total (1,5x Madrid) · 1 de cada 4 acuíferos sobreexplotado · +medio millón de pozos ilegales · CEDEX: -3/-7% recursos hídricos en 2040 · Doñana: 9/16 sectores del acuífero en alarma (ene. 2026), riesgo de salinización · +1.500 humedales en España, solo 734 inventariados y 74 Ramsar · 12% especies agua dulce en humedales · +134 ha humedales Doñana · -15% dotaciones riego La Rocina · 100.000 ha regadío a retirar en Tablas Daimiel · 80% agua → agricultura regadío · Salmón atlántico: -82% en una década · LIFE HumedalES 2026-2036 · Mar Menor: 135 km², 3 colapsos por eutrofización (2016/2019/2021), 5 t/día de nitratos y fosfatos", "categoria": "Agua", "resumenClave": "WWF detecta el robo de agua en los acuíferos de Doñana mediante imágenes por satélite, una metodología que ya están adoptando las administraciones públicas. En 2025 restauró más de 134 hectáreas de humedales en el entorno del parque, y en 2026 arrancó LIFE HumedalES, el mayor proyecto de la historia del programa LIFE, para restaurar 26.200 hectáreas más."}, {"emoji": "🐆", "name": "Lince ibérico y Refugio de Montejo — de 100 a 2.663 ejemplares", "desc": "El lince ibérico es el mayor éxito de recuperación de un mamífero en toda Europa. A principios de los años 2000 quedaban menos de 100 ejemplares — el felino más amenazado del mundo.\n\nEn 2025 son 2.663 (+10% vs 2024, censo oficial), con poblaciones confirmadas en Andalucía, Extremadura, Castilla-La Mancha, Castilla y León, y Portugal, y una nueva área aprobada en Aragón en 2025. El proyecto LIFE LynxConnect garantiza la continuidad del esfuerzo a largo plazo. En 2025 se publicó también el primer censo ibérico del conejo de monte, especie clave de la que depende el felino como presa principal.\n\nLa fragmentación del territorio es una amenaza añadida: solo el 27% de España está protegido, y mal conectado entre sí. El informe de WWF 'Autopistas Salvajes' identifica 12 corredores ecológicos prioritarios para conectar estas poblaciones aisladas. La proliferación de infraestructuras ha provocado un declive del 50% en el número de mamíferos silvestres en España.\n\nVinculado al lince está el Refugio de Rapaces de Montejo de la Vega (Segovia), el proyecto de conservación más longevo de WWF España. Fue fundado el 13 de enero de 1975 por Félix Rodríguez de la Fuente junto con la población local de Montejo, cuando los buitres aún eran considerados alimañas perseguidas. Fue el primer acuerdo de custodia del territorio de España — un modelo pionero replicado en todo el país.\n\nEn la temporada 2025 se registraron 857 parejas de buitre leonado (754 en el censo de 2024): la colonia más importante de España y de Europa, junto a la de las Hoces de Duratón. También 11 parejas de alimoche, estables desde los años 90.\n\nEl Parque Natural de las Hoces del Río Riaza (5.185 ha, 2004) amplía la protección del área. El Bosque WWF, cerca de la Rinconada, está dedicado a las personas que han dejado un legado solidario para la naturaleza.", "dato": "2.663 linces (+10%, censo 2025) · 6 CCAA + Portugal · LIFE LynxConnect · Informe 'Autopistas Salvajes': 12 corredores ecológicos prioritarios · Solo 27% de España protegido y mal conectado · -50% mamíferos silvestres por infraestructuras · Refugio Montejo: 857 parejas buitre 2025 (754 en 2024), mayor colonia de Europa junto a Hoces de Duratón · 1975 Félix Rodríguez de la Fuente · Primer custodia del territorio de España", "categoria": "Especies y hábitats", "resumenClave": "El lince ibérico pasó de menos de 100 ejemplares a principios de siglo a 2.663 en 2025 — el mayor éxito de recuperación de un mamífero en toda Europa. Vinculado a su recuperación está el Refugio de Rapaces de Montejo de la Vega, el proyecto de conservación más longevo de WWF España, fundado en 1975 por Félix Rodríguez de la Fuente."}, {"emoji": "🐺", "name": "Lobo y grandes carnívoros — la batalla política de 2026", "desc": "En la Península Ibérica habitan tres de los cinco grandes carnívoros europeos: el oso pardo, el lobo ibérico y el lince ibérico. Un privilegio ecológico que conlleva una responsabilidad política enorme.\n\nA escala europea, se estiman 17.000 osos pardos, 9.000 lobos, 12.000 linces euroasiáticos y apenas 1.000 glotones. El proyecto LIFE EuroLargeCarnivores, liderado por WWF, promueve la coexistencia entre estas especies y la actividad humana.\n\nEspaña aporta la mayor superficie neta a la Red Natura 2000, con 400 especies y más de 1.800 espacios protegidos —desde Picos de Europa hasta Doñana o las Hoces del Riaza—. Es el marco legal que ha permitido la recuperación del lince, el oso y el lobo en toda Europa.\n\nEl lobo ibérico es el más conflictivo: en 2025, su censo confirma un incremento del 12% de manadas en la última década. Sin embargo, las comunidades autónomas presionan para rebajar su nivel de protección.\n\nEn noviembre de 2025 se confirmó un hito histórico: el nacimiento de 3 cachorros de una pareja de origen italo-francés detectada desde 2024 entre las comarcas de l'Alta Garrotxa y l'Alt Empordà, en el norte de Girona. Son los primeros cachorros de lobo nacidos en Cataluña en un siglo. La especie había sido exterminada en la región a principios del siglo XX, y hace unos 25 años el primer lobo solitario cruzó los Pirineos desde Francia.\n\nWWF exige que España mantenga el estado de conservación desfavorable del lobo en su informe a la Comisión Europea, rechazando las presiones autonómicas para facilitar sus controles. El Departamento Legal de WWF mantiene acciones en Galicia, Asturias, La Rioja y Cantabria, y ha interpuesto recurso de inconstitucionalidad ante el Defensor del Pueblo.\n\nEl desmán ibérico fue declarado en 2025 en situación crítica de extinción, impulsando el proyecto LIFE SAVE Desmán.\n\nEl visón europeo es el mamífero más amenazado de España: el último censo nacional confirma solo 142 ejemplares en la península, catalogado en peligro crítico de extinción por la UICN. La caída ha sido constante: de unos 1.000 ejemplares en el año 2000 a 500 en 2012-2014, hasta los 142 actuales. La Rioja alberga una de sus principales poblaciones, donde WWF ha impulsado un centro de cría en cautividad para evitar su extinción. Además del deterioro de su hábitat fluvial, está amenazado por el visón americano, especie invasora incluida en 2025 en la lista europea de especies invasoras.\n\nWWF lleva más de una década reclamando el cierre definitivo de las granjas de cría de visón americano en España, origen de buena parte de los escapes que amenazan al visón europeo y a casi otras 50 especies autóctonas. Lo hace a través de la campaña \"Cierre de las granjas de visón ¡YA!\", que ya suma cerca de 70.000 apoyos. Se calcula que hay ya más de 30.000 visones americanos distribuidos a lo largo de unos 12.530 km de ríos españoles.\n\nA escala global, las especies invasoras son responsables del 60% de las extinciones registradas y cuestan más de 35.000 millones de dólares al año.\n\nWWF también lanzó en 2026 el proyecto ODISEC, una plataforma digital para unificar y digitalizar el seguimiento del ciervo, el corzo y la perdiz roja en España, financiada por la Fundación Biodiversidad. Su objetivo es dar a las administraciones datos actualizados y comparables sobre el estado de estas especies hasta 2027.", "dato": "Europa: 17.000 osos, 9.000 lobos, 12.000 linces euroasiáticos, 1.000 glotones · LIFE EuroLargeCarnivores · Red Natura 2000: 400 especies, +1.800 espacios en España · Lobo: +12% manadas en una década · Primeros cachorros en Cataluña en un siglo (nov. 2025, l'Alta Garrotxa/l'Alt Empordà) · Acciones legales en 4 CCAA · Recurso Defensor del Pueblo · Desmán ibérico: situación crítica 2025 · Visón europeo: 1.000 (2000) → 500 (2012-14) → 142 (2025) · Visón americano: +30.000 ejemplares/12.530 km ríos · Especies invasoras: 60% extinciones, +35.000M$/año · Proyecto ODISEC (2026): seguimiento digital ciervo/corzo/perdiz", "categoria": "Especies y hábitats"}, {"emoji": "🐟", "name": "Pesca sostenible y áreas marinas protegidas — 27,5% del mar protegido", "desc": "España tiene el 27,5% de su superficie marina protegida, según el informe 'Victorias para la naturaleza 2026' de WWF (25,7% en 2025, 22,5% previamente). Este año se han declarado 5 nuevas Áreas Marinas Protegidas, y se prevén más de 40 planes de gestión en los próximos 12 meses. Avanza hacia el objetivo del 30% en 2030. Sin embargo, la protección estricta —la que de verdad restringe actividades— es solo del 0,014% de la superficie marina (145 km²), muy lejos del objetivo europeo del 10% para 2030. En enero de 2026 entró en vigor el Tratado Global de los Océanos (BBNJ), ratificado por España. Abre la posibilidad histórica de crear áreas marinas protegidas en alta mar y exigir evaluaciones de impacto para nuevas actividades como la minería submarina.\n\nEl Parque Nacional marino del Mar de las Calmas (El Hierro) avanza hacia su tramitación parlamentaria — sería el primer Parque Nacional 100% marino de España. En julio de 2024, el Ministerio para la Transición Ecológica aprobó la propuesta de declaración, tras una campaña de WWF que arrancó en 2017. El proyecto LIFE INTEMARES es el mayor proyecto de conservación marina en Europa, con gestión participativa de la Red Natura 2000 marina española.\n\nEn cuanto a la pesca, el informe CGPM-FAO 2025 reflejó una mejora clara en el Mediterráneo: +25% de biomasa, -50% de mortalidad por pesca, y descenso de la sobrepesca del 80% al 50% en una década. Según WWF, todas las especies de atún del mundo muestran ya signos de recuperación.\n\nLa pesca ilegal sigue siendo un problema grave: puede superar el 40% de las capturas en algunas pesquerías. España y Europa han tomado la delantera regulando contra esta práctica. WWF trabaja también con pescadores artesanales en procesos de cogestión, donde ellos son los protagonistas y guardianes del mar. El proyecto Comprometidos con el Mar ya tiene talleres piloto de cogestión activos en 6 zonas y cofradías de pescadores. La moratoria a la minería submarina — una actividad con impactos potencialmente devastadores sobre los fondos marinos — es otra de las líneas de defensa del programa.\n\nUn ejemplo destacado de cogestión es el Comité de cogestión del sonso en Cataluña: esta pesquería, popular en la Costa Brava y el Maresme, estuvo a punto de colapsar y de ser cerrada por la Comisión Europea. La cogestión entre pescadores, WWF, administración y ciencia permitió su recuperación, un caso de éxito reconocido con varios premios.", "dato": "27,5% mar protegido en España (meta 30% en 2030, 5 nuevas AMP en 2026, +40 planes de gestión previstos) · Protección estricta: solo 0,014% (145 km²) vs meta UE 10% · Atún: todas las especies con signos de recuperación · Tratado BBNJ en vigor enero 2026 · Parque Nacional Mar de las Calmas (tramitación, propuesta aprobada jul. 2024) · LIFE INTEMARES · +25% biomasa Mediterráneo · Pesca ilegal: hasta 40% capturas · Comprometidos con el Mar: cogestión en 6 zonas · No a la minería submarina", "categoria": "Océanos"}, {"emoji": "🐋", "name": "Especies marinas — corales, cetáceos y contaminación por plásticos", "desc": "El Mediterráneo apenas ocupa el 1% de la superficie oceánica del planeta, pero alberga 1 de cada 10 especies marinas conocidas, el 28% de ellas exclusivas de este mar. Sus poblaciones de mamíferos marinos han caído un 41% en 50 años, y solo quedan unas 400 focas monje. De las 73 especies mediterráneas evaluadas, más de la mitad están amenazadas y 20 en peligro crítico.\n\nEs además el mar más contaminado del mundo: concentra el 7% de los microplásticos del planeta, y el 75% de sus pesquerías evaluadas están sobreexplotadas.\n\nEl proyecto LIFE ECOREST devolvió al mar en 2025 más de 8.000 colonias de organismos estructurantes — corales, gorgonias y plumas de mar — en la costa catalana, en colaboración directa con el sector pesquero. Es uno de los proyectos de restauración marina más ambiciosos de Europa. La campaña del velero Blue Panda de WWF recibió más de 500 visitantes en puntos de información y participación directa de alumnado y familias.\n\nEn Baleares, las poblaciones de rayas han recuperado niveles de abundancia comparables a los años 60 — una de las señales más claras de que las medidas de gestión pesquera basadas en ciencia funcionan. En mayo de 2026 se creó un Grupo de Trabajo específico para reducir las velocidades de los barcos en el Corredor de Migración de Cetáceos del Mediterráneo, para mitigar las colisiones del transporte marítimo con cetáceos.\n\nEl proyecto CetAMBICion documenta incrementos de densidad de delfines en áreas ibéricas y estima poblaciones de especies clave. Canarias es el enclave más importante de Europa para ballenas y delfines, con hasta 29 taxones de cetáceos presentes en sus aguas. Allí, WWF impulsa desde 2017 la campaña por el Parque Nacional Mar de las Calmas (El Hierro), que avanza hacia su tramitación parlamentaria y sería el primer Parque Nacional 100% marino de España.\n\nEn el archipiélago Chinijo (La Graciosa y Alegranza, Parque Natural desde 1986), WWF lleva 25 años trabajando con más de 1.500 personas voluntarias en censos, limpiezas, prevención del furtivismo y sensibilización, desde que abrió su oficina en Canarias en 1998. Sus aguas albergan delfines, cachalotes, zifios, tortugas, langosta, gorgonias, ostras gigantes y esponjas de vidrio.\n\nWWF trabaja también en la protección de tiburones y rayas, tortugas marinas y ballenas, logrando decisiones en convenios internacionales que amplían la cobertura de protección y control del comercio de estas especies.\n\nCada año se vierten a la naturaleza 100 millones de toneladas de residuos de plástico, y una décima parte acaba en el mar. El Mediterráneo concentra 1,25 millones de fragmentos de plástico por km², casi 4 veces más que la 'isla de basura' del Pacífico. España es el segundo país que más plástico vierte al Mediterráneo, solo por detrás de Turquía. El tratado global contra la contaminación por plásticos, aplazado a 2026 por presiones de los países productores de petróleo, es otra de las batallas pendientes.", "dato": "Mediterráneo: 1% superficie oceánica, 1 de cada 10 especies marinas, -41% mamíferos marinos en 50 años, ~400 focas monje, mar más contaminado del mundo (7% microplásticos) · LIFE ECOREST: 8.000+ colonias devueltas al mar · Blue Panda: 500 visitantes · Rayas Baleares: niveles años 60 · Canarias: enclave más importante de Europa para ballenas y delfines — hasta 29 taxones estrictamente protegidos · Parque Nacional Mar de las Calmas (El Hierro): campaña desde 2017, tramitación en curso · Chinijo (La Graciosa/Alegranza): 25 años, +1.500 voluntarios, oficina Canarias desde 1998 · Grupo trabajo cetáceos Mediterráneo (mayo 2026) · CetAMBICion · Tiburones, tortugas, ballenas · Plásticos: 100M t/año vertidas, Mediterráneo 1,25M fragmentos/km² (4x Pacífico), España 2º país que más vierte al Mediterráneo · Tratado plásticos: aplazado a 2026", "categoria": "Océanos"}, {"emoji": "🔥", "name": "Incendios forestales — 20 años de análisis, la 6ª generación ya está aquí", "desc": "WWF lleva más de 20 años estudiando las causas y buscando soluciones a los incendios forestales en España — con una biblioteca de informes que constituye el análisis más sólido y continuado sobre esta problemática. La conclusión es contundente: España es buena apagando incendios (el 65% se extinguen en fase de conato, menos de 1 ha) pero no en evitarlos. No se invierte en dar vida a los montes para que no ardan — y los bosques se han convertido en 'bombas de relojería'.\n\n2025 fue el peor año de incendios forestales de este siglo y del anterior en España, solo superado por 1994 (437.000 ha): ardieron cerca de 355.000 ha, casi el triple de la media anual. El 90% de esa superficie se quemó en solo 15 días, entre el 8 y el 22 de agosto. La campaña dejó 8 víctimas mortales, 79 heridas y más de 42.000 evacuadas de sus viviendas.\n\nEl número total de siniestros bajó (8.199, frente a una media de 8.800 en la última década). Sin embargo, los Grandes Incendios Forestales (GIF, más de 500 ha) se dispararon a 63 —frente a una media de solo 29 en la última década— y concentraron más del 87% de toda la superficie quemada. Llegó a haber hasta 18 GIF activos al mismo tiempo. El noroeste fue el epicentro de la crisis: concentró 32 GIF (el 50% del total nacional) y el 75% de la superficie quemada por estos grandes incendios, con León (30%), Ourense (29%) y Zamora (10%) a la cabeza. Un 45% de la superficie afectada tenía alguna figura de protección ambiental.\n\nHasta el 95% de los incendios en España tiene origen humano, y casi el 53% de los que tienen causa conocida son intencionados —frente al 28% por negligencias y accidentes—. Es una cifra que refleja conflictos sociales y económicos no resueltos en el medio rural, no tramas organizadas: las fiscalías de medio ambiente descartan la existencia de \"tramas incendiarias\" coordinadas.\n\nLa inversión pública revela el desequilibrio del modelo: el 78% del gasto se destina a la extinción (unos 450M€ anuales) frente a solo el 12% en prevención (~200M€ anuales). Apagar un incendio cuesta unos 20.000€ por hectárea, frente a los 3.000€ de la selvicultura preventiva o los 500€ de una quema prescrita.\n\nLos incendios de 6ª generación son más grandes, más feroces e incontrolables: ya no se pueden apagar con los medios y métodos tradicionales. Solo la prevención — gestión del monte, desbroces, cultivos de proximidad, uso tradicional del territorio — puede evitar que sean tan devastadores. En 2025 se aprobó el Real Decreto 716/2025 (26 de agosto), que establece directrices comunes de prevención para todas las CCAA — un avance estructural impulsado en parte por la presión de WWF. En mayo de 2026, la Semana de Acción por la Naturaleza activó cerca de 30 iniciativas de restauración post-incendio en toda España.\n\nEn noviembre de 2025, WWF publicó el informe 'Restauración de zonas incendiadas', que propone la restauración ecológica como pieza central de la prevención futura. No basta con apagar el fuego: hay que transformar el paisaje hacia modelos más resilientes antes de que vuelva a arder. WWF urge al Ministerio para la Transición Ecológica y a las Comunidades Autónomas a aprobar sin demora el Plan Nacional de Restauración de la Naturaleza, con financiación firme y participación real.", "dato": "~355.000 ha quemadas en 2025 (peor año en 2 siglos, solo superado por 1994) · 90% de la superficie en 15 días (8-22 agosto) · 8 víctimas mortales, 79 heridos, 42.000 evacuados · 63 GIF (media década: 29) = 87% de la superficie · Noroeste: 50% de los GIF, 75% superficie GIF (León, Ourense, Zamora) · 95% causa humana, 53% intencionados · Extinción 78% del gasto (450M€) vs prevención 12% (200M€) · RD 716/2025 · Informe 'Incendios extremos: el reto de adaptar el territorio' (2026)", "categoria": "Bosques"}, {"emoji": "🌳", "name": "Restauración forestal y gestión sostenible — FSC, EUDR y corcho", "desc": "En España, los bosques solo ocupan el 29% de la superficie que podrían ocupar, y la mayoría no se encuentra en buen estado. A escala global, hemos perdido dos tercios de los bosques en 10.000 años.\n\nEl programa de Restauración de WWF actúa en dos frentes: frenar la deforestación (incluida la deforestación importada — la soja, el aceite de palma y la carne que consumimos arrazan bosques tropicales) y restaurar activamente los ecosistemas forestales degradados.\n\nWWF impulsó el Reglamento europeo de deforestación importada (EUDR), que exige a las empresas trazabilidad y diligencia debida en productos como soja, aceite de palma, madera, cacao, café, caucho y ganado vacuno. Su entrada en vigor se ha aplazado ya tres veces y ahora está prevista para diciembre de 2026 en grandes y medianas empresas, y junio de 2027 en pymes.\n\nEn 2025, WWF ejecutó acciones de restauración en 20 localizaciones prioritarias en varias comunidades autónomas, con seguimiento post-ejecución de hasta 5 años en colaboración con la UPM. Junto a FSC España y Dendron, certificó cerca de 10.000 ha de montes privados en Cuenca y Guadalajara bajo criterios de gestión forestal responsable. En 2024 el proyecto se amplió a Toledo (7 municipios más), y ya ha sumado más de 500 personas en actividades de sensibilización dirigidas a población local, escolares y propietarios forestales.\n\nWWF fue miembro fundador de FSC en su creación en Toronto (Canadá, 1993), y en España lideró el arranque de la certificación en 1998. Ese vínculo histórico explica su colaboración actual con FSC España en proyectos como el de Cuenca y Guadalajara.\n\nEse mismo compromiso se extiende al corcho: WWF impulsa la Red Ibérica de Comercio Forestal, que promueve el sello FSC entre fabricantes de tapones. Trefinos, el principal fabricante español de tapones de corcho para cava y champán, se sumó a este compromiso para aumentar progresivamente el corcho FSC en su producción. Con ello se unió a una red que agrupa a seis de las mayores corcheras del mundo.\n\nEl proyecto eco-hidrológico del río Mijares (en colaboración con Allianz, para restaurar los daños de la DANA) y el laboratorio rural Rural Labscape combinan restauración, resiliencia climática y economía local.\n\nEl proyecto TERECOVA, pionero desde 2016 en la Comunidad Valenciana (Enguera y Crevillente) junto a varias universidades y el CEAM, desarrolló un modelo participativo en el que la propia población decide dónde y cómo restaurar los paisajes quemados y degradados.\n\nLa Alianza por la Restauración, con 30 organizaciones, mantiene activo el Plan Nacional de Restauración. WWF también defiende la Ley de Restauración de la UE frente al paquete Ómnibus, que busca debilitar los marcos de restauración europeos.", "dato": "Bosques: solo 29% superficie potencial en España · Reglamento EUDR deforestación importada (aplazado a dic. 2026/jun. 2027 pymes) · 20 localizaciones restauración 2025 · ~10.000 ha FSC en Cuenca/Guadalajara/Toledo (+500 sensibilizados) · FSC cofundado por WWF (Toronto 1993 · España 1998) · Red Ibérica de Comercio Forestal (Trefinos-corcho) · TERECOVA: restauración participativa en Comunidad Valenciana desde 2016 · Río Mijares restauración post-DANA · 30 organizaciones Alianza Restauración · Ley Restauración UE defendida", "categoria": "Bosques"}, {"emoji": "⚡", "name": "Clima y Energía — Única ONG en el Consejo de Finanzas Sostenibles", "desc": "El planeta encadena once años consecutivos como los más cálidos, con una temperatura media de casi 1,5°C por encima de los niveles preindustriales. Las concentraciones de gases de efecto invernadero siguen aumentando y la ciencia advierte que ya hemos superado el límite del 1,5°C que fijaban los estudios. En Europa, el calentamiento avanza más rápido que la media global, intensificando olas de calor, sequías e incendios en el sur del continente.\n\nEl Programa de Clima y Energía trabaja para mantener la senda compatible con 1,5ºC en un contexto de repliegue regulatorio en Europa. En 2025, WWF España presentó su documento 'Senda 1,5ºC compatible con la naturaleza' ante Red Eléctrica (REDEIA) para alinear la planificación de redes con criterios climáticos y de biodiversidad. Lanzó RE-EVALÚA, herramienta pionera para evaluar proyectos renovables con criterios ambientales y sociales. También inició el proyecto europeo LIFE REALS (2025-2028), que trabaja en España, Bulgaria, Hungría, Rumanía y Ucrania. Busca redirigir el despliegue renovable hacia suelos ya artificializados o degradados —antiguos polígonos industriales, vertederos— en vez de ocupar más naturaleza.\n\nEn el ámbito financiero, WWF España es la única ONG participante en el Consejo de Finanzas Sostenibles (CFS) creado en 2025. Mantiene interlocución con el Banco de España, CNMV y otros supervisores para integrar riesgos climáticos y de biodiversidad en la regulación financiera (informe SUSREG 2025).\n\nTambién organizó la movilización en Madrid en el marco de la COP30 bajo el lema 'El clima exige acción, el futuro exige esperanza'. WWF defendió activamente los marcos europeos (taxonomía, diligencia debida) frente al paquete Ómnibus de la Comisión Europea.\n\nEn 2025, WWF España lideró el manifiesto contra el cluster eólico del Maestrazgo, en coordinación con las principales organizaciones ecologistas y actores territoriales. Defendió que la transición energética debe hacerse respetando la biodiversidad y sin colonizar espacios naturales de alto valor.\n\nEspaña importa casi el 100% de los combustibles fósiles que consume, y estos generan el 75% de las emisiones de gases de efecto invernadero del país. WWF pide la descarbonización completa del sector eléctrico para 2030 y la neutralidad climática para 2040, priorizando la eficiencia energética y la descentralización —autoconsumo y comunidades energéticas locales— frente a más importaciones. WWF España también mide y compensa cada año sus propias emisiones de CO2 mediante proyectos acreditados.\n\nEn abril de 2026, WWF España participó en la primera Conferencia sobre la Transición para Abandonar los Combustibles Fósiles (Santa Marta, Colombia), que reunió a 56 países. Marcó un hito político clave en el camino hacia la eliminación de los fósiles. En mayo de 2026, WWF publicó el informe \"Rumbo a la Resiliencia Hídrica\", que establece que los impactos de la crisis climática relacionados con el agua son uno de los principales riesgos para la estabilidad financiera mundial en España.", "dato": "'Senda 1,5ºC' ante REDEIA · RE-EVALÚA · LIFE REALS (2025-2028, España/Bulgaria/Hungría/Rumanía/Ucrania) · Única ONG en Consejo Finanzas Sostenibles · SUSREG 2025 · Movilización COP30 Madrid · 1,5ºC ya superado · España: 100% fósiles importados, 75% emisiones GEI del país · Descarbonización eléctrica 2030, neutralidad climática 2040 · Conferencia Santa Marta: 56 países contra los fósiles (abr. 2026) · Resiliencia hídrica: riesgo financiero España · Maestrazgo: manifiesto contra cluster eólico", "categoria": "Clima y energía"}, {"emoji": "🌾", "name": "Alimentos — Ley de Desperdicio Alimentario aprobada en 2025", "desc": "El sistema alimentario es responsable del 26% de las emisiones de gases de efecto invernadero y del 75% de la deforestación mundial. Lo que comemos tiene un impacto directo en el planeta: los cultivos de soja para pienso animal arrasan la Amazonía; el aceite de palma destruye selvas tropicales; el exceso de regadío intensivo esquilma acuíferos como el de Doñana.\n\nEl programa de Alimentos de WWF trabaja en cuatro ejes: una PAC (Política Agraria Común) más verde y justa, producción sostenible (el problema no es escasez sino una producción mal planteada), consumo sostenible y reducción del desperdicio alimentario.\n\nDesde 2010, WWF impulsa la Coalición Por Otra PAC, que agrupa a más de 30 organizaciones bajo el principio de \"quien contamina paga\". Pide más ayudas de desarrollo rural para la producción ecológica, las fincas en la Red Natura 2000 y los Sistemas Agrarios de Alto Valor Natural, como las dehesas. En mayo de 2026, el evento \"40 años de España en la UE: entender la PAC\" reunió a más de 130 asistentes para analizar el futuro de la Política Agraria Común.\n\nEn 2025 se aprobó la Ley de Prevención de Pérdidas y Desperdicio Alimentario tras años de trabajo de WWF con la campaña #LeySinDesperdicio. En 2024, el desperdicio alimentario en España ya se redujo un 4,4% respecto al año anterior, hasta 1.125 millones de kilos (datos oficiales del Ministerio de Agricultura). A escala global, cerca del 40% de la producción de alimentos se descarta entre el campo y la mesa, con un coste de unos 2.600 millones de dólares al año y una huella hídrica de unos 250 km³.\n\nEn abril de 2026 se lanzó el Proyecto FARO (Fincas Agroecológicas para la Resiliencia y el Territorio) en Doñana, una red de fincas que demuestra que otro modelo agrario es posible. Lo impulsan Agricultores Puerta Doñana y SEAE, junto a WWF, con el apoyo de la Fundación Biodiversidad. Durante sus 3 años de duración, la Red de Fincas FARO funciona como un laboratorio vivo para mejorar el uso del agua, el suelo y la biodiversidad, con una Comunidad de Práctica donde agricultores, técnicos y científicos comparten resultados.\n\nUna investigación de WWF en 147 países muestra el potencial de una dieta más sana y sostenible. Podría reducir el uso de suelo agrícola en al menos un 40%, las emisiones ligadas a la alimentación en al menos un 30%, la pérdida de vida silvestre hasta un 46% y las muertes prematuras en al menos un 20%. La receta pasa por más verduras, legumbres y fruta, menos carne pero de mejor calidad —de ganadería extensiva— y menos alimentos procesados. En España, WWF trabajó con el Hospital Universitario La Paz y otros expertos en el proyecto LiveWell (LIFE+ de la UE). Diseñaron un menú sostenible que reduciría un 25% las emisiones de gases de efecto invernadero ligadas a la alimentación.\n\nEn Cataluña, el proyecto Zitrus trabaja con 27 fincas de cítricos (1.550 ha) en Tarragona para reducir el consumo de agua a menos de la mitad y el uso de pesticidas en un 67%. Se ha registrado además un aumento notable de biodiversidad, con más de 170 especies de vertebrados detectadas. El proyecto Zitroladors, con la Fundació Espigoladors, cuantifica y reduce el desperdicio de cítricos a pie de campo.\n\nEn dehesas, el proyecto ibérico Sembrando Dehesas (con Trashumancia y Naturaleza y ANP-WWF Portugal) trabaja en tres zonas piloto: el Valle de los Pedroches (Córdoba), varias comarcas de Cáceres y Badajoz, y los municipios portugueses de Coruche, Mora y Montemor-o-Novo.\n\nJunto a Trashumancia y Naturaleza, la Plataforma por la Ganadería Extensiva y el Pastoralismo y la Sociedad Española de Pastos, WWF presentó una propuesta de bases técnicas para una Estrategia Estatal de Ganadería Extensiva. Fue fruto de un proceso participativo con más de 80 personas y entidades. Pide al Ministerio de Agricultura que la convierta en una estrategia formal —la misma que WWF reclama también en su informe de incendios de 2026 como herramienta clave de prevención.\n\nEl 80% del territorio agrícola español —18 millones de ha— está amenazado por la contaminación de plaguicidas. En 2023, la población española estuvo expuesta a 130 plaguicidas distintos en alimentos cotidianos, un 23% más que el año anterior: 60 no autorizados en la UE, 49 disruptores endocrinos y 15 sustancias PFAS, tóxicos muy persistentes. En 2024, el 46% de los alimentos consumidos en España tenía residuos de plaguicidas, un porcentaje que sube al 69% en el caso de la fruta.\n\nFrente a esto, el proyecto Aliados de la Agricultura (con GREFA) promueve el control natural de plagas recuperando fauna auxiliar —aves rapaces, insectos beneficiosos— y polinizadores silvestres. De ellos depende en parte casi 3 de cada 4 cultivos del mundo.", "dato": "Ley Desperdicio Alimentario 2025 (#LeySinDesperdicio) · Desperdicio España: -4,4% en 2024 (1.125M kg) · Desperdicio global: ~40% producción, 2.600M$/año, 250 km³ huella hídrica · Proyecto FARO Doñana 2026 (3 años, Red de Fincas) · Dieta planetaria: -40% suelo agrícola, -30% emisiones, -46% pérdida vida silvestre, -20% muertes prematuras · Sembrando Dehesas (Pedroches, Cáceres/Badajoz, Portugal) · Estrategia Estatal Ganadería Extensiva (+80 entidades) · 26% emisiones GEI y 75% deforestación mundial → sistema alimentario · Coalición Por Otra PAC (desde 2010, +30 organizaciones) · SAVN y dehesas · Plaguicidas: 130 detectados en 2023 (60 no autorizados UE, 49 disruptores endocrinos) · 46% alimentos con residuos (69% fruta) · Aliados de la Agricultura (fauna auxiliar y polinizadores, con GREFA)", "categoria": "Alimentos"}, {"emoji": "🦅", "name": "Crimen ambiental y tráfico de especies — menos del 7% se juzga", "desc": "Los delitos contra la fauna salvaje son uno de los problemas más graves en la conservación de la biodiversidad — y uno de los menos visibles. En España, menos del 7% de los crímenes ambientales son juzgados.\n\nEl veneno es el 'asesino silencioso' de la fauna protegida: mata a águilas imperiales, buitres negros, lobos y muchas otras especies, frecuentemente colocado de forma intencionada. En los últimos 25 años se han confirmado 21.260 animales muertos por veneno, aunque la cifra real podría superar los 200.000 dentro de un total de 9.700 delitos documentados contra la fauna. La campaña #StopCrimenAmbiental lleva 55.900 firmas recogidas. WWF se persona en procesos penales por veneno y furtivismo con efecto disuasorio demostrado sobre los infractores.\n\nA escala global, el tráfico de fauna es el tercer negocio ilícito más lucrativo del mundo: se matan cada año 100 tigres, 30.000 elefantes y más de 1.000 rinocerontes para comerciar con sus partes. En Europa, 1 de cada 3 especies en peligro crítico lo está por la amenaza de las especies exóticas invasoras.\n\nWWF trabaja también para que España incorpore a su legislación la Directiva europea de Delitos Ambientales (aprobada en mayo de 2024 pero aún sin transposición). El tráfico de madera ilegal, el robo de huevos de aves rapaces y la pesca ilegal también forman parte de esta agenda.", "dato": "<7% crímenes ambientales juzgados · 55.900 firmas #StopCrimenAmbiental · Veneno: 21.260 muertes confirmadas en 25 años (real: +200.000), 9.700 delitos · Tráfico global: 100 tigres, 30.000 elefantes, 1.000 rinocerontes/año · Directiva Delitos Ambientales UE pendiente de transposición", "categoria": "Justicia y defensa legal"}, {"emoji": "⚖️", "name": "Departamento Legal — El derecho como herramienta de defensa ambiental", "desc": "El Departamento Legal de WWF España utiliza los derechos reconocidos en el Convenio de Aarhus (acceso a la información, participación pública y acceso a la justicia ambiental) como herramienta estratégica de incidencia. En 2025 gestionó más de 80 acuerdos (consultorías, servicios, conservación y marketing) y 9 procesos de herencias y legados. Esta capacidad de actuar depende de la independencia financiera de WWF: son sus socios, no las administraciones públicas, quienes sostienen más de la mitad de su presupuesto. Esto le permite litigar incluso contra el propio Gobierno español.\n\nEn acceso a la información: solicitó a administraciones estatales y autonómicas datos sobre autorizaciones de control del lobo y aprovechamientos hi
