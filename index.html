 junio 2026", "captacion": {"resumen30": {"cifras": ["11.687.497", "323.063", "1.285.834"], "labels": ["personas atendidas en 2024 en España y en 41 países", "asistencias en la respuesta a la DANA de Valencia — la mayor recaudación de la historia de Cruz Roja: 112M€", "socios y empresas colaboradoras, junto a 231.236 voluntarios"], "cierre": "No es una organización que ayuda \"fuera\": es la red con más presencia en España, en tu barrio, en tu provincia, donde haga falta.", "videoDestacado": {"url": "https://www.youtube.com/watch?v=9UtC-1pIyTQ", "titulo": "Historia Extraordinaria — Adiós Soledad: Jerónima y Ramona", "duracion": "3:03"}}, "proyectosClave": [0, 1, 2], "argumentario": [0, 1, 2]}, "speech": {"parada": "Oye, ¿tienes un minuto y medio? Quiero contarte el día de alguien que no conoces, pero que seguro reconoces.", "discurso": "Imagina un día cualquiera, en cualquier ciudad de España.\n\nA las 8 de la mañana, una mujer de 84 años que vive sola tiene un mareo en su cocina. Lleva colgado al cuello un dispositivo: pulsa el botón, y en segundos contesta una persona real, que avisa a su hija y, si hace falta, a una ambulancia. Eso existe gracias a la teleasistencia de Cruz Roja — más de 132.000 personas mayores la tienen en España, 24 horas, 365 días al año.\n\nA las 10, en un hospital, hay un niño ingresado para una operación que le da miedo. Una voluntaria de Cruz Roja se sienta con él, juega, le hace el rato menos largo. El año pasado acompañaron así a más de 38.000 niños y niñas en hospitales de toda España.\n\nA mediodía, una persona que lleva ocho meses sin trabajo entra a una oficina de Cruz Roja. Allí le ayudan a actualizar su currículum, a practicar una entrevista — incluso con un simulador con inteligencia artificial — y a encontrar ofertas reales. El año pasado, más de 270.000 personas pasaron por estos programas de empleo.\n\nPor la tarde, una mujer que ha sufrido violencia de género recibe una llamada de seguimiento de su teleasistencia con GPS, que puede activar en cualquier momento si se siente en peligro. Más de 55.000 mujeres tienen acceso a este tipo de apoyo.\n\nY por la noche, alguien que no puede dormir por la ansiedad llama a un teléfono gratuito, y al otro lado hay una persona formada para escucharle. Casi 1,2 millones de personas recibieron apoyo de salud mental el año pasado.\n\nTodo esto, en un solo día, en España. Y detrás de cada una de estas historias hay una persona voluntaria — 231.236 en total — y 1.285.834 socios que hacen posible que esa red exista, funcione y llegue a tiempo.", "cierre": "Todo esto sigue pasando hoy, ahora mismo, mientras hablamos. Y solo sigue pasando porque hay gente que decide formar parte de esa red. Por unos 12 euros al mes — unos 140-150 al año — tú también puedes ser esa persona que, sin saberlo, hace que alguien hoy no esté solo. ¿Te apuntas?"}, "videos": [{"titulo": "Historia Extraordinaria — Adiós Soledad: Jerónima y Ramona", "tipo": "Testimonio de beneficiarias", "duracion": "3:03", "url": "https://www.youtube.com/watch?v=9UtC-1pIyTQ", "anio": "2021"}, {"titulo": "Historia Extraordinaria — José Ignacio, un ejemplo a seguir", "tipo": "Testimonio de beneficiario", "duracion": "3:22", "url": "https://www.youtube.com/watch?v=RZaE6SY2NNQ", "anio": "2025"}, {"titulo": "Historia Extraordinaria — Tengo una carta para ti", "tipo": "Testimonio emotivo — mayores y niños", "duracion": "4:36", "url": "https://www.youtube.com/watch?v=DLEjAxay7PU", "anio": "2023"}, {"titulo": "Historia Extraordinaria — Rafael, voluntario de Cruz Roja en Ponferrada", "tipo": "Testimonio de voluntario", "duracion": "3:39", "url": "https://www.youtube.com/watch?v=NcA4wuFrLPg", "anio": "2025"}, {"titulo": "Historia Extraordinaria — El voluntariado transforma a las personas", "tipo": "Testimonio de voluntariado", "duracion": "3:14", "url": "https://www.youtube.com/watch?v=sA7sofr0tRI", "anio": "2025"}, {"titulo": "Historia Extraordinaria — Mar y Dikra, evolución personal y profesional", "tipo": "Testimonio de beneficiarias", "duracion": "5:12", "url": "https://www.youtube.com/watch?v=H8c5sY6K7hQ", "anio": "2025"}, {"titulo": "Testimonio Vincúlate — Almudena", "tipo": "Testimonio breve — soledad no deseada", "duracion": "0:42", "url": "https://www.youtube.com/watch?v=1eSZgdPDdO0", "anio": "2025"}, {"titulo": "Así fue 2025 — Cruz Roja Española", "tipo": "Resumen anual de impacto", "duracion": "3:43", "url": "https://www.youtube.com/watch?v=UB37TXeUWac", "anio": "2025"}, {"titulo": "160 Aniversario de Cruz Roja Española", "tipo": "Spot institucional", "duracion": "2:45", "url": "https://www.youtube.com/watch?v=KZJyfrhdBdU", "anio": "2024"}], "ultimaActualizacion": "junio 2026"}</script>
<script type="application/json" id="data-wwf">{"id": "wwf", "emoji": "🐼", "nombre": "WWF", "full": "WWF España", "color": "#16a34a", "claim": "Fundada en España en 1968. Parte de la mayor red de conservación del planeta: +5 millones de socios en más de 100 países. En España: ~50.000 socios que financian el 53% del presupuesto.\n\nSu proyecto más antiguo, el Refugio de Rapaces de Montejo de la Vega, fue fundado en 1975 por Félix Rodríguez de la Fuente, cuando los buitres aún eran perseguidos como alimañas — el primer acuerdo de custodia del territorio de España.\n\nDel lince ibérico (2.663 ejemplares en 2025, rescatado del borde de la extinción) a Doñana, el lobo, los océanos y el clima. Las 3 metas globales de WWF para 2030: cero pérdida neta de especies y hábitats naturales, y reducir a la mitad tanto la huella ecológica como las emisiones de la humanidad.", "meta": [{"label": "Fundada en España", "val": "1968"}, {"label": "Socios España (último dato)", "val": "~50.000"}, {"label": "Socios en el mundo", "val": "+5 millones"}, {"label": "Lince ibérico 2025", "val": "2.663 ejemplares"}], "cifras": [{"num": "2.663", "label": "Linces ibéricos en 2025 (+10% vs 2024, censo 2025). A principios de siglo quedaban menos de 100. Es el mayor éxito de recuperación de un mamífero en toda Europa.", "fuente": "WWF España · web oficial junio 2026 / Censo lince ibérico 2025"}, {"num": "22,5%", "label": "De la superficie marina española está protegida (2025). El objetivo es el 30% en 2030. En paralelo, el Tratado Global de los Océanos (BBNJ) entró en vigor en enero de 2026, permitiendo crear áreas protegidas en alta mar.", "fuente": "WWF España · web oficial junio 2026"}, {"num": "+134 ha", "label": "De humedales restauradas en el entorno de Doñana en 2025 — los mayores proyectos ejecutados por WWF España hasta la fecha. En 2026 se aprobó LIFE HumedalES (2026-2036), el mayor proyecto de la historia del programa LIFE, para restaurar 26.200 ha más.", "fuente": "WWF España · Memoria de Conservación 2025"}, {"num": "73%", "label": "De reducción en poblaciones de vertebrados desde 1970 a escala mundial (Informe Planeta Vivo 2024). El planeta encadena 11 años consecutivos como los más cálidos. La temperatura ya está casi 1,5°C por encima de los niveles preindustriales.", "fuente": "WWF · Informe Planeta Vivo 2024 / Memoria Conservación 2025"}, {"num": "~50.000", "label": "Socios en España (parte de los +5 millones en todo el mundo), que financian el 53% del presupuesto anual de WWF España (~11M€). La independencia financiera es lo que permite llevar casos ante la Comisión Europea sin depender del Gobierno.", "fuente": "WWF España · transparencia económica / web oficial"}, {"num": "55.900", "label": "Firmas en la campaña #StopCrimenAmbiental. Menos del 7% de los crímenes ambientales son juzgados en España. WWF actúa en vía penal contra el uso de veneno, el furtivismo y el tráfico de especies.", "fuente": "WWF España · Memoria de Conservación 2025 / web oficial"}], "programas": [{"emoji": "🐆", "name": "Lince ibérico y Refugio de Montejo — de 100 a 2.663 ejemplares", "desc": "El lince ibérico es el mayor éxito de recuperación de un mamífero en toda Europa. A principios de los años 2000 quedaban menos de 100 ejemplares — el felino más amenazado del mundo.\n\nEn 2025 son 2.663 (+10% vs 2024, censo oficial), con poblaciones confirmadas en Andalucía, Extremadura, Castilla-La Mancha, Castilla y León, y Portugal, y una nueva área aprobada en Aragón en 2025. El proyecto LIFE LynxConnect garantiza la continuidad del esfuerzo a largo plazo. En 2025 se publicó también el primer censo ibérico del conejo de monte, especie clave de la que depende el felino como presa principal.\n\nVinculado al lince está el Refugio de Rapaces de Montejo de la Vega (Segovia), el proyecto de conservación más longevo de WWF España: fundado el 13 de enero de 1975 por Félix Rodríguez de la Fuente junto con la población local de Montejo, cuando los buitres aún eran considerados alimañas perseguidas. Fue el primer acuerdo de custodia del territorio de España — un modelo pionero replicado en todo el país.\n\nEn la temporada 2025 se registraron 857 parejas de buitre leonado: la colonia más importante de España y de Europa. También 11 parejas de alimoche, estables desde los años 90.\n\nEl Parque Natural de las Hoces del Río Riaza (5.185 ha, 2004) amplía la protección del área. El Bosque WWF, cerca de la Rinconada, está dedicado a las personas que han dejado un legado solidario para la naturaleza.", "dato": "2.663 linces (+10%, censo 2025) · 6 CCAA + Portugal · LIFE LynxConnect · Refugio Montejo: 857 parejas buitre (mayor colonia de Europa) · 1975 Félix Rodríguez de la Fuente · Primer custodia del territorio de España"}, {"emoji": "⚡", "name": "Clima y Energía — Única ONG en el Consejo de Finanzas Sostenibles", "desc": "El planeta encadena once años consecutivos como los más cálidos, con una temperatura media de casi 1,5°C por encima de los niveles preindustriales. Las concentraciones de gases de efecto invernadero siguen aumentando y la ciencia advierte que ya hemos superado el límite del 1,5°C que fijaban los estudios. En Europa, el calentamiento avanza más rápido que la media global, intensificando olas de calor, sequías e incendios en el sur del continente.\n\nEl Programa de Clima y Energía trabaja para mantener la senda compatible con 1,5ºC en un contexto de repliegue regulatorio en Europa. En 2025, WWF España presentó su documento 'Senda 1,5ºC compatible con la naturaleza' ante Red Eléctrica (REDEIA) para alinear la planificación de redes con criterios climáticos y de biodiversidad. Lanzó RE-EVALÚA, herramienta pionera para evaluar proyectos renovables con criterios ambientales y sociales, e inició el proyecto europeo LIFE REALS (2025-2028), orientado a redirigir el despliegue renovable hacia suelos artificiales.\n\nEn el ámbito financiero, WWF España es la única ONG participante en el Consejo de Finanzas Sostenibles (CFS) creado en 2025, y mantiene interlocución con el Banco de España, CNMV y otros supervisores para integrar riesgos climáticos y de biodiversidad en la regulación financiera (informe SUSREG 2025).\n\nTambién organizó la movilización en Madrid en el marco de la COP30 bajo el lema 'El clima exige acción, el futuro exige esperanza'. WWF defendió activamente los marcos europeos (taxonomía, diligencia debida) frente al paquete Ómnibus de la Comisión Europea.\n\nEn 2025, WWF España lideró el manifiesto contra el cluster eólico del Maestrazgo, en coordinación con las principales organizaciones ecologistas y actores territoriales, defendiendo que la transición energética debe hacerse respetando la biodiversidad y sin colonizar espacios naturales de alto valor.\n\nEn abril de 2026, WWF España participó en la primera Conferencia sobre la Transición para Abandonar los Combustibles Fósiles (Santa Marta, Colombia), que marcó un hito político clave en el camino hacia la eliminación de los fósiles. En mayo de 2026, WWF publicó el informe \"Rumbo a la Resiliencia Hídrica\", que establece que los impactos de la crisis climática relacionados con el agua son uno de los principales riesgos para la estabilidad financiera mundial en España.", "dato": "'Senda 1,5ºC' ante REDEIA · RE-EVALÚA · LIFE REALS (2025-2028) · Única ONG en Consejo Finanzas Sostenibles · SUSREG 2025 · Movilización COP30 Madrid · 1,5ºC ya superado · Conferencia Santa Marta abono combustibles fósiles (abr. 2026) · Resiliencia hídrica: riesgo financiero España · Maestrazgo: manifiesto contra cluster eólico"}, {"emoji": "💧", "name": "Agua — Doñana, Tablas de Daimiel y robo de agua", "desc": "El agua dulce es vital para animales, plantas y personas, pero desde 1970 se ha perdido más del 80% de la biodiversidad en los ecosistemas de agua dulce a escala global. En Europa, el 60% de los ríos, humedales y acuíferos están en mal estado. En España, cerca del 80% del agua consumida va a la agricultura de regadío intensiva, un modelo que ignora los límites de los recursos disponibles y acelera la desertificación.\n\nEl programa de Agua de WWF trabaja en cuatro líneas: ahorro de agua en la agricultura (regadío sostenible), ríos vivos y libres (restauración de riberas y caudales), sequía y desertificación (causas estructurales, no solo climáticas), y humedales (España es el país de Europa con mayor diversidad de humedales).\n\nDos casos emblemáticos: Doñana (robo de agua por riego ilegal, detectado por satélite, y restauración de más de 134 ha de humedales en 2025) y Tablas de Daimiel (la Confederación reconoció la necesidad de retirar 100.000 ha de regadío).\n\nEn junio de 2026, WWF alertó de que el salmón atlántico ha caído un 82% en una sola década y más de la mitad de su hábitat histórico es hoy inaccesible por presas.\n\nEn 2026 se aprobó el proyecto LIFE HumedalES (2026-2036), el mayor proyecto de la historia del programa LIFE: 26.200 ha en 107 espacios Natura 2000 de las 17 comunidades autónomas, liderado por España, para impulsar el Plan de Restauración de Humedales de España, con WWF España como uno de los socios ejecutores.\n\nEl Mar Menor es uno de los casos más emblemáticos del fracaso de la gestión del agua en España: una laguna salada de 135 km² que sufrió un episodio catastrófico de eutrofización en 2019 causado por el exceso de nitratos procedentes de la agricultura intensiva de regadío. Miles de peces muertos en sus orillas. WWF trabaja en su recuperación y en la aplicación de la legislación que obliga a reducir la contaminación agrícola, frente a las presiones del sector del regadío.", "dato": "+134 ha humedales Doñana · -15% dotaciones riego La Rocina · 100.000 ha regadío a retirar en Tablas Daimiel · 80% agua → agricultura regadío · Salmón atlántico: -82% en una década · LIFE HumedalES 2026-2036 · Mar Menor: 135 km² devastados por nitratos agrícolas"}, {"emoji": "🔥", "name": "Incendios forestales — 20 años de análisis, la 6ª generación ya está aquí", "desc": "WWF lleva más de 20 años estudiando las causas y buscando soluciones a los incendios forestales en España — con una biblioteca de informes que constituye el análisis más sólido y continuado sobre esta problemática. La conclusión es contundente: España es buena apagando incendios (el 65% se extinguen en fase de conato, menos de 1 ha) pero no en evitarlos. No se invierte en dar vida a los montes para que no ardan — y los bosques se han convertido en 'bombas de relojería'.\n\n2025 fue el peor año de incendios forestales de los últimos dos siglos en España: ardieron 392.000 ha, con 8 víctimas mortales, 79 personas heridas y más de 42.000 evacuadas de sus viviendas. El número total de siniestros bajó (7.451, frente a una media de 8.430 en la última década), pero los Grandes Incendios Forestales (GIF, más de 500 ha) se dispararon a 65 —frente a una media de solo 21 en los últimos 20 años— y concentraron el 87,5% de toda la superficie quemada. Llegó a haber hasta 18 GIF activos al mismo tiempo. El noroeste de España concentró el 80% de la superficie quemada (León 30%, Ourense 29%, Zamora y Cáceres 10% cada una), y un 45% de la zona afectada tenía alguna figura de protección ambiental.\n\nLos incendios de 6ª generación son más grandes, más feroces e incontrolables: ya no se pueden apagar con los medios y métodos tradicionales. Solo la prevención — gestión del monte, desbroces, cultivos de proximidad, uso tradicional del territorio — puede evitar que sean tan devastadores. En 2025 se aprobó el Real Decreto 716/2025 (26 de agosto), que establece directrices comunes de prevención para todas las CCAA — un avance estructural impulsado en parte por la presión de WWF. En mayo de 2026, la Semana de Acción por la Naturaleza activó cerca de 30 iniciativas de restauración post-incendio en toda España.\n\nEn noviembre de 2025, WWF publicó el informe 'Restauración de zonas incendiadas', que propone la restauración ecológica como pieza central de la prevención futura — no basta con apagar el fuego, hay que transformar el paisaje hacia modelos más resilientes antes de que vuelva a arder. WWF urge al Ministerio para la Transición Ecológica y a las Comunidades Autónomas a aprobar sin demora el Plan Nacional de Restauración de la Naturaleza, con financiación firme y participación real.", "dato": "392.000 ha quemadas en 2025, el peor año en 200 años · 8 víctimas mortales, 79 heridos, 42.000 evacuados · 65 Grandes Incendios Forestales (media histórica: 21) = 87,5% de la superficie · Noroeste 80% (León, Ourense, Zamora, Cáceres) · RD 716/2025 · Informe 'Restauración de zonas incendiadas' (nov. 2025)"}, {"emoji": "🌳", "name": "Restauración forestal y gestión sostenible — FSC, LIFE y dehesas", "desc": "En España, los bosques solo ocupan el 29% de la superficie que podrían ocupar, y la mayoría no se encuentra en buen estado. A escala global, hemos perdido dos tercios de los bosques en 10.000 años.\n\nEl programa de Restauración de WWF actúa en dos frentes: frenar la deforestación (incluida la deforestación importada — la soja, el aceite de palma y la carne que consumimos arrazan bosques tropicales) y restaurar activamente los ecosistemas forestales degradados.\n\nEn 2025, WWF ejecutó acciones de restauración en 20 localizaciones prioritarias en varias comunidades autónomas, con seguimiento post-ejecución de hasta 5 años en colaboración con la UPM. Junto a FSC España y Dendron, certificó cerca de 10.000 ha de montes privados en Cuenca y Guadalajara bajo criterios de gestión forestal responsable.\n\nEl proyecto eco-hidrológico del río Mijares (en colaboración con Allianz, para restaurar los daños de la DANA) y el laboratorio rural Rural Labscape combinan restauración, resiliencia climática y economía local.\n\nLa Alianza por la Restauración, con 30 organizaciones, mantiene activo el Plan Nacional de Restauración. WWF también defiende la Ley de Restauración de la UE frente al paquete Ómnibus, que busca debilitar los marcos de restauración europeos.", "dato": "Bosques: solo 29% superficie potencial en España · 20 localizaciones restauración 2025 · ~10.000 ha FSC · Río Mijares restauración post-DANA · 30 organizaciones Alianza Restauración · Ley Restauración UE defendida"}, {"emoji": "🐟", "name": "Pesca sostenible y áreas marinas protegidas — 22,5% del mar protegido", "desc": "España tiene el 22,5% de su superficie marina protegida, avanzando hacia el objetivo del 30% en 2030. En enero de 2026 entró en vigor el Tratado Global de los Océanos (BBNJ), ratificado por España, que abre la posibilidad histórica de crear áreas marinas protegidas en alta mar y exigir evaluaciones de impacto para nuevas actividades como la minería submarina.\n\nEl Parque Nacional marino del Mar de las Calmas (El Hierro) avanza hacia su tramitación parlamentaria — sería el primer Parque Nacional 100% marino de España. El proyecto LIFE INTEMARES es el mayor proyecto de conservación marina en Europa, con gestión participativa de la Red Natura 2000 marina española.\n\nEn cuanto a la pesca, el informe CGPM-FAO 2025 reflejó una mejora clara en el Mediterráneo: +25% de biomasa, -50% de mortalidad por pesca, y descenso de la sobrepesca del 80% al 50% en una década.\n\nLa pesca ilegal sigue siendo un problema grave: puede superar el 40% de las capturas en algunas pesquerías. España y Europa han tomado la delantera regulando contra esta práctica. WWF trabaja también con pescadores artesanales en procesos de cogestión, donde ellos son los protagonistas y guardianes del mar. La moratoria a la minería submarina — una actividad con impactos potencialmente devastadores sobre los fondos marinos — es otra de las líneas de defensa del programa.", "dato": "22,5% mar protegido en España (meta 30% en 2030) · Tratado BBNJ en vigor enero 2026 · Parque Nacional Mar de las Calmas (tramitación) · LIFE INTEMARES · +25% biomasa Mediterráneo · Pesca ilegal: hasta 40% capturas · No a la minería submarina"}, {"emoji": "🐋", "name": "Especies marinas — corales, cetáceos, tiburones y tortugas", "desc": "El proyecto LIFE ECOREST devolvió al mar en 2025 más de 8.000 colonias de organismos estructurantes — corales, gorgonias y plumas de mar — en la costa catalana, en colaboración directa con el sector pesquero. Es uno de los proyectos de restauración marina más ambiciosos de Europa. La campaña del velero Blue Panda de WWF recibió más de 500 visitantes en puntos de información y participación directa de alumnado y familias.\n\nEn Baleares, las poblaciones de rayas han recuperado niveles de abundancia comparables a los años 60 — una de las señales más claras de que las medidas de gestión pesquera basadas en ciencia funcionan. En mayo de 2026 se creó un Grupo de Trabajo específico para reducir las velocidades de los barcos en el Corredor de Migración de Cetáceos del Mediterráneo, para mitigar las colisiones del transporte marítimo con cetáceos.\n\nEl proyecto CetAMBICion documenta incrementos de densidad de delfines en áreas ibéricas y estima poblaciones de especies clave. Canarias es el enclave más importante de Europa para ballenas y delfines, con hasta 29 taxones de cetáceos presentes en sus aguas; allí, WWF impulsa desde 2017 la campaña por el Parque Nacional Mar de las Calmas (El Hierro), que avanza hacia su tramitación parlamentaria y sería el primer Parque Nacional 100% marino de España.\n\nWWF trabaja también en la protección de tiburones y rayas, tortugas marinas y ballenas, logrando decisiones en convenios internacionales que amplían la cobertura de protección y control del comercio de estas especies. El tratado global contra la contaminación por plásticos, aplazado a 2026 por presiones de los países productores de petróleo, es otra de las batallas pendientes.", "dato": "LIFE ECOREST: 8.000+ colonias devueltas al mar · Blue Panda: 500 visitantes · Rayas Baleares: niveles años 60 · Canarias: enclave más importante de Europa para ballenas y delfines — hasta 29 taxones estrictamente protegidos · Parque Nacional Mar de las Calmas (El Hierro): campaña desde 2017, tramitación en curso · Grupo trabajo cetáceos Mediterráneo (mayo 2026) · CetAMBICion · Tiburones, tortugas, ballenas · Tratado plásticos: aplazado a 2026"}, {"emoji": "🌾", "name": "Alimentos — Ley de Desperdicio Alimentario aprobada en 2025", "desc": "El sistema alimentario es responsable del 26% de las emisiones de gases de efecto invernadero y del 75% de la deforestación mundial. Lo que comemos tiene un impacto directo en el planeta: los cultivos de soja para pienso animal arrasan la Amazonía; el aceite de palma destruye selvas tropicales; el exceso de regadío intensivo esquilma acuíferos como el de Doñana.\n\nEl programa de Alimentos de WWF trabaja en cuatro ejes: una PAC (Política Agraria Común) más verde y justa, producción sostenible (el problema no es escasez sino una producción mal planteada), consumo sostenible y reducción del desperdicio alimentario.\n\nEn 2025 se aprobó la Ley de Prevención de Pérdidas y Desperdicio Alimentario tras años de trabajo de WWF con la campaña #LeySinDesperdicio.\n\nEn abril de 2026 se lanzó el Proyecto FARO (Fincas Agroecológicas para la Resiliencia y el Territorio) en Doñana, una red de fincas que demuestra que otro modelo agrario es posible, junto a Agricultores Puerta Doñana y SEAE.\n\nWWF también trabaja en la ganadería extensiva (dehesas, pastoreo), la reducción de pesticidas y el apoyo a la dieta saludable y sostenible. En mayo de 2026, el evento \"40 años de España en la UE: entender la PAC\" reunió a más de 130 asistentes para analizar el futuro de la Política Agraria Común.", "dato": "Ley Desperdicio Alimentario 2025 (#LeySinDesperdicio) · Proyecto FARO Doñana 2026 · 26% emisiones GEI y 75% deforestación mundial → sistema alimentario · PAC verde y justa · PorOtraPAC"}, {"emoji": "🐺", "name": "Lobo y grandes carnívoros — la batalla política de 2026", "desc": "En la Península Ibérica habitan tres de los cinco grandes carnívoros europeos: el oso pardo, el lobo ibérico y el lince ibérico. Un privilegio ecológico que conlleva una responsabilidad política enorme.\n\nEl lobo ibérico es el más conflictivo: en 2025, su censo confirma un incremento del 12% de manadas en la última década. Sin embargo, las comunidades autónomas presionan para rebajar su nivel de protección.\n\nWWF exige que España mantenga el estado de conservación desfavorable del lobo en su informe a la Comisión Europea, rechazando las presiones autonómicas para facilitar sus controles. El Departamento Legal de WWF mantiene acciones en Galicia, Asturias, La Rioja y Cantabria, y ha interpuesto recurso de inconstitucionalidad ante el Defensor del Pueblo.\n\nEl desmán ibérico fue declarado en 2025 en situación crítica de extinción, impulsando el proyecto LIFE SAVE Desmán. El visón europeo está amenazado por el visón americano, incluido en 2025 en la lista europea de especies invasoras.\n\nWWF también lanzó en 2026 el proyecto ODISEC, una plataforma digital para unificar y digitalizar el seguimiento del ciervo, el corzo y la perdiz roja en España, financiada por la Fundación Biodiversidad, con el objetivo de dar a las administraciones datos actualizados y comparables sobre el estado de estas especies hasta 2027.", "dato": "Lobo: +12% manadas en una década · Acciones legales en 4 CCAA · Recurso Defensor del Pueblo · Desmán ibérico: situación crítica 2025 · Visón americano: lista invasoras UE 2025 · Proyecto ODISEC (2026): seguimiento digital ciervo/corzo/perdiz"}, {"emoji": "🦅", "name": "Crimen ambiental y tráfico de especies — menos del 7% se juzga", "desc": "Los delitos contra la fauna salvaje son uno de los problemas más graves en la conservación de la biodiversidad — y uno de los menos visibles. En España, menos del 7% de los crímenes ambientales son juzgados.\n\nEl veneno es el 'asesino silencioso' de la fauna protegida: mata a águilas imperiales, buitres negros, lobos y muchas otras especies, frecuentemente colocado de forma intencionada. La campaña #StopCrimenAmbiental lleva 55.900 firmas recogidas. WWF se persona en procesos penales por veneno y furtivismo con efecto disuasorio demostrado sobre los infractores.\n\nA escala global, el tráfico de fauna es el tercer negocio ilícito más lucrativo del mundo: se matan cada año 100 tigres, 30.000 elefantes y más de 1.000 rinocerontes para comerciar con sus partes. En Europa, 1 de cada 3 especies en peligro crítico lo está por la amenaza de las especies exóticas invasoras.\n\nWWF trabaja también para que España incorpore a su legislación la Directiva europea de Delitos Ambientales (aprobada en mayo de 2024 pero aún sin transposición). El tráfico de madera ilegal, el robo de huevos de aves rapaces y la pesca ilegal también forman parte de esta agenda.", "dato": "<7% crímenes ambientales juzgados · 55.900 firmas #StopCrimenAmbiental · Veneno: águila imperial, buitre, lobo · Tráfico global: 100 tigres, 30.000 elefantes, 1.000 rinocerontes/año · Directiva Delitos Ambientales UE pendiente de transposición"}, {"emoji": "🤝", "name": "Participación y Voluntariado — Red de Grupos Locales en +10 CCAA", "desc": "El Programa de Participación es el músculo social de WWF: conecta la agenda ambiental global con el territorio a través de voluntarios, grupos locales y campañas ciudadanas. La Red de Grupos Locales de WWF España tiene presencia activa en 12 grupos activos en toda España y en 2025 se reforzó con encuentros presenciales y online, un nuevo Plan de Formación continua con microformaciones mensuales en colaboración con los programas de conservación, y acompañamiento directo para impulsar nuevos proyectos locales.\n\nEl programa estatal de voluntariado en Parques Nacionales (OAPN) tiene alta participación en espacios como Cabañeros, Islas Atlánticas o Sierra de Andújar. El Plan Allen desarrolla actividades de restauración, ciencia ciudadana y educación ambiental en el entorno de Doñana, combinando impacto ambiental directo con implicación comunitaria.\n\nLas campañas en red más destacadas de 2025 fueron la Plantación en Red, La Hora del Planeta y Walking Rivers. El voluntariado participó activamente en movilizaciones climáticas (COP30 en Madrid, bajo el lema 'El clima exige acción, el futuro exige esperanza') y en defensa del lobo.\n\nEl programa también explora la educación ambiental, la ciencia ciudadana y el trabajo con jóvenes, participando en el Congreso Internacional de Educación Ambiental y el proceso del PAEAS. Los campamentos juveniles de naturaleza de WWF tienen su origen en el Refugio de Montejo, donde desde 1975 generaciones de jóvenes han aprendido conservación sobre el terreno.\n\nEl programa de Ciencia Ciudadana permite a cualquier persona contribuir con datos reales a los proyectos de seguimiento de biodiversidad de WWF: censos de fauna, inventarios de flora, detección de especies invasoras y monitoreo de hábitats.", "dato": "12 Grupos Locales en toda España · Plantación en Red · Hora del Planeta · Walking Rivers · Plan Allen Doñana · Movilización COP30 Madrid · Campamentos juveniles (origen Montejo 1975) · Ciencia ciudadana"}, {"emoji": "⚖️", "name": "Departamento Legal — El derecho como herramienta de defensa ambiental", "desc": "El Departamento Legal de WWF España utiliza los derechos reconocidos en el Convenio de Aarhus (acceso a la información, participación pública y acceso a la justicia ambiental) como herramienta estratégica de incidencia. En 2025 gestionó más de 80 acuerdos (consultorías, servicios, conservación y marketing) y 9 procesos de herencias y legados.\n\nEn acceso a la información: solicitó a administraciones estatales y autonómicas datos sobre autorizaciones de control del lobo y aprovechamientos hidráulicos, reforzando la transparencia pública y la base jurídica de las posiciones de WWF.\n\nEn justicia ambiental, el departamento actúa en múltiples niveles: ante la Comisión Europea (comunicación sobre el deslinde de Doñana que derivó en la apertura de un procedimiento investigatorio por la DG Medio Ambiente); ante el Tribunal Supremo, la Audiencia Nacional y Tribunales Superiores de Justicia (litigios en biodiversidad, agua y energía — incluido el caso del lobo, ver Programa de Lobo y Grandes Carnívoros); en vía penal (personación en casos de veneno, furtivismo y tráfico de especies protegidas — ver Programa de Crimen Ambiental para más detalle); y ante el Defensor del Pueblo (recurso de inconstitucionalidad por la desprotección del lobo).\n\nEl departamento también ha intervenido en debates regulatorios europeos frente al paquete Ómnibus, que amenaza marcos clave como la taxonomía verde y la diligencia debida.", "dato": "Convenio de Aarhus · Caso Doñana → procedimiento DG Medio Ambiente UE · Lobo: litigios en Galicia, Asturias, La Rioja y Cantabria · Ámbito penal: veneno y furtivismo · 9 herencias · +80 acuerdos"}], "fondos": [{"label": "Proyectos y actividades de conservación — incluye campañas, sensibilización, captación de fondos y gastos de actividad (~6,4M€)", "pct": 66}, {"label": "Personal especializado — científicos, abogados, técnicos de conservación, comunicación y administración (~3,2M€)", "pct": 29}, {"label": "Inversiones, inmovilizado y otros (~0,5M€)", "pct": 5}], "web": "https://www.wwf.es", "problema": "El planeta ha perdido el 73% de sus poblaciones de vertebrados (mamíferos, aves, peces, anfibios y reptiles) desde 1970, según el Informe Planeta Vivo 2024 — la naturaleza se está vaciando a un ritmo sin precedentes en la historia humana. Al mismo tiempo, el planeta encadena ya 11 años consecutivos como los más cálidos jamás registrados, con la temperatura global casi 1,5°C por encima de los niveles preindustriales.\n\nEsto no es un problema lejano ni afecta solo a la fauna salvaje: la degradación de los ecosistemas compromete el agua que bebemos, los alimentos que producimos, la polinización de los cultivos y la capacidad del planeta para amortiguar fenómenos extremos.\n\nEn España, esa crisis tiene nombres concretos: el Mar Menor — la laguna salada más grande de Europa Occidental, 135 km² — colapsó en 2019 por la eutrofización causada por nitratos de la agricultura intensiva, con miles de peces muertos. Doñana sufre un robo sistemático de agua de sus acuíferos. Y menos del 7% de los crímenes ambientales que se denuncian en España llegan a juzgarse.\n\nWWF trabaja con un objetivo claro para 2030: frenar a cero la pérdida neta de especies y hábitats, y reducir a la mitad tanto la huella ecológica como las emisiones de la humanidad.", "motivosSocio": ["La prueba de que sí se puede revertir: a principios de siglo, el lince ibérico era el felino más amenazado del mundo, con menos de 100 ejemplares. En 2025 son 2.663 — el mayor éxito de recuperación de un mamífero en toda Europa, con nuevas poblaciones en seis comunidades autónomas y Portugal. No es un caso aislado: es la prueba de que la conservación funciona cuando hay financiación sostenida.", "Independencia total, sin depender de gobiernos ni empresas: los ~50.000 socios en España (parte de los +5 millones en el mundo) financian el 53% del presupuesto anual de WWF España (~11M€). Esa independencia es lo que permite a WWF llevar casos contra el propio Gobierno español ante la Comisión Europea cuando incumple normativa ambiental — algo que una organización dependiente de subvenciones públicas no podría permitirse.", "Tecnología al servicio de la defensa del territorio: WWF detecta el robo de agua en acuíferos sobreexplotados mediante imágenes satelitales, una metodología que ya están adoptando administraciones públicas. En 2025 consiguió que se acordara una reducción del bombeo ilegal en el entorno de Doñana — algo que llevaba décadas sin resolverse por vías convencionales.", "El mar también se recupera cuando se le deja: en Baleares, las poblaciones de rayas han vuelto a niveles de abundancia comparables a los años 60 — una de las señales más claras de que la gestión pesquera basada en ciencia funciona. La biomasa pesquera en el Mediterráneo ha crecido más de un 25% en zonas con medidas de protección. España ya protege el 22,5% de su superficie marina, camino del 30% en 2030, y desde enero de 2026 el Tratado Global de los Océanos permite por primera vez crear áreas protegidas en alta mar.", "51 años de historia con raíces en la conservación española: el Refugio de Rapaces de Montejo de la Vega fue fundado el 13 de enero de 1975 por Félix Rodríguez de la Fuente, cuando los buitres todavía eran perseguidos por la administración. Más de cinco décadas después, esa misma filosofía — proteger antes de que sea demasiado tarde — sigue guiando programas como la restauración de Doñana o la recuperación del lince."], "fuentesCompletas": [{"texto": "WWF España · Memoria de Conservación 2025 (documento principal de esta ficha)", "url": "https://wwfes.awsassets.panda.org/downloads/resumen-memoria-2025.pdf"}, {"texto": "WWF · Informe Planeta Vivo 2024", "url": "https://www.wwf.es/nuestro_trabajo/informe_planeta_vivo_ipv/informe_planeta_vivo_2024_resolver_la_crisis/"}, {"texto": "WWF España · Bosques: Incendios forestales", "url": "https://www.wwf.es/nuestro_trabajo/bosques/incendios_forestales_/"}, {"texto": "WWF España · WWF urge a impulsar una restauración eficaz de zonas afectadas por incendio (nov. 2025, cifras de la temporada 2025 e informe 'Restauración de zonas incendiadas')", "url": "https://www.wwf.es/?72300/WWF-urge-a-impulsar-una-restauracion-eficaz-de-zonas-afectadas-por-incendio-para-construir-paisajes-menos-vulnerables-a-la-crisis-climatica"}], "verificado": "Datos verificados junio 2026", "captacion": {"resumen30": {"cifras": ["2.663", "73%", "22,5%"], "labels": ["linces ibéricos en 2025 — de menos de 100 a principios de siglo: el mayor éxito de conservación de un mamífero en Europa", "de reducción en poblaciones mundiales de vertebrados desde 1970 — estamos en plena 6.ª extinción masiva", "del mar español protegido en 2025, camino del 30% en 2030 — y desde enero de 2026 el Tratado Global de los Océanos permite crear áreas protegidas en alta mar"], "cierre": "WWF trabaja con un objetivo claro para 2030: frenar a cero la pérdida neta de especies y hábitats, y reducir a la mitad la huella ecológica y las emisiones de la humanidad.", "videoDestacado": {"url": "https://www.youtube.com/watch?v=DlMfJPCXrpA", "titulo": "WWF Informe Planeta Vivo 2024 — La naturaleza está desapareciendo", "duracion": "1:28"}}, "proyectosClave": [0, 1, 2], "argumentario": [0, 1, 2]}, "speech": {"parada": "¿Tienes un minuto y medio? Te voy a contar cómo podría ser un día normal, dentro de 20 años, si nada cambia.", "discurso": "Imagina un día cualquiera de verano, dentro de 20 años, en una ciudad española.\n\nHace tanto calor que salir a la calle a partir de las 11 de la mañana no es seguro para muchas personas — el planeta ya lleva 11 años consecutivos siendo el más cálido jamás registrado, casi 1,5 grados por encima de lo normal, y la tendencia no se ha revertido. En el supermercado, ciertos alimentos —frutas, verduras, pescado— son más caros y más irregulares, porque las cosechas dependen de un clima que cada año es menos predecible, y porque el sistema alimentario actual ya es responsable del 26% de las emisiones mundiales. En las noticias, otro incendio forestal ha obligado a evacuar un pueblo — en 2025 ya ardieron más de 390.000 hectáreas solo en España, y los bosques, que ya cubren menos de un tercio de la superficie que podrían ocupar, siguen reduciéndose. Y cuando hay restricciones de agua, no es solo \"culpa de la sequía\": el 80% del agua de zonas como Doñana ya se destina al regadío agrícola, y ríos y lagunas enteras —como el Mar Menor, la más grande de Europa Occidental— han colapsado por la contaminación, con miles de peces muertos.\n\nNada de esto es ciencia ficción. Es, literalmente, la proyección de lo que ya está pasando, si simplemente seguimos igual.\n\nPero hay buenas noticias: nada de esto está cerrado todavía. España ya protege el 22,5% de su superficie marina, camino del 30% en 2030. En 2025 se aprobó una ley para reducir el desperdicio de alimentos. Y en Doñana, en 2025, se restauraron 134 hectáreas de humedales — el mayor proyecto de este tipo hasta ahora — con un nuevo plan de 3,3 millones de euros para la próxima década. La diferencia entre el día que acabo de describir y un día normal, sin sobresaltos, depende de cuánto y cuán rápido se haga esto.", "cierre": "WWF trabaja en todos esos frentes a la vez — clima, agua, alimentación, incendios — y lo hace sin depender de gobiernos ni empresas: sus ~50.000 socios en España financian más de la mitad de su presupuesto, lo que le permite actuar incluso contra el propio Gobierno cuando hace falta. Por unos 12 euros al mes — unos 140-150 al año — formas parte de quienes están evitando que ese día de dentro de 20 años sea así. ¿Te animas?"}, "fondosNota": "Nota: el desglose de WWF España clasifica gastos por naturaleza contable. La captación de fondos y la administración están distribuidas dentro de las categorías de personal y actividades. Fuente: Presupuesto y cuentas auditadas WWF España.", "videos": [{"titulo": "Tres años, 400 hectáreas y un objetivo: recuperar Doñana", "tipo": "Documental de proyecto", "duracion": "3:08", "url": "https://www.youtube.com/watch?v=ej2-uFXXhag", "anio": "2025"}, {"titulo": "Los momentazos de Territorio Lince 2025", "tipo": "Resumen del año — lince ibérico", "duracion": "1:16", "url": "https://www.youtube.com/watch?v=SmY4YhgwR_Q", "anio": "2025"}, {"titulo": "Restaurando el mar: el proyecto LIFE ECOREST devuelve la vida al Mediterráneo", "tipo": "Documental de proyecto marino", "duracion": "1:55", "url": "https://www.youtube.com/watch?v=-96VcCnB-Hw", "anio": "2024"}, {"titulo": "Restaurando el Humedal de Las Islillas", "tipo": "Documental de proyecto", "duracion": "2:37", "url": "https://www.youtube.com/watch?v=J490SUmJNXk", "anio": "2025"}, {"titulo": "WWF Informe Planeta Vivo 2024 — La naturaleza está desapareciendo", "tipo": "Informe de impacto global", "duracion": "1:28", "url": "https://www.youtube.com/watch?v=DlMfJPCXrpA", "anio": "2024"}, {"titulo": "Nuevo Informe: Incendios Forestales 2025", "tipo": "Informe de urgencia — incendios", "duracion": "1:30", "url": "https://www.youtube.com/watch?v=PhkhXLOwD7c", "anio": "2025"}, {"titulo": "La fuerza del grupo — Grupos Locales WWF España", "tipo": "Spot de voluntariado", "duracion": "1:34", "url": "https://www.youtube.com/watch?v=ANmbFgFsA38", "anio": "2025"}, {"titulo": "Día de la Tierra 2024 — Alimentación sostenible", "tipo": "Divulgación — sistema alimentario", "duracion": "4:49", "url": "https://www.youtube.com/watch?v=5Yi9vnTdMzc", "anio": "2024"}], "ultimaActualizacion": "junio 2026"}</script>
<script type="application/json" id="data-fjc">{"id": "fjc", "emoji": "🩸", "nombre": "FJC", "full": "Fundación Josep Carreras contra la Leucemia", "color": "#7c3aed", "claim": "Fundada en 1988 por Josep Carreras, tenor superviviente de una leucemia que en 1987 le devolvió la vida un trasplante de médula ósea.\n\nDesde entonces, la Fundación cubre todo el recorrido de la enfermedad: gestiona el REDMO —único registro oficial de donantes de médula de España, por mandato del Ministerio de Sanidad—, impulsa investigación a través del Instituto de Investigación contra la Leucemia Josep Carreras, y acompaña a pacientes y familias.\n\n520.508 donantes activos. 5.º registro de Europa.", "meta": [{"label": "Fundada", "val": "1988 (REDMO: 1991)"}, {"label": "Donantes REDMO", "val": "520.508 (5.º Europa / 13.º mundo)"}, {"label": "Socios FJC", "val": "149.867 activos"}, {"label": "Probabilidad compatibilidad", "val": "1 entre 3.500"}], "cifras": [{"num": "520.508", "label": "Donantes activos en el REDMO a 31 dic. 2025 (eran 505.505 en 2024). España es el 5.º registro de Europa y el 13.º del mundo.", "fuente": "REDMO · Memoria de Impacto 2025 / FJC Memoria 2024"}, {"num": "481", "label": "Donaciones efectivas en 2025 (+14% vs 2024). En 2024 fueron 426. En 2012, cuando empezó el REDMO, solo se realizaban 35 al año.", "fuente": "REDMO · Memoria de Impacto 2025"}, {"num": "794", "label": "Trasplantes coordinados para pacientes en España en 2025. En 2024 fueron 748 (+18% vs 2023). Desde 1991 se han coordinado 15.435 trasplantes.", "fuente": "REDMO · Memoria de Impacto 2025 / Ministerio de Sanidad-ONT, 1 mayo 2026"}, {"num": "26 días", "label": "Mediana de búsqueda de donante compatible en 2025 (27 días en 2024). El 84% de los pacientes encuentra donante antes de 60 días.", "fuente": "REDMO · Memoria de Impacto 2025"}, {"num": "149.867", "label": "Socios activos de la Fundación Josep Carreras en 2024, con una cuota media de 38,23€. A punto de alcanzar los 150.000.", "fuente": "FJC · Memoria de Actividades 2024"}, {"num": "60.886", "label": "Unidades de sangre de cordón umbilical en el REDMO (2025). España es el 1.º de Europa y 3.º del mundo en unidades disponibles.", "fuente": "REDMO · Memoria de Impacto 2025"}], "programas": [{"emoji": "🗃️", "name": "REDMO — El único registro oficial de donantes de médula de España", "desc": "El REDMO (Registro de Donantes de Médula Ósea de España) fue creado por la Fundación Josep Carreras en 1991 para cubrir un vacío crítico: tres de cada cuatro pacientes con leucemia no disponen de un familiar compatible y necesitan encontrar a un donante desconocido. Su pleno desarrollo llegó en 1994, con la firma del primer acuerdo marco con el Ministerio de Sanidad y la ONT, integrándolo en el Sistema Nacional de Salud como registro oficial único.\n\nEn 2024, el REDMO superó el hito de 505.505 donantes (septiembre 2024), con 30.010 nuevas incorporaciones (+27% vs 2023). A 31 de diciembre de 2025 son ya 520.508 donantes activos. España se posiciona como el 5.º registro de Europa y el 13.º del mundo.\n\nEn 2024 se coordinaron 426 donaciones efectivas (+8% vs 2023) y 748 trasplantes para pacientes españoles (+18% vs 2023). En 2025: 481 donaciones y 794 trasplantes. El tiempo mediano de búsqueda es de 26-27 días. El 84-85% de los pacientes encuentra donante antes de 60 días.\n\nDesde su creación hasta fin de 2025, el REDMO ha transformado 15.435 vidas. En 2024 obtuvo la acreditación Full Standard de la WMDA, la máxima certificación mundial en calidad y seguridad. El REDMO está conectado a la red internacional WMDA.\n\nEn 2025 se inscribieron 24.829 nuevos donantes (+3% vs 2024), con una edad media de 30 años — el \"rejuvenecimiento\" del registro es uno de los logros que el Ministerio de Sanidad destaca del Plan Nacional de Médula Ósea (PNMO), en marcha desde 2012 y que completó su tercera fase en 2025. España alcanzó un 27% de autoabastecimiento en 2025 (trasplantes con donante español, sin depender del extranjero), frente al 3% de 2012.\n\nGracias al proyecto Ready to Ship (R2S), el 7% de las unidades de sangre de cordón umbilical del REDMO —las de mayor calidad— están ya caracterizadas y pre-liberadas para uso inmediato en caso de urgencia. Detrás de cada cifra hay una historia: Hugo, donante de 20 años, se apuntó al registro al donar sangre por primera vez y, seis meses después, fue compatible con un paciente. Pastora, madre de una bebé de 23 días cuando fue diagnosticada de leucemia, recibió un trasplante de un donante anónimo y hoy celebra un año de nueva vida junto a sus hijos.", "dato": "520.508 donantes (2025) · 481 donaciones · 794 trasplantes · 26 días mediana · 15.435 vidas en 35 años · Full Standard WMDA · 24.829 nuevos donantes 2025 (+3%) · 30 años edad media (rejuvenecimiento REDMO) · 27% autoabastecimiento (vs 3% en 2012) · 7% unidades SCU pre-liberadas (proyecto R2S)"}, {"emoji": "💉", "name": "Proceso de donación — gratuito, sin cirugía en el 81% de los casos", "desc": "Inscribirse en el REDMO es gratuito y puede hacerse en cualquier centro de transfusión de sangre de España o llamando al 900 32 33 34. El proceso empieza con una extracción de sangre para tipificación HLA. Si en algún momento se identifica un paciente compatible, el donante es contactado y recibe toda la información antes de tomar ninguna decisión, sin ningún tipo de compromiso previo.\n\nEl 81% de las donaciones en 2025 se realizan por aféresis de sangre periférica (88% en 2024): durante 4-5 días previos se administra un medicamento que moviliza las células madre desde la médula al torrente sanguíneo, y luego se extraen mediante una máquina de aféresis, igual que con las plaquetas. El donante vuelve a casa el mismo día.\n\nEl 9% son por extracción directa de médula ósea bajo anestesia general (recuperación de 2-3 días). El 9% restante son linfocitos o boosts. En todos los casos, todos los gastos (desplazamiento, alojamiento, médicos, días laborables) son cubiertos íntegramente por la Fundación.\n\nEl perfil de donante más demandado clínicamente: varón joven (18-40 años). La edad media de los nuevos inscritos en 2025 es de 30 años. La probabilidad de que dos personas no emparentadas sean compatibles es de aproximadamente 1 entre 3.500 — por eso cada nueva inscripción cuenta, y por eso el registro necesita ser lo más amplio y diverso posible.\n\nUn donante real lo resume así: \"En 2018 me inscribí pensando que había muy pocas posibilidades de ser compatible con alguien. En 2020 me convertí en un héroe sin capa. El día de la donación fue muy fácil: es como una extracción de sangre, pero con una máquina especial que separa la médula y devuelve el resto al cuerpo.\"", "dato": "Gratuito · Sin compromiso previo · 81% sin cirugía (aféresis, como plaquetas) · Todos los gastos cubiertos · 900 32 33 34 · Probabilidad compatibilidad no emparentada: 1 entre 3.500"}, {"emoji": "🏛️", "name": "Instituto Josep Carreras — el centro más grande de Europa en leucemia", "desc": "El Instituto de Investigación contra la Leucemia Josep Carreras es el primer centro de investigación europeo focalizado exclusivamente en la leucemia y las hemopatías malignas, y uno de los únicos en el mundo. Fue fundado en 2010 por la Generalitat de Cataluña y la Fundación Josep Carreras. Tiene 5 localizaciones coordinadas (Hospital Can Ruti de Badalona, Hospital Sant Pau, Hospital Clínic, Hospital del Mar y Hospital Trueta de Girona) y es un centro CERCA de la Generalitat de Cataluña.\n\nEn 2024 cuenta con más de 400 profesionales (366 investigadores y técnicos, 58 de gestión), 40 grupos de investigación y 4 programas. Sus investigaciones abarcan todos los aspectos de la leucemia: diagnóstico genómico, mecanismos moleculares, desarrollo de terapias avanzadas, mejora de CAR-T, epidemiología y medicina personalizada.\n\nEn 2024 recibió la acreditación provisional como Centro de Excelencia Severo Ochoa del Ministerio de Ciencia, el máximo reconocimiento académico en España (pendiente de confirmación definitiva). Desde su fundación, la Fundación Josep Carreras ha aportado más de 71 millones de euros al Instituto; 6,995 millones en 2024. El Instituto realiza más de 600.000 horas anuales de investigación.\n\nEn la última evaluación CERCA, el Instituto obtuvo la calificación A — la máxima posible — lo que garantiza la continuidad presupuestaria por parte de la Generalitat de Catalunya durante los próximos 4 años. En abril de 2025, el Dr. Ari Melnick (Weill Cornell, Nueva York), referente internacional en linfomas de células B y leucemias agudas, relevó al Dr. Manel Esteller en la dirección del Instituto. El Instituto Josep Carreras es el centro más grande de Europa dedicado en exclusiva a la investigación contra la leucemia y otros cánceres de la sangre.", "dato": "+400 profesionales · 40 grupos, 4 programas · 5 sedes hospitalarias · Severo Ochoa 2024 · 71M€ histórico (6,995M€ en 2024) · 600.000h/año investigación · CERCA: calificación A (4 años garantizados) · Dr. Ari Melnick, director desde abr. 2025 · Centro más grande de Europa"}, {"emoji": "🔬", "name": "Avances científicos 2025-2026 — de la mesa de laboratorio al paciente", "desc": "En 2026, el Instituto Josep Carreras acumula avances destacados: la identificación de un \"interruptor protector\" en el cáncer de sangre más frecuente, la descripción de dos fases clave en el origen de la leucemia infantil más frecuente, una nueva forma de entender el cáncer mediante \"ecosistemas dinámicos\" de características tumorales, y avances en la identificación de tipos celulares poco frecuentes mediante integración multiómica.\n\nEn el ámbito tecnológico, el equipo de Spatial Biology, liderado por el Dr. Eduard Porta y la Dra. Daniela Grases, ha procesado más de 1.000 muestras de tejido y publicó en 2025 la primera guía práctica mundial de Transcriptómica Espacial en la revista Trends in Biotechnology — una tecnología clave para diagnósticos más rápidos, precisos y personalizados en cáncer hematológico.\n\nEl Instituto cuenta también con un Centro de Diagnóstico Computacional que integra datos biológicos con inteligencia artificial para acelerar el desarrollo de nuevos enfoques diagnósticos y terapéuticos. Para asegurar el futuro de esta investigación, el programa CarrerasLeaders financia a 16 investigadores postdoctorales de excelencia durante 36 meses, con selección por mérito y revisión por pares internacional, impulsando su desarrollo en liderazgo, independencia y consolidación científica.", "dato": "2026: 4 avances científicos (interruptor protector, leucemia infantil, ecosistemas dinámicos tumorales, multiómica) · Spatial Biology: +1.000 muestras, 1ª guía mundial 2025 (Trends in Biotechnology) · Centro de Diagnóstico Computacional con IA · CarrerasLeaders: 16 postdocs/36 meses"}, {"emoji": "🏠", "name": "Pisos de Acogida — Un hogar lejos de casa", "desc": "El programa de alojamientos de acogida de la Fundación Josep Carreras ofrece un hogar temporal gratuito a los pacientes que necesitan desplazarse a Barcelona para recibir trasplante de médula ósea o tratamiento CAR-T, y a sus cuidadores.\n\nEn 2024 dispone de 8 pisos situados cerca del Hospital Clínic, Hospital Vall d'Hebron, Hospital de Sant Pau, ICO-Badalona e ICO-L'Hospitalet, y 5 hoteles solidarios (2 nuevos incorporados en 2024). En 2024 se atendió a 105 pacientes y cuidadores (+48% vs 2023), con una ocupación cercana al 80%.\n\nLos 8 pisos acogieron a 54 pacientes adultos (59 estancias, 2.030 pernoctaciones, media de 37 días de estancia). Los 5 hoteles acogieron a 51 pacientes, incluyendo niños (81 estancias, 184 pernoctaciones, media de 3,6 días).\n\nEn 2024 se tuvo que denegar 53 peticiones por falta de disponibilidad. El precio medio de una habitación de hotel en Barcelona es de 183€/noche: en los casos de estancias más largas (hasta unos 109 días), la Fundación evitó a los pacientes gastos de hasta 19.947€ por estancia. En 2024 se completó la reforma integral de 6 de los 8 pisos gracias al apoyo de empresas colaboradoras.", "dato": "8 pisos gratuitos en Barcelona (Clínic, Sant Pau, Vall d'Hebron, ICO-Duran i Reynals, ICO-Badalona) + 5 hoteles concertados · 2 pisos para trasplante autólogo domiciliario (15-20 días) · Resto para trasplante alogénico y CAR-T (estancias más largas) · 105 pacientes 2024 (+48%) · Consultas médicas 24h/365: Dr. Enric Carreras (~1.500/año, España + Latinoamérica) · Información y acompañamiento: ~16 consultas/día laborable · Programa de Experiencia del Paciente desde 2022 (manuales, vídeos, artículos, documentales)"}, {"emoji": "🧬", "name": "Spin-offs — De la leucemia al laboratorio al paciente", "desc": "La Fundación impulsa la creación de empresas biotecnológicas que llevan los resultados de investigación del Instituto al paciente real. En 2024 destacan dos spin-offs en fase clínica.\n\nOneChain Immunotherapeutics desarrolla OC-1, una terapia CAR-T para la leucemia T/mieloide cortical agresiva (coT-ALL), un tipo poco frecuente y de muy mal pronóstico. En mayo de 2024 fue tratado el primer paciente en el ensayo clínico CARxALL en el Hospital Clínic y el Hospital Sant Joan de Déu de Barcelona. En marzo, OneChain obtuvo financiación de 3,8 millones de euros del programa TransMisiones del Gobierno para el diseño de nuevas partículas virales mediante inteligencia artificial.\n\nLeukos Biotech desarrolla AOP208, un fármaco que bloquea el receptor de serotonina 1b (diana nunca antes utilizada en oncología), dirigido a las células madre leucémicas responsables del desarrollo y recaída de la leucemia. En octubre de 2024 inició el ensayo clínico SERONCO-1 en el Hospital Vall d'Hebron, después de más de 10 años de investigación liderada por la Dra. Ruth Risueño.", "dato": "OneChain: primer paciente CAR-T mayo 2024 · Leukos Biotech: primer paciente AOP208 octubre 2024 · 2 spin-offs en ensayo clínico activo"}, {"emoji": "🌐", "name": "Red WMDA y cordón umbilical — España, 1.º Europa en SCU", "desc": "El REDMO está integrado en la World Marrow Donor Association (WMDA), la red que conecta registros de más de 30 países. Esta integración transforma la búsqueda: cuando un paciente español no encuentra donante en el REDMO, la búsqueda se extiende automáticamente a millones de donantes en el mundo, y viceversa.\n\nEn 2025, de las 481 donaciones desde España, 270 viajaron a 29 países distintos. De los 794 trasplantes para pacientes españoles, 215 usaron donantes del registro español (autosuficiencia del 27%; objetivo ONT: 35%) y el resto vinieron de Alemania (267), Polonia (56), Reino Unido (48), Italia (36) y EEUU (64), entre otros.\n\nAdemás, España es el primer país de Europa y tercero del mundo en número de unidades de sangre de cordón umbilical disponibles: 60.886 unidades (2025), gestionadas por bancos públicos en Málaga (20.968), Barcelona (18.657), Madrid (7.995), Galicia (6.371) y Valencia (4.953). La sangre de cordón es especialmente útil para pacientes pediátricos y casos con compatibilidad HLA difícil, ya que está disponible de forma inmediata.", "dato": "30+ países conectados · 270 donaciones enviadas al extranjero en 2025 · 60.886 unidades SCU · 1.º Europa · 3.º mundo"}, {"emoji": "👥", "name": "Comunidad Imparable — 149.867 socios y sensibilización", "desc": "La Fundación Josep Carreras tiene una comunidad de socios y colaboradores que en 2024 alcanzaba los 149.867 socios activos, a punto de llegar a los 150.000. La cuota media es de 38,23€ y las cuotas y donativos de socios regulares supusieron 18,5 millones de euros.\n\nLa campaña de sensibilización 'El mejor anuncio del mundo' llegó a más de 7,5 millones de personas. Cada año, la Semana contra la Leucemia (21-28 de junio) moviliza a toda la organización con estands informativos, campañas en medios y redes, y el Día de los Imparables (en 2024 en el CaixaForum de Valencia con más de 2.000 pacientes y familias).\n\nEn 2024 se gestionaron 525 iniciativas solidarias que recaudaron 324.062€, organizadas por particulares, empresas y asociaciones en toda España. Más de 900 empresas y entidades forman parte del plan de alianzas corporativas. La tienda solidaria online facturó 116.101€ en 2024 con 680 pedidos.\n\nLa Fundación Josep Carreras no está sola: forma parte de una red internacional de fundaciones hermanas. En Alemania, la Deutsche José Carreras Leukämie Stiftung ha recaudado más de 270 millones de euros en 30 ediciones de su gala televisiva contra la leucemia, financiando 1.552 proyectos (960 becas de investigación, equipamiento asistencial y ayudas sociales a pacientes).\n\nEn Suiza, la Fondation José Carreras de Ginebra mantiene un programa de tipaje de alta resolución de unidades de cordón umbilical, accesibles para cualquier paciente del mundo, y financia el proyecto SWISSCORD junto a hospitales pediátricos de Zúrich y Lausana. En Estados Unidos, la cátedra Josep Carreras / E.D. Thomas en el Fred Hutchinson Cancer Center de Seattle financia investigación de primer nivel en leucemia mieloide aguda.\n\nA través del REDMO, España tiene acceso a más de 40 millones de donantes disponibles en todo el mundo, y ha contribuido a más de 13.576 trasplantes no emparentados a nivel mundial — una cifra distinta a los 15.435 trasplantes recibidos por pacientes en España: estos 13.576 son las veces que un donante español ha sido el origen de un trasplante, en España o en cualquier otro país del mundo.\n\n\"Un Match x una Vida\" es una campaña del Ministerio de Sanidad, la ONT, las comunidades autónomas y la Fundación Josep Carreras dentro del Plan Nacional de Médula Ósea, dirigida especialmente a hombres jóvenes de 18 a 40 años — el perfil más necesario y menos representado en el registro. El \"Match Tour\" es un autobús que recorre ciudades de España con actividades de divulgación e inscripción de donantes en directo.", "dato": "149.867 socios · 18,5M€ en cuotas regulares · 525 iniciativas solidarias · 900+ empresas colaboradoras · 7,5M personas campaña · Red internacional: Alemania (~250M€/31 galas TV), Suiza (SWISSCORD), Seattle (cátedra Fred Hutch) · 40M+ donantes mundiales vía REDMO · \"Un Match x una Vida\": Match Tour (bus por ciudades de España, Ministerio de Sanidad)"}, {"emoji": "🩺", "name": "Programa de Experiencia del Paciente", "desc": "Iniciado en 2022, el Programa de Experiencia del Paciente diseña e implementa proyectos que mejoran la calidad de vida de pacientes con leucemia y hemopatías malignas más allá del ámbito estrictamente médico.\n\nEl Proyecto CORAL estudia exhaustivamente la experiencia del paciente adulto joven (18-39 años) con leucemia aguda o linfoma agresivo, desde el prediagnóstico hasta la larga supervivencia, para diseñar un modelo de atención de ámbito nacional. En 2024 se realizó el estudio cualitativo en el Hospital Clínic de Barcelona, con validación posterior en 3 hospitales más.\n\nEl Proyecto EICR 360º (con Sanofi) trabaja la enfermedad injerto contra receptor crónica, que afecta a múltiples órganos (piel, ojos, articulaciones, pulmón) en supervivientes de trasplante, con un manual práctico de más de 60 páginas y vídeos testimoniales.\n\nEl podcast Imparables por un tubo, disponible en Spotify, Apple Podcasts y YouTube, ofrece información de calidad a pacientes y familias desde 2023. Desde 2010 se han atendido más de 22.000 consultas de orientación médica y otras 22.000 consultas informativas. Además, la FJC fue clave para la aprobación en España de la Ley del Derecho al Olvido Oncológico (junio 2023), que protege a los supervivientes frente a la discriminación en seguros y préstamos.\n\nEl servicio de consultas de orientación médica funciona 24 horas, los 365 días del año, y está atendido personalmente por el Dr. Enric Carreras, hematólogo y director médico de la Fundación, especialista en trasplante de médula ósea. Recibe una media de 1.500 consultas al año, con pacientes que escriben desde España, Latinoamérica y otros países. El servicio de información y acompañamiento atiende además una media de 16 consultas cada día laborable.", "dato": "22.000 consultas médicas + 22.000 informativas · CORAL · EICR 360º · Podcast Imparables · Ley Derecho Olvido Oncológico 2023 · Consultas médicas 24h/365: Dr. Enric Carreras · ~1.500/año · 16 consultas info/día laborable"}, {"emoji": "🤝", "name": "Alianzas internacionales del Instituto — China, IGTP y 50 años de historia", "desc": "El Instituto impulsa el proyecto europeo ACHILLES para formar a la nueva generación investigadora en hemato-oncología, refuerza su alianza con China en cánceres hematológicos, y acoge encuentros científicos internacionales como el cónclave sobre linfoma folicular y la reunión europea EWALL sobre leucemia linfoblástica aguda. El Instituto firmó también una alianza estratégica con el IGTP y el ICO en el Campus Can Ruti de Badalona, que integra a más de 100 profesionales para proyectos de investigación conjuntos.\n\nEn junio de 2026, Josep Carreras participó en la conmemoración de los 50 años del primer trasplante alogénico de médula ósea realizado en el Hospital Clínic de Barcelona — el mismo procedimiento que, décadas después, salvaría su propia vida y le llevaría a fundar la Fundación que hoy lleva su nombre.", "dato": "ACHILLES: formación europea en hemato-oncología · Alianza con China · Conclaves internacionales: linfoma folicular, EWALL · Alianza IGTP-ICO Can Ruti: +100 profesionales · 50 años del primer trasplante alogénico (Clínic, jun. 2026) — con Josep Carreras presente"}], "fondos": [{"label": "Búsqueda de donante y trasplante (España + extranjero)", "pct": 38}, {"label": "Investigación — Instituto Josep Carreras (construcción + ayudas)", "pct": 35}, {"label": "Estructura y gestión del REDMO", "pct": 10}, {"label": "Administración y captación de fondos", "pct": 10}, {"label": "Sensibilización", "pct": 7}], "web": "https://fcarreras.org", "problema": "Tres de cada cuatro pacientes con leucemia u otra enfermedad de la sangre no tienen un familiar compatible que pueda donarles médula ósea. Necesitan encontrar a un desconocido — y la probabilidad de que dos personas no emparentadas sean compatibles es de aproximadamente 1 entre 3.500.\n\nEl desafío, además, no es único: hace falta investigar nuevos tratamientos para los casos que hoy no se curan, disponer de un registro amplio y conectado a la red mundial para que cualquier paciente tenga opciones reales, y acompañar a pacientes y familias durante un proceso que suele ser largo y duro.\n\nEsto no es un dato abstracto: Hugo se inscribió en el REDMO en 2018 al donar sangre por primera vez, sin pensar que llegarían a llamarle nunca. En 2020 resultó compatible con un paciente al otro lado del mundo y le salvó la vida.\n\nCada uno de los 520.508 donantes activos en España es, en potencia, esa misma llamada para alguien que hoy no sabe que la necesita.", "motivosSocio": ["El único ciclo completo, de principio a fin: el REDMO conecta donantes con pacientes; el Instituto de Investigación contra la Leucemia Josep Carreras —el centro más grande de Europa dedicado en exclusiva a la leucemia y cánceres de la sangre, calificado con la máxima nota (A) en su última evaluación— investiga nuevas terapias; y sus spin-offs las llevan a ensayos clínicos reales. Pocas organizaciones cubren todo el recorrido, del donante al laboratorio y de vuelta al paciente.", "El Estado les delegó esta misión: la Fundación Josep Carreras no es una ONG que actúa por iniciativa propia — es la entidad a la que el Ministerio de Sanidad encargó por mandato oficial la gestión del REDMO, el único registro nacional de donantes de médula ósea de España. Cuando un médico busca un donante para su paciente, pasa por aquí.", "De 35 donaciones al año a 481: en 2012, cuando empezó el REDMO, se realizaban 35 donaciones efectivas al año en toda España. En 2025 fueron 481 — un crecimiento que no es casualidad, sino el resultado de más de una década de captación constante de nuevos donantes y de mejoras en la gestión del registro.", "Creada por quien vivió en sus carnes lo que hoy financia: Josep Carreras sobrevivió a una leucemia en 1987-1988 gracias a un trasplante de médula ósea. Ese mismo año fundó la entidad; en 1991 creó el REDMO para que ningún paciente tuviera que pasar por lo que él pasó sin tener, al menos, una oportunidad real de encontrar donante.", "No está sola: forma parte de una red internacional de fundaciones hermanas. En Alemania, la fundación equivalente ha recaudado más de 270 millones de euros en 30 ediciones de una gala televisiva anual, financiando 1.552 proyectos de investigación y sociales. La Fundación Josep Carreras en España, con sus 149.867 socios, es el nodo español de ese esfuerzo compartido."], "fuentesCompletas": [{"texto": "Fundación Josep Carreras · Memoria de Actividades 2024 (documento principal de esta ficha)", "url": "https://fcarreras.org/wp-content/uploads/2025/09/2024_MEMORIA-FJC_es_web_def.pdf"}, {"texto": "REDMO · Memoria de Impacto 2025", "url": "https://www.fcarreras.org/es/redmo"}], "verificado": "Datos verificados junio 2026", "captacion": {"resumen30": {"cifras": ["520.508", "794", "26 días"], "labels": ["donantes activos en el REDMO, el registro oficial de médula ósea de España (5.º Europa / 13.º mundo)", "trasplantes coordinados para pacientes en España en 2025", "mediana de búsqueda de donante compatible — el 84% de los pacientes lo encuentra en menos de 60 días"], "cierre": "Cada uno de los 520.508 donantes activos en España es, en potencia, esa misma llamada para alguien que hoy no sabe que la necesita.", "videoDestacado": {"url": "https://www.youtube.com/shorts/5ZIRPNjnnjs", "titulo": "La historia de Carmen — Imparable contra la leucemia linfoblástica aguda", "duracion": "1:05"}}, "proyectosClave": [0, 2, 4], "argumentario": [0, 1, 2]}, "speech": {"parada": "¿Te importa si te cuento algo de minuto y medio? Es la historia de Marta, una paciente — es ficticia, pero su proceso es exactamente el real.", "discurso": "A Marta le diagnostican leucemia. El médico le explica que necesita un trasplante de médula ósea. Le hacen pruebas a su familia, pero solo 1 de cada 4 pacientes tiene un familiar compatible — y Marta no es uno de esos casos. Tendrá que depender de un desconocido, y la probabilidad de que dos personas no emparentadas sean compatibles es de aproximadamente 1 entre 3.500.\n\nAquí entra el REDMO, el registro español de donantes de médula, gestionado por la Fundación Josep Carreras por encargo oficial del Ministerio de Sanidad. Buscan en una base de 520.508 donantes en España, conectada con una red mundial de más de 30 países. A los 26 días —la mediana de espera— encuentran a alguien compatible. El 84% de los pacientes, como Marta, tienen esa suerte.\n\nEl donante vive en otra ciudad, así que el trasplante se hace en un hospital lejos de casa de Marta. Su madre quiere acompañarla, pero un hotel durante semanas no es algo que puedan permitirse. La Fundación tiene 8 pisos y 5 hoteles de acogida para estas situaciones — gratuitos, para que ninguna familia tenga que elegir entre estar cerca o pagar el alquiler de su casa. Solo en 2024, 105 familias se alojaron así.\n\nDurante las semanas de tratamiento, Marta y su madre tienen acceso a consultas médicas e informativas — más de 22.000 de cada tipo al año en toda España — para entender cada paso del proceso.\n\nEl trasplante sale bien. Y parte de la razón es que el tratamiento que recibió Marta no existía hace pocos años: salió del Instituto de Investigación contra la Leucemia Josep Carreras, el centro más grande de Europa dedicado en exclusiva a esta enfermedad, con más de 400 investigadores. Terapias como CAR-T, que hace una década eran experimentales, hoy ya están llegando a pacientes reales.", "cierre": "La historia de Marta —el registro, el trasplante, el piso de acogida, la investigación que hizo posible su tratamiento— es un solo sistema, y lo sostienen 149.867 socios. Por unos 12 euros al mes — unos 140-150 al año — formas parte de ese sistema: el que encuentra al donante, el que aloja a la familia, y el que investiga la cura. ¿Te animas?"}, "videos": [{"titulo": "El mejor anuncio del mundo", "tipo": "Spot viral de captación", "duracion": "0:30", "url": "https://www.youtube.com/watch?v=wlnXuOC9zJc", "anio": "2024"}, {"titulo": "Para que no pare la música, que no pare la investigación", "tipo": "Spot emocional de campaña", "duracion": "1:00", "url": "https://www.youtube.com/watch?v=0x2vpFOTWBs", "anio": "2025"}, {"titulo": "La historia de Carmen — Imparable contra la leucemia linfoblástica aguda", "tipo": "Testimonio breve de paciente (Short)", "duracion": "1:05", "url": "https://www.youtube.com/shorts/5ZIRPNjnnjs", "anio": "2025"}, {"titulo": "Más de 500.000 donantes unen estas dos historias", "tipo": "Spot emocional — donantes de médula", "duracion": "1:39", "url": "https://www.youtube.com/watch?v=xY7k0JQaIdM", "anio": "2024"}, {"titulo": "Un match x una vida", "tipo": "Spot campaña Match Tour", "duracion": "1:57", "url": "https://www.youtube.com/watch?v=7x5NSBuUnYo", "anio": "2024"}, {"titulo": "Los niños y niñas nos explican qué es la leucemia", "tipo": "Divulgación — perspectiva infantil", "duracion": "1:46", "url": "https://www.youtube.com/watch?v=DPma94FSHIc", "anio": "2023"}, {"titulo": "¡Ya somos más de 150.000 socios contra la leucemia!", "tipo": "Spot de agradecimiento — hito de socios", "duracion": "2:59", "url": "https://www.youtube.com/watch?v=8JGOopC7-i0", "anio": "2025"}, {"titulo": "Imparables contra el linfoma", "tipo": "Testimonio de paciente", "duracion": "5:40", "url": "https://www.youtube.com/watch?v=WoNJR2UCcwI", "anio": "2024"}], "ultimaActualizacion": "junio 2026"}</script>
<script type="application/json" id="data-fpm">{"id": "fpm", "emoji": "🧠", "nombre": "FPM", "full": "Fundación Pasqual Maragall", "color": "#0ea5e9", "claim": "Única fundación en España dedicada exclusivamente a investigación preventiva del Alzheimer. Nacida en abril de 2008 por iniciativa de Pasqual Maragall, expresidente de la Generalitat y exalcalde de Barcelona, tras ser diagnosticado de Alzheimer: \"Quiero ayudar a derrotar esta enfermedad. En ningún lugar está escrito que sea invencible.\"\n\nPresidida por Cristina Maragall (hija de Pasqual Maragall) y dirigida por el Dr. Arcadi Navarro (director general).\n\n112.842 socios (de 147 en 2012 a más de 110.000 hoy — un crecimiento de la base social que la colaboración con Wesser ha contribuido a impulsar con +29.000 nuevos socios). 93M€ invertidos en investigación 2013-2025.\n\nSu hallazgo en Nature Medicine (análisis de sangre, >90% precisión) puede transformar el diagnóstico temprano del Alzheimer.", "meta": [{"label": "Fundada", "val": "2008"}, {"label": "Socios", "val": "112.842"}, {"label": "Participantes Alfa", "val": "2.743"}, {"label": "Publicaciones 2025", "val": "80 revistas"}], "cifras": [{"num": "900.000", "label": "Personas con Alzheimer y otras demencias en España, según el Estudio sobre la percepción social del Alzheimer en España de la propia Fundación (2025). 2 de cada 3 españoles tienen o han tenido en su entorno a alguien con Alzheimer.", "fuente": "Fundación Pasqual Maragall · Estudio percepción social 2025"}, {"num": ">90%", "label": "Precisión del análisis de sangre (biomarcador p-tau217) para detectar el Alzheimer, publicado en Nature Medicine. Comparable a la punción lumbar pero mucho menos invasivo y costoso.", "fuente": "BBRC / Nature Medicine · Hito 6 Informe 2025"}, {"num": "2.743", "label": "Participantes del Estudio Alfa, personas de entre 45 y 75 años en su mayoría descendientes de personas con Alzheimer, seguidos longitudinalmente desde 2013.", "fuente": "Fundación Pasqual Maragall · Informe de Impacto 2025"}, {"num": "93 M€", "label": "Invertidos en investigación del Alzheimer del 2013 al 2025. Solo en 2025: 17 millones de euros. El 57% del presupuesto total va directamente a investigación.", "fuente": "Fundación Pasqual Maragall · Informe de Impacto 2025"}, {"num": "112.842", "label": "Socios y socias a cierre de 2025. Durante el año se alcanzó el hito de los 100.000 socios, uno de los mayores apoyos ciudadanos activos a la investigación en España.", "fuente": "Fundación Pasqual Maragall · Informe de Impacto 2025"}, {"num": "416 M", "label": "Personas en el \"continuo\" del Alzheimer en el mundo según Gustavsson et al. (2022): 32 millones ya con demencia por Alzheimer, 69 millones en fase prodrómica (deterioro cognitivo leve) y 315 millones en fase preclínica — con la patología en el cerebro pero sin ningún síntoma todavía. Aparte, la OMS estima 55 millones de personas con demencia de cualquier causa en el mundo (2021), cifra que podría llegar a 152 millones en 2050.", "fuente": "Gustavsson et al. 2022 / FPM Informe 2025"}], "programas": [{"emoji": "🩸", "name": "Diagnóstico por análisis de sangre — Nature Medicine 2025", "desc": "Uno de los hitos más relevantes del BBRC en 2025 fue la publicación en Nature Medicine de que el biomarcador p-tau217 medido en plasma sanguíneo detecta el Alzheimer con una precisión superior al 90%, comparable a la punción lumbar (el test de referencia hasta ahora) pero mucho menos invasivo y más accesible. Este hallazgo, liderado por investigadores del BBRC, supone un paso decisivo hacia diagnósticos accesibles en atención primaria: un análisis de sangre estándar podría sustituir a procedimientos que requieren sedación y hospitalización.\n\nEl BBRC también participó en el proyecto SCAP-AD para validar nuevos métodos diagnósticos ultrasensibles de detección precoz, coordinando la neuroimagen desde el centro de Barcelona.\n\nEl estudio SpeechDx, en consorcio con la Alzheimer's Drug Discovery Foundation, explorará biomarcadores del habla para detección precoz en 2.650 participantes de 5 centros (400 del BBRC de cohortes ALFA+ y Beta-AARC).", "dato": "p-tau217 en sangre: >90% precisión · Nature Medicine · Comparable a punción lumbar · Sin sedación · SCAP-AD · SpeechDx"}, {"emoji": "🧫", "name": "Estudio Alfa — La cohorte de referencia internacional", "desc": "El Alzheimer es responsable del 75% de las demencias y afecta a más de 900.000 personas en España: 1 de cada 10 mayores de 65 años, y 1 de cada 3 mayores de 85. Si no se encuentra un tratamiento eficaz, las personas con demencia en el mundo podrían pasar de 55 a 152 millones en 2050 (OMS) — y solo en España la cifra podría superar el millón y medio de personas — un escenario que podría colapsar los sistemas sanitario y asistencial.\n\nEl coste medio asciende a unos 35.000-42.000€ por persona y año (hasta 77.000€ en fases avanzadas), del cual el 86-87% lo asumen las familias y solo un 8% es gasto sanitario público.\n\nEn 8 de cada 10 casos, el cuidado lo asume un familiar — en un 76% de los casos, una mujer (hijas y esposas) — que dedica una media de 70 horas semanales. Dos de cada tres españoles afirman conocer a alguien con Alzheimer (en el 27% de los casos, un familiar directo): es la 2ª preocupación de salud tras el cáncer, y la 1ª entre las personas mayores.\n\nEl Estudio Alfa (Alzheimer's and Families) es el proyecto central del Barcelonaβeta Brain Research Center (BBRC) y una de las plataformas de investigación preventiva del Alzheimer más importantes del mundo. Impulsado en 2013 por la Fundación 'la Caixa', cuenta con 2.743 personas de entre 45 y 75 años, en su mayoría descendientes de personas con Alzheimer.\n\nEl estudio caracteriza la fase preclínica de la enfermedad: el periodo de hasta 20 años antes de los primeros síntomas cognitivos, cuando la intervención preventiva todavía puede ser eficaz. Cada participante es evaluado en múltiples visitas con análisis de sangre, neuroimagen (resonancia magnética y PET), pruebas cognitivas y factores de estilo de vida.\n\nEn 2025, el estudio generó 23.947 muestras procesadas, 965 resonancias magnéticas y 3.563 sesiones totales (1.292 clínicas, 1.219 de cognición, 1.052 de enfermería). El Estudio Alfa actúa como infraestructura estratégica que alimenta a todos los demás estudios del BBRC y sirve como base para los 4 ensayos clínicos activos de tratamientos modificadores de la enfermedad.", "dato": "75% de las demencias · 900.000 afectados en España · 1/10 >65 años, 1/3 >85 · 2050: podría triplicarse, +1,5M en España · Coste 42-77.000€/año, 86% lo paga la familia · 8/10 cuidado por familiar (76% mujeres, 70h/semana) · 2.743 participantes · 45-75 años · desde 2013 · 23.947 muestras procesadas · 965 RM · base para 4 ensayos clínicos activos"}, {"emoji": "🤖", "name": "ALFA10 — El algoritmo que se anticipará al Alzheimer", "desc": "ALFA10 es el proyecto más ambicioso de la Fundación para esta década: el seguimiento longitudinal de toda la cohorte ALFA, que busca desarrollar y validar un algoritmo predictivo capaz de estimar el riesgo de Alzheimer antes de los primeros síntomas. Representa la evolución completa de la cohorte: desde la cohorte parental ALFA (2013-2014, 2.743 personas) hasta ALFA+ (450 personas desde 2016) y ahora ALFA10 (+2.000 personas), con seguimiento digital remoto previsto desde 2027.\n\nEl estudio, con más de 2.000 personas de la cohorte histórica, recontacta a los participantes originales para continuar su seguimiento; las primeras visitas presenciales están previstas para 2026 y pueden prolongarse hasta finales de 2027. Como explica el Dr. Gonzalo Sánchez, investigador y neuropsicólogo del BBRC: \"El objetivo es entender mejor cómo progresa la enfermedad antes de que se manifiesten los síntomas, y preparar un protocolo de actuación que, a la larga, pueda ser adoptado por el sistema de salud.\"\n\nLa monitorización digital incluye apps propias de evaluación cognitiva (Cogstate, NeoTiv), análisis de patrones de pulsación
