20.900", "+300.000"], "labels": ["niños, niñas y adolescentes en riesgo de pobreza o exclusión social en España — más de uno de cada tres", "niños, niñas y jóvenes atendidos directamente en España en 2025, junto a 4.763 familias", "socios, padrinos y donantes que hacen posible que Aldeas los acompañe hasta la plena autonomía"], "cierre": "Cuando el sistema los abandona a los 18, Aldeas sigue ahí. Y antes de que llegue ese momento, trabaja para que la separación no ocurra.", "videoDestacado": {"url": "https://www.youtube.com/watch?v=oyejBK_wJd8", "titulo": "\"1, 2, 3...CASA\" — Corto para Aldeas Infantiles SOS de Icíar Bollaín", "duracion": "9:46"}}, "proyectosClave": [0, 1, 3], "argumentario": [0, 1, 2]}, "speech": {"parada": "¿Me dejas contarte algo de minuto y medio? Es sobre lo que pasa el día que un chico cumple 18 años, y casi nadie lo sabe.", "discurso": "Imagina a una niña, Sara, que con 7 años no puede seguir viviendo con su familia. Junto con sus dos hermanos, entra en el sistema de protección. Tienen suerte: los tres van juntos a una Aldea Infantil SOS, donde viven en una casa normal, con 5 o 6 niños más y educadores que hacen de figura estable — porque mantener unidos a los hermanos es una prioridad, y para muchos de estos niños es el único vínculo familiar que les queda. En España hay 8 Aldeas así, y en 2025 acogieron a 1.430 niños y jóvenes en esta situación.\n\nSara crece. Va al colegio, tiene amigos, hace una vida lo más normal posible. Y entonces, llega el día de su cumpleaños número 18.\n\nPara un joven que vive con su familia, cumplir 18 no cambia gran cosa — sigue en casa, con apoyo, el tiempo que necesite. Para un joven tutelado por el sistema público, cumplir 18 puede significar literalmente quedarse sin casa de un día para otro: sin red de apoyo, sin vivienda, muchas veces sin empleo. Es uno de los puntos ciegos más graves del sistema de protección, y casi nadie habla de él.\n\nAldeas es una de las pocas organizaciones que sigue al lado de estos jóvenes después de los 18: en 2025, apoyaron a 1.141 jóvenes con proyectos de autonomía, de emancipación y de acceso al empleo — y desde 2025 tienen incluso un servicio de postacogimiento, para quienes ya salieron del sistema hace tiempo pero necesitan ayuda en algún momento puntual de su vida adulta.\n\nY antes de que las cosas lleguen a ese punto, Aldeas también trabaja para que muchas familias ni siquiera lleguen a separarse: en 2025, sus programas de prevención —30 centros de día, apoyo a familias— llegaron a 18.329 niños y 3.639 familias, evitando que esa separación llegue a producirse.", "cierre": "75 años después de nacer en Austria para dar hogar a niños huérfanos de la guerra, Aldeas sigue haciendo lo mismo en España desde 1967, pero también acompaña a jóvenes como Sara mucho después de los 18 — algo que el sistema público, por sí solo, no hace. Lo sostienen más de 300.000 socios, padrinos y donantes. Por unos 12 euros al mes — unos 140-150 al año — formas parte de quienes hacen que cumplir 18 años no sea, para nadie, el día en que se queda solo. ¿Nos ayudas?"}, "videos": [{"titulo": "\"1, 2, 3...CASA\" — Corto para Aldeas Infantiles SOS de Icíar Bollaín", "tipo": "Cortometraje — acogimiento familiar", "duracion": "9:46", "url": "https://www.youtube.com/watch?v=oyejBK_wJd8", "anio": "2023"}, {"titulo": "Juntas porque somos hermanas", "tipo": "Testimonio de beneficiarias — hermanas en acogimiento", "duracion": "2:24", "url": "https://www.youtube.com/watch?v=0JF4-_SabaA", "anio": "2024"}, {"titulo": "Dos hermanas, una historia de vida: crecer en Aldeas Infantiles SOS", "tipo": "Testimonio de beneficiarias", "duracion": "2:12", "url": "https://www.youtube.com/watch?v=NJVELZypE9k", "anio": "2024"}, {"titulo": "Ponle una sonrisa a la vida", "tipo": "Spot emocional — no separar hermanos", "duracion": "0:55", "url": "https://www.youtube.com/watch?v=ndsXM1Ofnl4", "anio": "2023"}, {"titulo": "Busco casa con familia", "tipo": "Spot de acogimiento familiar", "duracion": "1:08", "url": "https://www.youtube.com/watch?v=x3mQFoUXgPY", "anio": "2024"}, {"titulo": "Ningún niño nace para crecer solo — Aldeas Infantiles SOS", "tipo": "Spot institucional", "duracion": "1:10", "url": "https://www.youtube.com/watch?v=W-J4VGtoRTc", "anio": "2024"}, {"titulo": "AcogES+: Tú puedes dar una oportunidad a niños, niñas y adolescentes", "tipo": "Spot de proyecto — AcogES+", "duracion": "1:27", "url": "https://www.youtube.com/watch?v=xaAPkl8D62U", "anio": "2024"}, {"titulo": "Una cabina telefónica con un mensaje por escuchar", "tipo": "Campaña emotiva", "duracion": "1:03", "url": "https://www.youtube.com/watch?v=LXkOwQlIYJ8", "anio": "2023"}, {"titulo": "Un problema silencioso", "tipo": "Spot de concienciación", "duracion": "1:00", "url": "https://www.youtube.com/watch?v=ug3wBQ7g83M", "anio": "2024"}, {"titulo": "Campaña contra el acoso escolar #StopSilencio", "tipo": "Campaña con Leticia Dolera — bullying", "duracion": "3:15", "url": "https://www.youtube.com/watch?v=cPuT1KLYhQE", "anio": "2023"}, {"titulo": "Francisco | La importancia de los abuelos", "tipo": "Testimonio familiar", "duracion": "0:58", "url": "https://www.youtube.com/watch?v=-Gqn0Qvhkvg", "anio": "2023"}, {"titulo": "¿Qué hacemos en Aldeas Infantiles SOS?", "tipo": "Spot institucional explicativo", "duracion": "1:00", "url": "https://www.youtube.com/watch?v=wzG3AZklYFk", "anio": "2024"}, {"titulo": "¿Qué es Aldeas Infantiles SOS?", "tipo": "Vídeo institucional general", "duracion": "2:29", "url": "https://www.youtube.com/watch?v=_PdTJM06Joo", "anio": "2023"}], "ultimaActualizacion": "junio 2026"}</script>
<script>
/* ==================================================
   CONFIG
================================================== */
var ONG_IDS=['aecc','aldeas','cruzroja','fec','fjc','fpm','wwf'];

/* ==================================================
   DATOS
   Cada ONG vive en su propio <script type="application/json" id="data-{id}">
================================================== */
/* Un bloque malformado no debe tumbar la app: se omite esa ONG y se avisa por consola */
var ONGS=[];
var ONG_BY_ID={};
ONG_IDS.forEach(function(id){
  try{
    var o=JSON.parse(document.getElementById('data-'+id).textContent);
    ONGS.push(o);
    ONG_BY_ID[o.id]=o;
  }catch(e){
    console.error('Bloque de datos inválido, ONG omitida: '+id,e);
  }
});

/* ==================================================
   ESTADO
   Única fuente de verdad de la UI
================================================== */
var state={
  currentOng:ONGS.length?ONGS[0].id:null,
  captacionMode:false
};

/* ==================================================
   UTILIDADES
================================================== */
var ESC_RE=/[&<>"]/g,ESC_MAP={'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'};
function esc(s){return String(s).replace(ESC_RE,function(c){return ESC_MAP[c];});}
function safeUrl(u){return(typeof u==='string'&&/^https?:\/\//i.test(u.trim()))?u:'#';}
function getOng(){return ONG_BY_ID[state.currentOng]||null;}

/* ==================================================
   DOM
   Referencias cacheadas (el script va al final del body)
================================================== */
var dom={
  body:document.body,
  hdr:document.querySelector('.hdr'),
  themeBtn:document.getElementById('thbtn'),
  tabs:document.getElementById('ongTabs'),
  navBadge:document.getElementById('navHidden'),
  ficha:document.getElementById('fichaView')
};

/* ==================================================
   RENDER · componentes reutilizables
================================================== */
/* Sección plegable de la ficha (acordeón) */
function fsec(ongId,num,icon,title,body,open){
  var bid=`fsec-${ongId}-${num}-b`;
  return `<div class="fsec"><button type="button" class="fsec-h${open?' open':''}" aria-expanded="${open?'true':'false'}" aria-controls="${bid}"><span class="fsec-i" aria-hidden="true">${icon}</span><span class="fsec-t">${title}</span><span class="fsec-arr" aria-hidden="true">▼</span></button><div class="fsec-b" id="${bid}"><div>${body}</div></div></div>`;
}
/* Fila numerada (datos sorprendentes / motivos para colaborar) */
function sorpItem(n,dato,fuente){
  return `<div class="sorp"><div class="sorp-num" aria-hidden="true">${n}</div><div class="sorp-body"><div class="sorp-dato">${esc(dato)}</div>${fuente?`<div class="sorp-fuente">${esc(fuente)}</div>`:''}</div></div>`;
}
/* Bloque de storytelling */
function speechPart(lbl,txt){
  return `<div class="speech-part"><div class="speech-lbl">${lbl}</div><div class="speech-txt">${txt}</div></div>`;
}
/* Enlace a la web oficial + líneas de verificación (compartido por ambas ramas de fuentes) */
function webVerif(ong){
  var h=`<a href="${safeUrl(ong.web)}" target="_blank" rel="noopener" class="wlink" aria-label="Web oficial de ${esc(ong.full)} (abre en nueva pestaña)">${ong.emoji} ${esc(ong.full)} → ${esc(ong.web)}</a>`;
  if(ong.verificado)h+=`<div class="verif">✅ Datos verificados: ${esc(ong.verificado)}</div>`;
  if(ong.ultimaActualizacion)h+=`<div class="verif">🗓️ Última actualización: ${esc(ong.ultimaActualizacion)}</div>`;
  return h;
}

/* ==================================================
   RENDER · tabs
================================================== */
function renderTabs(){
  var h='';
  for(let i=0;i<ONGS.length;i++){var o=ONGS[i],sel=o.id===state.currentOng;h+=`<button type="button" class="otab${sel?' active':''}" id="tab-${o.id}" data-id="${o.id}" role="tab" aria-selected="${sel?'true':'false'}" aria-controls="fichaView" tabindex="${sel?'0':'-1'}" aria-label="${esc(o.full)}${sel&&state.captacionMode?' (vista rápida)':''}" title="${esc(o.full)}" style="--tab-color:${o.color}"><span class="otab-main">${o.emoji} ${esc(o.nombre)}${sel&&state.captacionMode?'<span class="cap-badge" aria-hidden="true">30s</span>':''}</span><span class="otab-full" aria-hidden="true">${esc(o.full)}</span></button>`;}
  dom.tabs.innerHTML=h;
  requestAnimationFrame(updateNavBadge);
}
/* Actualiza selección y badge "30s" sin reconstruir la lista de tabs */
function updateTabs(){
  dom.tabs.querySelectorAll('.otab').forEach(function(b){
    var sel=b.getAttribute('data-id')===state.currentOng;
    var showBadge=sel&&state.captacionMode;
    b.classList.toggle('active',sel);
    b.setAttribute('aria-selected',sel?'true':'false');
    b.setAttribute('tabindex',sel?'0':'-1');
    b.setAttribute('aria-label',b.getAttribute('title')+(showBadge?' (vista rápida)':''));
    var badge=b.querySelector('.cap-badge');
    if(showBadge&&!badge){
      badge=document.createElement('span');
      badge.className='cap-badge';
      badge.setAttribute('aria-hidden','true');
      badge.textContent='30s';
      b.querySelector('.otab-main').appendChild(badge);
    }else if(!showBadge&&badge){
      badge.parentNode.removeChild(badge);
    }
  });
  requestAnimationFrame(updateNavBadge);
}
function updateNavBadge(){
  var nav=dom.tabs.parentElement;var ts=Array.from(dom.tabs.querySelectorAll('.otab'));var nr=nav.getBoundingClientRect().right;var hidTabs=ts.filter(function(t){return t.getBoundingClientRect().left>=nr-4;});var b=dom.navBadge;if(b){b.textContent=hidTabs.length>0?(hidTabs.length+' más'):'';b.title=hidTabs.length>0?hidTabs.map(function(t){return t.getAttribute('title');}).join(', '):'';}
  dom.tabs.classList.toggle('has-overflow',hidTabs.length>0);
}

/* ==================================================
   RENDER · vista captación ("en 30 segundos")
================================================== */
function renderCaptacion(view,ong){
  var c=ong.captacion,r=c.resumen30,h=`<div class="cwrap" style="--ong-c:${ong.color}">`;
  h+=`<button type="button" class="cappill cappill-back">← Volver a la ficha completa</button>`;
  h+=`<div class="chero"><div class="cemoji" aria-hidden="true">${ong.emoji}</div><div class="ctitle">${esc(ong.full)} EN 30 SEGUNDOS</div></div>`;
  h+=`<div class="cstats">`;
  for(let i=0;i<r.cifras.length;i++){
    h+=`<div class="cstat"><div class="cnum">${esc(r.cifras[i])}</div><div class="clabel">${r.labels&&r.labels[i]?esc(r.labels[i]):''}</div></div>`;
  }
  h+=`</div>`;
  h+=`<div class="ccierre">${esc(r.cierre)}</div>`;
  h+=`<div class="csection"><div class="cstitle">🚀 3 proyectos clave</div><div class="clist">`;
  for(let j=0;j<c.proyectosClave.length;j++){
    var p=ong.programas[c.proyectosClave[j]];
    if(!p)continue;
    h+=`<div class="citem"><div class="citem-h">${p.emoji} ${esc(p.name)}</div><div class="citem-d">${p.dato?esc(p.dato):''}</div></div>`;
  }
  h+=`</div></div>`;
  h+=`<div class="csection"><div class="cstitle">💬 Argumentario</div><div class="clist">`;
  for(let k=0;k<c.argumentario.length;k++){
    var mot=ong.motivosSocio[c.argumentario[k]];
    if(mot)h+=`<div class="citem citem-arg">${esc(mot)}</div>`;
  }
  h+=`</div></div>`;
  if(r.videoDestacado){h+=`<a href="${safeUrl(r.videoDestacado.url)}" target="_blank" rel="noopener" class="wlink wlink-col"><span style="font-weight:700;font-size:.82rem">🎬 Vídeo destacado</span><span style="font-size:.75em;color:var(--muted)">▶ ${esc(r.videoDestacado.titulo)}</span><span style="font-size:.72em;color:var(--dim)">${esc(r.videoDestacado.duracion)}</span></a>`;}
  h+=`</div>`;
  view.innerHTML=h;
}

/* ==================================================
   RENDER · ficha completa
   Se construye como string y se asigna con un único innerHTML:
   el contenido cambia por completo entre ONGs (secciones opcionales,
   número variable de filas), así que un solo parse + un solo layout
   es la vía más barata para el navegador.
================================================== */
function renderFicha(){
  var view=dom.ficha,ong=getOng();
  if(!ong){view.innerHTML='';return;}
  if(state.captacionMode&&ong.captacion){renderCaptacion(view,ong);return;}
  var h=`<div class="fwrap" style="--ong-c:${ong.color}">`;
  h+=`<div class="fhero"><div class="hband"><div class="hemoji" aria-hidden="true">${ong.emoji}</div><h1 class="hband-name">${esc(ong.nombre)}</h1></div><div class="hbody">`;
  h+=`<div class="hfull">${esc(ong.full)}</div>`;
  h+=`<div class="hclaim">${esc(ong.claim)}</div>`;
  h+=`<div class="hmeta">`;
  for(let i=0;i<ong.meta.length;i++) h+=`<div class="mchip">${esc(ong.meta[i].label)}: <b>${esc(ong.meta[i].val)}</b></div>`;
  h+=`</div></div></div>`;
  if(ong.captacion){h+=`<button type="button" class="cappill cappill-sec">⚡ En 30 segundos</button>`;}
  h+=`<div class="sec-actions"><button type="button" class="sec-toggle-all" data-expanded="false" aria-label="Expandir todas las secciones de la ficha">⊞ Expandir todo</button></div>`;

  var b='<div class="cgrid">';
  for(let i=0;i<ong.cifras.length;i++){var c=ong.cifras[i];b+=`<div class="ccard"><div class="cnum2">${esc(c.num)}</div><div class="clbl">${esc(c.label)}</div>${c.fuente?`<div class="csrc">${esc(c.fuente)}</div>`:''}</div>`;}
  h+=fsec(ong.id,2,'📊','Cifras clave',b+'</div>',true);

  if(ong.problema){
    h+=fsec(ong.id,4,'❗','Problema que intenta resolver',`<div class="utxt" style="padding: 10px 0;">${esc(ong.problema)}</div>`);
  }

  b='';
  for(let i=0;i<ong.programas.length;i++){var p=ong.programas[i],pid=`p-${ong.id}-${i}`;b+=`<div class="prog" id="${pid}"><button type="button" class="phdr" data-pid="${pid}" aria-expanded="false" aria-controls="${pid}-body"><span class="pemi" aria-hidden="true">${p.emoji}</span><span class="pnam">${esc(p.name)}</span><span class="parr" aria-hidden="true">▼</span></button><div class="pshort">${esc(p.desc.substring(0,130))}${p.desc.length>130?'...':''}</div><div class="pfull" id="${pid}-body"><div>${esc(p.desc)}${p.dato?`<div class="pdato">→ ${esc(p.dato)}</div>`:''}</div></div></div>`;}
  h+=fsec(ong.id,5,'🚀',`Programas (${ong.programas.length})`,b);

  if(ong.sorprenden&&ong.sorprenden.length){
    b='';
    for(let i=0;i<ong.sorprenden.length;i++)b+=sorpItem(i+1,ong.sorprenden[i].dato,ong.sorprenden[i].fuente);
    h+=fsec(ong.id,6,'⚡','5 datos que sorprenden',b);
  }

  b='';
  for(let i=0;i<ong.fondos.length;i++){var f=ong.fondos[i];var fpct=Number.isInteger(f.pct)?f.pct:parseFloat(f.pct.toFixed(1));b+=`<div class="fbar"><div class="fbl"><span class="fn">${esc(f.label)}</span><span class="fp">${fpct}%</span></div><div class="btrack"><div class="bfill" style="width:${fpct}%"></div></div></div>`;}
  if(ong.fondosNota){b+=`<p class="fondos-nota">${esc(ong.fondosNota)}</p>`;}
  h+=fsec(ong.id,7,'💰','Uso de fondos',b);

  if(ong.unicos&&ong.unicos.length){
    b='';
    for(let i=0;i<ong.unicos.length;i++) b+=`<div class="unico"><div class="udot"></div><div class="utxt">${esc(ong.unicos[i].text)}</div></div>`;
    h+=fsec(ong.id,8,'⭐','Lo que los hace únicos',b);
  }

  if(ong.motivosSocio&&ong.motivosSocio.length){
    b='';
    for(let i=0;i<ong.motivosSocio.length;i++)b+=sorpItem(i+1,ong.motivosSocio[i]);
    h+=fsec(ong.id,9,'🎤','5 motivos para colaborar como socio',b);
  }

  if(ong.speech){
    b='<div class="speech">'
      +speechPart('🚦 Parada',esc(ong.speech.parada))
      +speechPart('🗣️ Discurso',esc(ong.speech.discurso).replace(/\n/g,'<br><br>'))
      +speechPart('🤝 Cierre',esc(ong.speech.cierre))
      +'</div>';
    h+=fsec(ong.id,1,'🎙️','Ejemplo de storytelling',b);
  }

  if(ong.dato){
    b=`<div class="datobox"><div class="datobadge" aria-hidden="true">📌 Fuente</div><div class="datotext">${esc(ong.dato)}</div><div class="datosrc">Fuente: <a href="${safeUrl(ong.dato_url)}" target="_blank" rel="noopener">${ong.dato_fuente?esc(ong.dato_fuente):esc(ong.dato_url)}</a></div></div>`;
    h+=fsec(ong.id,10,'📅','Dato del año',b);
  }

  if(ong.videos&&ong.videos.length){
    b='';
    for(let vi=0;vi<ong.videos.length;vi++){var v=ong.videos[vi];b+=`<a href="${safeUrl(v.url)}" target="_blank" rel="noopener" class="wlink wlink-col"><span style="font-weight:700">▶ ${esc(v.titulo)}</span><span style="font-size:.75em;color:var(--muted)">${esc(v.tipo)} · ${esc(v.duracion)} · ${esc(v.anio)}</span></a>`;}
    h+=fsec(ong.id,13,'🎬','Vídeos',b);
  }

  if(ong.fuentesCompletas&&ong.fuentesCompletas.length){
    b='';
    for(let i=0;i<ong.fuentesCompletas.length;i++){var fc=ong.fuentesCompletas[i];b+=`<a href="${safeUrl(fc.url)}" target="_blank" rel="noopener" class="wlink wlink-spaced" aria-label="${esc(fc.texto)} (abre en nueva pestaña)">🔗 ${esc(fc.texto)}</a>`;}
    h+=fsec(ong.id,11,'📚','Fuentes y web',b+webVerif(ong));
  } else {
    h+=fsec(ong.id,12,'🔗','Web oficial',webVerif(ong));
  }
  h+=`</div>`;
  view.innerHTML=h;
}

/* ==================================================
   EVENTOS · transiciones de estado
================================================== */
function selectOng(id){
  state.currentOng=id;
  var o=getOng();
  if(o)document.title=o.nombre;
  updateTabs();
  renderFicha();
  dom.ficha.setAttribute('aria-labelledby','tab-'+id);
  window.scrollTo({top:0,behavior:'smooth'});
}
function toggleCaptacion(){
  state.captacionMode=!state.captacionMode;
  updateTabs();
  renderFicha();
}
function toggleTheme(){
  var l=dom.body.classList.toggle('light');
  dom.themeBtn.textContent=l?'☀️':'🌙';
  dom.themeBtn.setAttribute('aria-pressed',l?'true':'false');
  try{localStorage.setItem('wt',l?'1':'0');}catch(e){}
}
function toggleAllSections(btn){
  var expand=btn.getAttribute('data-expanded')==='false';
  dom.ficha.querySelectorAll('.fsec-h').forEach(function(x){
    x.classList.toggle('open',expand);
    x.setAttribute('aria-expanded',String(expand));
  });
  btn.setAttribute('data-expanded',String(expand));
  btn.textContent=expand?'⊟ Colapsar todo':'⊞ Expandir todo';
  btn.setAttribute('aria-label',(expand?'Colapsar':'Expandir')+' todas las secciones de la ficha');
}
/* Delegación: un solo listener para tabs y otro para toda la ficha */
function tabsClick(e){
  var t=e.target.closest('.otab');
  if(t)selectOng(t.getAttribute('data-id'));
}
function fichaClick(e){
  var t=e.target.closest('.cappill-sec,.cappill-back,.sec-toggle-all,.fsec-h,.phdr');
  if(!t)return;
  if(t.classList.contains('cappill-sec')||t.classList.contains('cappill-back')){toggleCaptacion();return;}
  if(t.classList.contains('sec-toggle-all')){toggleAllSections(t);return;}
  if(t.classList.contains('fsec-h')){
    var open=t.classList.toggle('open');
    t.setAttribute('aria-expanded',open?'true':'false');
    return;
  }
  var p=document.getElementById(t.getAttribute('data-pid'));
  var openP=p.classList.toggle('open');
  t.setAttribute('aria-expanded',openP?'true':'false');
}
function tabKeydown(e){
  var tabs=Array.from(dom.tabs.querySelectorAll('.otab'));
  var idx=tabs.findIndex(function(t){return t.getAttribute('data-id')===state.currentOng;});
  var next=-1;
  if(e.key==='ArrowRight'||e.key==='ArrowDown') next=(idx+1)%tabs.length;
  else if(e.key==='ArrowLeft'||e.key==='ArrowUp') next=(idx-1+tabs.length)%tabs.length;
  else if(e.key==='Home') next=0;
  else if(e.key==='End') next=tabs.length-1;
  else return;
  e.preventDefault();
  selectOng(tabs[next].getAttribute('data-id'));
  tabs[next].focus();
}
function setHdrH(){if(dom.hdr)document.documentElement.style.setProperty('--hdr-h',dom.hdr.offsetHeight+'px');}

/* ==================================================
   INICIALIZACIÓN
================================================== */
window.addEventListener('DOMContentLoaded',function(){
  /* el tema ya lo aplicó el script inline del body; aquí solo se sincroniza el botón */
  if(dom.body.classList.contains('light')){dom.themeBtn.textContent='☀️';dom.themeBtn.setAttribute('aria-pressed','true');}
  dom.themeBtn.addEventListener('click',toggleTheme);
  renderTabs();renderFicha();
  dom.tabs.addEventListener('click',tabsClick);
  dom.tabs.addEventListener('keydown',tabKeydown);
  dom.ficha.addEventListener('click',fichaClick);
  setHdrH();
  window.addEventListener('resize',setHdrH);
  window.addEventListener('resize',function(){requestAnimationFrame(updateNavBadge);});
  requestAnimationFrame(function(){dom.body.classList.add('ready');});
});
</script>
</body>
