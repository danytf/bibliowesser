 de teclas (Neurokeys) y biomarcadores del habla — sin necesidad de desplazarse al centro. ALFA10 está conectado al proyecto europeo AD-RIDDLE (2024-2028, presupuesto de 31M€, cofinanciado por la Comisión Europea), que reúne a 6 países europeos y EE.UU. para crear una plataforma modular de cribado del Alzheimer.", "dato": "ALFA10: recontacta a la cohorte histórica, +2.000 personas · Cohorte: ALFA(2.743)→ALFA+(450)→ALFA10(+2.000) · Apps Cogstate/NeoTiv + Neurokeys + habla · Conectado a AD-RIDDLE (31M€, 2024-2028, 6 países+EEUU) · Dr. Gonzalo Sánchez"}, {"emoji": "💊", "name": "4 ensayos clínicos activos — Los primeros fármacos modificadores", "desc": "2025 es un año bisagra para el Alzheimer: por primera vez llegan los primeros fármacos modificadores de la enfermedad, y el BBRC participa activamente en los ensayos clínicos clave. Los 4 ensayos en curso son: AHEAD A3-45 (lecanemab, anticuerpo anti-beta-amiloide, 1.400 participantes de todo el mundo, prevención en personas de 55-80 años con alto riesgo); LAKI (remternetug, anticuerpo anti-amiloide, ~1.200 participantes de 250+ centros en América, Asia, España y Reino Unido, fase III); ReTain (inmunoterapia activa anti-tau fosforilada en Alzheimer preclínico); y AACO/TRAILBLAZER-ALZ 5 (donanemab, anticuerpo anti-amiloide, fase III, evaluaciones cognitivas y neuroimagen).\n\nEl BBRC está en uno de los únicos dos países europeos en el ensayo LAKI (España y Reino Unido), lo que refleja su reconocimiento internacional.\n\n2021-2024 marca una nueva era: tras décadas con solo fármacos sintomáticos (Tacrine 1993, Donepezil 1996, Rivastigmine 2000, Galantamine 2001, Memantine 2003), llegaron los primeros fármacos modificadores de la enfermedad: Aducanumab (2021), Lecanemab (2023) y Donanemab (2024).\n\nSin embargo, actualmente solo alrededor del 6% de las personas con Alzheimer son elegibles para estos tratamientos según estudios en clínicas especializadas europeas (criterios EMA: fase inicial, sin doble copia ApoE4, sin comorbilidades graves) — lo que subraya la urgencia de la detección precoz mediante biomarcadores en sangre, que permitirá identificar a quién tratar y cuándo.", "dato": "4 ensayos activos · AHEAD: lecanemab · LAKI: remternetug · ReTain: anti-tau · AACO: donanemab · BBRC en uno de 2 países europeos en LAKI · Nuevos fármacos: Aducanumab(2021)·Lecanemab(2023)·Donanemab(2024) · Solo ~6% pacientes elegibles actualmente (criterios EMA: fase inicial + ApoE4 0-1 copias + sin comorbilidades graves)"}, {"emoji": "🧠", "name": "Minicerebros — investigar el Alzheimer sin experimentación animal", "desc": "Una de las líneas más innovadoras del grupo de Genómica del BBRC es la creación de \"minicerebros\" (organoides cerebrales): cultivos celulares tridimensionales que reproducen la estructura del cerebro humano, generados a partir de células madre obtenidas de muestras de sangre de los propios participantes — sin necesidad de experimentación animal. Iniciado en 2022 y liderado por la Dra. Laura García González, este proyecto permite simular el desarrollo del Alzheimer y estudiar sus factores genéticos en un entorno controlado, alcanzando organoides de hasta 3-4 mm³.\n\nGracias a esta tecnología, los investigadores pueden estudiar los mecanismos moleculares y celulares de las primeras etapas del Alzheimer, acercándose cada vez más a prevenir, ralentizar o incluso detener su progreso.\n\nLa campaña \"Minicerebros para pensar en grande\" busca recaudar 250.000€ para ampliar esta línea de investigación — una forma muy visual y emocional de explicar a cualquier persona en la calle qué hace realmente un investigador de Alzheimer.", "dato": "\"Minicerebros\" (organoides cerebrales) desde 2022 · Dra. Laura García González · Sin experimentación animal · Tamaño máx. 3-4 mm³ · Campaña: 250.000€"}, {"emoji": "😴", "name": "Prevención — ALFASleep y PENSA: hábitos que cambian el cerebro", "desc": "Si el Alzheimer empieza a gestarse hasta 20 años antes de los primeros síntomas, la prevención mediante hábitos de vida es una de las líneas más esperanzadoras de la investigación. El estudio ALFA+ (450 participantes sin alteraciones cognitivas de la cohorte ALFA, de los cuales unos 400 activos en 2025) analiza la asociación entre marcadores de fluidos, neuroimagen, biomarcadores y factores clínicos para describir la fase preclínica del Alzheimer.\n\nEl proyecto ALFASleep, con 200 participantes de ALFA+, demostró en 2025 que la fragmentación del sueño causa cambios estructurales en regiones cerebrales vulnerables al Alzheimer, incluso en personas sin deterioro cognitivo — siendo el efecto más pronunciado en mujeres.\n\nEl estudio PENSA demostró que una intervención combinada de hábitos saludables más un compuesto del té verde mejora la cognición hasta 4,5 veces y reduce aproximadamente un 25% el riesgo de desarrollar demencia.\n\nAdemás, la investigación en factores de riesgo modificables (Lancet Commission, 2020) estima que un 40% de las demencias mundiales podrían prevenirse o retrasarse actuando sobre 12 factores: desde la educación y la pérdida auditiva hasta el sedentarismo, el tabaquismo, la depresión, el aislamiento social y la contaminación del aire.", "dato": "ALFA+: 450 participantes (≈400 activos en 2025) · ALFASleep: sueño fragmentado → daño cerebral (más en mujeres) · PENSA: hábitos+té verde → ×4,5 cognición, -25% riesgo demencia · 40% demencias mundiales potencialmente prevenibles (12 factores, Lancet 2020)"}, {"emoji": "🔬", "name": "7 grupos de investigación y consorcios internacionales", "desc": "El BBRC cuenta a mediados de 2026 con 7 grupos de investigación. En 2025 se incorporaron dos: el grupo del Dr. Salvador Macip (mecanismos biológicos del envejecimiento y neurodegeneración, incluyendo senescencia celular) y el grupo de la Dra. Sandra Acosta (Modelos de Enfermedades Neurológicas, con organoides cerebrales y células madre pluripotentes).\n\nEn 2026 se sumó un nuevo Grupo de Investigación en IA y Datos de Salud, liderado por el Dr. Joaquín Dopazo, centrado en integrar datos genómicos, clínicos, cognitivos, de neuroimagen y de estilo de vida mediante inteligencia artificial para mejorar la predicción y comprensión del Alzheimer. Los grupos restantes cubren: Investigación Clínica y Factores de Riesgo; Neuroimagen; Biomarcadores en Fluidos y Neurología Traslacional; y Genómica.\n\nEl BBRC participa en 6 consorcios internacionales: MenoBrain (red Marie Skłodowska-Curie, menopausia y riesgo de Alzheimer en mujeres); SpeechDx (biomarcadores del habla); ASTRO-PET (neuroinflamación y trazador PET); AD-RIDDLE (herramientas de detección y diagnóstico en Europa, 5 años); PROMINENT (IA y economía de la salud en neurodegeneración); y COMMUTE (COVID-19 y riesgo de neurodegeneración).\n\nEn 2025 publicó 80 artículos en revistas científicas (84% en Q1, 65% en D1) y participó en 46 conferencias internacionales.", "dato": "7 grupos · 2 nuevos en 2025 (Macip y Acosta) + 1 en 2026 (Dopazo, IA y Datos de Salud) · 6 consorcios internacionales · 80 publicaciones (84% Q1) · 46 conferencias"}, {"emoji": "👩‍🦳", "name": "Acompañamiento a personas cuidadoras", "desc": "Cuidar a una persona con Alzheimer puede generar problemas físicos y psicológicos derivados del estrés y la sobrecarga — y el bienestar de quien cuida repercute directamente en la calidad de los cuidados que recibe la persona enferma. Por eso la Fundación ofrece programas grupales gratuitos dirigidos a familiares cuidadores.\n\nLos Grupos Terapéuticos Presenciales (Barcelona y Madrid) organizaron 7 nuevos grupos en 2025 con 70 cuidadores; desde 2013, han atendido a 1.723 personas en 184 grupos en todo el territorio.\n\nEl programa online 'Aprende a Cuidar y a Cuidarte' organizó 32 grupos en 2025 con 320 personas cuidadoras; desde 2021, ha acompañado a 1.090 personas en 120 grupos. Ambos programas abordan la evolución de la enfermedad, el manejo de síntomas, la comunicación con la persona diagnosticada, los recursos comunitarios y, sobre todo, el autocuidado.\n\nLa Fundación también publicó una Guía de Síntomas Psicológicos y Conductuales del Alzheimer (financiada por la Diputación de Barcelona) y el estudio Cuidar Mejor (con IMSERSO), centrado en cuidadoras profesionales: el 90% son mujeres de entre 45 y 65 años, con más de 8 años de experiencia media, y casi el 70% no ha recibido formación específica sobre Alzheimer pese a tener gran interés en recibirla.", "dato": "184 grupos terapéuticos / 1.723 personas desde 2013 · 120 grupos online / 1.090 personas desde 2021 · 2025: 70 + 320 nuevas personas · Estudio Cuidar Mejor (IMSERSO): 90% mujeres, 70% sin formación"}, {"emoji": "🌱", "name": "Plenamente Activas — acompañar a quien recibe el diagnóstico", "desc": "Recibir un diagnóstico de Alzheimer es un golpe que requiere acompañamiento para favorecer el bienestar y mantener la autonomía. 'Plenamente Activas' es un programa de intervención psicológica grupal para personas en fases iniciales de la enfermedad y con conciencia de su diagnóstico: grupos de 6 personas, 8 sesiones semanales de 1 hora, gratuitas y presenciales con terapeutas profesionales, tras una valoración cognitiva previa. Actualmente se realiza en Barcelona.\n\nEn 2025 organizó 3 grupos con 18 personas diagnosticadas en fase inicial. El programa busca comprender mejor la enfermedad, promover hábitos saludables, dar a conocer tratamientos no farmacológicos, fortalecer la identidad y el propósito de vida, y favorecer la implicación activa en la vida social.\n\nEstá enmarcado en el Estudio PLENA, que busca validar científicamente los beneficios de este tipo de intervención psicosocial.\n\nTodo esto se complementa con la plataforma AreaAlzheimer (financiada por el Fondo Europeo Next Generation, el Plan de Recuperación del Gobierno de España y la Generalitat de Catalunya), con 1.867 usuarios registrados y cuatro espacios: información, comunidad y foros, formación y acompañamiento, y participación en estudios — incluyendo el Estudio CuiDem (intervención grupal en cuidadores), la guía Co-Care OCoP sobre innovación TIC en Alzheimer, y el Test de Zarit para medir la sobrecarga de la persona cuidadora.", "dato": "Plenamente Activas: grupos de 6, 8 sesiones/1h semanales, gratuitas (Barcelona) · 2025: 3 grupos/18 personas · Estudio PLENA · AreaAlzheimer: 1.867 usuarios (Next Gen EU + Gob. España + Generalitat)"}, {"emoji": "📢", "name": "Divulgación — Brain Film Fest y 1,4M de visitas al blog", "desc": "La Fundación Pasqual Maragall tiene uno de los programas de divulgación sobre el Alzheimer más activos de España.\n\nEn 2025: 76 charlas divulgativas en todo el territorio; 1,4 millones de visitas al blog 'Hablemos sobre el Alzheimer'; 8ª edición del Brain Film Fest (CCCB Barcelona, 6.389 espectadores, 44 actividades, Premio Especial a la trilogía de Nicolas Philibert sobre salud mental); 3.015 impactos en medios, con una audiencia total de 757 millones de personas y un valor publicitario equivalente de 22 millones de euros; y 137.599 seguidores en redes sociales con 909.208 interacciones.\n\nEn 2026, la Fundación publicó la guía gratuita \"La comunicación con una persona con Alzheimer\", con consejos prácticos para mejorar la relación comunicativa con la persona afectada, descargable desde su web.", "dato": "76 charlas · 1,4M visitas al blog · Brain Film Fest: 6.389 espectadores (8ª edición) · 3.015 impactos en medios, 757M audiencia · 137.599 seguidores redes · Guía gratuita de comunicación (2026)"}, {"emoji": "🏛️", "name": "Acción institucional — el Alzheimer como prioridad de salud pública", "desc": "Más allá de la ciencia y la divulgación, la Fundación trabaja para situar el Alzheimer en la agenda política. Ha trasladado al Parlamento de Cataluña la necesidad de abordar esta enfermedad como una prioridad de salud pública.\n\nEl Observatorio del Alzheimer y las Demencias, impulsado con Novo Nordisk, publicó su Estudio sobre la percepción social del Alzheimer en España (2025), que confirma que la enfermedad se consolida como una de las principales preocupaciones de salud de los españoles — la 2ª tras el cáncer, y la 1ª entre las personas mayores.\n\nEn 2026, la Fundación recibió la visita de Lenny Shallcross, director ejecutivo del World Dementia Council, y abrió una nueva convocatoria de investigación en colaboración con la Alzheimer's Association de EE.UU. — dos gestos que refuerzan su posición como referente internacional más allá de las fronteras españolas. Los Premios Diana Garrigosa reconocen anualmente iniciativas y personas destacadas en la lucha contra el Alzheimer.", "dato": "Parlamento de Cataluña: Alzheimer como prioridad de salud pública · Observatorio (con Novo Nordisk): 2ª preocupación de salud tras cáncer, 1ª entre mayores · Visita World Dementia Council (2026) · Convocatoria con Alzheimer's Association · Premios Diana Garrigosa"}, {"emoji": "💰", "name": "Actividad económica — 30,7M€, 57% a investigación", "desc": "La Fundación Pasqual Maragall y el BBRC tuvieron en 2025 un presupuesto conjunto de 30.735.836€. El origen de los ingresos: 59% de particulares (socios y donantes, 18.260.816€); 30% de empresas y fundaciones (9.204.183€); 8% de fondos públicos (subvenciones estatales y europeas, 2.617.677€); 2% de venta de servicios (428.937€); y 1% de ingresos financieros.\n\nEl destino del gasto: 57% a programas de investigación (17.532.360€); 22% a la red de socios y donantes (6.909.741€); 16% a apoyo a familias, sensibilización e incidencia pública (4.823.133€); y solo 4% a administración (1.299.729€). Estos cuatro porcentajes suman 99% por redondeo; el 1% restante (~170.873€) corresponde a partidas menores no desglosadas individualmente.\n\nLa Fundación tiene 290 trabajadores en total (176 en la Fundación y 114 en el BBRC, con 66-68% de mujeres en ambas entidades). Por cada euro destinado a conseguir nuevos socios, se obtiene un retorno de 3 euros. Del 2013 al 2025, la Fundación ha invertido más de 93 millones de euros en investigación.", "dato": "30,7M€ presupuesto · 57% a investigación (17,5M€) · 4% administración · 290 trabajadores · 93M€ histórico en investigación (2013-2025) · Retorno ×3"}], "fondos": [{"label": "Programas de investigación (BBRC y becas)", "pct": 57}, {"label": "Red de socios y campañas (retorno ×3)", "pct": 22}, {"label": "Apoyo familias, sensibilización e incidencia", "pct": 16}, {"label": "Administración", "pct": 4}, {"label": "Otras partidas no desglosadas (redondeo)", "pct": 1}], "web": "https://fpmaragall.org", "problema": "El Alzheimer empieza a desarrollarse hasta 20 años antes de que aparezcan los primeros síntomas. Cuando llega el olvido, el daño lleva dos décadas acumulándose silenciosamente en el cerebro — la ventana real para intervenir es ahora, no cuando ya hay diagnóstico.\n\nEn España hay 900.000 personas con Alzheimer u otra demencia, y a nivel mundial 416 millones de personas están ya en algún punto del \"continuo\" de la enfermedad (32 millones con demencia, 69 millones en fase prodrómica y el resto en fase preclínica).\n\nSi nada cambia, 1 de cada 2 personas verá su vida devastada por la demencia: bien por desarrollarla ella misma, bien por tener que cuidar a alguien que la padece. No es una enfermedad \"de otros\" — es prácticamente una moneda al aire.\n\nY aunque por primera vez existen fármacos que modifican el curso de la enfermedad (Lecanemab, Donanemab), solo alrededor del 6% de los pacientes son elegibles para recibirlos según estudios europeos en clínicas especializadas, porque llegan cuando el daño ya está muy avanzado. Por eso la detección precoz no es un detalle técnico: es la diferencia entre poder actuar cuando el cerebro todavía puede protegerse o llegar cuando el daño ya es irreversible.", "motivosSocio": ["El pitch que se explica solo: han descubierto un análisis de sangre que detecta el Alzheimer 20 años antes de que aparezca, con más del 90% de precisión, publicado en Nature Medicine — comparable a la punción lumbar pero accesible y poco invasivo. Es, probablemente, el avance más fácil de transmitir de toda esta guía.", "Esto le toca a casi todo el mundo, no es \"cosa de otros\": 2 de cada 3 españoles tienen o han tenido en su entorno cercano a alguien con Alzheimer. Y para quienes ya cuidan a esa persona, la Fundación ofrece Grupos Terapéuticos gratuitos para familiares cuidadores — 184 grupos y 1.723 personas acompañadas desde 2013, porque el bienestar de quien cuida repercute directamente en la calidad de los cuidados que recibe el enfermo. La Fundación pasó de 147 socios en 2012 a más de 112.000 en 2025, alcanzando el hito de los 100.000 durante este último año: cada vez más gente entiende que esto les afecta directamente. Muestra de ese crecimiento: en 2026 la Fundación celebró en el Auditorio Nacional de Música de Madrid su primer gran encuentro de socios en la capital desde su creación hace 18 años, con más de 500 asistentes y el testimonio de Manuel Sánchez Pingarrón, una persona diagnosticada de Alzheimer.", "Escala europea real: ALFA10, el proyecto más ambicioso del BBRC para esta década, está conectado al consorcio europeo AD-RIDDLE — 31 millones de euros, 6 países europeos más EE.UU., para crear un sistema de cribado del Alzheimer mediante análisis de sangre que podría implementarse en sistemas de salud reales.", "Ciencia sin experimentación animal: el BBRC ha creado \"minicerebros\" — organoides cerebrales cultivados en laboratorio a partir de una simple muestra de sangre — que permiten simular el Alzheimer y probar tratamientos en un entorno controlado, sin recurrir a animales.", "Lo que financias no es solo ciencia de laboratorio, también cambia hábitos cotidianos: el 40% de los casos de demencia en el mundo son potencialmente prevenibles actuando sobre 12 factores de riesgo (Lancet 2020). El estudio PENSA de la Fundación, que combina hábitos saludables con té verde, ha demostrado mejoras de hasta ×4,5 en cognición y una reducción del 25% en el riesgo de demencia. Y el proyecto ALFASleep está investigando algo tan cotidiano como el sueño fragmentado y su relación con el daño cerebral — especialmente en mujeres."], "fuentesCompletas": [{"texto": "Fundación Pasqual Maragall · Informe de Impacto 2025 (documento principal de esta ficha)", "url": "https://fpmaragall.org/memoria2025/files/Memoria_2025_ES.pdf"}, {"texto": "BBRC · Estudio Alfa, ALFA10 y AD-RIDDLE (31M€, 24 partners EU+UKRI)", "url": "https://www.barcelonabeta.org/en/news/news/ihi-launches-ad-riddle-interdisciplinary-initiative-help-prevent-and-treat-alzheimers"}], "verificado": "Datos verificados junio 2026", "captacion": {"resumen30": {"cifras": ["900.000", ">90%", "112.842"], "labels": ["personas con Alzheimer u otra demencia en España", "precisión de un análisis de sangre para detectar el Alzheimer, publicado en Nature Medicine", "socios y socias a cierre de 2025, hito de los 100.000 alcanzado este año"], "cierre": "Por eso la detección precoz no es un detalle técnico: es la diferencia entre poder actuar o llegar demasiado tarde.", "videoDestacado": {"url": "https://www.youtube.com/watch?v=_jY8QtNU1b4", "titulo": "Por un futuro sin Alzheimer", "duracion": "4:19"}}, "proyectosClave": [0, 1, 3], "argumentario": [0, 1, 2]}, "speech": {"parada": "¿Te puedo contar algo de minuto y medio? Es sobre el Alzheimer, y probablemente no lo sabes — cambia bastante las cosas.", "discurso": "El Alzheimer no empieza cuando aparecen los primeros olvidos. Empieza hasta 20 años antes — en silencio, sin ningún síntoma, mientras la persona vive su vida totalmente normal. Cuando llega el diagnóstico, el daño ya lleva dos décadas acumulándose. Eso significa que alguien que hoy tiene 50 o 55 años y se siente perfectamente bien, podría estar ya en ese proceso sin saberlo.\n\nEn España hay 900.000 personas con Alzheimer u otra demencia. Y la cifra que de verdad debería hacernos parar: si nada cambia, 1 de cada 2 personas verá su vida afectada por esta enfermedad — bien porque la desarrolle ella misma, bien porque tenga que cuidar a alguien que la tiene. No es \"cosa de otros\". Es, literalmente, una moneda al aire para cualquiera.\n\nAquí es donde entra algo que ha cambiado en 2025: un equipo de investigadores descubrió un análisis de sangre capaz de detectar el Alzheimer con más del 90% de precisión, antes de que aparezca ningún síntoma — publicado en Nature Medicine, comparable a una punción lumbar pero sin necesidad de sedación. Esto importa porque ahora mismo existen fármacos que pueden modificar el curso de la enfermedad —Lecanemab, Donanemab— pero solo alrededor del 6% de los pacientes son elegibles según estudios europeos, porque normalmente llegan cuando el daño ya está muy avanzado. Con detección 20 años antes, eso cambia por completo.\n\nDetrás de este avance está la Fundación Pasqual Maragall, a través del BBRC — uno de los centros de investigación sobre Alzheimer más importantes de Europa. Tienen una cohorte de más de 2.700 personas en seguimiento desde hace años. Y tienen un proyecto, ALFA10, conectado a un consorcio europeo de 8 países con 31 millones de euros. Incluso investigan sin experimentación animal, usando \"minicerebros\" — organoides cerebrales cultivados a partir de una simple muestra de sangre.\n\nY no es solo investigación de laboratorio: el 40% de los casos de demencia en el mundo son potencialmente prevenibles actuando sobre hábitos cotidianos —sueño, ejercicio, alimentación—, y la Fundación tiene programas específicos sobre esto, además de acompañamiento gratuito para las más de 1.700 personas que ya cuidan a un familiar con Alzheimer.", "cierre": "El 57% del presupuesto de la Fundación va directo a investigación. Por unos 12 euros al mes — unos 140-150 al año — formas parte de los 112.842 socios que hacen posible que, la próxima vez que alguien tenga ese 50% de probabilidades, exista una forma de saberlo a tiempo. ¿Te apuntas?"}, "videos": [{"titulo": "Por un futuro sin Alzheimer", "tipo": "Spot institucional de campaña", "duracion": "4:19", "url": "https://www.youtube.com/watch?v=_jY8QtNU1b4", "anio": "2024"}, {"titulo": "Día Mundial del Alzheimer — Para que nadie pierda su identidad", "tipo": "Spot campaña Día Mundial sep.", "duracion": "1:15", "url": "https://www.youtube.com/watch?v=DsQ2T9Ruwxs", "anio": "2024"}, {"titulo": "100.000 socios — Esther y Víctor Manuel", "tipo": "Testimonio de socios — hito 100.000", "duracion": "2:01", "url": "https://www.youtube.com/watch?v=gHHw7htuTXw", "anio": "2023"}, {"titulo": "100.000 socios — Montserrat y Enrique", "tipo": "Testimonio de socios — hito 100.000", "duracion": "1:56", "url": "https://www.youtube.com/watch?v=YGWpLGXa1NY", "anio": "2023"}, {"titulo": "¿Es posible detectar el Alzheimer antes de los primeros síntomas?", "tipo": "Divulgación científica — detección precoz", "duracion": "1:48", "url": "https://www.youtube.com/watch?v=BGp65TN5OVQ", "anio": "2024"}, {"titulo": "¿Cómo empieza el Alzheimer? — Conoce la Investigación", "tipo": "Divulgación científica", "duracion": "1:57", "url": "https://www.youtube.com/watch?v=9t1huEf2cUw", "anio": "2024"}, {"titulo": "El camino del Alzheimer — Cap. 1: Poniendo nombre al Alzheimer", "tipo": "Serie divulgativa — episodio 1", "duracion": "1:11", "url": "https://www.youtube.com/watch?v=UR4lZmpxUwU", "anio": "2024"}, {"titulo": "El camino del Alzheimer — Cap. 2: La principal causa de demencia", "tipo": "Serie divulgativa — episodio 2", "duracion": "1:17", "url": "https://www.youtube.com/watch?v=cA6BRL0Txdo", "anio": "2024"}, {"titulo": "El camino del Alzheimer — Cap. 3: Las proteínas beta-amiloide y tau", "tipo": "Serie divulgativa — episodio 3", "duracion": "1:21", "url": "https://www.youtube.com/watch?v=T8tuK6E_06s", "anio": "2024"}, {"titulo": "El camino del Alzheimer — Cap. 4: Técnicas de neuroimagen", "tipo": "Serie divulgativa — episodio 4", "duracion": "1:14", "url": "https://www.youtube.com/watch?v=20eUq_gobt4", "anio": "2024"}, {"titulo": "El camino del Alzheimer — Cap. 5: Cuando te cuidas, el Alzheimer da un paso atrás", "tipo": "Serie divulgativa — episodio 5", "duracion": "1:05", "url": "https://www.youtube.com/watch?v=7SETRpdQsko", "anio": "2024"}], "ultimaActualizacion": "junio 2026"}</script>
<script type="application/json" id="data-fec">{"id": "fec", "emoji": "❤️", "nombre": "FEC", "full": "Fundación Española del Corazón", "color": "#ef4444", "claim": "Fundada en 1967 como Fundación Hispana de Cardiología; adoptó su nombre actual (\"Fundación Española del Corazón\") en 1995, con S.A.R. la Infanta Doña Margarita de Borbón como presidenta de honor desde entonces.\n\nPresidida desde 2022 por el Dr. Andrés Íñiguez Romo, jefe de Cardiología del Hospital Álvaro Cunqueiro de Vigo y expresidente de la SEC (2015-2017), creador de SEC-Calidad. Como él mismo resume: \"Lo relevante es la promoción de la salud: no se trata solo de hábitos cardiosaludables, sino de mejorar la nutrición, el comportamiento o el ejercicio. La responsabilidad del ciudadano es muy importante.\"\n\nPromovida por la Sociedad Española de Cardiología (8.593 miembros), el conocimiento médico más especializado de España al servicio de la prevención cardiovascular. 14.306 socios, 53 asociaciones de pacientes, 29.164 DEAs en la app Ariadna.", "meta": [{"label": "Fundada", "val": "1967"}, {"label": "Promotora", "val": "SEC (8.593 miembros)"}, {"label": "Socios FEC", "val": "14.306"}, {"label": "DEAs Ariadna", "val": "29.164 registrados"}], "cifras": [{"num": "57,3%", "label": "De los españoles tiene 2 o más factores de riesgo cardiovascular simultáneos (ESFEC 2021). El factor más prevalente no es el colesterol: es dormir mal (36,2% de los españoles).", "fuente": "FEC · Encuesta de Salud Cardiovascular ESFEC 2021"}, {"num": "10,8%", "label": "Supervivencia media ante parada cardíaca extrahospitalaria en España. Con RCP inmediata y desfibrilador en menos de 5 minutos, la probabilidad aumenta significativamente.", "fuente": "Fundación MAPFRE / OHSCAR 2025"}, {"num": "29.164", "label": "DEAs (desfibriladores) registrados en la app Ariadna del programa PACS, con 71.099 usuarios voluntarios. Galicia es la primera CCAA en integrar Ariadna en el sistema de emergencias 061.", "fuente": "FEC · Memoria Anual 2025"}, {"num": "10 M", "label": "Personas con hipertensión en España, de las cuales 3 millones no saben que la padecen. Es el principal factor de riesgo prevenible de la enfermedad cardiovascular.", "fuente": "Revista FEC nº 160 · Verano 2026"}, {"num": "17,9 M", "label": "Muertes al año en el mundo por enfermedad cardiovascular (ECV) — más que todas las formas de cáncer combinadas. En España, las ECV causan unas 120.000 muertes al año (una cada 4 minutos) y generan un coste anual superior a 7.700 millones € (estimación PwC/Farmaindustria 2020, incluyendo atención sanitaria y pérdida de productividad).", "fuente": "OMS (mortalidad mundial y España) / PwC-Farmaindustria 2020 (coste económico)"}, {"num": "80%", "label": "De los eventos cardiovasculares mayores son prevenibles actuando sobre los factores de riesgo modificables. La enfermedad cardiovascular es la que más mata y la más evitable.", "fuente": "OMS / FEC"}], "programas": [{"emoji": "⚡", "name": "PACS y app Ariadna — 29.164 DEAs, 71.099 usuarios", "desc": "El Programa de Áreas Cardioseguras (PACS) certifica espacios con desfibrilador (DEA) y personal formado en RCP. Su pieza central es la app Ariadna RCP — creada conjuntamente por la FEC, la Sociedad Española de Cardiología (SEC) y Cruz Roja — diseñada para localizar en segundos al voluntario con conocimientos en RCP y el DEA más cercano cuando se produce una parada cardiorrespiratoria.\n\nEn 2025, Ariadna tiene 29.164 DEAs registrados y 71.099 usuarios voluntarios en toda España.\n\nEn 2025 se produjo un hito clave: Galicia fue la primera comunidad autónoma en integrar Ariadna en el sistema de Emergencias Sanitarias de Galicia-061, de modo que cuando se llama al 061 por una parada cardíaca, el sistema activa automáticamente a los voluntarios Ariadna más cercanos. Además, la FEC firmó un convenio con Gestión de Servicios para la Salud y Seguridad de Canarias (GSC) para la integración en Canarias.\n\nLa supervivencia ante una parada cardíaca extrahospitalaria en España es del 10,8%. Cada minuto sin desfibrilación reduce las posibilidades de supervivencia entre un 7 y un 10%. Ariadna resuelve exactamente ese problema.", "dato": "29.164 DEAs · 71.099 usuarios Ariadna · Galicia: primera CCAA integrada en 061 · 10,8% supervivencia media parada cardiaca extrahospitalaria · Ariadna: creada junto con Cruz Roja y SEC"}, {"emoji": "🎯", "name": "Campaña hipertensión — Hay peligros que no te ves venir", "desc": "Campaña de concienciación lanzada por la FEC y la Sociedad Española de Cardiología (SEC), avalada por más de 20 entidades. Su objetivo es concienciar a la población de la importancia de medirse la presión arterial de forma habitual: una cifra igual o superior a 140/90 mmHg en dos o tres ocasiones requiere acudir al médico.\n\nLa campaña incluye spot, infografías, materiales descargables y activaciones con mediciones de tensión en hospitales de toda España (Rey Juan Carlos, Infanta Elena, Hospital de Canarias, Álvaro Cunqueiro, Hospital Central de la Defensa…).\n\nCuenta con el apoyo de cardiólogos influencers como Aurelio Rojas y José Abellán. Materiales disponibles en peligrosquenotevesvenir.com.", "dato": "140/90 mmHg: umbral de hipertensión · Avalada por +20 entidades · Activaciones en hospitales de toda España · peligrosquenotevesvenir.com"}, {"emoji": "🏛️", "name": "Incidencia política — Comprometidos por el corazón", "desc": "El 29 de septiembre de 2025, Día Mundial del Corazón, la FEC organizó la firma de la Declaración de Compromiso \"Comprometidos por el corazón\", suscrita por las comisiones de sanidad del Congreso de los Diputados y de las cámaras legislativas de todas las comunidades autónomas, comprometiéndose a impulsar medidas que refuercen la prevención, diagnóstico y tratamiento de las enfermedades cardiovasculares. Este es el tipo de incidencia política que financia la base social de la FEC: conseguir que todos los gobiernos autonómicos y el Congreso firmen un compromiso formal sobre salud cardiovascular, con 14.306 socios y sin financiación pública dominante.\n\nLa campaña \"PACTOS por tu corazón\" trabaja los factores de riesgo cardiovascular modificables (presión arterial, alimentación, colesterol, contaminación, tabaco, obesidad, sedentarismo y soledad).\n\nEn 2025 se celebró también la 3ª edición de los Premios imPULSO, que reconocen a entidades que impulsan la salud cardiovascular, con una nueva categoría para Centros de Educación y la participación de 28 empresas.", "dato": "Declaración de Compromiso firmada por Congreso + cámaras autonómicas (sept. 2025) · Campaña PACTOS por tu corazón · Premios imPULSO (3ª ed.): 28 empresas"}, {"emoji": "🏫", "name": "Cardioescuelas y RCP — Premios RCP Escuelas (5ª ed.)", "desc": "La formación en reanimación cardiopulmonar (RCP) desde la infancia es uno de los pilares de la FEC. Los Premios RCP Escuelas tienen tres categorías: Originalidad y Creatividad, Proyecto Formativo Integral, y Máxima Participación.\n\nEn su 4ª edición (2025) presentaron sus proyectos 16 colegios y centros de formación; la FEC ya ha convocado la 5ª edición (2026), con el plazo de candidaturas abierto hasta el 8 de octubre. El objetivo: que la RCP se enseñe en todos los colegios, desde infantil hasta bachillerato y formación profesional.\n\nLa FEC también organiza la Semana del Corazón (en torno al 29 de septiembre, Día Mundial del Corazón) con talleres de RCP y nutrición en varias ciudades de toda España.", "dato": "Premios RCP Escuelas: 4ª ed. 2025 (16 colegios participantes) · 5ª ed. 2026 convocada (plazo hasta 8 oct.) · 3 categorías · Semana del Corazón: talleres RCP y nutrición"}, {"emoji": "🥗", "name": "PASFEC — Sello de Alimentación Cardiosaludable", "desc": "El Programa de Alimentación y Salud (PASFEC) evalúa productos alimenticios con criterios nutricionales definidos por un comité de cardiólogos de la SEC. Las empresas pagan la evaluación técnica, pero el sello solo se otorga si el producto cumple los criterios establecidos, que son públicos y transparentes.\n\nEn 2025, el programa cuenta con 25 empresas adheridas, 39 productos evaluados y 200 referencias disponibles en el mercado, con la nueva adhesión de Monte Nevado. Los criterios están disponibles en pasfec.fundaciondelcorazon.com.\n\nEl programa genera un incentivo de mercado para que las empresas alimentarias mejoren el perfil nutricional de sus productos. Entre las marcas con sello PASFEC hay productos muy conocidos por los consumidores como Danacol y ProActiv Original (lácteos para reducir el colesterol), además de Boadas 1880, Gullón Ligera, Exkimo o Aromais, entre otras.\n\nLa nueva adhesión de Aperitivos Medina se sumó recientemente al programa, y PASFEC fue premiado por la Academia Española de Nutrición y Dietética por su labor de mejora del perfil nutricional de los alimentos en España.", "dato": "25 empresas · 39 productos · 200 referencias · Comité médico SEC independiente · Nueva adhesión: Monte Nevado · Criterios públicos · Marcas con sello: Danacol, ProActiv, Gullón Ligera... · Nueva adhesión: Aperitivos Medina · Premio Academia Española de Nutrición"}, {"emoji": "🏢", "name": "PECS — Programa de Empresas Cardiosaludables", "desc": "El Programa de Empresas Cardiosaludables (PECS) proporciona a las empresas adheridas herramientas y recomendaciones para mejorar la salud cardiovascular de sus empleados. En 2025 participan 9 empresas: Cruz Roja, Renfe, SEUR, Generali, Universidad Europea, Parque Móvil del Estado, ABANCA, Holcim y la nueva incorporación SEIASA (Sociedad Mercantil Estatal de Infraestructuras Agrarias).\n\nLa FEC organiza también una jornada conjunta con el Instituto Nacional de Seguridad y Salud en el Trabajo (INSST) enfocada a entornos cardioseguros y cardiosaludables en las empresas. El programa incluye formación en RCP, medición de factores de riesgo en el entorno laboral y asesoramiento en hábitos cardiovasculares.", "dato": "9 empresas adheridas 2025 · Cruz Roja, Renfe, SEUR, Generali, Holcim... · Jornada conjunta INSST · RCP y prevención en el trabajo"}, {"emoji": "🏃", "name": "Carrera Popular del Corazón — XVII edición 2026", "desc": "La Carrera Popular del Corazón surgió como herramienta para concienciar a la sociedad y promocionar el deporte como medio para combatir las enfermedades cardiovasculares. En 2025 (16ª edición presencial y 6ª virtual) participaron 4.632 personas, con la presentación conducida por el periodista Javier Callejo (Telemadrid) y el apoyo de los atletas olímpicos Yago Rojo y Azucena Díaz, además de la enfermera divulgadora Esther Gómez (@mienfermerafavorita).\n\nLa 17ª edición presencial y 7ª virtual ya está convocada para el 26 de septiembre de 2026 en Madrid Río (salida en la explanada Puente del Rey), con carrera de 10km, marcha de 4,5km y carreras infantiles según edad, y Medtronic como patrocinador oficial.", "dato": "2025: 4.632 inscritos, atletas Yago Rojo y Azucena Díaz · 2026: XVII edición, 26 sept., Madrid Río, patrocinador Medtronic"}, {"emoji": "📚", "name": "Escuela de Paciente Experto — formación gratuita para pacientes", "desc": "La Escuela de Paciente Experto de la FEC ofrece formación online gratuita para pacientes cardiópatas y sus familiares o cuidadores, con 32 profesores especializados (cardiólogos y otros especialistas) impartiendo cursos sobre fibrilación auricular, insuficiencia cardiaca, cardiopatía isquémica y lípidos, además de materias generales sobre la cardiopatía. El objetivo: que el paciente conozca su propia enfermedad para adoptar comportamientos y conductas saludables que mejoren su evolución hacia la cronicidad.\n\nLa Escuela incluye también un espacio específico de \"Cuidado del Cuidador\", reconociendo que la enfermedad cardiovascular no solo afecta al paciente sino también a quienes lo acompañan.", "dato": "4 cursos gratuitos online (FA, IC, cardiopatía isquémica, lípidos) + materias generales · 32 profesores especializados · Espacio \"Cuidado del Cuidador\""}, {"emoji": "🫀", "name": "Organización de Asociaciones de Pacientes — 53 asociaciones en todo el territorio", "desc": "La Fundación Española del Corazón coordina una red de 53 asociaciones de pacientes cardiovasculares distribuidas por todo el territorio nacional, con el objetivo de defender los intereses de los pacientes y desarrollar actividades útiles para ellos y su salud.\n\nEn 2025, el III Congreso Nacional de la Organización de Asociaciones de Pacientes FEC se celebró en la Casa del Corazón (Madrid) con 107 participantes, 7 charlas sobre patologías cardiovasculares y un taller práctico. Se realizaron dos CardioTV Live sobre la encuesta \"Percepción del riesgo cardiovascular en pacientes con cardiopatías y/o diabetes\" (880 y 151 visualizaciones respectivamente).\n\nLa campaña \"Siente tu ritmo\" (Día del Pulso, 1 de marzo), sobre fibrilación auricular, incluyó jornadas en hospitales de Madrid, Tarragona, La Paz, Granada (Hospital Clínico San Cecilio y Virgen de las Nieves) y La Princesa, con 4.600 visualizaciones en el CardioTV Live asociado. El proyecto \"Mujer y Corazón\" (bienio 2023-2025) cerró con la jornada \"La Tarde de Mujer y Corazón\" en la Casa del Corazón (más de 100 asistentes presenciales), abordando menopausia, embarazo, alimentación y deporte según la edad.", "dato": "53 asociaciones · 107 pacientes III Congreso · Siente tu ritmo: FA en hospitales (4.600 visualizaciones) · Mujer y Corazón: +100 asistentes"}, {"emoji": "🔬", "name": "Investigación e I+D — SEC: 775.225€ en becas y proyectos", "desc": "La Sociedad Española de Cardiología (SEC), promotora de la FEC, tiene una potente agencia de investigación. En 2025 otorgó 775.225€ en proyectos, becas y premios, con 25 proyectos y estudios activos y 23 nuevos proyectos evaluados.\n\nEl Congreso SEC25 (Granada, 23-25 octubre) reunió a 3.107 inscritos con 319 sesiones y 1.577 comunicaciones presentadas. La Revista Española de Cardiología recibió más de 500 originales y mantiene un factor de impacto de 4,9 (Q1). REC: Interventional Cardiology logró en 2025 su inclusión en PubMed Central.\n\nLa Liga de los Casos Clínicos 2025 tuvo 2.182 profesionales en 59 equipos y 159 casos clínicos. La SEC impulsa también SECoopera, su programa de cooperación internacional, con actividad destacada en Bolivia y Ruanda durante 2025 (ver Formación y divulgación científica).", "dato": "775.225€ en becas y proyectos SEC · 3.107 inscritos Congreso SEC25 · Factor impacto REC 4,9 (Q1)"}, {"emoji": "🎓", "name": "Formación y divulgación científica — Campus SEC, CardioTV y SECoopera", "desc": "La Sociedad Española de Cardiología (SEC), promotora de la FEC, es la principal plataforma de formación cardiológica de habla hispana. En el curso 2024-2025: Campus SEC online con 45 cursos y 8.749 alumnos matriculados; 9 cursos presenciales con 348 alumnos; 14 postgrados con 1.164 alumnos activos; y el Programa de Simulación para residentes (159 R2 formados, más 12 en nivel avanzado R4-R5).\n\nEn divulgación científica, CardioTV produjo 57 piezas audiovisuales en 2025 (Live, Focus, Flash y Talks), con hasta 2.163 visualizaciones por pieza. CardioPODCAST alcanzó su 4ª temporada con 32 episodios y una media de 1.092 escuchas en los primeros 30 días. El Blog 'Cardiología hoy' publicó 142 artículos originales con más de 1,6 millones de visitas totales.\n\nSECoopera extiende este conocimiento a países en desarrollo: en 2025, 12 voluntarios realizaron formación en Ruanda sobre fiebre reumática, y en Bolivia se gestionaron 344 casos de telemedicina, 27 implantes de marcapasos, 28 cirugías y 70 ecocardiografías en una sola semana. El examen europeo de cardiología para residentes tuvo 71 inscritos españoles con un 97% de aprobados.\n\nEn 2025, la FEC puso en marcha su tienda solidaria online, un nuevo canal para acercar productos con causa a la ciudadanía y generar recursos para sus fines sociales. También amplió su presencia digital con nuevos perfiles en TikTok, Threads y Bluesky, y su newsletter alcanza ya a 44.882 suscriptores.", "dato": "Campus SEC: 45 cursos · 8.749 alumnos · CardioTV: 57 piezas · CardioPODCAST: 32 ep/1.092 escuchas · Blog: 1,6M visitas · Bolivia: 27 implantes marcapasos · Ruanda: 12 voluntarios · Newsletter: 44.882 suscriptores · Nueva tienda solidaria online · Presencia en TikTok/Threads/Bluesky"}, {"emoji": "🌐", "name": "Internacional — EHN, WHF y congresos europeos", "desc": "La FEC participa activamente en la European Heart Network (EHN) y en la World Heart Federation (WHF). En 2025, asistió al Annual Workshop de la EHN en Estocolmo (junio) y al EACH Summit de Bruselas (diciembre), donde se presentó el Plan Europeo de Salud Cardiovascular como marco de referencia para una acción coordinada a nivel europeo.\n\nCon la WHF, participó en el World Heart Summit de Ginebra (mayo) y colaboró en el Adherence Day sobre adherencia terapéutica. En el Congreso Europeo de Cardiología celebrado en Madrid en 2025, la FEC dio soporte al cribado cardiovascular en el Cardiovascular Health Checkpoint, analizando a 1.360 personas.", "dato": "EHN: Annual Workshop Estocolmo + EACH Summit Bruselas (Plan Europeo Salud CV) · WHF: World Heart Summit Ginebra + Adherence Day · 1.360 cribados Congreso ESC Madrid"}, {"emoji": "🤝", "name": "Alianzas estratégicas — Sanitas, oncología y medio ambiente", "desc": "En 2025, la FEC se incorporó como partner científico de Healthy Cities, el programa de sostenibilidad de Sanitas para mejorar la salud de las personas y del entorno urbano fomentando la actividad física y los espacios verdes en las ciudades.\n\nTambién participó en CardiTox, una iniciativa de concienciación sobre la protección de la salud cardiovascular durante los tratamientos oncológicos, con mediciones de riesgo cardiovascular in situ — un cruce poco conocido entre cardiología y oncología.\n\nSEC-FEC Verde es una iniciativa estratégica conjunta de la SEC y la FEC que estudia el impacto de la contaminación ambiental y el cambio climático sobre la salud cardiovascular, generando evidencia científica para cuantificar ese riesgo y promover intervenciones desde una perspectiva de sostenibilidad — conectando directamente con el factor \"Contaminación\" de la campaña PACTOS por tu corazón.", "dato": "Healthy Cities (Sanitas): FEC partner científico · CardiTox: cardiología + oncología · SEC-FEC Verde: contaminación, cambio climático y salud CV"}], "fondos": [{"label": "Programas (PACS, Cardioescuelas, PECS, PASFEC) (estimado)", "pct": 50}, {"label": "Campañas de sensibilización e incidencia (estimado)", "pct": 28}, {"label": "Captación y comunicación (estimado)", "pct": 14}, {"label": "Administración (estimado)", "pct": 8}], "web": "https://fundaciondelcorazon.com", "problema": "La enfermedad cardiovascular mata a 17,9 millones de personas al año en el mundo — más que todo el cáncer combinado — y en España causa unas 120.000 muertes anuales. El 80% de esos eventos son prevenibles actuando sobre factores de riesgo modificables.\n\nY sin embargo, el 57,3% de los españoles tiene dos o más factores de riesgo cardiovascular simultáneos: el más prevalente no es el colesterol ni la hipertensión, sino algo tan cotidiano como dormir mal (un 36,2% lo hace).\n\nCuando ocurre una parada cardíaca fuera del hospital, la supervivencia en España es del 10,8% — en los países nórdicos supera el 30%. La diferencia no es genética ni de sistema sanitario: es la cultura de RCP y la densidad de desfibriladores disponibles.\n\nEsa brecha, entre lo que podríamos hacer y lo que hacemos, es exactamente el espacio donde trabaja la FEC.", "motivosSocio": ["La brecha de supervivencia que la tecnología puede cerrar: en una parada cardíaca extrahospitalaria, España sobrevive al 10,8% de los casos frente a más del 30% en los países nórdicos — la diferencia es la cultura de RCP y la densidad de desfibriladores. Ariadna, la app de DEAs de la FEC, es la primera de su tipo integrada en un sistema de emergencias 061 en España: 29.164 desfibriladores registrados y 71.099 voluntarios. En 2025, Galicia fue la primera comunidad en integrarla: cuando alguien llama al 061 por una parada cardíaca, el sistema activa automáticamente a los voluntarios cercanos.", "El conocimiento médico más especializado de España, traducido a la calle: la FEC está promovida por la Sociedad Española de Cardiología (8.593 miembros) — la ciencia que hacen los cardiólogos se convierte en programas que llegan a colegios, empresas y a la cocina de cualquier familia (PASFEC, Cardioescuelas, PECS).", "Incidencia política con resultados medibles: en septiembre de 2025, las comisiones de sanidad del Congreso de los Diputados y de todas las cámaras autonómicas firmaron la Declaración de Compromiso \"Comprometidos por el corazón\", impulsada por la FEC. Lo consiguió con 14.306 socios — sin la financiación ni la estructura de una gran organización internacional.", "Formación gratuita para quien ya tiene un diagnóstico: la Escuela de Paciente Experto de la FEC ofrece cursos online gratuitos sobre fibrilación auricular, insuficiencia cardiaca, cardiopatía isquémica y lípidos, impartidos por 32 profesionales especializados, además de un espacio dedicado al \"Cuidado del Cuidador\". No es solo prevención para quien está sano: es acompañamiento real para quien ya convive con la enfermedad, a través de la red de 53 asociaciones de pacientes que la FEC coordina por todo el territorio.", "Lo que tu cuota financia se puede ver y vivir cada año: la Carrera Popular del Corazón nació para concienciar sobre las enfermedades cardiovasculares y promover el deporte como herramienta para combatirlas. En 2025 (16ª edición presencial y 6ª virtual) participaron 4.632 personas, con el apoyo de atletas olímpicos. La XVII edición de 2026 se celebrará el 26 de septiembre en Madrid Río — no es una gala cerrada, es un evento al que cualquier socio puede ir y participar."], "fuentesCompletas": [{"texto": "Fundación Española del Corazón · Memoria Anual 2025 (documento principal de esta ficha)", "url": "https://fundaciondelcorazon.com/images/Memorias/Memoria_anual_FEC_2025.pdf"}, {"texto": "SEC · Informe de Actividad SEC-FEC 2025 (fuente de todos los datos SEC y FEC de esta ficha)", "url": "https://secardiologia.es/images/publicaciones/infografias/Memoria_anual_2025.pdf"}, {"texto": "Fundación Española del Corazón · Revista FEC nº160 (Verano 2026) — convocatoria de la 5ª edición de los Premios RCP Escuelas", "url": "https://fundaciondelcorazon.com/images/revista-fc/RevistaFundaciondelCorazon_160.pdf"}], "verificado": "Datos verificados junio 2026", "captacion": {"resumen30": {"cifras": ["57,3%", "10,8%", "29.164"], "labels": ["de los españoles tiene 2 o más factores de riesgo cardiovascular — el más prevalente no es el colesterol: es dormir mal (36,2%)", "supervivencia ante parada cardíaca extrahospitalaria en España — en los países nórdicos supera el 30%", "DEAs registrados en la app Ariadna, con 71.099 voluntarios — Galicia ya la integra en el 061"], "cierre": "Esa brecha, entre lo que podríamos hacer y lo que hacemos, es exactamente el espacio donde trabaja la FEC.", "videoDestacado": {"url": "https://www.youtube.com/watch?v=1JOaTUwnMUs", "titulo": "Parte de mí: vivir con una cardiopatía congénita", "duracion": "5:43"}}, "proyectosClave": [0, 1, 2], "argumentario": [0, 1, 2]}, "speech": {"parada": "Oye, ¿tienes un minuto y medio? Te voy a contar la historia de Javier — es ficticia, pero le pasa a gente real cada día.", "discurso": "Javier tiene 52 años. Como el 57% de los españoles, tiene dos o más factores de riesgo cardiovascular sin darse mucha importancia — el más común ni siquiera es el colesterol o la tensión: es dormir mal, algo que le pasa a más de un tercio de la población. Javier duerme mal desde hace años, y nunca lo ha relacionado con su corazón.\n\nUn día, en la calle, Javier sufre una parada cardíaca. Cae al suelo, delante de varias personas.\n\nEn España, la probabilidad de sobrevivir a esto es del 10,8%. En los países nórdicos, es más del 30%. La diferencia no es genética, ni el sistema sanitario: es si alguien cerca sabe hacer RCP y si hay un desfibrilador a mano en los primeros minutos.\n\nEsta vez, Javier tiene suerte: una persona que pasaba por allí tiene la app Ariadna, del programa PACS de la Fundación Española del Corazón. La app le avisa de que hay una parada cardíaca a pocos metros y le indica dónde está el desfibrilador más cercano — uno de los 29.164 registrados en toda España. Esa persona empieza la RCP mientras otra va a buscar el DEA. Cuando llega la ambulancia, Javier ya tiene pulso.\n\nJavier sobrevive. Y en su revisión, le diagnostican uno de los factores de riesgo que tenía sin saberlo. Ahora sigue uno de los cursos gratuitos de la Escuela de Paciente Experto de la FEC, para entender cómo cuidar su corazón — algo que existe gracias a que la Fundación está promovida por la Sociedad Española de Cardiología, más de 8.500 cardiólogos que traducen su conocimiento a programas reales: cardioescuelas que enseñan RCP en los colegios, un sello que identifica qué alimentos son realmente cardiosaludables, y programas en empresas para que haya desfibriladores también en el trabajo.\n\nEn 2025, las comisiones de sanidad del Congreso y de todas las comunidades autónomas firmaron un compromiso conjunto, impulsado por la FEC, para que historias como la de Javier terminen así con más frecuencia — y no al revés.", "cierre": "La diferencia entre el 10,8% y el 30% —entre lo que ya sabemos hacer y lo que realmente hacemos— es exactamente donde trabaja la FEC, y la financian 14.306 socios. Por unos 12 euros al mes — unos 140-150 al año — formas parte de quienes hacen que, la próxima vez, haya un desfibrilador cerca y alguien sepa usarlo. ¿Quieres ser parte de esa diferencia?"}, "videos": [{"titulo": "Parte de mí: vivir con una cardiopatía congénita", "tipo": "Testimonio de pacientes — #ParteDeMí", "duracion": "5:43", "url": "https://www.youtube.com/watch?v=1JOaTUwnMUs", "anio": "2024"}, {"titulo": "Hay peligros que no te ves venir", "tipo": "Spot de prevención cardiovascular", "duracion": "1:31", "url": "https://www.youtube.com/watch?v=O0hVQsgKsy4", "anio": "2024"}, {"titulo": "Salva vidas con Ariadna: actúa a tiempo ante una parada cardiaca", "tipo": "Spot divulgativo — app Ariadna y DEAs", "duracion": "0:59", "url": "https://www.youtube.com/watch?v=qu9mc7-srT8", "anio": "2024"}, {"titulo": "Si te cuidas hoy, te lo agradecerás mañana", "tipo": "Spot de hábitos saludables — #SiTeCuidasHoy", "duracion": "2:38", "url": "https://www.youtube.com/watch?v=SqpMz2tj-_Y", "anio": "2024"}, {"titulo": "Semana del Corazón 2025", "tipo": "Spot de campaña anual", "duracion": "2:01", "url": "https://www.youtube.com/watch?v=ZI0g4zfZT4A", "anio": "2025"}, {"titulo": "¿Qué es #PACTOSportucorazón?", "tipo": "Divulgación — campaña de prevención", "duracion": "1:05", "url": "https://www.youtube.com/watch?v=bpCOeIADtuQ", "anio": "2023"}, {"titulo": "¿Cuántas personas padecen y mueren por insuficiencia cardiaca en España?", "tipo": "Divulgación — enfermedad cardiovascular", "duracion": "0:57", "url": "https://www.youtube.com/watch?v=_TerFHllV3k", "anio": "2023"}], "ultimaActualizacion": "junio 2026"}</script>
<script type="application/json" id="data-aldeas">{"id": "aldeas", "emoji": "🏠", "nombre": "AI", "full": "Aldeas Infantiles SOS España", "color": "#f59e0b", "claim": "Nacida en Austria en 1949 para dar hogar a niños huérfanos de la Segunda Guerra Mundial, Aldeas Infantiles SOS opera en España desde 1967 y hoy es parte de una red en 137 países y territorios que atiende a 7,9 millones de personas en todo el mundo.\n\nEn 2025, 20.900 niños, niñas y jóvenes y 4.763 familias atendidos en España (de los que 18.329 estaban en situación de vulnerabilidad y desamparo familiar), y 47.505 menores y 13.567 familias en total entre España y Latinoamérica. Cuidan a quienes han perdido el cuidado parental o están en riesgo de perderlo, desde el primer día de vida hasta la plena emancipación.\n\nPresidida por Pedro Puig: \"Respondemos a crisis simultáneas — emergencias climáticas como la DANA de Valencia, guerras como Ucrania y Gaza — ayudando a quienes soportan las peores consecuencias.\" En 2016, Aldeas Infantiles SOS Internacional recibió el Premio Princesa de Asturias de la Concordia — uno de los reconocimientos más prestigiosos a nivel mundial — por su labor en favor de la infancia.", "meta": [{"label": "En España desde", "val": "1967"}, {"label": "En el mundo", "val": "137 países y territorios"}, {"label": "Socios/padrinos/donantes", "val": "307.991"}, {"label": "Niños/as España 2025", "val": "20.900 (4.763 familias)"}], "cifras": [{"num": "20.900", "label": "Niños, niñas y jóvenes atendidos en España en 2025, junto a 4.763 familias, a través de programas de prevención, protección y apoyo a jóvenes. De ellos, 18.329 estaban en situación de vulnerabilidad y desamparo familiar."}, {"num": "47.505", "label": "Menores atendidos en el mundo en 2025 (España + 7 países de Latinoamérica), junto a 13.567 familias. En Latinoamérica: 26.605 niños/as y 8.804 familias en Bolivia, El Salvador, Guatemala, Honduras, Nicaragua, Perú y Venezuela."}, {"num": "307.991", "label": "Socios, padrinos y donantes que sostienen la labor de Aldeas Infantiles SOS en España en 2025, junto al apoyo de más de 400 empresas, fundaciones e instituciones públicas."}, {"num": "59,9 M€", "label": "Ingresos totales en 2025, con resultado positivo. El 72,1% procede de financiación privada (socios, padrinos, donantes y empresas) y el 27,9% de subvenciones públicas."}, {"num": "2,7 M", "label": "Niños, niñas y adolescentes en riesgo de pobreza o exclusión social en España (2024) — más de un tercio de la población infantil del país. La pobreza infantil volvió a aumentar pese a descender en el resto de la población."}, {"num": "75 años", "label": "Aldeas Infantiles SOS cumplió 75 años de historia en 2024, iniciada en Austria en 1949. En España, mantiene el Sello EFQM 400+ (una de las acreditaciones más exigentes de Europa) y la Certificación Keeping Children Safe Nivel 1."}, {"num": "40,9%", "label": "Personas que crecieron en el sistema de protección en España y hoy están en riesgo de pobreza o exclusión social, frente al 24,5% de la población general — muchas debieron emanciparse a los 18 años sin red familiar o económica suficiente. Dato del informe \"Condiciones de vida tras salir del sistema de protección\", Memoria 2025."}], "programas": [{"emoji": "👨‍👩‍👧", "name": "Programas de Prevención — 30 Centros de Día y fortalecimiento familiar", "desc": "Los Programas de Prevención de Aldeas buscan evitar que los niños y niñas sean separados de sus familias, trabajando con las familias en riesgo antes de que la situación se deteriore. En 2025 cuentan con 30 Centros de Día en toda España, 9 Programas de Familias y 5 Centros de Educación Infantil (0-3 años).\n\nLos Centros de Día ofrecen apoyo escolar, talleres socioeducativos, apoyo emocional e intervención familiar a niños en situación de vulnerabilidad. Los Programas de Familias incluyen terapia familiar e individual, mediación, orientación parental, atención a madres y padres jóvenes, y grupos de apoyo.\n\nLos programas Caixa Proinfancia atienden a la infancia más vulnerable de 0 a 18 años en colaboración con la Obra Social La Caixa. En Aragón, el proyecto Aulas de Convivencia lleva el modelo preventivo directamente a los colegios.\n\nLa familia G.O., del Centro de Día de Madrid, llegó buscando apoyo psicológico para su hijo menor: \"al principio le costó venir, pero hoy es el primero en llegar y el último en irse\", cuentan; \"para nuestra familia ha supuesto un antes y un después\". Junto con los programas de educación en valores y proyectos escolares, comunitarios y de educación ambiental, los Programas de Prevención atendieron en 2025 a 18.329 niños, niñas y adolescentes y a 3.639 familias — el grueso de toda la actividad de Aldeas en España.", "dato": "2025: 18.329 niños/as · 3.639 familias · 30 Centros de Día · 5 CEI (0-3 años) · 9 Programas de Familias · Caixa Proinfancia · Aulas de Convivencia"}, {"emoji": "🏠", "name": "Aldea Infantil SOS y Residencias de Jóvenes — acogimiento residencial", "desc": "Las 8 Aldeas Infantiles SOS de España ofrecen un entorno familiar protector a niños, niñas y adolescentes que por distintos motivos no pueden vivir con su familia biológica. En cada hogar conviven entre 5 y 6 niños, principalmente grupos de hermanos, junto a una educadora de referencia y educadores de apoyo. Entre 6 y 10 hogares de este tipo, con espacios de ocio compartidos (parque infantil, zona deportiva, sala de usos múltiples), forman una Aldea Infantil SOS.\n\nLa Aldea de Granada está situada en el Albaicín y se compone de 5 casas con biblioteca, sala de actividades, pista de baloncesto y amplios jardines. Alexandra llegó a la Aldea Infantil SOS de Cuenca a los 14 años, tras complicaciones familiares que le impidieron seguir viviendo con sus padres: \"Afortunadamente, siempre hay una luz en la oscuridad, esta luz para mí era toda la gente y los profesionales que encontré en mi nuevo camino\", cuenta seis años después.\n\nEn las 5 Residencias de Jóvenes de España conviven entre 6 y 8 chicos y chicas en su etapa previa a la emancipación, con una intervención basada en normalización, atención integral, educabilidad e individualización. El Programa de Primera Acogida y Valoración completa el dispositivo, ofreciendo respuesta inmediata y temporal a niños en situación de urgencia mientras se define su futuro.\n\nEn conjunto, todos los Programas de Protección (Aldeas, Residencias, Primera Acogida y Acogimiento Familiar) acogieron en 2025 a 1.430 niños, niñas y adolescentes y apoyaron a 1.124 familias.", "dato": "2025: 1.430 niños/as acogidos · 1.124 familias apoyadas (todos los Programas de Protección) · 8 Aldeas (5-6 niños/hogar, 6-10 hogares/Aldea) · 5 Residencias Jóvenes (6-8 jóvenes) · 1 Primera Acogida y Valoración · Testimonio real: Alexandra, Aldea de Cuenca"}, {"emoji": "🤝", "name": "Acogimiento Familiar — AcogES+ e Historias en Juego", "desc": "El Programa de Apoyo al Acogimiento en Familia se divide en tres líneas — Familia Extensa, Familia Ajena y Familia Ajena Especializada — e incluye servicios como sensibilización y formación a familias acogedoras, Puntos de Encuentro y Mediación Familiar, grupos de autoayuda y \"respiro familiar\" para dar descanso a las familias acogedoras.\n\nDentro de esta línea, el programa AcogES+ (Acogimiento Familiar Especializado con Dedicación Exclusiva) ha acercado el acogimiento especializado a más de 1.500 familias y formado a 160 profesionales a lo largo del proyecto. Stephana, madre biológica de un niño en el Programa de Acogimiento en Familia Ajena de Tenerife, recuperó su custodia tras trabajar con el equipo de Aldeas y la familia de acogida: \"esperaba toda la semana las visitas en el punto de encuentro, pero las despedidas siempre me rompían el corazón (...) actualmente, mi hijo vive conmigo y estamos muy felices\".\n\nVinculada a AcogES+, la campaña \"Historias en Juego\" recogió 14.172 firmas ciudadanas para promover el acogimiento familiar especializado a nivel legislativo y fue presentada a las administraciones autonómicas. La exposición itinerante \"Juntos porque somos hermanos\" (33 imágenes de 33 captadores de todo el mundo sobre el vínculo fraterno en acogimiento) recorrió Madrid, Granada, Málaga, Valencia y Vigo.", "dato": "10 Programas de Acogimiento Familiar (Extensa/Ajena/Ajena Especializada) · AcogES+: +1.500 familias contactadas, 160 profesionales formados · Historias en Juego: 14.172 firmas · Exposición Juntos porque somos hermanos (5 ciudades)"}, {"emoji": "🚀", "name": "Programa de Jóvenes — de la protección a la emancipación", "desc": "Aldeas Infantiles SOS acompaña a los jóvenes que han crecido en el sistema de protección mucho más allá de los 18 años. El sistema público los desampara al cumplir la mayoría de edad: Aldeas garantiza continuidad.\n\nEn 2025, el Programa de Jóvenes en España apoyó a 1.141 chicos y chicas a través de 8 Proyectos de Autonomía (pisos asistidos con acompañamiento educativo y social), 8 Proyectos de Emancipación (seguimiento a jóvenes que ya viven solos y vuelven a necesitar apoyo), 8 Servicios de Empleo (orientación, talleres, contacto con empresas, apoyo al emprendimiento), el Proyecto Ágora en Granada (competencias personales, sociales y laborales en barrios vulnerables), 2 Programas Profesionales (formación en oficios como cocina y automoción) y un nuevo Servicio de Postacogimiento para quienes ya han salido de los programas pero necesitan apoyo puntual.\n\nLa ayuda cubre vivienda, formación, búsqueda de empleo y apoyo psicológico cuando es necesario. Antes de los proyectos de Autonomía y Emancipación, el Proyecto Tránsito a la Vida Adulta prepara a los jóvenes para el paso a la mayoría de edad, ayudándoles a tomar conciencia de su propio proyecto de vida. Los Programas Profesionales están dirigidos a jóvenes mayores de 16 años sin el título de Graduado en ESO ni de Formación Profesional, ofreciéndoles una vía de cualificación y reinserción educativa y laboral.\n\nYaritsa, de 24 años, pasó por el Programa de Jóvenes de Las Palmas tras una infancia sin los recursos ni el apoyo necesarios: hoy ha terminado un ciclo formativo, una carrera universitaria y el B1 de inglés. \"Todo este proceso ha sido, para mí, reparar el corazón y llenar mi maleta de herramientas para seguir caminando\", cuenta.", "dato": "2025: 1.141 jóvenes apoyados · 8 Proyectos Autonomía · 8 Proyectos Emancipación · 8 Servicios Empleo · Proyecto Ágora Granada · 2 Programas Profesionales · Nuevo: Servicio Postacogimiento"}, {"emoji": "📚", "name": "Educación en Valores — Abraza tus Valores y Párate a Pensar", "desc": "Desde 1997 (Abraza tus Valores) y 2004 (Párate a Pensar), Aldeas Infantiles SOS desarrolla Programas de Educación en Valores en colaboración con centros educativos de toda España. \"Abraza tus Valores\" (Infantil y Primaria) y \"Párate a Pensar\" (Secundaria) enseñan respeto, empatía, confianza, tolerancia, responsabilidad e igualdad.\n\nEn 2024, llegaron a 231.600 alumnos y alumnas en 2.316 centros educativos de toda España. La actividad \"Diputados por un Día\" llevó a 140 niños y niñas de 7 colegios al Congreso de los Diputados, donde ejercieron activamente su derecho a la participación y votaron 14 propuestas. La VII Jornada Nacional de Jóvenes, con representantes de todas las comunidades autónomas, elaboró de forma colaborativa un Decálogo sobre el uso de las tecnologías.", "dato": "231.600 alumnos en 2.316 centros (2024) · Abraza tus Valores (1997) + Párate a Pensar (2004) · Diputados por un Día: 140 niños, 7 colegios, 14 propuestas votadas · VII Jornada Nacional de Jóvenes: Decálogo tecnologías"}, {"emoji": "🌎", "name": "Cooperación internacional — 7 países de Latinoamérica", "desc": "Desde Aldeas Infantiles SOS de España se impulsan proyectos de cooperación internacional con el objetivo de reducir la pobreza, frenar la desigualdad y generar oportunidades para la infancia y las familias en situación de vulnerabilidad. En 2025 financió programas en 7 países latinoamericanos — Bolivia, El Salvador, Guatemala, Honduras, Nicaragua, Perú y Venezuela — trabajando en fortalecimiento de capacidades parentales, vínculos afectivos seguros y acceso a educación, salud y acompañamiento psicosocial.\n\nEn total, apoyó a 26.605 niños, niñas y jóvenes y a 8.804 familias a través de 13 Programas de Cuidado Alternativo, 15 Programas de Jóvenes, 35 Programas de Fortalecimiento Familiar y Comunitario y 26 Programas de Educación y Capacitación. En Honduras, el proyecto \"Modelo Comunitario de Crianza y Protección: Vínculos para el Desarrollo Integral en Choluteca y Tegucigalpa\", financiado por el Gobierno de Canarias, alcanzó importantes avances en sus primeros seis meses de ejecución.", "dato": "2025: 26.605 niños/as · 8.804 familias · 7 países: Bolivia, El Salvador, Guatemala, Honduras, Nicaragua, Perú, Venezuela · 13 Cuidado Alternativo + 15 Jóvenes + 35 Fortalecimiento Familiar + 26 Educación · Honduras: proyecto financiado por Gobierno de Canarias"}, {"emoji": "🏛️", "name": "Incidencia política — derechos de la infancia", "desc": "Aldeas Infantiles SOS no solo cuida a la infancia: trabaja para cambiar las leyes y políticas que afectan a los niños más vulnerables.\n\nEn 2024 colideró la campaña \"Vota por la infancia\" con motivo de las elecciones europeas, para situar los derechos de la infancia en la agenda comunitaria. Visibilizó en el Congreso de los Diputados la realidad de los jóvenes que salen del sistema de protección, lo que culminó con el registro de una Proposición no de Ley. Organizó un evento paralelo en la Cumbre del Futuro de Naciones Unidas en Nueva York.\n\nCerró el proyecto europeo Together (participación política de infancia y juventud vulnerable), premiado como Experiencia Transformadora por la EAPN. Se unió a la Alianza Global por los Cuidados y forma parte del Comité de Emergencia y de la Coordinadora de Organizaciones para el Desarrollo (CONGDE).\n\nEn 2025, contribuyó a la evaluación de la Estrategia de Erradicación de la Violencia contra la Infancia y la Adolescencia, participó en el ECOSOC Youth Forum 2025 de Naciones Unidas, y promovió la participación de niños, niñas y jóvenes en iniciativas sobre salud mental, paz e inteligencia artificial — incluyendo un Diálogo de Alto Nivel sobre IA y cooperación en la SEGIB (Madrid, abril 2025).", "dato": "'Vota por la infancia' (elecciones europeas 2024) · Proposición no de Ley en el Congreso · Cumbre ONU Nueva York · Premio EAPN Proyecto Together · Alianza Global por los Cuidados · CONGDE · 2025: Estrategia Erradicación Violencia Infancia · ECOSOC Youth Forum · Diálogo IA SEGIB Madrid"}, {"emoji": "🛡️", "name": "Política de Protección Infantil y certificaciones de calidad", "desc": "Toda la labor de Aldeas Infantiles SOS se apoya en su Política de Protección Infantil, gestionada por un Comité de Política Infantil propio y basada en la Convención de Derechos del Niño de la ONU y los estándares de la coalición \"Keeping Children Safe\". Se estructura en tres pilares: Conciencia (espacios formales de diálogo sobre protección infantil entre niños y adultos, y una red de protección activa con otras entidades), Prevención (formación y sensibilización de todos los colaboradores, y empoderamiento de los niños como agentes activos de su propia protección y la de sus compañeros) y Denuncia (investigación de cualquier caso de desprotección).\n\nEsta política se traduce en certificaciones externas de primer nivel: el Sello EFQM 400+ (una de las acreditaciones de excelencia más exigentes de Europa), la Certificación AENOR ISO 9001 de gestión de calidad, Quality4Children (estándares específicos de acogimiento) y la Certificación de Nivel 1 de Keeping Children Safe, que verifica el cumplimiento de los estándares globales de protección infantil.", "dato": "Comité de Política Infantil: Conciencia-Prevención-Denuncia (CDN ONU + Keeping Children Safe) · Sello EFQM 400+ · AENOR ISO 9001 · Quality4Children · Keeping Children Safe Nivel 1"}, {"emoji": "🏫", "name": "Academia SOS — Formación, calidad e investigación institucional", "desc": "La Academia SOS es el recurso estratégico de Aldeas Infantiles SOS para fortalecer la formación, impulsar la calidad e integrar la investigación como ejes fundamentales para la mejora continua. En 2024, Aldeas obtuvo la certificación en Transparencia y Buen Gobierno de la Coordinadora de Organizaciones para el Desarrollo (CONGDE) — un sello distinto pero complementario al Sello EFQM 400+ que sustenta la Política de Protección Infantil (ver ese programa).\n\nEn formación: 3.229 personas participaron en 74 acciones formativas programadas con una satisfacción promedio de 4,3 sobre 5. La formación incluye formación inicial (obligatoria para todas las incorporaciones, tanto plantilla como voluntariado), formación continua (protección infantil, trauma, gestión emocional, herramientas digitales) y formación especializada para familias acogedoras.\n\nEn investigación, destacan cuatro estudios en 2024: Evaluación del modelo AcogES+ (mejoras significativas en bienestar y vínculo afectivo); Sentirse en familia (más de 300 niños en entornos residenciales, factores de sentido de pertenencia); Evaluación de los cuidados en acogimiento residencial (realizada en 2024 en 8 Aldeas, 4 Residencias de Jóvenes —hoy ya son 5—, Pisos y Programa de Primera Acogida); y la Encuesta general de salud mental infanto-juvenil (más de 3.700 niños, niñas y jóvenes en 77 programas, con necesidad de reforzar enfoques terapéuticos orientados al trauma y neurodesarrollo). Los resultados se han presentado en el XIII Congreso Iberoamericano de Psicología y en la Universidad Pontificia de Comillas.\n\nLa medición de satisfacción de 2024 alcanzó a 4.598 participantes en encuestas, incluyendo 2.467 niños, niñas, adolescentes y jóvenes (1.252 niñas y 1.215 niños), 1.432 familias, 379 colegios y 195 personas de la administración. Los grados de satisfacción (sobre 5): niños/as y jóvenes: 4,36; familias: 4,63; administración: 4,60; centros educativos: 4,68; voluntarios y profesionales en prácticas: 4,61.", "dato": "Transparencia y Buen Gobierno CONGDE · 3.229 personas en 74 acciones formativas · Satisfacción 4,3/5 · Encuesta salud mental: 3.700 niños en 77 programas · 4 estudios de investigación · 4.598 encuestados · Satisfacción familias 4,63 · centros educativos 4,68"}, {"emoji": "♿", "name": "Aldeas Inclusiva — Centro Especial de Empleo e inclusión real", "desc": "Aldeas Inclusiva trabaja para contribuir a la plena inclusión de las personas con discapacidad en la sociedad, dando respuesta a sus necesidades y generando oportunidades reales. Su eje central es el Centro Especial de Empleo de Iniciativa Social (CEEIS), con cuatro líneas de negocio: Ecoembalajes (embalaje sostenible, reconocida como referente del sector), Ecoagricultura (reconocida por la Red Rural Nacional como buena práctica de dinamización rural), Manipulados y Educa (educación inclusiva, con más de 3.489 alumnos en 2024).\n\nEn 2024, 69 personas con discapacidad intelectual trabajaron en el CEEIS, de las que 15 proceden de Aldeas Infantiles SOS. El Proyecto SENDA (cofinanciado por CEPES con cargo al Fondo Social Europeo Plus) mejoró la productividad, la estructura organizativa y el clima laboral.\n\nEl Proyecto Social incluye el programa Serendipia (autonomía e independencia: 3 personas completaron su proceso de emancipación en 2024), Kairós (Escuela de Ocio y Tiempo Libre Inclusiva inaugurada en 2024 en colaboración con la Universidad de Granada, Fundación 'la Caixa' y el Ayuntamiento de Deifontes, con formación homologada y certificados del sector del ocio), el Servicio de Ajuste Personal y Social (SAPS, con 21 planes individuales de trabajo), y la Comisión de Ocio y Tiempo Libre (actividades como el Desafío VALE). Aldeas Inclusiva trabaja en alianza con CEPES, Fundación Unicaja y Fundación 'la Caixa'.", "dato": "69 personas con discapacidad en CEEIS · 4 líneas: Ecoembalajes, Ecoagricultura, Manipulados, Educa · 3.489 alumnos Educa · Kairós inaugurada 2024 · Serendipia: 3 emancipaciones · SAPS: 21 planes individuales"}, {"emoji": "🌱", "name": "Naturaleza Educa y Educación Afectivo-Sexual", "desc": "El Programa de Educación Afectivo-Sexual trabaja relaciones saludables, prevención de violencia, identidades y diversidad con los niños y jóvenes de todos los programas de Aldeas.\n\nEl programa \"Naturaleza Educa\" utiliza el medio natural como herramienta educativa: huertos, equinoterapia social, granjas escuela y actividades de educación ambiental, presentes en todas las Aldeas, incluyendo la EcoGranja de Tenerife y el Espacio Malvaseda de Zaragoza (con terapia ecuestre), con proyectos como \"Un día rural\", \"Hogares sostenibles\" (retos de ahorro de agua, luz y reciclaje por hogar) y \"Pequeños grandes granjeros\" (cuidado de animales, siembra y recolección).\n\nEn Cataluña, el servicio Connectem impartió 47 talleres en institutos sobre gestión emocional, autoestima y salud digital, con la campaña \"Una Semana Sin Pantallas\" que invitó a toda la Comunidad Escolar (alumnos, profesores y familias) a desconectarse temporalmente de los dispositivos digitales.", "dato": "Naturaleza Educa: equinoterapia, EcoGranja Tenerife, Espacio Malvaseda Zaragoza, Un día rural, Hogares sostenibles, Pequeños grandes granjeros · Connectem (Cataluña): 47 talleres · Una Semana Sin Pantallas"}, {"emoji": "🙋", "name": "Voluntariado — presencia territorial en toda España", "desc": "El programa de Voluntariado es transversal: gestiona la incorporación, participación, seguimiento y salida de personas voluntarias en los proyectos y servicios que Aldeas Infantiles SOS desarrolla en cada territorio, facilitando la vinculación entre la sociedad y la organización y proporcionando la formación necesaria para su actividad.\n\nAldeas Infantiles SOS participa activamente en plataformas de voluntariado de toda España: es miembro de la Junta Directiva de la Plataforma de Voluntariado de Granada (Andalucía), y forma parte de la Coordinadora Aragonesa de Voluntariado y la Federación Aragonesa de Solidaridad, la Federación Plataforma de Entidades de Voluntariado de Canarias, la Federación Catalana de Voluntariado Social y la Plataforma de Voluntariado Galego. Esta presencia institucional en plataformas regionales muestra el arraigo territorial de Aldeas más allá de sus propios centros.", "dato": "Junta Directiva Plataforma Voluntariado Granada (Andalucía) · Coordinadora Aragonesa de Voluntariado · Federación Plataforma Entidades Voluntariado Canarias · Federación Catalana de Voluntariado Social · Plataforma de Voluntariado Galego"}], "fondos": [{"label": "Programas sociales (España + cooperación internacional)", "pct": 80}, {"label": "Captación de recursos, gestión de socios y justificación de subvenciones", "pct": 14.2}, {"label": "Administración y gestión de la entidad", "pct": 5.8}], "web": "https://www.aldeasinfantiles.es", "problema": "En España, más de 2,7 millones de niños, niñas y adolescentes están en riesgo de pobreza o exclusión social — más de un tercio de la población infantil del país, una cifra que volvió a aumentar en 2024 pese a descender en el resto de la población.\n\nUna parte de esa infancia vulnerable acaba en el sistema de protección: en 2025, Aldeas atendió en España a 1.430 niños, niñas y jóvenes en situación de desamparo (acogidos en Aldeas, Residencias de Jóvenes o familias de acogida), además de 18.329 menores y 3.639 familias dentro de sus programas de prevención, dirigidos a evitar que la separación llegue a producirse.\n\nEl sistema público de protección tiene, además, un punto ciego: al cumplir 18 años, miles de jóvenes que han crecido sin familia salen del sistema de un día para otro, sin red de apoyo, sin vivienda y muchas veces sin empleo.\n\nAldeas es una de las pocas organizaciones que sigue acompañando a estos jóvenes después de la mayoría de edad, con proyectos de autonomía, emancipación y, desde 2025, un servicio de postacogimiento para quienes ya salieron del sistema pero necesitan ayuda puntual más adelante.", "motivosSocio": ["Acompañamiento de por vida, no hasta los 18: el sistema público desampara a los jóvenes tutelados al cumplir la mayoría de edad. Aldeas es de las pocas organizaciones que sigue a su lado después: en 2025, 1.141 jóvenes recibieron apoyo en proyectos de autonomía, emancipación, empleo y, desde 2025, un nuevo servicio de postacogimiento para quienes ya salieron del programa pero necesitan ayuda puntual más adelante.", "Los hermanos nunca se separan: en las 8 Aldeas de España, mantener unidos a los grupos de hermanos en el mismo hogar es una prioridad — para muchos niños es el único vínculo familiar estable que les queda. La campaña \"Historias en Juego\" llevó esta lucha más allá de las Aldeas, recogiendo 14.172 firmas para que las familias de acogida también prioricen acoger a hermanos juntos.", "No solo cuida, también cambia leyes: en 2024, Aldeas llevó a jóvenes ex-tutelados al Congreso de los Diputados, organizó un evento paralelo en la Cumbre del Futuro de la ONU en Nueva York y colideró la campaña europea \"Vota por la infancia\". En 2025, Mariam, una joven que creció en la Aldea de Madrid y hoy participa en el Programa de Jóvenes, llevó ese mismo mensaje al Foro de Derechos de la Infancia de la Unión Europea, reclamando que el apoyo a quienes han pasado por el sistema de protección no termine a los 18 años. Esa incidencia también llega a las aulas: en la cuarta edición de \"Diputados por un Día\" (2025), 146 niños y niñas de 7 centros educativos votaron propuestas reales en el propio Congreso. Los programas de Educación en Valores (\"Abraza tus Valores\" y \"Párate a Pensar\") llegaron en 2024 a 231.600 alumnos en 2.316 centros educativos de toda España.", "75 años de trayectoria y máximas certificaciones de calidad: nacida en Austria en 1949 para dar hogar a niños huérfanos de la Segunda Guerra Mundial, hoy opera en 137 países. En España, desde 1967, mantiene el Sello EFQM 400+ — una de las acreditaciones más exigentes de Europa — y la Certificación Keeping Children Safe Nivel 1, además del sello de Transparencia y Buen Gobierno de la CONGDE.", "Una organización a la vanguardia de los riesgos de hoy: Aldeas no se ha quedado anclada en el modelo de \"hogar de acogida\" de 1949. En marzo de 2026 publicó \"Enredados con las pantallas\", una guía elaborada con una docena de expertos (psicólogos, fiscales, sociólogos) sobre ciberacoso, adicción a pantallas, IA y salud mental infantil — y participó activamente en la redacción del Proyecto de Ley Orgánica para la protección de menores en entornos digitales, aportando recomendaciones concretas sobre control parental, verificación de edad y prevención de adicciones."], "fuentesCompletas": [{"texto": "Aldeas Infantiles SOS · Cifras oficiales 2025 (comunicadas en área de prensa y web institucional; la Memoria 2025 en PDF aún no está publicada — se espera ~septiembre 2026, como ocurrió con la Memoria 2024)", "url": "https://www.aldeasinfantiles.es/area-prensa"}, {"texto": "Aldeas Infantiles SOS · Memoria 2024 / Finanzas 2024 (año anterior, usada para datos de programas de Educación en Valores y contexto histórico)", "url": "https://cms.aldeasinfantiles.es/uploads/2025/07/memoria-2024-extensa.pdf"}, {"texto": "Aldeas Infantiles SOS · Enredados con las pantallas (marzo 2026)", "url": "https://www.aldeasinfantiles.es/area-prensa/guia-enredados-con-las-pantallas"}, {"texto": "Aldeas Infantiles SOS · Testimonio de Alexandra, \"Somos supervivientes de nuestro pasado\" (27 marzo 2019)", "url": "https://www.aldeasinfantiles.es/actualidad/testimonios/somos-supervivientes-de-nuestro-pasado/"}, {"texto": "Aldeas Infantiles SOS · Memoria Aldeas 2025 (testimonios de Yaritsa, Stephana y familia G.O.; cifras de socios, financiación e informes 2025)", "url": "https://www.aldeasinfantiles.es/wp-content/uploads/2026/06/Memoria-Socios-2025.pdf"}], "verificado": "Datos verificados junio 2026", "captacion": {"resumen30": {"cifras": ["2,7 M", "
